                <option key={k} value={k}>{DEVICE_PRESETS[k].name + " · " + DEVICE_PRESETS[k].w + "×" + DEVICE_PRESETS[k].h}</option>
              ))}
            </select>
            <button onClick={() => setPreviewLandscape((v) => !v)} style={{ fontSize: 12, cursor: "pointer", background: previewLandscape ? "#2E5BFF" : "#0f1420", color: "#e8edf4", border: "1px solid #3a4356", borderRadius: 6, padding: "4px 10px" }}>{previewLandscape ? "Landscape" : "Portrait"}</button>
            <button onClick={() => setMpNonce((n) => n + 1)} style={{ fontSize: 12, cursor: "pointer", background: "#0f1420", color: "#e8edf4", border: "1px solid #3a4356", borderRadius: 6, padding: "4px 10px" }}>Reload</button>
            <span style={{ color: "#8fa3bd", fontSize: 11 }}>{vw + "×" + vh + " · @" + dev.dpr + "x" + (scale < 1 ? " · " + Math.round(scale * 100) + "%" : "")}</span>
            <button onClick={() => setMobilePreview(false)} style={{ fontSize: 12, cursor: "pointer", background: "#2E5BFF", color: "#fff", border: "none", borderRadius: 6, padding: "5px 12px", fontWeight: 600 }}>Close</button>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap", justifyContent: "center", marginBottom: 10 }}>
            <span style={{ color: "#8fa3bd", fontSize: 11, marginRight: 2 }}>Persona:</span>
            {personaOpts.map((o) => (
              <button key={o.key} onClick={() => { handleSetPersona(o.key); setTimeout(() => setMpNonce((n) => n + 1), 350); }} style={{ fontSize: 11, padding: "3px 9px", borderRadius: 999, cursor: "pointer", border: "1px solid rgba(255,255,255,.4)", background: personaKey === o.key ? "#C2410C" : "transparent", color: "#fff", fontWeight: personaKey === o.key ? 700 : 500 }}>{o.name}</button>
            ))}
          </div>
          <div style={{ width: (vw + 24) * scale, height: (vh + 24) * scale, flex: "0 0 auto" }}>
            <div style={{ width: vw, height: vh, transform: "scale(" + scale + ")", transformOrigin: "top left", border: "12px solid #1a1f2b", borderRadius: previewLandscape ? 34 : 42, boxSizing: "content-box", background: "#fff", boxShadow: "0 24px 70px rgba(0,0,0,.6)", overflow: "hidden" }}>
              <iframe
                key={previewDevice + (previewLandscape ? "-l" : "-p") + "-" + mpNonce}
                src={src}
                title="Mobile preview"
                style={{ width: vw, height: vh, border: "none", background: "#fff", display: "block" }}
              />
            </div>
          </div>
          <div style={{ color: "#5f7291", fontSize: 10, marginTop: 16, textAlign: "center", maxWidth: 480, lineHeight: 1.5 }}>Runs the real mobile code path inside the frame: touch input, pointer:coarse, mobile viewport and PWA standalone display are emulated. Not a desktop resize.</div>
        </div>
        );
      })()}
      {isDev && !MP_PREVIEW && stage !== "dashboard" && (
        <button onClick={doSkipToDashboard} title="Load the dummy statement data + Dec £15,000 goal and jump straight to the dashboard" style={{ position: "fixed", bottom: 12, right: 12, zIndex: 9999, background: "#2E5BFF", color: "#fff", padding: "11px 18px", borderRadius: 10, fontSize: 13, fontWeight: 700, border: "none", cursor: "pointer", boxShadow: "0 6px 20px rgba(46,91,255,.4)" }}>⚡ Skip to dashboard</button>
      )}
      {stage === "dashboard" && <NotificationBanner notes={notifications} onDismiss={dismissNote} />}
      {content}
      {reviewMonth && (
        <MonthEndReviewModal
          month={reviewMonth}
          transactions={customTransactions}
          budgets={reviewBudgets}
          goal={goals && goals.length ? goals[0] : null}
          onAction={handleReviewAction}
          onClose={closeReview}
          isManual={reviewManual}
          plan={plan}
          allTargets={allTargets}
        />
      )}
      {showSplash && <LoginSplash />}
      <ToastContainer toasts={toasts} />
    </>
  );
}

/* Remove the pre-React boot shell now that we're about to paint the real UI. */
/* Render into a sibling node rather than #root itself: createRoot() wipes its
   container, which was yanking the boot shell out mid-animation (it just
   flashed and vanished). Mount alongside it, then fade the shell out once the
   logo animation has had time to land. */
(function () {
  const shell = document.getElementById("boot-shell");
  const rootEl = document.getElementById("root");
  const mount = document.createElement("div");
  rootEl.appendChild(mount);
  ReactDOM.createRoot(mount).render(<App />);
  if (shell) {
    const started = window.__bootStart || Date.now();
    /* Only mobile plays the animation, so only mobile waits for it to land.
       Desktop shows a static logo and can drop it as soon as React is up. */
    const animated = window.matchMedia("(max-width: 760px)").matches
      && !window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    const wait = animated ? Math.max(0, 1500 - (Date.now() - started)) : 0;
    setTimeout(function () {
      shell.style.transition = "opacity .45s ease";
      shell.style.opacity = "0";
      setTimeout(function () { if (shell.parentNode) shell.parentNode.removeChild(shell); }, 480);
    }, wait);
  }
})();

  .trend-tip { position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%); background: var(--card); box-shadow: var(--shadow-pop); border: 1px solid var(--line); color: var(--ink); font-size: 11px; font-weight: 600; padding: 4px 8px; border-radius: 6px; white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity 0.12s; z-index: 6; }
  .trend-bar-col:hover .trend-tip { opacity: 1; }
  .trend-bar { width: 60%; max-width: 120px; border-radius: 6px 6px 0 0; background: var(--accent); transition: height 0.4s ease; }
  .trend-bar-wrap.dual .trend-bar { width: 42%; max-width: 78px; }
  .income-bar { background: linear-gradient(180deg, var(--pos), #2fae90); }
  .spend-bar { background: var(--accent); }
  .trend-bar-label { color: var(--ink-3); font-size: 11px; }
  .legend-row { display: flex; gap: 16px; margin-top: 12px; }
  .legend-item { display: flex; align-items: center; gap: 6px; color: var(--ink-2); font-size: 12px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* insights */
  .insight-list { display: flex; flex-direction: column; gap: 10px; margin-top: 14px; }
  .insight-row { display: flex; align-items: flex-start; gap: 10px; padding: 12px; border-radius: 14px; font-size: 13px; color: var(--ink); background: var(--surface-2); border: 1px solid var(--line); }
  .insight-icon { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }

  /* ---------------- landing page ---------------- */
  .landing-page { background: var(--bg); color: var(--ink); position: relative; min-height: 100vh; overflow-x: hidden; }
  .lp-wrap { position: relative; z-index: 1; max-width: 1000px; margin: 0 auto; padding: 0 24px; }
  .lp-nav {
    position: sticky; z-index: 2; display: flex; align-items: center; justify-content: space-between;
    padding: 18px 24px; background: var(--card);
    border-bottom: 1px solid var(--line); top: 0;
    will-change: transform; transform: translateZ(0);
  }
  .lp-nav-actions { display: flex; gap: 10px; }
  .btn { font-family: inherit; font-weight: 600; cursor: pointer; border-radius: 12px; padding: 10px 18px; font-size: 14px; border: 1px solid var(--line); transition: all 0.18s ease; }
  .btn-primary { color: var(--on-accent); background: var(--accent); box-shadow: 0 6px 20px var(--accent-shadow); border: none; }
  .btn-primary:hover { filter: brightness(1.08); }
  .btn-ghost { color: var(--ink); background: var(--surface-2); }
  .btn-ghost:hover { background: var(--surface-3); }
  .btn-large { padding: 16px 32px; font-size: 16px; border-radius: 16px; }

  .lp-hero { text-align: center; padding: 90px 24px 60px; position: relative; z-index: 1; }
  .hero-eyebrow { display: inline-block; font-size: 12px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--accent); background: var(--accent-soft); border: 1px solid var(--accent-soft); padding: 6px 14px; border-radius: 999px; margin-bottom: 24px; }
  .lp-hero h1 { font-size: 56px; font-weight: 700; letter-spacing: -0.02em; margin: 0 0 20px; line-height: 1.15; color: var(--ink); }
  .lp-hero p { font-size: 18px; color: var(--ink-2); max-width: 520px; margin: 0 auto 34px; line-height: 1.55; }
  .hero-actions { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
  .lp-hero-copy p.hero-try-note, .hero-try-note { display: block; text-align: center; max-width: 380px; font-size: 13px; color: var(--ink-3); margin: 22px auto 0; font-weight: 500; line-height: 1.55; }

  .lp-section { padding: 60px 24px; position: relative; z-index: 1; }
  .section-head { text-align: center; max-width: 560px; margin: 0 auto 36px; }
  .section-head h2 { font-size: 26px; font-weight: 700; letter-spacing: -0.01em; margin: 0 0 8px; color: var(--ink); }
  .section-head p { color: var(--ink-2); font-size: 14px; margin: 0; }

  .reveal { opacity: 0; transform: translateY(24px); transition: opacity 0.7s ease, transform 0.7s ease; will-change: opacity, transform; }
  .reveal.in-view { opacity: 1; transform: translateY(0); will-change: auto; }

  /* --- immersive how-it-works --- */
  .lp-step { display: grid; grid-template-columns: 1fr 1.2fr; gap: 40px; align-items: center; margin: 56px 0; }
  .lp-step-flip { direction: rtl; }
  .lp-step-flip > * { direction: ltr; }
  .lp-step-copy h3 { color: var(--ink); font-size: 26px; margin: 14px 0 10px; letter-spacing: -0.01em; }
  .lp-step-copy p { color: var(--ink-2); font-size: 16px; line-height: 1.6; margin: 0; }
  .lp-demo-card { background: var(--surface-2); border: 1px solid var(--line); border-radius: 16px; padding: 26px; min-height: 250px; position: relative; overflow: hidden; }

  /* step 1: file drop */
  .lpd-upload { display: flex; align-items: center; justify-content: center; }
  .lpd-zone { width: 100%; border: 2px dashed var(--line); border-radius: 16px; padding: 38px 20px; text-align: center; transition: border-color .3s; }
  .lpd-zone-inner { position: relative; }
  .lpd-zone-hint { color: var(--ink-2); font-size: 14px; display: block; }
  .lpd-file { position: absolute; top: 18px; left: 24px; z-index: 2; background: var(--card); box-shadow: var(--shadow-pop); border: 1px solid var(--line); border-radius: 12px; padding: 10px 14px; display: flex; align-items: center; gap: 10px; opacity: 0; }
  .lpd-file-icon { font-size: 18px; }
  .lpd-file-meta { display: flex; flex-direction: column; gap: 2px; text-align: left; }
  .lpd-file-name { color: var(--ink); font-size: 12px; font-weight: 600; }
  .lpd-file-bank { color: var(--ink-3); font-size: 10px; font-weight: 600; }
  .lpd-file-2 { top: 44px; left: 44px; }
  .lpd-progress { height: 6px; border-radius: 3px; background: var(--surface-3); margin: 16px auto 0; max-width: 260px; overflow: hidden; opacity: 0; }
  .lpd-progress-fill { height: 100%; width: 0; border-radius: 3px; background: var(--grad-2, var(--accent)); }
  .lpd-done { color: var(--pos); font-size: 14px; font-weight: 600; margin-top: 12px; opacity: 0; }
  .in-view .lpd-file-1 { animation: lpdFly 1.5s ease-in-out 0.4s forwards; }
  .in-view .lpd-file-2 { animation: lpdFly 1.5s ease-in-out 0.9s forwards; }
  .in-view .lpd-zone { animation: lpdZonePulse 0.5s ease 2.2s; }
  .in-view .lpd-progress { animation: lpdShow 0.3s ease 2.4s forwards; }
  .in-view .lpd-progress-fill { animation: lpdFill 1s ease 2.6s forwards; }
  .in-view .lpd-done { animation: lpdPop 0.4s ease 3.7s forwards; }
  @keyframes lpdFly { 0% { opacity: 0; transform: translate(-30px,-30px) rotate(-6deg); } 15% { opacity: 1; } 70% { opacity: 1; transform: translate(120px, 70px) rotate(3deg) scale(1); } 100% { opacity: 0; transform: translate(130px, 90px) scale(0.55); } }
  @keyframes lpdZonePulse { 0% { border-color: var(--line); } 40% { border-color: var(--pos); box-shadow: 0 0 0 4px rgba(18,161,80,0.15); } 100% { border-color: var(--line); } }
  @keyframes lpdShow { to { opacity: 1; } }
  @keyframes lpdFill { to { width: 100%; } }
  @keyframes lpdPop { 0% { opacity: 0; transform: translateY(8px) scale(0.9); } 100% { opacity: 1; transform: translateY(0) scale(1); } }

  /* step 2: categorise */
  .lpd-cat { display: flex; flex-direction: column; gap: 12px; }
  .lpd-tx { display: flex; justify-content: space-between; align-items: center; gap: 12px; opacity: 0; transform: translateY(10px); }
  .in-view .lpd-tx { animation: lpdRow 0.45s ease forwards; }
  .lpd-tx-left { display: flex; flex-direction: column; gap: 2px; }
  .lpd-tx-name { color: var(--ink); font-size: 13px; font-weight: 600; letter-spacing: 0.01em; }
  .lpd-tx-amt { color: var(--ink-3); font-size: 12px; }
  .lpd-chip { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; padding: 5px 11px; border-radius: 999px; opacity: 0; transform: scale(0.6); }
  .in-view .lpd-chip { animation: lpdChip 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards; }
  .lpd-ai-note { color: var(--ink-2); font-size: 13px; margin-top: 6px; opacity: 0; }
  .in-view .lpd-ai-note { animation: lpdShow 0.5s ease forwards; }
  @keyframes lpdRow { to { opacity: 1; transform: translateY(0); } }
  @keyframes lpdChip { to { opacity: 1; transform: scale(1); } }

  /* step 3: views */
  .lpd-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
  .lpd-tab { font-family: inherit; font-size: 13px; font-weight: 600; color: var(--ink-2); background: var(--surface-2); border: 1px solid var(--line); border-radius: 999px; padding: 8px 15px; cursor: pointer; transition: all .15s; }
  .lpd-tab:hover { background: var(--surface-3); color: var(--ink); }
  .lpd-tab-active { background: var(--grad-2, var(--accent)); color: var(--on-accent); border-color: transparent; }
  .lpd-pane { display: flex; flex-direction: column; gap: 13px; min-height: 170px; }
  .lpd-bar-row { display: grid; grid-template-columns: 120px 1fr 56px; gap: 12px; align-items: center; }
  .lpd-bar-label { color: var(--ink); font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .lpd-bar-track { height: 8px; border-radius: 4px; background: var(--surface-2); overflow: hidden; }
  .lpd-bar-fill { height: 100%; border-radius: 4px; }
  .lpd-bar-amt { color: var(--ink); font-size: 13px; text-align: right; font-variant-numeric: tabular-nums; }
  .lpd-review-row { display: grid; grid-template-columns: 1.4fr 0.8fr 0.8fr 1.1fr; gap: 10px; align-items: center; font-size: 13px; color: var(--ink); padding: 4px 0; }
  .lpd-review-row > span:nth-child(2), .lpd-review-row > span:nth-child(3) { text-align: right; font-variant-numeric: tabular-nums; }
  .lpd-review-head { color: var(--ink-3); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; font-weight: 700; }
  .lpd-under { color: var(--pos); font-weight: 600; text-align: right; }
  .lpd-trend { flex-direction: row; align-items: flex-end; gap: 14px; padding: 10px 6px 0; }
  .lpd-trend-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; height: 160px; justify-content: flex-end; }
  .lpd-trend-bar { width: 100%; max-width: 42px; border-radius: 6px 6px 3px 3px; background: var(--grad-2, var(--accent)); transition: height .4s ease; }
  .lpd-trend-label { color: var(--ink-3); font-size: 11px; }
  .lpd-goal { display: flex; flex-direction: column; gap: 8px; background: var(--surface-2); border-radius: 14px; padding: 14px; }
  .lpd-goal-top { display: flex; justify-content: space-between; color: var(--ink); font-size: 13px; font-weight: 600; }
  .lpd-goal-note { color: var(--ink-2); font-size: 12px; }
  .lpd-views-hint { color: var(--ink-3); font-size: 12px; margin-top: 16px; text-align: center; }
  .lpd-cur-num { font-size: 17px; letter-spacing: 0; line-height: 1; }
  .step-num .ic { vertical-align: 0; }
  .lpd-cur-head { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
  .lpd-cur-head .lpd-cur-soon { margin-left: auto; }
  .lpd-cur-label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-3); font-weight: 600; }
  .lpd-cur-toggle { display: flex; background: var(--surface-2); border: 1px solid var(--line); border-radius: 999px; padding: 3px; }
  .lpd-cur-opt { font-family: inherit; font-size: 13px; font-weight: 700; color: var(--ink-2); background: none; border: none; border-radius: 999px; padding: 6px 16px; cursor: pointer; transition: all .15s; }
  .lpd-cur-opt-on { background: var(--grad-2, var(--accent)); color: var(--on-accent); }
  .lpd-cur-accounts { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .lpd-cur-acc { font-size: 12px; font-weight: 600; color: var(--ink-2); background: var(--surface-2); border: 1px solid var(--line); border-radius: 8px; padding: 5px 10px; }
  .lpd-cur-tx { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--line); }
  .lpd-cur-tx-name { font-size: 13px; color: var(--ink); }
  .lpd-cur-tx-amt { display: flex; flex-direction: column; align-items: flex-end; line-height: 1.3; }
  .lpd-cur-tx-amt > span:first-child { font-size: 14px; font-weight: 700; color: var(--ink); font-variant-numeric: tabular-nums; }
  .lpd-cur-conv { font-size: 11px; color: var(--ink-3); font-weight: 500; }
  .lpd-cur-pos { color: var(--pos) !important; }
  .lpd-cur-total { display: flex; align-items: center; justify-content: space-between; margin-top: 14px; padding: 13px 14px; background: var(--accent-soft); border: 1px solid var(--accent); border-radius: 12px; }
  .lpd-cur-total span { font-size: 13px; color: var(--ink-2); }
  .lpd-cur-total b { font-size: 18px; color: var(--ink); font-variant-numeric: tabular-nums; }
  @media (max-width: 760px) {
    .lp-step { grid-template-columns: 1fr; gap: 20px; margin: 40px 0; }
    .lp-step-flip { direction: ltr; }
    .lpd-bar-row { grid-template-columns: 100px 1fr 50px; }
  }

  .steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
  .step-num { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: var(--accent); font-weight: 700; font-size: 13px; margin-bottom: 12px; color: var(--on-accent); }

  .features { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .feature-card { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 22px 20px; box-shadow: var(--shadow-card); transition: transform 0.2s ease, box-shadow 0.2s ease; display: flex; flex-direction: column; }
  .feature-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-pop); }
  .feature-icon { width: 40px; height: 40px; border-radius: 11px; display: flex; align-items: center; justify-content: center; background: var(--accent-soft); color: var(--accent); margin-bottom: 14px; }
  .feature-card h4 { font-size: 15px; font-weight: 700; margin: 0 0 6px; color: var(--ink); }
  .feature-card p { font-size: 13px; color: var(--ink-2); margin: 0 0 16px; line-height: 1.55; }
  .fc-viz { margin-top: auto; padding-top: 14px; border-top: 1px solid var(--line); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; min-height: 28px; }
  .fc-q { font-size: 11px; font-weight: 600; color: var(--on-accent); background: var(--accent); padding: 4px 9px; border-radius: 12px 12px 12px 3px; }
  .fc-a { font-size: 11px; font-weight: 600; color: var(--ink-2); background: var(--surface-2); padding: 4px 9px; border-radius: 12px; }
  .fc-roll-from, .fc-roll-to { font-size: 11px; font-weight: 700; padding: 4px 9px; border-radius: 20px; }
  .fc-roll-from { color: var(--ink-2); background: var(--surface-2); }
  .fc-roll-to { color: var(--accent); background: var(--accent-soft); }
  .fc-roll-arrow { color: var(--ink-3); font-weight: 700; }
  .fc-chip { font-size: 11px; font-weight: 700; color: var(--accent); background: var(--accent-soft); padding: 4px 10px; border-radius: 20px; }
  .fc-chip-soft { color: var(--ink-3); background: var(--surface-2); }
  .fc-viz-goal { gap: 10px; }
  .fc-bar { flex: 1; height: 7px; background: var(--surface-3); border-radius: 5px; overflow: hidden; }
  .fc-bar span { display: block; height: 100%; background: var(--accent); border-radius: 5px; }
  .fc-bar-label { font-size: 11px; font-weight: 700; color: var(--ink-2); }
  .fc-bill { font-size: 11px; font-weight: 600; color: var(--ink-2); background: var(--surface-2); padding: 4px 9px; border-radius: 20px; }
  .fc-bill-due { color: var(--accent); background: var(--accent-soft); }

  .pricing { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; max-width: 620px; margin: 0 auto; align-items: stretch; }
  .price-card { background: var(--surface-2); border: 1px solid var(--line); border-radius: 16px; padding: 28px; text-align: center; display: flex; flex-direction: column; }
  .price-card.highlight { border-color: var(--accent); background: linear-gradient(160deg, var(--accent-soft), var(--accent-soft)); box-shadow: 0 8px 30px var(--accent-shadow); }
  .price-tag { font-size: 12px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
  .price-amount { font-size: 32px; font-weight: 700; margin-bottom: 4px; color: var(--ink); }
  .price-period { font-size: 13px; color: var(--ink-3); margin-bottom: 18px; }
  .price-features { list-style: none; padding: 0; margin: 0 0 22px; text-align: left; } .price-card .btn { margin-top: auto; }
  .price-features li { font-size: 13px; color: var(--ink-2); padding: 6px 0; padding-left: 22px; position: relative; }
  .price-features li::before { content: "✓"; position: absolute; left: 0; color: var(--pos); font-weight: 700; }

  .lp-final-cta { text-align: center; padding: 70px 24px 90px; position: relative; z-index: 1; }
  .lp-final-cta h2 { font-size: 28px; margin: 0 0 12px; letter-spacing: -0.01em; color: var(--ink); }
  .lp-final-cta p { color: var(--ink-2); margin: 0 0 24px; }

  .lp-footer { position: relative; z-index: 1; text-align: center; padding: 22px; color: var(--ink-3); font-size: 12px; border-top: 1px solid var(--line); }

  @media (max-width: 720px) {
    .lp-hero h1 { font-size: 36px; }
    .steps, .features { grid-template-columns: 1fr; }
    .pricing { grid-template-columns: 1fr; }
    /* perf: drop per-frame blur compositing that janks scroll on mobile */
    .lp-nav { background: var(--card); will-change: auto; }
    .lp-demo-card { background: var(--card); }
    .feature-card { background: var(--card); }
    .price-card { background: var(--card); }
    .landing-page .blob3 { display: none; }
    .landing-page .blob { filter: blur(38px); opacity: 0.4; }
  }

  /* stage transitions */
  .stage-fade { animation: stageFadeIn 0.35s ease; }
  @keyframes stageFadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .modal-backdrop { position: fixed; inset: 0; background: rgba(6,10,18,0.72); display: flex; align-items: center; justify-content: center; padding: 18px; z-index: 200; animation: mbFade .2s ease; }
  @keyframes mbFade { from { opacity: 0; } to { opacity: 1; } }
  .review-modal { position: relative; width: 100%; max-width: 440px; max-height: 92vh; overflow-y: auto; padding: 24px 22px; animation: mbPop .25s cubic-bezier(0.34,1.4,0.64,1); }

  /* ---- plan wizard ---- */
  .pw-methods { display: flex; flex-direction: column; gap: 10px; margin: 14px 0 4px; }
  .pw-method { text-align: left; background: var(--surface-2); border: 1px solid var(--line); border-radius: 14px; padding: 14px 16px; cursor: pointer; color: var(--ink); font-family: inherit; display: flex; flex-direction: column; gap: 4px; transition: border-color .15s, background .15s; }
  .pw-method:hover { border-color: var(--accent-solid); background: var(--surface-2); }
  .pw-method-title { font-weight: 700; font-size: 14px; }
  .pw-method-sub { font-size: 13px; color: var(--ink-2); line-height: 1.45; }
  .pw-goal-line { font-size: 13px; color: var(--ink-2); line-height: 1.55; background: var(--surface-2); border: 1px solid var(--line); border-radius: 12px; padding: 10px 14px; margin: 4px 0 0; }
  .pw-goal-line b { color: var(--ink); }
  .pw-summary { font-size: 13px; color: var(--ink-2); line-height: 1.55; background: var(--accent-soft); border: 1px solid var(--accent); border-radius: 12px; padding: 10px 14px; margin: 10px 0 0; }
  .pw-summary b { color: var(--ink); }
  .bt-income-row .bt-input, .bt-income-row .bt-cur { color: var(--pos); }
  .bt-net-pos { color: var(--pos) !important; }
  .bt-net-neg { color: #ff6b6b !important; }

  /* ---- month-end review plan options ---- */
  .plan-opt { text-align: left; width: 100%; background: var(--surface-2); border: 1px solid var(--line); border-radius: 14px; padding: 13px 15px; cursor: pointer; color: var(--ink); font-family: inherit; display: flex; flex-direction: column; gap: 4px; margin-top: 10px; transition: border-color .15s, background .15s; }
  .plan-opt:hover { border-color: var(--accent-solid); background: var(--surface-2); }
  .plan-opt:disabled { opacity: 0.6; cursor: default; }
  .plan-opt-title { font-weight: 700; font-size: 14px; }
  .plan-opt-sub { font-size: 13px; color: var(--ink-2); line-height: 1.5; }
  .plan-opt-sub b { color: var(--ink); }

  /* ---- long-term plan grid ---- */
  .ltp-wrap { overflow-x: auto; border-radius: 14px; border: 1px solid var(--line); background: var(--card); }
  .ltp-table { border-collapse: separate; border-spacing: 0; width: 100%; font-size: 13px; }
  .ltp-table th, .ltp-table td { padding: 7px 12px; text-align: right; white-space: nowrap; border-bottom: 1px solid var(--line); }
  .ltp-table thead th { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-3); border-bottom: 1px solid var(--line); }
  .ltp-table .ltp-sticky { position: sticky; left: 0; background: var(--card); text-align: left; font-weight: 600; color: var(--ink); min-width: 140px; z-index: 3; border-right: 1px solid var(--line-strong); box-shadow: 6px 0 8px -4px rgba(0,0,0,0.28); }
  .ltp-table .ltp-sticky .cat-dot { margin-right: 7px; }
  .ltp-actual-head { color: var(--ink-2) !important; }
  .ltp-plan-head { color: var(--accent-solid) !important; }
  .ltp-actual { color: var(--ink); }
  .ltp-plan { color: var(--accent); }

  .goal-row { display: flex; flex-direction: column; background: var(--surface-2); border: 1px solid var(--line); border-radius: 16px; padding: 14px 16px; }
  .goal-row-head { display: flex; align-items: center; justify-content: space-between; }
  .goal-name { color: var(--ink); font-size: 14px; font-weight: 600; }
  .goal-add-row { display: flex; gap: 8px; margin-top: 12px; align-items: stretch; }
  .goal-add-btn { flex: 0 0 auto; padding: 8px 16px; font-size: 13px; border-radius: 12px; }

  .toast-stack {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    z-index: 100; display: flex; flex-direction: column; gap: 8px; align-items: center;
  }
  .toast {
    padding: 10px 18px; border-radius: 14px; font-size: 13px; font-weight: 500; color: var(--on-accent);
    background: #1B2028;
    border: 1px solid var(--line);
    box-shadow: 0 6px 20px rgba(0,0,0,0.35);
    animation: toastIn 0.25s ease;
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  /* ---- coding-up animation ---- */
  .processing-anim-card { max-width: 440px; }
  .code-feed { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; width: 100%; min-height: 40px; }
  .code-row { display: flex; align-items: center; gap: 8px; background: var(--surface-2); border: 1px solid var(--line); border-radius: 12px; padding: 9px 12px; animation: codeRowIn 0.5s ease; }
  .code-name { color: var(--ink); font-size: 13px; font-weight: 500; flex: 1; text-align: left; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .code-arrow { color: var(--ink-3); font-size: 14px; flex-shrink: 0; }
  .code-cat { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 999px; border: 1px solid; flex-shrink: 0; }
  .code-cat-dot { width: 7px; height: 7px; border-radius: 50%; }
  @keyframes codeRowIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* ---- confirm categorisation ---- */
  .confirm-tx-card { display: flex; align-items: center; justify-content: space-between; background: var(--surface-2); border: 1px solid var(--line); border-radius: 16px; padding: 16px 18px; margin-top: 6px; }
  .confirm-tx-name { color: var(--ink); font-size: 16px; font-weight: 600; }
  .confirm-tx-amount { color: var(--ink-2); font-size: 14px; font-weight: 600; }
  .confirm-select { flex: 1; background: none; border: none; color: var(--ink); font-family: inherit; font-size: 14px; font-weight: 600; outline: none; cursor: pointer; padding: 8px 6px; }
  .confirm-select option { background: var(--card); color: var(--ink); }
  .month-tab { flex: 0 0 auto; font-family: inherit; font-size: 13px; font-weight: 600; color: var(--ink-2); background: var(--surface-2); border: 1px solid var(--line); border-radius: 10px; padding: 8px 12px; cursor: pointer; }
  .apply-all-btn { align-self: flex-start; margin: 18px 0 6px; padding: 4px 0; text-align: left; }

  /* ---- empty widget slot ---- */
  .slot-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--ink-3); gap: 8px; text-align: center; }
  .slot-empty-icon { width: 40px; height: 40px; border-radius: 50%; border: 1.5px dashed var(--line); display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 300; color: var(--ink-3); }
  .slot-empty p { font-size: 12px; margin: 0; max-width: 160px; }

  /* ---- dashboard tour ---- */
  .overview-slot-coming { align-items: center; justify-content: center; display: flex; opacity: 0.5; }
  .coming-soon { color: var(--ink-3); font-size: 13px; font-style: italic; }
  .overview-slot.tour-active { border-style: solid; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-shadow); animation: slotPop 0.4s ease; }
  @keyframes slotPop { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
  .welcome-banner { position: relative; z-index: 62; text-align: center; color: var(--ink); font-size: 14px; font-weight: 600; padding: 10px 20px; background: linear-gradient(135deg, var(--accent-soft), var(--accent-soft)); border-bottom: 1px solid var(--line); }
  .tour-card { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 63; width: calc(100% - 40px); max-width: 380px; background: linear-gradient(180deg, #F4F7FF 0%, #FFFFFF 55%); border: 1.5px solid var(--accent); border-radius: 16px; padding: 22px; box-shadow: 0 18px 44px rgba(46,91,255,0.22), 0 4px 12px rgba(16,24,40,0.10); animation: tourCardIn 0.3s ease; }
  .tour-card-v2 { max-width: 420px; margin: 0 auto; background: linear-gradient(180deg, #F7F9FF 0%, #FFFFFF 60%); border: 1px solid rgba(46,91,255,0.35); border-radius: 18px; padding: 20px; box-shadow: 0 20px 48px rgba(16,24,40,0.20), 0 4px 14px rgba(16,24,40,0.10); animation: tourCardIn 0.28s ease; }
  .tour-root { position: fixed; inset: 0; z-index: 2147482999; }
  @keyframes tourCardIn { from { opacity: 0; transform: translate(-50%, 16px); } to { opacity: 1; transform: translate(-50%, 0); } }
  .tour-step-count { color: var(--accent); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .tour-title { color: var(--ink); font-size: 18px; font-weight: 700; margin: 0 0 6px; }
  .tour-body { color: var(--ink-2); font-size: 14px; line-height: 1.5; margin: 0 0 16px; }
  .tour-dots { display: flex; gap: 6px; margin-bottom: 16px; }
  .tour-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--surface-3); }
  .tour-dot-on { background: var(--accent); }
  .tour-next { width: 100%; }

  /* ---- tour spotlight (steps that point at the top bar / side menu) ---- */
  /* .topbar sets transform+z-index, so it owns a stacking context and a child can
     never rise above the tour card from inside it. Lift the bar itself instead. */
  .topbar-tour-lift { z-index: 61; }
  .tour-spot { position: relative; z-index: 1; border-radius: 14px; animation: tourSpotPulse 1.6s ease-in-out infinite; }
  /* .side-panel clips with overflow:hidden, so an outset ring gets cut — inset it. */
  .side-panel.tour-spot { z-index: 61; border-radius: 0; animation: tourSpotPulseInset 1.6s ease-in-out infinite; }
  @keyframes tourSpotPulse {
    0%   { box-shadow: 0 0 0 0 var(--accent-shadow), 0 0 0 2px var(--accent); }
    70%  { box-shadow: 0 0 0 12px transparent, 0 0 0 2px var(--accent); }
    100% { box-shadow: 0 0 0 0 transparent, 0 0 0 2px var(--accent); }
  }
  @keyframes tourSpotPulseInset {
    0%   { box-shadow: inset 0 0 0 2px var(--accent), inset 0 0 0 2px var(--accent-shadow); }
    70%  { box-shadow: inset 0 0 0 2px var(--accent), inset 0 0 0 12px transparent; }
    100% { box-shadow: inset 0 0 0 2px var(--accent), inset 0 0 0 0 transparent; }
  }
  /* Keep the card clear of whatever it's pointing at. */
  .tour-card-spot-upload, .tour-card-spot-inbox { bottom: auto; top: 96px; left: auto; right: 24px; transform: none; animation: tourCardInPlain 0.3s ease; }
  .tour-card-spot-menu { bottom: auto; top: 120px; left: auto; right: 24px; transform: none; animation: tourCardInPlain 0.3s ease; }
  @keyframes tourCardInPlain { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @media (max-width: 560px) {
    /* Content steps (safe-to-spend, breakdown, big picture, needs): pin the card to the
       TOP under the header. The highlighted card scrolls into the space below it. */
    .tour-card-content {
      top: 82px; bottom: auto; left: 14px; right: 14px; width: auto; max-width: none;
      transform: none; animation: tourCardInPlain 0.3s ease;
    }
    /* Spot steps (+ / inbox / menu) point at the top bar & menu. Pin the card to the
       BOTTOM so it never covers those icons — the pulsing ring draws the eye up. */
    .tour-card-spot-upload, .tour-card-spot-inbox, .tour-card-spot-menu {
      top: auto; bottom: 22px; left: 14px; right: 14px; width: auto; max-width: none;
      transform: none; animation: tourCardIn 0.3s ease;
    }
    .tour-card-spot-upload::before, .tour-card-spot-inbox::before, .tour-card-spot-menu::before { display: none; }
  }

  /* ---- budget ring (monthly summary) ---- */
  .budget-ring-wrap { position: relative; display: flex; justify-content: center; align-items: center; margin: 10px 0 4px; }
  .budget-ring { width: 150px; height: 150px; }
  .budget-ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .budget-ring-pct { color: var(--ink); font-size: 30px; font-weight: 700; letter-spacing: -0.02em; }
  .budget-ring-sub { color: var(--ink-3); font-size: 12px; margin-top: 2px; }
  .overspend-alert { background: rgba(217,45,32,0.15); border: 1px solid rgba(217,45,32,0.4); color: var(--neg); font-size: 12px; font-weight: 600; border-radius: 12px; padding: 8px 12px; text-align: center; margin: 6px 0 2px; }
  .category-name .cat-dot { display: inline-block; margin-right: 6px; vertical-align: middle; }
  .breakdown-scroll { flex: 1; overflow-y: auto; min-height: 0; display: flex; flex-direction: column; justify-content: space-between; }

  /* ---- added: greeting / trends / customise / bills-edit ---- */
  .overview-greeting { color: var(--ink); font-size: 20px; font-weight: 700; letter-spacing: -0.02em; margin: 2px 0 16px; }
  .uncat-banner-block { border-bottom: none; border: 1px solid var(--line); border-radius: 14px; margin: 0 4px 14px; justify-content: space-between; }
  .safe-hero { background: linear-gradient(150deg, var(--accent-soft), rgba(127,107,255,0.10)); border: 1px solid var(--accent); border-radius: 16px; padding: 18px 20px; margin: 0 0 18px; }
  .safe-hero-row { display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap; }
  .safe-hero-main { display: flex; flex-direction: column; gap: 2px; }
  .safe-hero-label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-2); font-weight: 700; }
  .safe-hero-num { font-size: 38px; font-weight: 800; color: var(--ink); letter-spacing: -0.03em; line-height: 1.05; font-variant-numeric: tabular-nums; }
  .safe-hero-over { color: var(--neg); }
  .safe-hero-side { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; font-size: 13px; color: var(--ink-2); text-align: right; }
  .safe-hero-overtext { color: var(--neg); font-weight: 600; }
  .safe-hero-roll { font-size: 12px; color: var(--ink-3); }
  .safe-hero-track { height: 8px; background: var(--surface-2); border-radius: 5px; margin-top: 14px; overflow: hidden; }
  @media (max-width: 560px) { .safe-hero-side { align-items: flex-start; text-align: left; } .safe-hero-num { font-size: 34px; } }
  .trends-wrap { display: flex; flex-direction: column; gap: 16px; }
  .trend-cat-select { width: auto; min-width: 130px; }
  .customise-list { display: flex; flex-direction: column; gap: 8px; }
  .customise-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; border-radius: 12px; border: 1px solid var(--line); background: var(--surface-2); color: var(--ink); font-size: 14px; font-weight: 600; cursor: pointer; }
  .customise-row:disabled { opacity: 0.6; cursor: default; }
  .customise-row.customise-on { border-color: var(--accent); background: var(--accent-soft); color: var(--ink); }
  .customise-check { color: var(--accent); font-weight: 700; }
  .bill-right { display: flex; align-items: center; gap: 10px; }
  .bill-remove { background: rgba(217,45,32,0.14); border: 1px solid rgba(217,45,32,0.4); color: var(--neg); font-size: 11px; font-weight: 600; padding: 4px 8px; border-radius: 8px; cursor: pointer; white-space: nowrap; }
  .bill-remove:hover { background: rgba(217,45,32,0.25); }

  /* ---- added: monthly review & long-term plan ---- */
  .review-wrap { display: flex; flex-direction: column; gap: 16px; }
  .review-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 4px; }
  .review-tile { display: flex; flex-direction: column; gap: 2px; padding: 14px; border-radius: 16px; border: 1px solid var(--line); background: var(--surface-2); }
  .review-tile.rt-good { border-color: rgba(18,161,80,0.4); }
  .review-tile.rt-bad { border-color: rgba(217,45,32,0.4); }
  .review-tile.rt-flat { border-color: var(--line-strong); }
  .rt-flat .rt-verdict { color: var(--ink-3); }
  .rt-label { color: var(--ink-2); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
  .rt-actual { color: var(--ink); font-size: 30px; font-weight: 800; letter-spacing: -0.02em; line-height: 1.05; font-variant-numeric: tabular-nums; }
  .rt-planned { color: var(--ink-3); font-size: 12px; }
  .rt-verdict { font-size: 12px; font-weight: 600; margin-top: 4px; }
  .rt-good .rt-verdict { color: var(--pos); }
  .rt-bad .rt-verdict { color: var(--neg); }
  .review-table { display: flex; flex-direction: column; margin-top: 16px; }
  .review-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1.3fr; gap: 16px; align-items: center; padding: 15px 10px; border-bottom: 1px solid var(--line); font-size: 16px; color: var(--ink); }
  .review-row > span:nth-child(2), .review-row > span:nth-child(3), .review-row > span:nth-child(4) { text-align: right; font-variant-numeric: tabular-nums; }
  .review-head { color: var(--ink-3); font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700; padding: 4px 10px 12px; border-bottom: 1px solid var(--line); }
  .review-cat { display: flex; align-items: center; gap: 12px; font-weight: 500; }
  .review-cat .cat-dot { width: 11px; height: 11px; }
  .review-total { border-bottom: none; border-top: 1.5px solid var(--line); margin-top: 2px; padding-top: 16px; font-weight: 700; }
  .review-total .review-cat { font-weight: 700; }
  .rv-over { color: var(--neg); font-weight: 600; }
  .rv-under { color: var(--pos); font-weight: 600; }
  .plan-headline { display: flex; flex-direction: column; margin: 0 0 8px; }
  .plan-big { color: var(--ink); font-size: 34px; font-weight: 800; letter-spacing: -0.02em; line-height: 1.05; font-variant-numeric: tabular-nums; }
  .plan-sub { color: var(--ink-2); font-size: 13px; }
  .plan-verdict { font-size: 13px; font-weight: 600; padding: 10px 12px; border-radius: 12px; }
  .plan-verdict.rt-good { background: rgba(18,161,80,0.12); color: var(--pos); }
  .plan-verdict.rt-bad { background: rgba(217,45,32,0.12); color: var(--neg); }
  .plan-bar-actual { background: var(--pos) !important; }
  .plan-bar-forecast { background: var(--accent) !important; }
  @media (max-width: 560px) { .review-cards { grid-template-columns: 1fr; } }

/* ---- step 4: product-forward hero ---- */
  .lp-hero { display: block; text-align: center; padding: 90px 24px 64px; }
  .lp-hero-copy { max-width: 640px; margin: 0 auto; }
  .lp-hero-copy h1 { font-size: 52px; }
  .lp-hero-copy p { max-width: 520px; margin-left: auto; margin-right: auto; }
  .lp-trust-strip { max-width: 760px; margin: 0 auto; padding: 0 24px 8px; text-align: center; }
  .lp-trust-facts { display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 14px; }
  .lp-trust-fact { display: inline-flex; align-items: center; gap: 7px; font-size: 14px; font-weight: 600; color: var(--ink-2); }
  .lp-trust-fact .ic { color: var(--accent); }
  .lp-trust-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--line-strong); }
  .lp-trust-note { margin: 14px 0 0; font-size: 13px; color: var(--ink-3); }
  @media (max-width: 560px) { .lp-trust-dot { display: none; } .lp-trust-facts { gap: 10px 18px; } }
  .lp-hero-mock { display: flex; flex-direction: column; gap: 14px; animation: heroMockIn 0.7s cubic-bezier(0.22, 0.8, 0.3, 1) both 0.15s; }
  @keyframes heroMockIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
  .hm-card { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 18px 20px; box-shadow: var(--shadow-card); }
  .hm-card.hm-budgets { margin-left: 26px; }
  .hm-label { display: block; font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 6px; }
  .hm-big { font-size: 34px; font-weight: 800; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; color: var(--ink); }
  .hm-sub { display: block; font-size: 12px; color: var(--ink-3); margin-top: 8px; font-variant-numeric: tabular-nums; }
  .hm-track { height: 8px; border-radius: 5px; background: var(--surface-2); overflow: hidden; margin-top: 12px; }
  .hm-track.sm { height: 5px; margin-top: 6px; }
  .hm-fill { height: 100%; border-radius: 5px; background: var(--accent); animation: barGrow 1s cubic-bezier(0.22, 0.8, 0.3, 1); }
  .hm-fill.warn { background: #E8A23D; }
  .hm-row { display: flex; gap: 10px; align-items: flex-start; padding: 8px 0; }
  .hm-row + .hm-row { border-top: 1px solid var(--line); }
  .hm-ico { width: 26px; height: 26px; border-radius: 8px; background: var(--surface-2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
  .hm-cat { flex: 1; min-width: 0; }
  .hm-cat-top { display: flex; justify-content: space-between; font-size: 13px; font-weight: 600; color: var(--ink); font-variant-numeric: tabular-nums; }
  @media (max-width: 900px) {
    .lp-hero { grid-template-columns: 1fr; gap: 34px; padding: 48px 20px 44px; }
    .lp-hero-copy h1 { font-size: 36px; }
    .hm-card.hm-budgets { margin-left: 0; }
  }

  /* ---- step 5: chart motion ---- */
  @keyframes barUp { from { height: 0; } }
  .trend-bar, .ltp-bar-col .ltp-bar, .lpd-trend-bar { animation: barUp 0.7s cubic-bezier(0.22, 0.8, 0.3, 1); }
  .bd-pie-svg { animation: pieIn 0.55s cubic-bezier(0.22, 0.8, 0.3, 1); transform-origin: center; }
  @keyframes pieIn { from { opacity: 0; transform: scale(0.86); } to { opacity: 1; transform: none; } }
  @media (prefers-reduced-motion: reduce) {
    .trend-bar, .ltp-bar-col .ltp-bar, .lpd-trend-bar, .bd-pie-svg, .lp-hero-mock, .hm-fill { animation: none; }
  }

  .lp-hero-copy p { margin: 0 auto 34px; }
  .lp-hero-copy .hero-actions { justify-content: center; }
  @media (max-width: 900px) { .lp-hero-copy h1 { font-size: 36px; } }

  /* ================= mobile usability fixes (2026-07-09_) ================= */

  /* Fix: wide tables were forcing the whole page/card wide instead of scrolling
     within the table. Stop flex children from expanding to content width. */
  .body-row { min-width: 0; }
  .main-content, .main-content-wide { min-width: 0; }
  .main-content > *, .main-content-wide > * { min-width: 0; max-width: 100%; }
  .glass-card, .dash-card { min-width: 0; }
  .table-wrap, .ltp-wrap, .budget-table-wrap { min-width: 0; max-width: 100%; -webkit-overflow-scrolling: touch; }

  /* Freeze the first (label) column so it stays visible while scrolling right */
  .month-table th:first-child, .month-table td:first-child {
    position: sticky; left: 0; z-index: 2; background: var(--card);
  }
  .budget-table th:first-child, .budget-table td:first-child {
    position: sticky; left: 0; z-index: 2;
  }
  .budget-table thead th:first-child, .budget-table .bt-total-row td:first-child { background: var(--surface-2); }
  .budget-table tbody td:first-child { background: var(--card); }
  .budget-table tbody tr:hover td:first-child { background: var(--surface-2); }

  /* LTP banners: allow long lines to wrap instead of running off-screen */
  .plan-verdict, .plan-sub, .plan-headline { overflow-wrap: anywhere; word-break: break-word; }

  /* Sidebar close (x) — only shows on mobile where the hamburger sits behind the drawer */
  .side-panel-label-actions { display: flex; align-items: center; gap: 4px; }
  .side-close-btn { display: none; background: none; border: none; color: var(--ink-2); font-size: 22px; line-height: 1; cursor: pointer; padding: 0 6px; border-radius: 6px; }
  .side-close-btn:hover { color: var(--ink); background: var(--surface-2); }

  /* Modals: never let the top get clipped; scroll inside the card if it's tall */
  .modal-overlay { overflow-y: auto; }
  .modal-card { max-height: calc(100dvh - 40px); overflow-y: auto; }

  @media (max-width: 640px) {
    /* Header: keep logo + buttons from colliding / wrapping */
    .topbar { gap: 10px; }
    .topbar-left { gap: 8px; min-width: 0; flex: 1 1 auto; }
    .topbar-left .brand { min-width: 0; white-space: nowrap; flex-shrink: 0; }
    .topbar-right { flex-shrink: 0; }
    .upload-statement-btn { flex-shrink: 0; }
    .upload-btn-icon { display: block; }

    /* Sidebar drawer: show close control, allow it to scroll */
    .side-close-btn { display: inline-flex; align-items: center; justify-content: center; }
    .side-panel.side-panel-open { overflow-y: auto; }

    /* "Ask about your money": stack field + button so the placeholder isn't cramped */
    .ask-row { flex-direction: column; align-items: stretch; }
    .ask-btn { width: 100%; }
  }

  @media (max-width: 460px) {
    /* Landing nav on very small screens */
    .lp-nav { padding: 14px 16px; gap: 10px; }
    .lp-nav .brand { min-width: 0; }
    .lp-nav .brand-word { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .lp-nav-actions { flex-shrink: 0; gap: 8px; }
    .lp-nav-actions .btn { padding: 9px 12px; font-size: 13px; }
  }

  @media (max-width: 720px) {
    /* Landing page: tighten oversized, uneven vertical gaps */
    .lp-section { padding: 40px 20px; }
    .section-head { margin-bottom: 24px; }
    .lp-step { margin: 32px 0; }
    .lp-final-cta { padding: 48px 20px 64px; }
  }
  /* ============= end mobile usability fixes ============= */


  /* --- audit fixes: contrast, touch targets, close-btn hit-area --- */

  .oh-sec { display: flex; align-items: center; gap: 12px; margin: 22px 0 14px; }
  .oh-sec > span:first-child { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-3); white-space: nowrap; }
  .oh-sec-ctx { font-size: 12px; font-weight: 500; color: var(--ink-3); opacity: 0.85; }
  .oh-rule { flex: 1; height: 1px; background: var(--line); }
  .oh-pill { display: flex; align-items: center; gap: 12px; background: var(--accent-soft); border-radius: 999px; padding: 11px 18px; margin-top: 14px; }
  .oh-pill-icon { color: var(--accent); display: flex; flex-shrink: 0; }
  .oh-pill-text { font-size: 14px; color: var(--ink); line-height: 1.45; }
  /* Matches .dash-card (surface-2 / --radius-card / --card-pad) — it used to be
     the only card on the page with a white fill, 12px radius and an accent bar. */
  .oh-needs { background: var(--surface-2); border: 1px solid var(--line); border-radius: var(--radius-card); padding: var(--card-pad); }
  /* Option A: the nag stack that used to sit above the hero is now one pill below it. */
  .oh-needs-wrap { margin: 0 0 12px; }
  /* Option B: the missing-data note lives inside the hero, directly under the
     number it qualifies, so the caveat cannot be read separately from the figure. */
  .oh-gapnote { display: flex; align-items: center; gap: 10px; background: var(--card); border: 1px dashed var(--line-strong); border-radius: 12px; padding: 10px 12px; margin-top: 14px; }
  .oh-gapnote-ic { color: #B26A00; display: flex; flex-shrink: 0; }

  /* Inside a V2 hero the note sits on the hero's own surface, so it needs its
     own background rather than the card white used on the plain hero. */
  .oh-gapnote-v2 { margin-top: 12px; background: var(--surface-2); border-color: var(--line-strong); }
  /* Last month, demoted. Margins match the cards exactly (flush, no inset). */

  .oh-lastmonth-sub { font-size: 14px; color: var(--ink-3); font-weight: 500; }
  .oh-needs-pill { display: flex; align-items: center; gap: 10px; width: 100%; background: var(--surface-2); border: 1px solid var(--line); border-radius: 999px; padding: 11px 16px; cursor: pointer; font-family: inherit; text-align: left; transition: background 0.15s, border-color 0.15s; }
  .oh-needs-pill:hover { background: var(--surface-3); border-color: var(--line-strong); }

  .oh-needs-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
  .oh-needs-count { font-size: 12px; color: var(--ink-3); }

  .glass-btn.confirmed { color: var(--pos); background: rgba(18,161,80,0.12); border-color: rgba(18,161,80,0.4); cursor: default; }

  /* P1-6: neutral (zero) variance colour */

  .tgt-pair b { font-weight: 700; }

  .ltp-how { margin-top: 8px; }

  .ba-manage { font-size: 13px; color: var(--ink-3); }

  /* P4-1: right-edge scroll hint on wide tables (first column already frozen) */
  .ltp-wrap, .table-wrap, .budget-table-wrap {
    background-image:
      linear-gradient(to left, var(--card), rgba(255,255,255,0) 26px),

    background-position: right center, right center;
    background-size: 26px 100%, 15px 100%;
    background-repeat: no-repeat;
    background-attachment: local, scroll;
  }

  /* P5-3: consistent keyboard focus rings across interactive elements */
  .glass-btn:focus-visible, .btn:focus-visible, .link-btn:focus-visible, .edit-link:focus-visible,
  .tx-clear:focus-visible, .data-gap-btn:focus-visible, .ev-open-btn:focus-visible,

  }

  @media (max-width: 640px) {
    /* P2-2: budget rows go two-line so the progress bar keeps full width (not a thin tick) */
    .v2pt-row, .v2pt-row.v2pt-chips, .v2pt-row.v2pt-full { display: flex; flex-wrap: wrap; align-items: center; gap: 6px 10px; }
    .v2pt-nm { flex: 1 1 auto; order: 1; min-width: 0; }
    .v2pt-val, .v2pt-st { order: 2; margin-left: auto; white-space: nowrap; }
    .v2pt-chip, .v2pt-dd { order: 3; }
    .v2pt-track { order: 4; flex: 1 1 100%; width: 100%; height: 9px; }

    /* "Where it's gone": bar drops to its own full-width line, but the figures stay
       in a real grid. Flex + margin-left:auto let each row's £/% be positioned by
       that row's label width, so nothing lined up down the column. Fixed trailing
       tracks = every £ and % aligns. */
    .v2wg-row { display: grid; grid-template-columns: 1fr 62px 40px; align-items: center; column-gap: 10px; row-gap: 7px; }
    .v2wg-row .v2wg-nm { grid-column: 1; grid-row: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; }
    .v2wg-row .v2wg-amt { grid-column: 2; grid-row: 1; text-align: right; }
    .v2wg-row .v2wg-pc { grid-column: 3; grid-row: 1; text-align: right; }
    .v2wg-bar { grid-column: 1 / -1; grid-row: 2; width: 100%; }

    /* P4-3: stack the pace legend instead of cramming three items on a line */
    .v2-legend { flex-direction: column; gap: 6px; align-items: flex-start; }
    .v2-legend-tr { align-items: flex-start; }

    /* P4-4: testing-account view switcher scrolls in one row */
    .testing-bar { flex-wrap: nowrap !important; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .testing-bar > button { flex: 0 0 auto; }

    /* P4-5: drop the near-invisible progress bar on compare-to-target rows */
    .bd-list .category-track { height: 5px; }
  }

  .cur-seg { border: none; background: transparent; font-family: inherit; font-size: 15px; font-weight: 700; letter-spacing: 0.02em; color: var(--ink-3); padding: 10px 26px; border-radius: 9px; cursor: pointer; transition: all .15s ease; }
  .cur-seg:hover { color: var(--ink); }

  .lp-expat-card { background: var(--card, #fff); border: 1px solid var(--line, #e6e8ee); border-radius: 18px; padding: 24px 20px; text-align: left; box-shadow: 0 8px 24px rgba(16,24,40,0.04); }
  .lp-expat-ico { font-size: 26px; line-height: 1; margin-bottom: 12px; }

  .lpd-cur-soon { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; color: var(--accent); background: var(--accent-soft); border-radius: 999px; padding: 4px 10px; letter-spacing: 0.01em; white-space: nowrap; }
