                <tbody>
                  {users.length === 0 ? (
                    <tr><td colSpan={6} style={{ padding: 24, textAlign: "center", color: "var(--ink-3)" }}>No customers yet.</td></tr>
                  ) : users.map((u) => {
                    const b = badgeFor(u);
                    return (
                      <tr key={u.id} style={{ borderTop: "1px solid var(--line)", opacity: busy === u.id ? 0.5 : 1 }}>
                        <td style={{ padding: "11px 12px", color: "var(--ink)" }}>{u.email}</td>
                        <td style={{ padding: "11px 12px", color: "var(--ink-3)" }}>{fmtDate(u.created_at)}</td>
                        <td style={{ padding: "11px 12px" }}><span style={{ background: b.bg, color: b.c, fontSize: 12, fontWeight: 600, padding: "3px 10px", borderRadius: 999, whiteSpace: "nowrap" }}>{b.t}</span></td>
                        <td style={{ padding: "11px 12px", color: "var(--ink-2)" }}>{u.statements}</td>
                        <td style={{ padding: "11px 12px", color: "var(--ink-3)" }}>{fmtDate(u.last_sign_in_at)}</td>
                        <td style={{ padding: "11px 12px", textAlign: "right", whiteSpace: "nowrap" }}>
                          <button className="admin-act" onClick={() => openMsg(u)}>Message</button>
                          <button className="admin-act" onClick={() => doReset(u)}>Reset</button>
                          <button className="admin-act admin-act-danger" onClick={() => doDelete(u)}>Delete</button>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

/* ---------------- App shell / router ---------------- */

function App() {
  const [stage, setStage] = useState("landing");
  const [checkingSession, setCheckingSession] = useState(true);
  const [userId, setUserId] = useState(null);
  const [name, setName] = useState("");
  const [banks, setBanks] = useState([]);
  const [targets, setTargets] = useState({});
  const [balances, setBalances] = useState({});
  const [uploadedFiles, setUploadedFiles] = useState({});
  const [customTransactions, setCustomTransactions] = useState([]);
  const [statements, setStatements] = useState([]);
  const [bankRows, setBankRows] = useState([]);
  const [overviewSlots, setOverviewSlots] = useState(DEFAULT_OVERVIEW_SLOTS);
  const [navViews, setNavViews] = useState(VIEWS.map((v) => v.key));
  const [allTargets, setAllTargets] = useState({});
  const [targetsEditReq, setTargetsEditReq] = useState(false);
  const [billExcludes, setBillExcludes] = useState([]);
  const [extraProfile, setExtraProfile] = useState(null);
  const [showExtraBanner, setShowExtraBanner] = useState(false);
  const [legalTab, setLegalTab] = useState("privacy");
  const [returnStage, setReturnStage] = useState("welcome");
  const [toasts, setToasts] = useState([]);
  const [goals, setGoals] = useState([]);
  const [isDev, setIsDev] = useState(false);
  const [isAdmin, setIsAdmin] = useState(false);
  const [notifications, setNotifications] = useState([]);
  const [theme, setTheme] = useState("light");
  const [runTour, setRunTour] = useState(false);
  const [usingDemo, setUsingDemo] = useState(false);
  const [demoCurrencies, setDemoCurrencies] = useState(["GBP"]);
  const [monthReviews, setMonthReviews] = useState([]);
  const [plan, setPlan] = useState(null);
  const [rollovers, setRollovers] = useState([]);
  const [reviewMonth, setReviewMonth] = useState(null);
  const [signupMonth, setSignupMonth] = useState(null);
  const [devNow, setDevNow] = useState(null);
  const setDevDate = (val) => { DEV_NOW = val || null; setDevNow(val || null); };
  const [reviewManual, setReviewManual] = useState(false);
  const [sessionDismissed, setSessionDismissed] = useState([]);

  const pushToast = (message, type) => {
    const id = Date.now() + Math.random();
    setToasts((prev) => [...prev, { id, message, type }]);
    setTimeout(() => setToasts((prev) => prev.filter((t) => t.id !== id)), 2600);
  };

  const hasData = customTransactions.length > 0;

  React.useEffect(() => {
    if (!userId) { setMonthReviews([]); setRollovers([]); setNotifications([]); return; }
    (async () => {
      try {
        const [mr, ro] = await Promise.all([fetchMonthReviews(userId), fetchRollovers(userId)]);
        setMonthReviews(mr); setRollovers(ro);
      } catch (e) {}
      try {
        const { data: notes } = await supabaseClient.from("notifications").select("*").eq("user_id", userId).eq("read", false).order("created_at", { ascending: false });
        setNotifications(notes || []);
      } catch (e) {}
    })();
  }, [userId]);

  React.useEffect(() => {
    // Hold the month-end review until the user has finished the welcome tour and
    // any first-run setup — it should never interrupt onboarding.
    if (stage !== "dashboard" || reviewMonth || runTour) return;
    if (!hasData) return;
    // Real month-end: only review the month that has JUST completed (previous month
    // relative to today), never retrospectively surface older months.
    const prev = addMonths(currentMonthKey(), -1);
    // Never review months that closed before the customer signed up — the first
    // review a Cx should ever see is the signup month, once a new month opens.
    const baseline = signupMonth || new Date().toISOString().slice(0, 7);
    if (prev < baseline) return;
    const done = completedMonthsWithData(customTransactions);
    if (!done.includes(prev)) return;
    const reviewed = new Set(monthReviews.map((r) => r.month));
    if (reviewed.has(prev) || sessionDismissed.includes(prev)) return;
    const b = (allTargets && allTargets[prev]) || {};
    const hasBudget = TX_CATEGORIES.some((c) => Number(b[c]) > 0) || !!plan;
    if (hasBudget) { setReviewManual(false); setReviewMonth(prev); }
  }, [stage, customTransactions, allTargets, monthReviews, reviewMonth, sessionDismissed, isDev, runTour, showExtraBanner, hasData, plan, devNow, signupMonth]);

  const reviewBudgets = (() => {
    if (!reviewMonth) return {};
    const b = (allTargets && allTargets[reviewMonth]) || {};
    const hasBudget = TX_CATEGORIES.some((c) => Number(b[c]) > 0);
    return (!hasBudget && isDev) ? DEMO_TARGETS : b;
  })();

  const closeReview = () => {
    if (reviewMonth && !reviewManual) setSessionDismissed((p) => [...p, reviewMonth]);
    setReviewMonth(null); setReviewManual(false);
  };
  const openReviewManual = (monthKey) => { setReviewManual(true); setReviewMonth(monthKey); };

  const handleReviewAction = async (month, action, payload) => {
    const net = (payload && payload.net) || 0;
    try { await supabaseClient.from("month_reviews").upsert({ user_id: userId, month, net, action }, { onConflict: "user_id,month" }); } catch (e) {}
    setMonthReviews((prev) => [...prev.filter((r) => r.month !== month), { month, net, action }]);
    const insertRollovers = async (rows) => {
      try { const { data } = await supabaseClient.from("budget_rollovers").insert(rows).select(); if (data) setRollovers((p) => [...p, ...data.map(rowToRollover)]); }
      catch (e) { setRollovers((p) => [...p, ...rows.map((r) => ({ ...r, id: "local-" + Math.random() }))]); }
    };
    if (action === "catchup" && payload && payload.perMonth > 0) {
      const rows = [];
      for (let i = 1; i <= payload.months; i++) rows.push({ user_id: userId, month: addMonths(month, i), amount: -Math.abs(payload.perMonth), source: "catchup" });
      await insertRollovers(rows);
      pushToast("Plan applied — budgets trimmed by " + formatMoney(payload.perMonth) + "/mo", "success");
    } else if (action === "full" && net) {
      await insertRollovers([{ user_id: userId, month: addMonths(month, 1), amount: net, source: "rollover" }]);
      pushToast(formatMoney(Math.abs(net)) + " carried into next month", "success");
    } else if (action === "bank_surplus" && payload && payload.goalId && payload.amount > 0) {
      const g = goals.find((x) => x.id === payload.goalId);
      if (g) await goalsApi.update(g.id, { saved: (Number(g.saved) || 0) + payload.amount });
      pushToast(formatMoney(payload.amount) + " added to " + (g ? g.name : "your goal"), "success");
    } else if (action === "roll_surplus" && payload && payload.amount > 0) {
      await insertRollovers([{ user_id: userId, month: addMonths(month, 1), amount: Math.abs(payload.amount), source: "surplus" }]);
      pushToast(formatMoney(payload.amount) + " rolled into next month", "success");
    } else if (action === "plan_accept" && plan) {
      const p = { ...plan, targetBalance: Math.round(plan.targetBalance - (payload && payload.amount ? payload.amount : 0)) };
      setPlan(p); try { await savePlanToDb(userId, p); } catch (e) {}
      pushToast("Goal updated to " + formatMoney(p.targetBalance) + " — same monthly targets", "success");
    } else if (action === "plan_catchup" && plan && payload && payload.months && payload.months.length) {
      const avgAll = avgSpendByCategory(customTransactions);
      const updates = {};
      payload.months.forEach((k) => {
        const row = {};
        TX_CATEGORIES.forEach((c) => { row[c] = plannedCatFor(allTargets, k, c, avgAll); });
        row["Income"] = plannedIncomeFor(allTargets, k, customTransactions);
        Object.entries(payload.trims || {}).forEach(([c, t]) => { row[c] = Math.max(0, (Number(row[c]) || 0) - t); });
        updates[k] = row;
      });
      setAllTargets((prev) => ({ ...prev, ...updates }));
      if (updates[currentMonthKey()]) setTargets(updates[currentMonthKey()]);
      for (const k of Object.keys(updates)) { try { await saveMonthTargetsToDb(userId, k, updates[k]); } catch (e) {} }
      pushToast("Plan tightened by " + formatMoney(payload.perMonth) + "/mo — your goal stays at " + formatMoney(plan.targetBalance), "success");
    } else if (action === "plan_extend" && plan) {
      const avgAll = avgSpendByCategory(customTransactions);
      const newMonth = addMonths(plan.targetMonth, 1);
      const row = {};
      TX_CATEGORIES.forEach((c) => { row[c] = plannedCatFor(allTargets, plan.targetMonth, c, avgAll); });
      row["Income"] = plannedIncomeFor(allTargets, plan.targetMonth, customTransactions);
      setAllTargets((prev) => ({ ...prev, [newMonth]: row }));
      try { await saveMonthTargetsToDb(userId, newMonth, row); } catch (e) {}
      const p = { ...plan, targetMonth: newMonth };
      setPlan(p); try { await savePlanToDb(userId, p); } catch (e) {}
      pushToast("Plan extended — " + formatMoney(plan.targetBalance) + " by " + monthLabelFromKey(newMonth) + " " + newMonth.slice(0, 4), "success");
    } else if (action === "plan_bank" && plan) {
      const p = { ...plan, targetBalance: Math.round(plan.targetBalance + (payload && payload.amount ? payload.amount : 0)) };
      setPlan(p); try { await savePlanToDb(userId, p); } catch (e) {}
      pushToast("Goal raised to " + formatMoney(p.targetBalance) , "success");
    } else if (action === "plan_ease" && plan && payload && payload.months && payload.months.length) {
      const avgAll = avgSpendByCategory(customTransactions);
      const updates = {};
      payload.months.forEach((k) => {
        const row = {};
        TX_CATEGORIES.forEach((c) => { row[c] = plannedCatFor(allTargets, k, c, avgAll); });
        row["Income"] = plannedIncomeFor(allTargets, k, customTransactions);
        Object.entries(payload.adds || {}).forEach(([c, a]) => { row[c] = (Number(row[c]) || 0) + a; });
        updates[k] = row;
      });
      setAllTargets((prev) => ({ ...prev, ...updates }));
      if (updates[currentMonthKey()]) setTargets(updates[currentMonthKey()]);
      for (const k of Object.keys(updates)) { try { await saveMonthTargetsToDb(userId, k, updates[k]); } catch (e) {} }
      pushToast("Budgets eased by " + formatMoney(payload.perMonth) + "/mo — goal stays at " + formatMoney(plan.targetBalance), "success");
    } else if (action === "plan_keep") {
      pushToast("Review saved — plan unchanged", "info");
    } else {
      pushToast("Review saved", "info");
    }
  };

  const notifyUncategorized = (n) => {
    if (n > 0) pushToast(n + " transaction" + (n !== 1 ? "s" : "") + " couldn't be auto-categorised \u2014 use the tag on your Overview to sort them", "info");
  };
  const runAiFallback = async (txs) => {
    const uncats = txs.filter((t) => t.category === "Uncategorized" && !DEV_FORCED_NAMES.has(t.name));
    if (!uncats.length) return;
    try {
      const unique = [...new Set(uncats.map((t) => t.name))].slice(0, 200);
      const mapping = await aiCategorize(unique);
      if (!mapping || !Object.keys(mapping).length) { notifyUncategorized(uncats.length); return; }
      setCustomTransactions((prev) => prev.map((t) =>
        t.category === "Uncategorized" && mapping[t.name] ? { ...t, category: mapping[t.name] } : t
      ));
      const idToCat = {};
      txs.forEach((t) => { if (t.id && t.category === "Uncategorized" && mapping[t.name]) idToCat[t.id] = mapping[t.name]; });
      if (Object.keys(idToCat).length) await updateTransactionCategoriesInDb(idToCat);
      pushToast("AI categorized " + Object.keys(idToCat).length + " transactions", "success");
      notifyUncategorized(uncats.filter((t) => !mapping[t.name]).length);
    } catch (e) { notifyUncategorized(uncats.length); }
  };

  const goalsApi = {
    add: async (g) => {
      try {
        const saved = await addGoalToDb(userId, g);
        setGoals((prev) => [...prev, saved]);
        pushToast("Goal added", "success");
      } catch (e) {
        setGoals((prev) => [...prev, { ...g, id: "local-" + Date.now() }]);
        pushToast("Goal added here, but couldn't save to your account — run the goals SQL setup", "error");
      }
    },
    update: async (id, fields) => {
      setGoals((prev) => prev.map((g) => (g.id === id ? { ...g, ...fields } : g)));
      try { if (!String(id).startsWith("local-")) await updateGoalInDb(id, fields); }
      catch (e) { pushToast("Couldn't save that change to your account", "error"); }
    },
    remove: async (id) => {
      setGoals((prev) => prev.filter((g) => g.id !== id));
      pushToast("Goal deleted", "info");
      try { if (!String(id).startsWith("local-")) await deleteGoalFromDb(id); }
      catch (e) {}
    },
  };

  /* After any upload, re-check every statement for the affected bank against
     ALL stored transactions, persist statuses, and surface any problems. */
  const runReconciliation = async (allStatements, allTransactions, focusBank) => {
    const rechecked = reconcileStatements(allStatements, allTransactions);
    try { await persistReconciliation(allStatements, rechecked); } catch (e) {}
    setStatements(rechecked);
    const focus = focusBank ? rechecked.filter((s) => s.bank === focusBank) : rechecked;
    const mismatches = focus.filter((s) => s.status === "mismatch");
    if (mismatches.length) {
      const m = mismatches[mismatches.length - 1];
      pushToast(m.bank + " statement doesn't balance — off by " + formatMoney(Math.abs(m.difference)) + ". Try uploading a statement covering a longer period to find what's missing.", "error");
    } else if (focus.some((s) => s.status === "reconciled")) {
      pushToast("Balances check out ✓", "success");
    }
    const issues = chainIssues(rechecked).filter((i) => !focusBank || i.bank === focusBank);
    if (issues.length) pushToast("⚠ " + issues[0].bank + ": " + issues[0].text, "error");
    return rechecked;
  };

  const recategorizeDescription = async (description, newCategory) => {
    setCustomTransactions((prev) => prev.map((t) => (t.name === description ? { ...t, category: newCategory } : t)));
    if (userId) {
      try {
        await supabaseClient.from("transactions").update({ category: newCategory }).eq("user_id", userId).eq("description", description);
      } catch (e) { pushToast("Changed here, but couldn't save to your account", "error"); return; }
    }
    pushToast("\u201C" + description + "\u201D \u2192 " + displayCat(newCategory), "success");
  };

  const startDemo = (demoCurs) => {
    const curs = (demoCurs && demoCurs.length ? demoCurs : [FX.home || "GBP"]).slice(0, 2);
    const home = (FX.ready && FX.home) ? FX.home : curs[0];
    FX.home = home; FX.ready = true;
    const all = [];
    curs.forEach((c) => {
      const bank = SAMPLE_BANK_BY_CUR[c] || ("Sample " + c + " Bank");
      FX.bankCurrency[bank] = c;
      let parsed = [];
      try { parsed = parseStatementCSV(demoCsvForCurrency(c)).transactions; } catch (e) { parsed = []; }
      parsed.forEach((t, i) => {
        const base = { ...t, id: "sample-" + c + "-" + i, bank, category: demoCategorize(t.name, t.amount) };
        all.push(applyFxToTx(base));
      });
    });
    devForceUncat(all);
    setCustomTransactions(all);
    setUsingDemo(true);
    setStage("processing");
  };

  const handleAddTransactions = async (list, bankName, meta, fileName, rawFile) => {
    const base = usingDemo ? [] : customTransactions;
    if (usingDemo) setUsingDemo(false);
    const overrideMap = {};
    base.forEach((t) => { if (!(t.name in overrideMap)) overrideMap[t.name] = t.category; });
    list.forEach((t) => { const o = overrideMap[t.name]; if (o && o !== "Uncategorized") t.category = o; });
    const { kept, skipped } = dedupeTransactions(list, base);
    devForceUncat(kept);
    let stmtRow = null;
    if (bankName && meta) {
      try {
        stmtRow = await saveStatementToDb(userId, {
          bank: bankName, fileName: fileName || null,
          periodStart: meta.periodStart, periodEnd: meta.periodEnd,
          opening: meta.opening, closing: meta.closing,
        });
      } catch (e) { pushToast("Couldn't record the statement — run the statements SQL setup", "error"); }
    }
    if (rawFile && bankName && userId) {
      try {
        const path = userId + "/" + bankName + "/" + Date.now() + "_" + (fileName || rawFile.name);
        await supabaseClient.storage.from("statements").upload(path, rawFile);
      } catch (e) {}
    }
    let saved = kept;
    if (kept.length) {
      try { saved = await saveTransactionsToDb(userId, bankName || null, kept, stmtRow ? stmtRow.id : null); }
      catch (e) { pushToast("Imported, but couldn't save to your account — run the transactions SQL setup", "error"); }
      saved.forEach((t) => { if (!t.bank) t.bank = bankName || null; });
      setCustomTransactions((prev) => [...saved, ...(usingDemo ? [] : prev)]);
      pushToast(kept.length + " transaction" + (kept.length !== 1 ? "s" : "") + " imported" + (skipped > 0 ? " · " + skipped + " duplicate" + (skipped !== 1 ? "s" : "") + " skipped" : ""), "success");
    } else {
      pushToast("All " + list.length + " transactions were already imported — nothing new added", "info");
    }
    const allTx = [...(kept.length ? saved : []), ...base];
    const allStmts = stmtRow ? [...statements.filter((s) => s.id !== stmtRow.id), stmtRow] : statements;
    await runReconciliation(allStmts, allTx, bankName || null);
    if (kept.length) runAiFallback(saved);
  };

  useEffect(() => {
    (async () => {
     try {
      const { data } = await supabaseClient.auth.getSession();
      const session = data?.session;
      if (session?.user) {
        const { data: userCheck, error: userErr } = await supabaseClient.auth.getUser();
        if (userErr || !userCheck?.user) {
          await supabaseClient.auth.signOut();
          setCheckingSession(false);
          return;
        }
        const uid = session.user.id;
        setUserId(uid);
        setIsDev(session.user.email === DEV_EMAIL);
        setIsAdmin(session.user.email === ADMIN_EMAIL);
        DEV_MODE = session.user.email === DEV_EMAIL;
        const profile = await fetchProfile(uid);
        if (profile?.name) {
          const bankRows = await fetchBanks(uid);
          const targetObj = await fetchTargets(uid);
          const txRows = await fetchTransactions(uid);
          const goalRows = await fetchGoals(uid);
          const stmtRows = await fetchStatements(uid);
          setGoals(goalRows);
          setName(profile.name);
          setSignupMonth((profile.created_at || "").slice(0, 7) || null);
          setBanks(bankRows.map((b) => b.bank_name));
          setBankRows(bankRows);
          setTargets(targetObj); fetchAllTargets(uid).then(setAllTargets).catch(() => {});
          setCustomTransactions(txRows);
          setStatements(stmtRows);
          setUploadedFiles(Object.fromEntries(bankRows.map((b) => [b.bank_name, [{ name: "existing", size: 1, id: b.id }]])));
          setOverviewSlots(parseOverviewLayout(profile)); setTheme(normalizeTheme(profile && profile.theme));
          setNavViews(parseNavLayout(profile));
          setBillExcludes(parseBillExcludes(profile));
      setPlan(planFromProfile(profile));
          setStage("dashboard");
        } else {
          setStage("onboarding");
        }
      }
      setCheckingSession(false);
     } catch (e) {
       console.error("Session restore failed:", e);
       setCheckingSession(false);
     }
    })();
  }, []);

  const openLegal = (tab, from) => { setLegalTab(tab); setReturnStage(from); setStage("legal"); };

  const DEV_EMAIL = "testing@mybudgetpal.com";
  const ADMIN_EMAIL = "admin@mybudgetpal.com";

  const reloadFxData = async () => {
    if (!userId) return;
    FX.ready = false;
    const bankRows2 = await fetchBanks(userId);
    setBanks(bankRows2.map((b) => b.bank_name));
    setBankRows(bankRows2);
    const txRows2 = await fetchTransactions(userId);
    setCustomTransactions(txRows2);
  };
  const handleSaveCurrency = async (homeCur, bankCurs) => {
    if (!userId) return;
    await supabaseClient.from("profiles").upsert({ id: userId, home_currency: homeCur });
    await Promise.all(Object.entries(bankCurs).map(([bank, cur]) =>
      supabaseClient.from("banks").update({ currency: cur }).eq("user_id", userId).eq("bank_name", bank)
    ));
    await reloadFxData();
  };
  const handleSaveFxRate = async (month, from, to, rate) => {
    if (!userId) return;
    const { error } = await supabaseClient.from("fx_rates").upsert(
      { user_id: userId, month, from_currency: from, to_currency: to, rate, source: "manual" },
      { onConflict: "user_id,month,from_currency,to_currency" }
    );
    if (error) throw error;
    await reloadFxData();
  };
  const handleSaveName = async (newName) => {
    setName(newName);
    if (userId) {
      try { await supabaseClient.from("profiles").upsert({ id: userId, name: newName }); }
      catch (e) { pushToast("Couldn't save name", "error"); }
    }
  };
  const handleChangeOverviewSlots = (newSlots) => {
    setOverviewSlots(newSlots);
    if (userId) {
      supabaseClient.from("profiles").upsert({ id: userId, overview_layout: newSlots }).then(() => {});
    }
  };
  const handleChangeTheme = (t) => {
    setTheme(t);
    if (userId) {
      supabaseClient.from("profiles").upsert({ id: userId, theme: t }).then(() => {});
    }
  };
  const handleChangeNavViews = (newViews) => {
    setNavViews(newViews);
    if (userId) supabaseClient.from("profiles").upsert({ id: userId, nav_layout: newViews }).then(() => {}, () => {});
  };
  const handleToggleBillExclude = (name) => {
    setBillExcludes((prev) => {
      const next = prev.includes(name) ? prev.filter((n) => n !== name) : [...prev, name];
      if (userId) supabaseClient.from("profiles").upsert({ id: userId, bill_excludes: next }).then(() => {}, () => {});
      return next;
    });
  };
  const handleSaveAllTargets = async (byMonth) => {
    const keys = Object.keys(byMonth || {}).filter((k) => /^\d{4}-\d{2}$/.test(k));
    if (!keys.length) return;
    setAllTargets((prev) => ({ ...prev, ...byMonth }));
    const curKey = currentMonthKey();
    if (byMonth[curKey]) setTargets(byMonth[curKey]);
    if (userId) {
      try {
        await supabaseClient.from("targets").delete().eq("user_id", userId).in("month", keys);
        const rows = [];
        keys.forEach((k) => { Object.entries(byMonth[k]).forEach(([category, monthly_target]) => { rows.push({ user_id: userId, category, month: k, monthly_target: Number(monthly_target) || 0 }); }); });
        if (rows.length) await supabaseClient.from("targets").insert(rows);
      } catch (e) { pushToast("Couldn't save targets", "error"); }
    }
  };
  const handleSaveTargets = async (newTargets) => {
    const key = currentMonthKey();
    const cleaned = Object.fromEntries(Object.entries(newTargets).map(([c, v]) => [c, Number(v) || 0]));
    const income = Number(allTargets && allTargets[key] && allTargets[key]["Income"]) || 0;
    if (income > 0 && cleaned["Income"] == null) cleaned["Income"] = income;
    setTargets(cleaned);
    setAllTargets((prev) => ({ ...prev, [key]: cleaned }));
    if (userId) {
      try {
        await supabaseClient.from("targets").delete().eq("user_id", userId).eq("month", key);
        const rows = Object.entries(cleaned).map(([category, monthly_target]) => ({ user_id: userId, category, month: key, monthly_target }));
        if (rows.length) await supabaseClient.from("targets").insert(rows);
      } catch (e) { pushToast("Couldn't save targets", "error"); }
    }
  };
  const handleRemoveBank = async (bankName) => {
    setBanks((prev) => prev.filter((b) => b !== bankName));
    setUploadedFiles((prev) => { const next = { ...prev }; delete next[bankName]; return next; });
    if (userId) {
      try { await supabaseClient.from("banks").delete().eq("user_id", userId).eq("bank_name", bankName); }
      catch (e) { pushToast("Couldn't remove bank", "error"); }
    }
    pushToast("Bank removed", "info");
  };
  const resetDevAccount = async () => {
    if (!userId) return;
    setCheckingSession(true);
    try {
      await supabaseClient.from("transactions").delete().eq("user_id", userId);
      await supabaseClient.from("targets").delete().eq("user_id", userId);
      await supabaseClient.from("goals").delete().eq("user_id", userId);
      await supabaseClient.from("statements").delete().eq("user_id", userId);
      await supabaseClient.from("banks").delete().eq("user_id", userId);
      await supabaseClient.from("profiles").upsert({ id: userId, name: null, occupation: null, salary_range: null, employment_type: null, overview_layout: null });
      try {
        const { data: topLevel } = await supabaseClient.storage.from("statements").list(userId);
        const toRemove = [];
        for (const entry of (topLevel || [])) {
          if (entry.id === null || entry.metadata == null) {
            const { data: sub } = await supabaseClient.storage.from("statements").list(userId + "/" + entry.name);
            (sub || []).forEach((fx) => toRemove.push(userId + "/" + entry.name + "/" + fx.name));
          } else {
            toRemove.push(userId + "/" + entry.name);
          }
        }
        if (toRemove.length) await supabaseClient.storage.from("statements").remove(toRemove);
      } catch (e) {}
      setName(""); setBanks([]); setBankRows([]); setTargets({}); setUploadedFiles({}); setPlan(null);
      setGoals([]); setCustomTransactions([]); setStatements([]); setBalances({});
      setOverviewSlots(DEFAULT_OVERVIEW_SLOTS); setExtraProfile(null); setShowExtraBanner(false);
      pushToast("Dev account reset \u2014 starting fresh", "success");
      setStage("onboarding");
    } catch (e) {
      pushToast("Reset failed \u2014 check connection", "error");
    }
    setCheckingSession(false);
  };
  const handleResetDev = () => {
    if (window.confirm("Reset the dev account? This deletes all its data and restarts onboarding from scratch.")) {
      resetDevAccount();
    }
  };
  const handleTest = async () => {
    try {
      const { data, error } = await supabaseClient.auth.signInAnonymously();
      if (error || !data?.user) { pushToast("TEST login failed: " + (error?.message || "no session") + " (enable Anonymous sign-ins in Supabase)", "error"); return; }
      setUserId(data.user.id);
      setIsDev(false); setIsAdmin(false); DEV_MODE = false; DEV_NOW = null; setDevNow(null);
      setStage("onboarding");
    } catch (e) { pushToast("TEST login error: " + (e?.message || e), "error"); }
  };
  const handleLogout = async () => {
    await supabaseClient.auth.signOut();
    setIsDev(false);
    setIsAdmin(false);
    DEV_MODE = false;
    setUserId(null); setName(""); setBanks([]); setBankRows([]); setTargets({}); setUploadedFiles({}); setGoals([]); setCustomTransactions([]); setStatements([]); setPlan(null);
    setOverviewSlots(DEFAULT_OVERVIEW_SLOTS);
    pushToast("Logged out", "info");
    setStage("landing");
  };

  const dismissNote = async (id) => {
    setNotifications((p) => p.filter((n) => n.id !== id));
    try { await supabaseClient.from("notifications").update({ read: true }).eq("id", id); } catch (e) {}
  };

  if (checkingSession) return null;

  const inApp = ["dashboard", "settings", "mapping", "planSetup", "admin"].includes(stage);

  let content;
  if (stage === "landing") {
    content = (
      <LandingScreen
        onSignup={() => { setReturnStage("landing"); setStage("signup"); }}
        onLogin={() => { setReturnStage("landing"); setStage("login"); }}
        onTest={handleTest}
      />
    );
  } else if (stage === "welcome") {
    content = (
      <WelcomeScreen
        onChoose={(mode) => { setReturnStage("welcome"); setStage(mode === "signup" ? "signup" : "login"); }}
        onOpenLegal={(tab) => openLegal(tab, "welcome")}
      />
    );
  } else if (stage === "legal") {
    content = <LegalScreen initialTab={legalTab} onBack={() => setStage(returnStage)} theme={theme} />;
  } else if (stage === "login" || stage === "signup") {
    content = (
      <AuthScreen
        initialMode={stage}
        onBack={() => setStage(returnStage)}
        onError={(msg, type) => pushToast(msg, type || "error")}
        onDone={async (mode, uid, profile) => {
          setUserId(uid);
          try { const em = (await supabaseClient.auth.getUser()).data?.user?.email || ""; setIsDev(em === DEV_EMAIL); setIsAdmin(em === ADMIN_EMAIL); DEV_MODE = em === DEV_EMAIL; } catch (e) {}
          if (mode === "login") {
            if (profile?.name) {
              const bankRows = await fetchBanks(uid);
              const targetObj = await fetchTargets(uid);
              const txRows = await fetchTransactions(uid);
              const goalRows = await fetchGoals(uid);
              const stmtRows = await fetchStatements(uid);
              setGoals(goalRows);
              setName(profile.name);
              setSignupMonth((profile.created_at || "").slice(0, 7) || null);
              setBanks(bankRows.map((b) => b.bank_name));
              setBankRows(bankRows);
              setTargets(targetObj); fetchAllTargets(uid).then(setAllTargets).catch(() => {});
              setCustomTransactions(txRows);
              setStatements(stmtRows);
              setUploadedFiles(Object.fromEntries(bankRows.map((b) => [b.bank_name, [{ name: "existing", size: 1, id: b.id }]])));
              setOverviewSlots(parseOverviewLayout(profile)); setTheme(normalizeTheme(profile && profile.theme));
              setNavViews(parseNavLayout(profile));
              setBillExcludes(parseBillExcludes(profile));
      setPlan(planFromProfile(profile));
              setStage("dashboard");
            } else {
              setStage("onboarding");
            }
          } else {
            setStage("onboarding");
          }
        }}
        onOpenLegal={(tab) => openLegal(tab, stage)}
      />
    );
  } else if (stage === "onboarding") {
    content = <OnboardingScreen userId={userId} pushToast={pushToast} onLogout={handleLogout} initialName={name} initialBanks={banks} onDone={(d) => { setName(d.name); setBanks(d.banks); setDemoCurrencies((d.currencies && d.currencies.length ? d.currencies : ["GBP"])); setStage("upload"); }} />;
  } else if (stage === "upload") {
    content = (
      <UploadScreen
        banks={banks}
        userId={userId}
        pushToast={pushToast}
        onBack={() => setStage("onboarding")}
        onSkip={() => setStage("demoUpload")}
        onDone={(files, bal, parsedTxs, newStatements) => {
          setUploadedFiles(files); setBalances(bal);
          const allTx = [...(parsedTxs || []), ...customTransactions];
          const allStmts = [...statements, ...(newStatements || [])];
          if (newStatements && newStatements.length) setStatements(allStmts);
          if (parsedTxs && parsedTxs.length) { setCustomTransactions(parsedTxs); runAiFallback(parsedTxs); }
          if (newStatements && newStatements.length) runReconciliation(allStmts, allTx, null);
          fetchBanks(userId).then((rows) => setBankRows(rows));
          setStage("processing");
        }}
      />
    );
  } else if (stage === "demoUpload") {
    {
      const bankCurs = [...new Set((bankRows || []).map((r) => r.currency || "GBP"))];
      const effDemoCurs = bankCurs.length ? bankCurs.slice(0, 2) : demoCurrencies;
      content = <DemoUploadScreen currencies={effDemoCurs} onUseDemo={startDemo} onSkipEmpty={() => setStage("processing")} onBack={() => setStage("upload")} />;
    }
  } else if (stage === "processing") {
    content = <ProcessingScreen transactions={customTransactions} onDone={() => setStage("confirmCategory")} />;
  } else if (stage === "confirmCategory") {
    content = <ConfirmCategoryScreen transactions={customTransactions} onConfirm={recategorizeDescription} onDone={() => setStage("openingBalance")} />;
  } else if (stage === "openingBalance") {
    content = <OpeningBalanceScreen banks={banks} statements={statements} userId={userId} pushToast={pushToast} onBack={() => setStage("upload")} onDone={() => { fetchBanks(userId).then((rows) => setBankRows(rows)); setStage("breakdown"); }} />;
  } else if (stage === "breakdown") {
    content = <MonthlyBreakdownScreen transactions={customTransactions} bankRows={bankRows} onBack={() => setStage("openingBalance")} onDone={() => setStage("targets")} />;
  } else if (stage === "targets") {
    content = <TargetSettingScreen userId={userId} transactions={customTransactions} pushToast={pushToast} banks={banks} accountData={{ statements, bankRows }} onBack={() => setStage("breakdown")} onDone={(t, p) => { setTargets(t); setPlan(p || null); setSignupMonth(new Date().toISOString().slice(0, 7)); if (userId) fetchAllTargets(userId).then(setAllTargets).catch(() => {}); setOverviewSlots(TOUR_DEFAULT_SLOTS); if (userId) supabaseClient.from("profiles").upsert({ id: userId, overview_layout: TOUR_DEFAULT_SLOTS }).then(() => {}); setShowExtraBanner(true); setRunTour(true); setStage("dashboard"); }} />;
  } else if (stage === "extraQuestions") {
    content = (
      <ExtraQuestionsScreen
        userId={userId}
        pushToast={pushToast}
        onDone={(data) => { setExtraProfile(data); setShowExtraBanner(false); setStage("dashboard"); }}
        onSkip={() => { setShowExtraBanner(false); setStage("dashboard"); }}
      />
    );
  } else if (stage === "planSetup") {
    content = <TargetSettingScreen userId={userId} transactions={customTransactions} pushToast={pushToast} banks={banks} accountData={{ statements, bankRows }} isEdit onBack={() => setStage("dashboard")} onDone={(t, p) => { setTargets(t); setPlan(p || null); if (userId) fetchAllTargets(userId).then(setAllTargets).catch(() => {}); setStage("dashboard"); }} />;
  } else if (stage === "mapping") {
    content = <MappingScreen transactions={customTransactions} onRecategorize={recategorizeDescription} onBack={() => setStage("dashboard")} theme={theme} />;
  } else if (stage === "settings") {
    content = (
      <SettingsScreen
        extraPending={showExtraBanner}
        onCompleteExtra={() => setStage("extraQuestions")}
        name={name} banks={banks} targets={targets} userId={userId}
        pushToast={pushToast}
        onBack={() => setStage("dashboard")}
        onOpenLegal={(tab) => openLegal(tab, "settings")}
        onLogout={handleLogout}
        onSaveName={handleSaveName}
        onRemoveBank={handleRemoveBank}
        onSaveTargets={handleSaveTargets}
        theme={theme}
        onChangeTheme={handleChangeTheme}
        onSaveCurrency={handleSaveCurrency}
        onSaveFxRate={handleSaveFxRate}
        onEditTargetsPage={() => { setTargetsEditReq(true); setStage("dashboard"); }}
      />
    );
  } else if (stage === "admin") {
    content = <AdminScreen onBack={() => setStage("dashboard")} pushToast={pushToast} />;
  } else {
    content = (
      <DashboardScreen
        name={name}
        signupMonth={signupMonth}
        targets={targets}
        banks={banks}
        hasData={hasData}
        onOpenSettings={() => setStage("settings")}
        onOpenMapping={() => setStage("mapping")}
        plan={plan}
        onEditPlan={() => setStage("planSetup")}
        onRecategorize={recategorizeDescription}
        showExtraBanner={showExtraBanner}
        onCompleteExtra={() => setStage("extraQuestions")}
        onDismissExtra={() => setShowExtraBanner(false)}
        onLogout={handleLogout}
        transactions={customTransactions}
        onAddTransactions={handleAddTransactions}
        usingDemo={usingDemo}
        pushToast={pushToast}
        overviewSlots={overviewSlots}
        onChangeOverviewSlots={handleChangeOverviewSlots}
        navViews={navViews}
        onChangeNavViews={handleChangeNavViews}
        allTargets={allTargets}
        billExcludes={billExcludes}
        onToggleBillExclude={handleToggleBillExclude}
        goals={goals}
        goalsApi={goalsApi}
        accountData={{ statements, bankRows }}
        isDev={isDev}
        isAdmin={isAdmin}
        onOpenAdmin={() => setStage("admin")}
        onResetDev={handleResetDev}
        runTour={runTour}
        onFinishTour={() => setRunTour(false)}
        theme={theme}
        rollovers={rollovers}
        onOpenReview={openReviewManual}
        onSaveAllTargets={handleSaveAllTargets}
        openTargetsEdit={targetsEditReq}
        onConsumeTargetsEdit={() => setTargetsEditReq(false)}
      />
    );
  }

  return (
    <>
      {isAdmin && inApp && <AdminBar onOpen={() => setStage("admin")} />}
      {isDev && inApp && <TestingBar />}
      {(isDev || DEV_FLAG) && inApp && (
        <div style={{ position: "fixed", bottom: 12, left: 12, zIndex: 9999, background: "#1a1f2b", color: "#e8edf4", padding: "6px 10px", borderRadius: 8, fontSize: 12, display: "flex", gap: 8, alignItems: "center", boxShadow: "0 4px 16px rgba(0,0,0,.3)" }}>
          <span style={{ opacity: 0.7 }}>DEV date:</span>
          <input type="date" value={devNow || ""} onChange={(e) => setDevDate(e.target.value)} style={{ fontSize: 12, padding: "2px 4px", borderRadius: 4, border: "1px solid #3a4356", background: "#0f1420", color: "#e8edf4" }} />
          {devNow && <button onClick={() => setDevDate("")} style={{ fontSize: 11, cursor: "pointer", background: "none", border: "none", color: "#8fa3bd", textDecoration: "underline" }}>reset</button>}
        </div>
      )}
      {stage === "dashboard" && <NotificationBanner notes={notifications} onDismiss={dismissNote} />}
      {content}
      {reviewMonth && (
        <MonthEndReviewModal
          month={reviewMonth}
          transactions={customTransactions}
          budgets={reviewBudgets}
          goal={goals && goals.length ? goals[0] : null}
          onAction={handleReviewAction}
          onClose={closeReview}
          isManual={reviewManual}
          plan={plan}
          allTargets={allTargets}
        />
      )}
      <ToastContainer toasts={toasts} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

  .trend-bar-col:hover .trend-tip { opacity: 1; }
  .trend-bar { width: 60%; border-radius: 6px 6px 0 0; background: var(--accent); transition: height 0.4s ease; }
  .trend-bar-wrap.dual .trend-bar { width: 40%; }
  .income-bar { background: linear-gradient(180deg, #4fe0c0, #2fae90); }
  .spend-bar { background: var(--accent); }
  .trend-bar-label { color: var(--ink-3); font-size: 11px; }
  .legend-row { display: flex; gap: 16px; margin-top: 12px; }
  .legend-item { display: flex; align-items: center; gap: 6px; color: var(--ink-2); font-size: 12px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* insights */
  .insight-list { display: flex; flex-direction: column; gap: 10px; margin-top: 14px; }
  .insight-row { display: flex; align-items: flex-start; gap: 10px; padding: 12px; border-radius: 14px; font-size: 13px; color: var(--ink); background: var(--surface-2); border: 1px solid var(--line); }
  .insight-icon { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
  .insight-warning .insight-icon { background: rgba(255,139,139,0.2); color: #ff8b8b; }
  .insight-positive .insight-icon { background: rgba(79,224,192,0.2); color: #4fe0c0; }
  .insight-info .insight-icon { background: var(--accent-soft); color: var(--accent); }

  /* ---------------- landing page ---------------- */
  .landing-page { background: var(--bg); color: var(--ink); position: relative; min-height: 100vh; overflow-x: hidden; }
  .lp-wrap { position: relative; z-index: 1; max-width: 1000px; margin: 0 auto; padding: 0 24px; }
  .lp-nav {
    position: sticky; z-index: 2; display: flex; align-items: center; justify-content: space-between;
    padding: 18px 24px; background: var(--card);
    border-bottom: 1px solid var(--line); top: 0;
    will-change: transform; transform: translateZ(0);
  }
  .lp-nav-actions { display: flex; gap: 10px; }
  .btn { font-family: inherit; font-weight: 600; cursor: pointer; border-radius: 14px; padding: 10px 18px; font-size: 14px; border: 1px solid var(--line); transition: all 0.18s ease; }
  .btn-primary { color: var(--on-accent); background: var(--accent); box-shadow: 0 6px 20px var(--accent-shadow); border: none; }
  .btn-primary:hover { filter: brightness(1.08); }
  .btn-ghost { color: var(--ink); background: var(--surface-2); }
  .btn-ghost:hover { background: var(--surface-3); }
  .btn-large { padding: 16px 32px; font-size: 16px; border-radius: 18px; }

  .lp-hero { text-align: center; padding: 90px 24px 60px; position: relative; z-index: 1; }
  .hero-eyebrow { display: inline-block; font-size: 12px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--accent); background: var(--accent-soft); border: 1px solid var(--accent-soft); padding: 6px 14px; border-radius: 999px; margin-bottom: 20px; }
  .lp-hero h1 { font-size: 56px; font-weight: 700; letter-spacing: -0.02em; margin: 0 0 16px; line-height: 1.15; color: var(--ink); }
  .lp-hero p { font-size: 17px; color: var(--ink-2); max-width: 520px; margin: 0 auto 32px; line-height: 1.5; }
  .hero-actions { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }

  .lp-section { padding: 60px 24px; position: relative; z-index: 1; }
  .section-head { text-align: center; max-width: 560px; margin: 0 auto 36px; }
  .section-head h2 { font-size: 26px; font-weight: 700; letter-spacing: -0.01em; margin: 0 0 8px; color: var(--ink); }
  .section-head p { color: var(--ink-2); font-size: 14px; margin: 0; }

  .reveal { opacity: 0; transform: translateY(24px); transition: opacity 0.7s ease, transform 0.7s ease; will-change: opacity, transform; }
  .reveal.in-view { opacity: 1; transform: translateY(0); will-change: auto; }

  /* --- immersive how-it-works --- */
  .lp-step { display: grid; grid-template-columns: 1fr 1.2fr; gap: 40px; align-items: center; margin: 56px 0; }
  .lp-step-flip { direction: rtl; }
  .lp-step-flip > * { direction: ltr; }
  .lp-step-copy h3 { color: var(--ink); font-size: 26px; margin: 14px 0 10px; letter-spacing: -0.01em; }
  .lp-step-copy p { color: var(--ink-2); font-size: 16px; line-height: 1.6; margin: 0; }
  .lp-demo-card { background: var(--surface-2); border: 1px solid var(--line); border-radius: 20px; padding: 26px; min-height: 250px; position: relative; overflow: hidden; }

  /* step 1: file drop */
  .lpd-upload { display: flex; align-items: center; justify-content: center; }
  .lpd-zone { width: 100%; border: 2px dashed var(--line); border-radius: 16px; padding: 38px 20px; text-align: center; transition: border-color .3s; }
  .lpd-zone-inner { position: relative; }
  .lpd-zone-hint { color: var(--ink-2); font-size: 14px; display: block; }
  .lpd-file { position: absolute; top: 18px; left: 24px; z-index: 2; background: var(--card); box-shadow: var(--shadow-pop); border: 1px solid var(--line); border-radius: 12px; padding: 10px 14px; display: flex; align-items: center; gap: 8px; opacity: 0; }
  .lpd-file-icon { font-size: 18px; }
  .lpd-file-name { color: var(--ink); font-size: 12px; font-weight: 600; }
  .lpd-progress { height: 6px; border-radius: 3px; background: var(--surface-3); margin: 16px auto 0; max-width: 260px; overflow: hidden; opacity: 0; }
  .lpd-progress-fill { height: 100%; width: 0; border-radius: 3px; background: var(--grad-2, var(--accent)); }
  .lpd-done { color: #4fe0c0; font-size: 14px; font-weight: 600; margin-top: 12px; opacity: 0; }
  .in-view .lpd-file { animation: lpdFly 1.5s ease-in-out 0.4s forwards; }
  .in-view .lpd-zone { animation: lpdZonePulse 0.5s ease 1.7s; }
  .in-view .lpd-progress { animation: lpdShow 0.3s ease 1.9s forwards; }
  .in-view .lpd-progress-fill { animation: lpdFill 1s ease 2.1s forwards; }
  .in-view .lpd-done { animation: lpdPop 0.4s ease 3.2s forwards; }
  @keyframes lpdFly { 0% { opacity: 0; transform: translate(-30px,-30px) rotate(-6deg); } 15% { opacity: 1; } 70% { opacity: 1; transform: translate(140px, 70px) rotate(3deg) scale(1); } 100% { opacity: 0; transform: translate(150px, 90px) scale(0.55); } }
  @keyframes lpdZonePulse { 0% { border-color: var(--line); } 40% { border-color: #4fe0c0; box-shadow: 0 0 0 4px rgba(79,224,192,0.15); } 100% { border-color: var(--line); } }
  @keyframes lpdShow { to { opacity: 1; } }
  @keyframes lpdFill { to { width: 100%; } }
  @keyframes lpdPop { 0% { opacity: 0; transform: translateY(8px) scale(0.9); } 100% { opacity: 1; transform: translateY(0) scale(1); } }

  /* step 2: categorise */
  .lpd-cat { display: flex; flex-direction: column; gap: 12px; }
  .lpd-tx { display: flex; justify-content: space-between; align-items: center; gap: 12px; opacity: 0; transform: translateY(10px); }
  .in-view .lpd-tx { animation: lpdRow 0.45s ease forwards; }
  .lpd-tx-left { display: flex; flex-direction: column; gap: 2px; }
  .lpd-tx-name { color: var(--ink); font-size: 13px; font-weight: 600; letter-spacing: 0.01em; }
  .lpd-tx-amt { color: var(--ink-3); font-size: 12px; }
  .lpd-chip { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; padding: 5px 11px; border-radius: 999px; opacity: 0; transform: scale(0.6); }
  .in-view .lpd-chip { animation: lpdChip 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards; }
  .lpd-ai-note { color: var(--ink-2); font-size: 13px; margin-top: 6px; opacity: 0; }
  .in-view .lpd-ai-note { animation: lpdShow 0.5s ease forwards; }
  @keyframes lpdRow { to { opacity: 1; transform: translateY(0); } }
  @keyframes lpdChip { to { opacity: 1; transform: scale(1); } }

  /* step 3: views */
  .lpd-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
  .lpd-tab { font-family: inherit; font-size: 13px; font-weight: 600; color: var(--ink-2); background: var(--surface-2); border: 1px solid var(--line); border-radius: 999px; padding: 8px 15px; cursor: pointer; transition: all .15s; }
  .lpd-tab:hover { background: var(--surface-3); color: var(--ink); }
  .lpd-tab-active { background: var(--grad-2, var(--accent)); color: var(--on-accent); border-color: transparent; }
  .lpd-pane { display: flex; flex-direction: column; gap: 13px; min-height: 170px; }
  .lpd-bar-row { display: grid; grid-template-columns: 120px 1fr 56px; gap: 12px; align-items: center; }
  .lpd-bar-label { color: var(--ink); font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .lpd-bar-track { height: 8px; border-radius: 4px; background: var(--surface-2); overflow: hidden; }
  .lpd-bar-fill { height: 100%; border-radius: 4px; }
  .lpd-bar-amt { color: var(--ink); font-size: 13px; text-align: right; font-variant-numeric: tabular-nums; }
  .lpd-review-row { display: grid; grid-template-columns: 1.4fr 0.8fr 0.8fr 1.1fr; gap: 10px; align-items: center; font-size: 13px; color: var(--ink); padding: 4px 0; }
  .lpd-review-row > span:nth-child(2), .lpd-review-row > span:nth-child(3) { text-align: right; font-variant-numeric: tabular-nums; }
  .lpd-review-head { color: var(--ink-3); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; font-weight: 700; }
  .lpd-under { color: #4fe0c0; font-weight: 600; text-align: right; }
  .lpd-trend { flex-direction: row; align-items: flex-end; gap: 14px; padding: 10px 6px 0; }
  .lpd-trend-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; height: 160px; justify-content: flex-end; }
  .lpd-trend-bar { width: 100%; max-width: 42px; border-radius: 6px 6px 3px 3px; background: var(--grad-2, var(--accent)); transition: height .4s ease; }
  .lpd-trend-label { color: var(--ink-3); font-size: 11px; }
  .lpd-goal { display: flex; flex-direction: column; gap: 8px; background: var(--surface-2); border-radius: 14px; padding: 14px; }
  .lpd-goal-top { display: flex; justify-content: space-between; color: var(--ink); font-size: 13px; font-weight: 600; }
  .lpd-goal-note { color: var(--ink-2); font-size: 12px; }
  .lpd-views-hint { color: var(--ink-3); font-size: 12px; margin-top: 16px; text-align: center; }
  .lpd-cur-num { font-size: 20px; letter-spacing: -1px; }
  .lpd-cur-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .lpd-cur-label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-3); font-weight: 600; }
  .lpd-cur-toggle { display: flex; background: var(--surface-2); border: 1px solid var(--line); border-radius: 999px; padding: 3px; }
  .lpd-cur-opt { font-family: inherit; font-size: 13px; font-weight: 700; color: var(--ink-2); background: none; border: none; border-radius: 999px; padding: 6px 16px; cursor: pointer; transition: all .15s; }
  .lpd-cur-opt-on { background: var(--grad-2, var(--accent)); color: var(--on-accent); }
  .lpd-cur-accounts { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .lpd-cur-acc { font-size: 11.5px; font-weight: 600; color: var(--ink-2); background: var(--surface-2); border: 1px solid var(--line); border-radius: 8px; padding: 5px 10px; }
  .lpd-cur-tx { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--line); }
  .lpd-cur-tx-name { font-size: 13px; color: var(--ink); }
  .lpd-cur-tx-amt { display: flex; flex-direction: column; align-items: flex-end; line-height: 1.3; }
  .lpd-cur-tx-amt > span:first-child { font-size: 14px; font-weight: 700; color: var(--ink); font-variant-numeric: tabular-nums; }
  .lpd-cur-conv { font-size: 11px; color: var(--ink-3); font-weight: 500; }
  .lpd-cur-pos { color: #4fe0c0 !important; }
  .lpd-cur-total { display: flex; align-items: center; justify-content: space-between; margin-top: 14px; padding: 13px 14px; background: var(--accent-soft); border: 1px solid var(--accent); border-radius: 12px; }
  .lpd-cur-total span { font-size: 13px; color: var(--ink-2); }
  .lpd-cur-total b { font-size: 18px; color: var(--ink); font-variant-numeric: tabular-nums; }
  @media (max-width: 760px) {
    .lp-step { grid-template-columns: 1fr; gap: 20px; margin: 40px 0; }
    .lp-step-flip { direction: ltr; }
    .lpd-bar-row { grid-template-columns: 100px 1fr 50px; }
  }

  .steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
  .step-card { background: var(--surface-2); border: 1px solid var(--line); border-radius: 20px; padding: 24px; }
  .step-num { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: var(--accent); font-weight: 700; font-size: 13px; margin-bottom: 12px; color: var(--on-accent); }
  .step-card h3 { font-size: 15px; margin: 0 0 6px; color: var(--ink); }
  .step-card p { font-size: 13px; color: var(--ink-2); margin: 0; line-height: 1.5; }

  .features { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .feature-card { background: var(--surface-2); border: 1px solid var(--line); border-radius: 18px; padding: 20px; }
  .feature-icon { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; background: var(--accent-soft); color: var(--accent); font-size: 16px; margin-bottom: 10px; }
  .feature-card h4 { font-size: 14px; margin: 0 0 5px; color: var(--ink); }
  .feature-card p { font-size: 12px; color: var(--ink-3); margin: 0; line-height: 1.5; }

  .pricing { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; max-width: 620px; margin: 0 auto; }
  .price-card { background: var(--surface-2); border: 1px solid var(--line); border-radius: 22px; padding: 28px; text-align: center; }
  .price-card.highlight { border-color: var(--accent); background: linear-gradient(160deg, var(--accent-soft), var(--accent-soft)); box-shadow: 0 8px 30px var(--accent-shadow); }
  .price-tag { font-size: 12px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
  .price-amount { font-size: 32px; font-weight: 700; margin-bottom: 4px; color: var(--ink); }
  .price-period { font-size: 13px; color: var(--ink-3); margin-bottom: 18px; }
  .price-features { list-style: none; padding: 0; margin: 0 0 22px; text-align: left; }
  .price-features li { font-size: 13px; color: var(--ink-2); padding: 6px 0; padding-left: 22px; position: relative; }
  .price-features li::before { content: "✓"; position: absolute; left: 0; color: #4fe0c0; font-weight: 700; }

  .lp-final-cta { text-align: center; padding: 70px 24px 90px; position: relative; z-index: 1; }
  .lp-final-cta h2 { font-size: 28px; margin: 0 0 12px; letter-spacing: -0.01em; color: var(--ink); }
  .lp-final-cta p { color: var(--ink-2); margin: 0 0 24px; }

  .lp-footer { position: relative; z-index: 1; text-align: center; padding: 22px; color: var(--ink-3); font-size: 12px; border-top: 1px solid var(--line); }

  @media (max-width: 720px) {
    .lp-hero h1 { font-size: 36px; }
    .steps, .features { grid-template-columns: 1fr; }
    .pricing { grid-template-columns: 1fr; }
    /* perf: drop per-frame blur compositing that janks scroll on mobile */
    .lp-nav { background: var(--card); will-change: auto; }
    .lp-demo-card { background: var(--card); }
    .feature-card { background: var(--card); }
    .price-card { background: var(--card); }
    .landing-page .blob3 { display: none; }
    .landing-page .blob { filter: blur(38px); opacity: 0.4; }
  }

  /* stage transitions */
  .stage-fade { animation: stageFadeIn 0.35s ease; }
  @keyframes stageFadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* button loading spinner */
  .rollover-banner { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 10px 18px; font-size: 13.5px; color: #dfe8ff; background: linear-gradient(90deg, var(--accent-soft), var(--accent-soft)); border-bottom: 1px solid var(--accent); }
  .rollover-banner strong { color: var(--ink); }
  .modal-backdrop { position: fixed; inset: 0; background: rgba(6,10,18,0.72); display: flex; align-items: center; justify-content: center; padding: 18px; z-index: 200; animation: mbFade .2s ease; }
  @keyframes mbFade { from { opacity: 0; } to { opacity: 1; } }
  .review-modal { position: relative; width: 100%; max-width: 440px; max-height: 92vh; overflow-y: auto; padding: 24px 22px; animation: mbPop .25s cubic-bezier(0.34,1.4,0.64,1); }

  /* ---- plan wizard ---- */
  .pw-methods { display: flex; flex-direction: column; gap: 10px; margin: 14px 0 4px; }
  .pw-method { text-align: left; background: var(--surface-2); border: 1px solid var(--line); border-radius: 14px; padding: 14px 16px; cursor: pointer; color: var(--ink); font-family: inherit; display: flex; flex-direction: column; gap: 4px; transition: border-color .15s, background .15s; }
  .pw-method:hover { border-color: var(--accent-solid); background: var(--surface-2); }
  .pw-method-title { font-weight: 700; font-size: 14.5px; }
  .pw-method-sub { font-size: 12.5px; color: var(--ink-2); line-height: 1.45; }
  .pw-goal-line { font-size: 13px; color: var(--ink-2); line-height: 1.55; background: var(--surface-2); border: 1px solid var(--line); border-radius: 12px; padding: 10px 14px; margin: 4px 0 0; }
  .pw-goal-line b { color: var(--ink); }
  .pw-summary { font-size: 13px; color: var(--ink-2); line-height: 1.55; background: var(--accent-soft); border: 1px solid var(--accent); border-radius: 12px; padding: 10px 14px; margin: 10px 0 0; }
  .pw-summary b { color: var(--ink); }
  .bt-income-row .bt-input, .bt-income-row .bt-cur { color: var(--pos); }
  .bt-net-pos { color: var(--pos) !important; }
  .bt-net-neg { color: #ff6b6b !important; }

  /* ---- month-end review plan options ---- */
  .plan-opt { text-align: left; width: 100%; background: var(--surface-2); border: 1px solid var(--line); border-radius: 14px; padding: 13px 15px; cursor: pointer; color: var(--ink); font-family: inherit; display: flex; flex-direction: column; gap: 4px; margin-top: 10px; transition: border-color .15s, background .15s; }
  .plan-opt:hover { border-color: var(--accent-solid); background: var(--surface-2); }
  .plan-opt:disabled { opacity: 0.6; cursor: default; }
  .plan-opt-title { font-weight: 700; font-size: 13.5px; }
  .plan-opt-sub { font-size: 12.5px; color: var(--ink-2); line-height: 1.5; }
  .plan-opt-sub b { color: var(--ink); }

  /* ---- long-term plan grid ---- */
  .ltp-wrap { overflow-x: auto; border-radius: 14px; border: 1px solid var(--line); background: var(--surface-2); }
  .ltp-table { border-collapse: collapse; width: 100%; font-size: 13px; }
  .ltp-table th, .ltp-table td { padding: 7px 12px; text-align: right; white-space: nowrap; border-bottom: 1px solid var(--line); }
  .ltp-table thead th { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-3); border-bottom: 1px solid var(--line); }
  .ltp-table .ltp-sticky { position: sticky; left: 0; background: var(--card); text-align: left; font-weight: 600; color: var(--ink); min-width: 140px; z-index: 1; }
  .ltp-table .ltp-sticky .cat-dot { margin-right: 7px; }
  .ltp-actual-head { color: var(--ink-2) !important; }
  .ltp-plan-head { color: var(--accent-solid) !important; }
  .ltp-actual { color: var(--ink); }
  .ltp-plan { color: var(--accent); }
  .ltp-neg { opacity: 0.92; }
  .ltp-bal-row td { font-weight: 700; background: var(--surface-2); }
  .ltp-net-row td { font-weight: 600; }
  .ltp-close-row td { border-top: 1px solid var(--line); }
  .ltp-goal-cell { background: rgba(79,224,192,0.14); color: #4fe0c0 !important; font-weight: 800; }

  /* ---- batch: alignment, rings, inbox, ltp, targets, ask ---- */
  .bt-total-disp { display: inline-flex; align-items: baseline; gap: 1px; padding: 4px 7px; }
  .bt-total-num { display: inline-block; min-width: 54px; text-align: right; font-variant-numeric: tabular-nums; }
  .balance-input-wrap { align-items: center; }
  .balance-input-wrap .target-input { text-align: right; }

  .bd-hero-right { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; justify-content: flex-end; }
  .bd-hero-ring .budget-ring-wrap { margin: 0; }
  .bd-hero-ring .budget-ring { width: 104px; height: 104px; }
  .bd-hero-ring .budget-ring-pct { font-size: 21px; }
  .bd-hero-ring .budget-ring-sub { font-size: 10px; }

  .ltp-proj-chart { height: 150px; margin-top: 30px; }
  .ltp-bar { position: relative; }
  .ltp-bar-val { position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); margin-bottom: 5px; font-size: 10.5px; font-weight: 700; color: var(--ink); white-space: nowrap; font-variant-numeric: tabular-nums; }
  .ltp-bal-row td { font-weight: 800 !important; background: var(--accent-soft) !important; }
  .ltp-net-row td { font-weight: 800 !important; background: var(--accent-soft) !important; }

  .plan-big { color: var(--ink); font-size: 34px; font-weight: 800; letter-spacing: -0.02em; }
  .plan-sub { color: var(--ink-2); font-size: 13px; }
  .plan-verdict { font-size: 13px; font-weight: 600; padding: 10px 12px; border-radius: 12px; }
  .plan-verdict.rt-good { background: rgba(79,224,192,0.12); color: #4fe0c0; }
  .plan-verdict.rt-bad { background: rgba(255,139,139,0.12); color: #ff8b8b; }
  .plan-grid { grid-template-columns: 1.4fr 1fr 1fr 1fr 1.1fr; }
  .plan-month { display: flex; flex-direction: column; }
  .plan-tag { font-size: 10px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.04em; }
  .plan-forecast-row .plan-tag { color: var(--accent); }
  .plan-bar-actual { background: #4fe0c0 !important; }
  .plan-bar-forecast { background: var(--accent) !important; }
  .plan-table { max-height: 340px; overflow-y: auto; }
  @media (max-width: 560px) { .review-cards { grid-template-columns: 1fr; } }

/* ---- step 4: product-forward hero ---- */
  .lp-hero { display: grid; grid-template-columns: 1.05fr 0.95fr; gap: 48px; align-items: center; text-align: left; padding: 72px 24px 64px; }
  .lp-hero-copy h1 { font-size: 52px; }
  .lp-hero-copy p { max-width: 46ch; }
  .hero-trust { display: block; margin-top: 18px; font-size: 12.5px; color: var(--ink-3); }
  .lp-hero-mock { display: flex; flex-direction: column; gap: 14px; animation: heroMockIn 0.7s cubic-bezier(0.22, 0.8, 0.3, 1) both 0.15s; }
  @keyframes heroMockIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
  .hm-card { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 18px 20px; box-shadow: var(--shadow-pop); }
  .hm-card.hm-budgets { margin-left: 26px; }
  .hm-label { display: block; font-size: 10.5px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 6px; }
  .hm-big { font-size: 34px; font-weight: 800; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; color: var(--ink); }
  .hm-sub { display: block; font-size: 12px; color: var(--ink-3); margin-top: 8px; font-variant-numeric: tabular-nums; }
  .hm-track { height: 8px; border-radius: 5px; background: var(--surface-2); overflow: hidden; margin-top: 12px; }
  .hm-track.sm { height: 5px; margin-top: 6px; }
  .hm-fill { height: 100%; border-radius: 5px; background: var(--accent); animation: barGrow 1s cubic-bezier(0.22, 0.8, 0.3, 1); }
  .hm-fill.warn { background: #E8A23D; }
  .hm-row { display: flex; gap: 10px; align-items: flex-start; padding: 8px 0; }
  .hm-row + .hm-row { border-top: 1px solid var(--line); }
  .hm-ico { width: 26px; height: 26px; border-radius: 8px; background: var(--surface-2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
  .hm-cat { flex: 1; min-width: 0; }
  .hm-cat-top { display: flex; justify-content: space-between; font-size: 12.5px; font-weight: 600; color: var(--ink); font-variant-numeric: tabular-nums; }
  @media (max-width: 900px) {
    .lp-hero { grid-template-columns: 1fr; gap: 34px; padding: 48px 20px 44px; }
    .lp-hero-copy h1 { font-size: 36px; }
    .hm-card.hm-budgets { margin-left: 0; }
  }

  /* ---- step 5: chart motion ---- */
  @keyframes barUp { from { height: 0; } }
  .trend-bar, .ltp-bar-col .ltp-bar, .lpd-trend-bar { animation: barUp 0.7s cubic-bezier(0.22, 0.8, 0.3, 1); }
  .bd-pie-svg { animation: pieIn 0.55s cubic-bezier(0.22, 0.8, 0.3, 1); transform-origin: center; }
  @keyframes pieIn { from { opacity: 0; transform: scale(0.86); } to { opacity: 1; transform: none; } }
  @media (prefers-reduced-motion: reduce) {
    .trend-bar, .ltp-bar-col .ltp-bar, .lpd-trend-bar, .bd-pie-svg, .lp-hero-mock, .hm-fill { animation: none; }
  }

  .lp-hero-copy p { margin: 0 0 28px; }
  .lp-hero-copy .hero-actions { justify-content: flex-start; }
  @media (max-width: 900px) { .lp-hero-copy h1 { font-size: 36px; } }

  /* ================= mobile usability fixes (2026-07-09_) ================= */

  /* Fix: wide tables were forcing the whole page/card wide instead of scrolling
     within the table. Stop flex children from expanding to content width. */
  .body-row { min-width: 0; }
  .main-content, .main-content-wide { min-width: 0; }
  .main-content > *, .main-content-wide > * { min-width: 0; max-width: 100%; }
  .glass-card, .dash-card { min-width: 0; }
  .table-wrap, .ltp-wrap, .budget-table-wrap { min-width: 0; max-width: 100%; -webkit-overflow-scrolling: touch; }

  /* Freeze the first (label) column so it stays visible while scrolling right */
  .month-table th:first-child, .month-table td:first-child {
    position: sticky; left: 0; z-index: 2; background: var(--card);
  }
  .budget-table th:first-child, .budget-table td:first-child {
    position: sticky; left: 0; z-index: 2;
  }
  .budget-table thead th:first-child, .budget-table .bt-total-row td:first-child { background: var(--surface-2); }
  .budget-table tbody td:first-child { background: var(--card); }
  .budget-table tbody tr:hover td:first-child { background: var(--surface-2); }

  /* LTP banners: allow long lines to wrap instead of running off-screen */
  .plan-verdict, .plan-sub, .plan-headline { overflow-wrap: anywhere; word-break: break-word; }

  /* Sidebar close (x) — only shows on mobile where the hamburger sits behind the drawer */
  .side-panel-label-actions { display: flex; align-items: center; gap: 4px; }
  .side-close-btn { display: none; background: none; border: none; color: var(--ink-2); font-size: 22px; line-height: 1; cursor: pointer; padding: 0 6px; border-radius: 6px; }
  .side-close-btn:hover { color: var(--ink); background: var(--surface-2); }

  /* Modals: never let the top get clipped; scroll inside the card if it's tall */
  .modal-overlay { overflow-y: auto; }
  .modal-card { max-height: calc(100dvh - 40px); overflow-y: auto; }

  @media (max-width: 640px) {
    /* Header: keep logo + buttons from colliding / wrapping */
    .topbar { gap: 10px; }
    .topbar-left { gap: 8px; min-width: 0; flex: 1 1 auto; }
    .topbar-left .brand { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .topbar-right { flex-shrink: 0; }
    .upload-statement-btn { white-space: nowrap; }

    /* Sidebar drawer: show close control, allow it to scroll */
    .side-close-btn { display: inline-flex; align-items: center; justify-content: center; }
    .side-panel.side-panel-open { overflow-y: auto; }

    /* "Ask about your money": stack field + button so the placeholder isn't cramped */
    .ask-row { flex-direction: column; align-items: stretch; }
    .ask-btn { width: 100%; }
  }

  @media (max-width: 460px) {
    /* Landing nav on very small screens */
    .lp-nav { padding: 14px 16px; gap: 10px; }
    .lp-nav .brand-row { min-width: 0; }
    .lp-nav .brand-name { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .lp-nav-actions { flex-shrink: 0; gap: 8px; }
    .lp-nav-actions .btn { padding: 9px 12px; font-size: 13px; }
  }

  @media (max-width: 720px) {
    /* Landing page: tighten oversized, uneven vertical gaps */
    .lp-section { padding: 40px 20px; }
    .section-head { margin-bottom: 24px; }
    .lp-step { margin: 32px 0; }
    .lp-final-cta { padding: 48px 20px 64px; }
  }
  /* ============= end mobile usability fixes ============= */


  /* --- audit fixes: contrast, touch targets, close-btn hit-area --- */
  .app-shell[data-theme="dark"] .settings-nudge { color: #cfe0ff; }
  .icon-btn { min-width: 44px; min-height: 44px; display: inline-flex; align-items: center; justify-content: center; }
  .side-close-btn { min-width: 44px; min-height: 44px; padding: 0; }

  .admin-bar { display: flex; align-items: center; gap: 12px; background: var(--accent); color: var(--on-accent); padding: 10px 18px; font-size: 13px; }
  .admin-bar-dot { width: 9px; height: 9px; border-radius: 50%; background: #BFF3D6; box-shadow: 0 0 0 3px rgba(255,255,255,0.27); flex-shrink: 0; }
  .admin-bar-label { font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 700; }
  .admin-bar-sub { opacity: 0.92; }
  .admin-bar-btn { margin-left: auto; font-family: inherit; font-size: 13px; font-weight: 700; color: var(--on-accent); background: rgba(255,255,255,0.16); border: none; border-radius: 999px; padding: 6px 14px; cursor: pointer; }
  .admin-bar-btn:hover { background: rgba(255,255,255,0.28); }
  .notif-banner { display: flex; align-items: center; gap: 10px; background: var(--accent-soft); color: var(--ink); border-bottom: 1px solid var(--line); padding: 10px 18px; font-size: 13.5px; }
  .notif-banner-text { flex: 1; }
  .notif-banner-x { background: none; border: none; color: var(--ink-3); font-size: 20px; line-height: 1; cursor: pointer; padding: 0 4px; font-family: inherit; }
  .menu-item-admin { color: var(--accent); font-weight: 600; }
  .admin-page { max-width: 1000px; margin: 0 auto; padding: 24px 20px 60px; min-height: 100vh; }
  .admin-act { font-family: inherit; font-size: 12.5px; font-weight: 600; color: var(--ink-2); background: var(--card); border: 1px solid var(--line); border-radius: 999px; padding: 5px 11px; cursor: pointer; margin-left: 6px; }
  .admin-act:hover { background: var(--surface-2); }
  .admin-act-danger { color: var(--neg); border-color: rgba(217,45,32,0.35); }
  .admin-act-danger:hover { background: rgba(217,45,32,0.08); }
  .beta-callout { display: flex; align-items: center; gap: 10px; background: #FFE44D; color: #3a2d00; border: 1.5px solid #E0B400; border-radius: 12px; padding: 12px 14px; font-size: 13.5px; font-weight: 600; line-height: 1.4; margin: 4px 0 16px; box-shadow: 0 2px 10px rgba(224,180,0,0.25); }
  .beta-callout-tag { background: #3a2d00; color: #FFE44D; font-size: 11px; font-weight: 800; letter-spacing: 0.08em; padding: 3px 8px; border-radius: 6px; flex-shrink: 0; }
  .beta-callout strong { font-weight: 800; }

  /* ===== Unified table skin: Targets / Long-Term Plan / Monthly Review ===== */
  .budget-table-wrap, .ltp-wrap { background: var(--card); border: 1px solid var(--line); border-radius: 14px; }
  .budget-table th, .budget-table td, .ltp-table th, .ltp-table td { padding: 8px 12px !important; font-size: 13px; }
  .budget-table thead th, .ltp-table thead th { background: var(--surface-2) !important; color: var(--ink-3) !important; font-size: 11px !important; font-weight: 600 !important; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--line); }
  .bt-corner, .bt-month-head { font-size: 11px !important; font-weight: 600 !important; color: var(--ink-3) !important; text-transform: uppercase; letter-spacing: 0.05em; }
  .bt-month-current, .ltp-plan-head { color: var(--accent) !important; }
  .bt-cat, .ltp-table .ltp-sticky { font-size: 13px; font-weight: 500; color: var(--ink); }
  .ltp-table .ltp-sticky { background: var(--card); }
  .ltp-table thead th.ltp-sticky { background: var(--surface-2) !important; }
  .budget-table tbody tr td, .ltp-table tbody tr td { border-bottom: 1px solid var(--line); }

  .bt-total-row td, .ltp-bal-row td, .ltp-net-row td { background: var(--surface-3) !important; font-weight: 700 !important; }
  .bt-total-row .bt-total-num { font-weight: 700; }
  .ltp-bal-row .ltp-sticky, .ltp-net-row .ltp-sticky { background: var(--surface-3) !important; color: var(--ink) !important; font-weight: 700 !important; }
  .bt-total-row td { border-top: 2px solid var(--line-strong) !important; }
  .ltp-bal-row.ltp-close-row td { border-top: 2px solid var(--line-strong) !important; }
  .ltp-net-row td { border-top: none !important; }

  .review-table { border: 1px solid var(--line); border-radius: 14px; background: var(--card); overflow: hidden; margin-top: 16px; }
  .review-head { background: var(--surface-2); color: var(--ink-3); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; padding: 9px 12px; }
  .review-row { padding: 8px 12px; font-size: 13px; gap: 12px; }
  .review-cat { gap: 8px; font-weight: 500; }
  .review-cat .cat-dot { width: 9px; height: 9px; }
  .review-total { background: var(--surface-3); border-top: 2px solid var(--line-strong); margin-top: 0; padding: 10px 12px; font-weight: 700; }

  .rv-over { color: var(--neg) !important; }
  .rv-under { color: var(--pos) !important; }
  .ltp-goal-cell { background: rgba(18,161,80,0.12) !important; color: var(--pos) !important; font-weight: 800; }
  .rt-good .rt-verdict { color: var(--pos) !important; }
  .rt-bad .rt-verdict { color: var(--neg) !important; }
</style>
