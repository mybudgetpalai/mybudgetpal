<script>
/* Mobile-preview emulation shim. Runs FIRST, before any app code, when the page
   is loaded inside the desktop testing "Mobile preview" frame (?mp=1). It makes
   the framed instance behave like a real phone rather than a narrow desktop
   window: coarse pointer, touch support, mobile UA hints and PWA standalone
   display. Everything below is a no-op on a normal (non-?mp=1) load. */
(function () {
  try {
    if (!/[?&]mp=1(&|$)/.test(window.location.search)) return;
    window.__MP_PREVIEW = true;

    /* Touch capability — code that feature-detects touch should see a phone. */
    if (!("ontouchstart" in window)) {
      try { window.ontouchstart = null; } catch (e) {}
    }
    try {
      Object.defineProperty(navigator, "maxTouchPoints", { get: function () { return 5; }, configurable: true });
    } catch (e) {}

    /* Mobile user-agent + platform hints. */
    var UA = "Mozilla/5.0 (iPhone; CPU iPhone OS 17_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/17.0 Mobile/15E148 Safari/604.1";
    try { Object.defineProperty(navigator, "userAgent", { get: function () { return UA; }, configurable: true }); } catch (e) {}
    try { Object.defineProperty(navigator, "platform", { get: function () { return "iPhone"; }, configurable: true }); } catch (e) {}
    try {
      Object.defineProperty(navigator, "userAgentData", {
        get: function () { return { mobile: true, platform: "iOS", brands: [] }; },
        configurable: true,
      });
    } catch (e) {}

    /* pointer:coarse / hover:none — hover-only affordances should disappear. */
    var origMM = window.matchMedia.bind(window);
    window.matchMedia = function (q) {
      var res = origMM(q);
      if (/pointer\s*:\s*coarse|hover\s*:\s*none|any-pointer\s*:\s*coarse/i.test(q)) {
        return { matches: true, media: q, onchange: null, addListener: function () {}, removeListener: function () {}, addEventListener: function () {}, removeEventListener: function () {}, dispatchEvent: function () { return false; } };
      }
      if (/pointer\s*:\s*fine|hover\s*:\s*hover/i.test(q)) {
        return { matches: false, media: q, onchange: null, addListener: function () {}, removeListener: function () {}, addEventListener: function () {}, removeEventListener: function () {}, dispatchEvent: function () { return false; } };
      }
      return res;
    };

    /* PWA standalone display — matches the installed-app experience. */
    var mmStandalone = window.matchMedia;
    window.matchMedia = function (q) {
      if (/display-mode\s*:\s*standalone/i.test(q)) {
        return { matches: true, media: q, onchange: null, addListener: function () {}, removeListener: function () {}, addEventListener: function () {}, removeEventListener: function () {}, dispatchEvent: function () { return false; } };
      }
      return mmStandalone(q);
    };
    try { Object.defineProperty(navigator, "standalone", { get: function () { return true; }, configurable: true }); } catch (e) {}

    /* Hide the testing/admin/DEV chrome inside the frame — the host desktop
       window owns those controls, and they'd otherwise cover the phone screen. */
    var st = document.createElement("style");
    st.textContent = ".admin-bar, .testing-bar { display: none !important; }";
    document.addEventListener("DOMContentLoaded", function () { document.head.appendChild(st); });

    /* Carry the DEV date through into the framed instance. */
    var dm = /[?&]devdate=([0-9-]+)/.exec(window.location.search);
    if (dm) window.__MP_DEVDATE = dm[1];
  } catch (e) { /* never let the shim break a normal load */ }
})();
</script>
