function formatSize(bytes) {

  return (bytes / (1024 * 1024)).toFixed(1) + " MB";
}

function parseCSVLine(line) {
  const out = [];
  let cur = "", inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQuotes = !inQuotes; continue; }
    if (ch === "," && !inQuotes) { out.push(cur.trim()); cur = ""; continue; }
    cur += ch;
  }
  out.push(cur.trim());
  return out;
}

function pad2(n) { return String(n).padStart(2, "0"); }
function normalizeDate(raw) {
  if (!raw) return null;
  const s = String(raw).trim();
  let m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if (m) return m[1] + "-" + pad2(m[2]) + "-" + pad2(m[3]);
  m = s.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})$/);
  if (m) {
    let d = +m[1], mo = +m[2], y = +m[3];
    if (mo > 12 && d <= 12) { const t = d; d = mo; mo = t; }
    if (y < 100) y += 2000;
    if (mo < 1 || mo > 12 || d < 1 || d > 31) return null;
    return y + "-" + pad2(mo) + "-" + pad2(d);
  }
  m = s.toLowerCase().match(/^(\d{1,2})\s+([a-z]{3})[a-z]*\s*(\d{4})?/);
  if (m) {
    const mo = MONTHS_SHORT.indexOf(m[2]) + 1;
    if (mo > 0) return (m[3] || String(new Date().getFullYear())) + "-" + pad2(mo) + "-" + pad2(m[1]);
  }
  const dt = new Date(s);
  if (!isNaN(dt.getTime())) return dt.toISOString().slice(0, 10);
  return null;
}
function formatTxDate(d) {
  if (!d) return "";
  if (/^\d{4}-\d{2}-\d{2}/.test(d)) return (+d.slice(8, 10)) + " " + MONTHS_LABEL[+d.slice(5, 7) - 1];
  return d;
}
function monthLabelFromKey(k) { return MONTHS_LABEL[+k.slice(5, 7) - 1]; }
function latestMonthKey(txs) {
  let max = "";
  (txs || []).forEach((t) => { if (t.date && t.date.slice(0, 7) > max) max = t.date.slice(0, 7); });
  return max || new Date().toISOString().slice(0, 7);
}
function lastNMonthKeys(endKey, n) {
  let y = +endKey.slice(0, 4), m = +endKey.slice(5, 7);
  const keys = [];
  for (let i = 0; i < n; i++) { keys.unshift(y + "-" + pad2(m)); m--; if (m === 0) { m = 12; y--; } }
  return keys;
}
function spendForMonth(txs, k) { return txs.filter((t) => t.amount < 0 && t.date.slice(0, 7) === k).reduce((s, t) => s + Math.abs(t.amount), 0); }
function incomeForMonth(txs, k) { return txs.filter((t) => t.amount > 0 && t.date.slice(0, 7) === k).reduce((s, t) => s + t.amount, 0); }

  txs.filter((t) => t.amount < 0 && t.date.slice(0, 7) === k).forEach((t) => { o[t.category] = (o[t.category] || 0) + Math.abs(t.amount); });

}

function isMidMonth() { const d = new Date(); const last = new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate(); return d.getDate() < last; }
function avgSpendByCategory(transactions) {
  const out = {};
  const has = transactions && transactions.length > 0;
  const keys = has ? lastNMonthKeys(latestMonthKey(transactions), 3) : [];
  const perMonth = keys.map((k) => spendByCategoryForMonth(transactions, k));
  TX_CATEGORIES.forEach((c) => {
    if (!has) { out[c] = CATEGORY_MONTHLY[c] ? CATEGORY_MONTHLY[c][CATEGORY_MONTHLY[c].length - 1] : 0; return; }
    const vals = perMonth.map((o) => o[c] || 0);
    const nz = vals.filter((v) => v > 0);
    const base = nz.length ? nz.reduce((a, b) => a + b, 0) / nz.length : 0;

  });

}

/* Deduplication: key = date + description + amount. Handles genuine same-day
   identical transactions by only skipping as many copies as already exist. */
function txKey(t) {
  return (t.date || "") + "|" + (t.name || "").toLowerCase().replace(/\s+/g, " ").trim() + "|" + (Number(t.amount) || 0).toFixed(2);
}
function dedupeTransactions(incoming, existing) {
  const existingCounts = {};
  (existing || []).forEach((t) => { const k = txKey(t); existingCounts[k] = (existingCounts[k] || 0) + 1; });
  const seen = {};
  const kept = [];
  let skipped = 0;
  (incoming || []).forEach((t) => {
    const k = txKey(t);
    seen[k] = (seen[k] || 0) + 1;
    if (seen[k] > (existingCounts[k] || 0)) kept.push(t);
    else skipped++;
  });
  return { kept, skipped };
}

/* Pacing projection helpers */
function currentMonthKey() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0");
}
function currentMonthName() {
  return new Date().toLocaleString("en-US", { month: "long" });
}
function daysInCurrentMonth() {
  const d = new Date();
  return new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
}
function projectMonthEnd(spentSoFar) {
  const day = new Date().getDate();
  if (day <= 0) return spentSoFar;
  return (spentSoFar / day) * daysInCurrentMonth();
}
function monthsUntil(dateStr) {
  if (!dateStr) return null;
  const now = new Date();
  const d = new Date(dateStr + "T00:00:00");
  if (isNaN(d)) return null;
  const months = (d.getFullYear() - now.getFullYear()) * 12 + (d.getMonth() - now.getMonth());
  return Math.max(0, months);
}
function topMerchantsFor(txs, k, n) {
  const o = {};
  txs.filter((t) => t.amount < 0 && (!k || t.date.slice(0, 7) === k)).forEach((t) => { o[t.name] = (o[t.name] || 0) + Math.abs(t.amount); });
  return Object.entries(o).map(([name, amount]) => ({ name, amount })).sort((a, b) => b.amount - a.amount).slice(0, n);
}
function ordinalDay(n) { const s = ["th", "st", "nd", "rd"], v = n % 100; return n + (s[(v - 20) % 10] || s[v] || s[0]); }
function detectRecurringBills(txs) {
  const groups = {};
  txs.filter((t) => t.amount < 0 && t.date).forEach((t) => {
    const key = t.name.toLowerCase().replace(/\d+/g, "").replace(/\s+/g, " ").trim();
    (groups[key] = groups[key] || []).push(t);
  });
  const bills = [];
  Object.values(groups).forEach((list) => {
    const months = new Set(list.map((t) => t.date.slice(0, 7)));
    if (months.size < 2) return;
    const avg = list.reduce((s, t) => s + Math.abs(t.amount), 0) / list.length;
    const steady = list.every((t) => Math.abs(Math.abs(t.amount) - avg) <= Math.max(avg * 0.2, 2));
    if (!steady) return;
    const days = list.map((t) => +t.date.slice(8, 10));
    const due = Math.round(days.reduce((a, b) => a + b, 0) / days.length);
    bills.push({ name: list[0].name, amount: Math.round(avg * 100) / 100, frequency: "Monthly", due: ordinalDay(due) });
  });
  return bills.sort((a, b) => b.amount - a.amount);
}
function buildInsights(txs, targets) {
  const out = [];
  const cur = latestMonthKey(txs);
  const prev = lastNMonthKeys(cur, 2)[0];
  const curCats = spendByCategoryForMonth(txs, cur);
  const prevCats = spendByCategoryForMonth(txs, prev);
  Object.keys(curCats).forEach((c) => {
    const a = curCats[c], b = prevCats[c];
    if (b > 20 && a > 20) {
      const chg = Math.round(((a - b) / b) * 100);
      if (chg >= 25) out.push({ type: "warning", text: c + " spend is up " + chg + "% vs last month." });
      else if (chg <= -25) out.push({ type: "positive", text: c + " spend is down " + Math.abs(chg) + "% vs last month." });
    }
  });
  const totalTarget = Object.values(targets || {}).reduce((s, v) => s + (Number(v) || 0), 0);
  const spent = spendForMonth(txs, cur);
  if (totalTarget > 0 && cur === currentMonthKey()) {
    const projected = projectMonthEnd(spent);
    if (projected > totalTarget) out.unshift({ type: "warning", text: "At this rate you'll spend ~" + formatMoney(projected) + " this month — " + formatMoney(projected - totalTarget) + " over your target." });
    else out.push({ type: "positive", text: "At this rate you'll finish ~" + formatMoney(totalTarget - projected) + " under your monthly target." });
  }
  if (totalTarget > 0) {
    if (spent <= totalTarget) out.push({ type: "positive", text: "You've used " + Math.round((spent / totalTarget) * 100) + "% of your monthly target." });
    else out.push({ type: "warning", text: "You're " + formatMoney(spent - totalTarget) + " over your total monthly target." });
  }
  const top = topMerchantsFor(txs, cur, 1)[0];
  if (top) out.push({ type: "info", text: "Your biggest merchant this month is " + top.name + " (" + formatMoney(top.amount) + ")." });
  return out.slice(0, 5);
}

function parseStatementCSV(text) {
  const lines = text.split(/\r?\n/).filter((l) => l.trim().length > 0);
  if (lines.length < 2) throw new Error("empty");
  const header = parseCSVLine(lines[0]).map((h) => h.toLowerCase());
  const dateIdx = header.findIndex((h) => h.includes("date"));
  const descIdx = header.findIndex((h) => h.includes("desc") || h.includes("narrat") || h.includes("detail") || h.includes("particular") || h.includes("name") || h.includes("merchant") || h.includes("reference"));
  const catIdx = header.findIndex((h) => h.includes("categ"));
  const amtIdx = header.findIndex((h) => h.includes("amount") || h === "value");
  const debitIdx = header.findIndex((h) => h.includes("debit") || h.includes("money out") || h.includes("withdraw") || h.includes("paid out"));
  const creditIdx = header.findIndex((h) => h.includes("credit") || h.includes("money in") || h.includes("deposit") || h.includes("paid in"));
  if (dateIdx === -1 || descIdx === -1 || (amtIdx === -1 && debitIdx === -1 && creditIdx === -1)) throw new Error("headers");
  const balIdx = header.findIndex((h) => h.includes("balance"));
  const num = (v) => { const n = Number(String(v || "").replace(/[^0-9.\-]/g, "")); return isNaN(n) ? 0 : n; };

  const rows = lines.slice(1).map((line) => {
    const cols = parseCSVLine(line);
    let amount = 0;
    if (amtIdx !== -1 && cols[amtIdx]) amount = num(cols[amtIdx]);
    else {
      const dr = debitIdx !== -1 ? Math.abs(num(cols[debitIdx])) : 0;
      const cr = creditIdx !== -1 ? Math.abs(num(cols[creditIdx])) : 0;
      amount = cr - dr;
    }
    const name = (cols[descIdx] || "").trim();
    return {
      date: normalizeDate(cols[dateIdx]) || "",
      name,
      category: catIdx !== -1 && cols[catIdx] ? cols[catIdx].trim() : categorizeByRules(name, amount),
      amount,
      _bal: balIdx !== -1 && cols[balIdx] !== undefined && String(cols[balIdx]).trim() !== "" ? num(cols[balIdx]) : null,
    };
  }).filter((t) => t.name && t.amount !== 0);

  /* Detect opening/closing from a running-balance column, if the CSV has one */
  const meta = { opening: null, closing: null, periodStart: null, periodEnd: null };
  const dated = rows.filter((r) => r.date && r._bal !== null);
  if (dated.length >= 2) {
    const sorted = [...dated].sort((a, b) => a.date.localeCompare(b.date));
    const first = sorted[0], last = sorted[sorted.length - 1];
    meta.opening = Math.round((first._bal - first.amount) * 100) / 100;
    meta.closing = last._bal;
  }
  rows.forEach((r) => { delete r._bal; });
  return { transactions: rows, meta };
}

/* PDF text extraction (pdf.js, loaded on demand) */
let pdfjsPromise = null;
function loadPdfJs() {
  if (window.pdfjsLib) return Promise.resolve(window.pdfjsLib);
  if (!pdfjsPromise) {
    pdfjsPromise = new Promise((resolve, reject) => {
      const s = document.createElement("script");
      s.src = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
      s.onload = () => {
        window.pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
        resolve(window.pdfjsLib);
      };
      s.onerror = () => reject(new Error("Couldn't load PDF reader"));
      document.head.appendChild(s);
    });
  }
  return pdfjsPromise;
}
async function extractPdfText(file) {
  const pdfjs = await loadPdfJs();
  const buf = await file.arrayBuffer();
  const doc = await pdfjs.getDocument({ data: buf }).promise;
  let text = "";
  for (let p = 1; p <= doc.numPages; p++) {
    const page = await doc.getPage(p);
    const content = await page.getTextContent();
    text += content.items.map((i) => i.str).join(" ") + "\n";
  }
  return text;
}

/* AI helpers via Supabase Edge Function "ai-statement" */
async function aiParseStatementText(text) {
  const { data, error } = await supabaseClient.functions.invoke("ai-statement", {
    body: { action: "parse", text: String(text).slice(0, 150000) },
  });
  if (error || !data || !Array.isArray(data.transactions)) throw new Error((error && error.message) || (data && data.error) || "AI parsing unavailable");
  const txs = data.transactions.map((t) => {
    const amount = Number(t.amount) || 0;
    const name = String(t.description || "").trim();
    return { date: normalizeDate(t.date) || "", name, amount, category: categorizeByRules(name, amount) };
  }).filter((t) => t.name && t.amount !== 0);
  const numOrNull = (v) => { const n = Number(v); return v === null || v === undefined || v === "" || isNaN(n) ? null : n; };
  return {
    transactions: txs,
    meta: {
      opening: numOrNull(data.opening_balance),
      closing: numOrNull(data.closing_balance),
      periodStart: normalizeDate(data.period_start) || null,
      periodEnd: normalizeDate(data.period_end) || null,
    },
  };
}
async function aiCategorize(descriptions) {
  const { data, error } = await supabaseClient.functions.invoke("ai-statement", {
    body: { action: "categorize", items: descriptions },
  });
  if (error || !data || !data.categories) throw new Error((error && error.message) || (data && data.error) || "AI categorization unavailable");
  return data.categories;
}

/* One entry point: file -> { transactions, meta } */
async function parseStatementFile(file) {
  const lower = file.name.toLowerCase();
  let result;
  if (lower.endsWith(".csv")) result = parseStatementCSV(await file.text());
  else if (lower.endsWith(".pdf")) {
    const text = await extractPdfText(file);
    if (!text.trim()) throw new Error("This PDF has no readable text (it may be a scanned image) — try a CSV export instead.");
    result = await aiParseStatementText(text);
  } else throw new Error("Only PDF or CSV files are supported.");
  const meta = result.meta || { opening: null, closing: null, periodStart: null, periodEnd: null };
  const dates = result.transactions.map((t) => t.date).filter(Boolean).sort();
  if (!meta.periodStart && dates.length) meta.periodStart = dates[0];
  if (!meta.periodEnd && dates.length) meta.periodEnd = dates[dates.length - 1];
  return { transactions: result.transactions, meta };
}

function rowToStmt(r) {

    difference: r.difference === null ? null : Number(r.difference),
    status: r.status || "unverified",
  };
}
async function fetchStatements(userId) {
  const { data, error } = await supabaseClient.from("statements").select("*").eq("user_id", userId).order("period_start", { ascending: true });
  if (error) return [];
  return (data || []).map(rowToStmt);
}
async function saveStatementToDb(userId, s) {
  /* Re-uploading the same period for the same bank updates the existing row instead of duplicating it */
  if (s.periodStart && s.periodEnd) {
    const { data: existing } = await supabaseClient.from("statements").select("*")
      .eq("user_id", userId).eq("bank_name", s.bank)
      .eq("period_start", s.periodStart).eq("period_end", s.periodEnd).limit(1);
    if (existing && existing.length) {
      const upd = {};
      if (s.opening !== null && s.opening !== undefined) upd.opening_balance = s.opening;
      if (s.closing !== null && s.closing !== undefined) upd.closing_balance = s.closing;
      if (s.fileName) upd.file_name = s.fileName;
      if (Object.keys(upd).length) {
        const { data: updated } = await supabaseClient.from("statements").update(upd).eq("id", existing[0].id).select().single();
        return rowToStmt(updated || existing[0]);
      }
      return rowToStmt(existing[0]);
    }
  }
  const { data, error } = await supabaseClient.from("statements").insert({
    user_id: userId, bank_name: s.bank, file_name: s.fileName || null,
    period_start: s.periodStart || null, period_end: s.periodEnd || null,
    opening_balance: s.opening, closing_balance: s.closing,
    computed_closing: null, difference: null, status: "unverified",
  }).select().single();
  if (error) throw error;
  return rowToStmt(data);
}

/*
 * Reconciliation: for every statement of a bank, computed closing =
 * opening + sum of ALL stored transactions for that bank inside the period.
 * Re-run after every upload, so a later "longer period" upload that fills a
 * gap automatically flips an old mismatch to reconciled.
 * Also chains statements: previous closing should equal next opening.
 */
function reconcileStatements(statements, transactions) {
  const results = [];
  statements.forEach((s) => {
    if (s.opening === null || s.closing === null || !s.periodStart || !s.periodEnd) {
      results.push({ ...s, computed: null, difference: null, status: "unverified" });
      return;
    }
    const sum = transactions
      .filter((t) => t.bank === s.bank && t.date && t.date >= s.periodStart && t.date <= s.periodEnd)
      .reduce((a, t) => a + t.amount, 0);
    const computed = Math.round((s.opening + sum) * 100) / 100;
    const difference = Math.round((s.closing - computed) * 100) / 100;
    results.push({ ...s, computed, difference, status: Math.abs(difference) <= 0.01 ? "reconciled" : "mismatch" });
  });
  return results;
}
function chainIssues(statements) {
  const byBank = {};
  statements.forEach((s) => { (byBank[s.bank] = byBank[s.bank] || []).push(s); });
  const issues = [];
  Object.entries(byBank).forEach(([bank, list]) => {
    const sorted = [...list].filter((s) => s.periodStart).sort((a, b) => a.periodStart.localeCompare(b.periodStart));
    for (let i = 1; i < sorted.length; i++) {
      const prev = sorted[i - 1], cur = sorted[i];
      if (prev.periodEnd && cur.periodStart) {
        const gapDays = (new Date(cur.periodStart) - new Date(prev.periodEnd)) / 86400000;
        if (gapDays > 3) issues.push({ bank, type: "gap", text: "Possible missing statement between " + prev.periodEnd + " and " + cur.periodStart });
      }
      if (prev.closing !== null && cur.opening !== null && Math.abs(prev.closing - cur.opening) > 0.01) {
        issues.push({ bank, type: "chain", text: "Closing balance (" + formatMoney(prev.closing) + ") doesn't match next opening (" + formatMoney(cur.opening) + ")" });
      }
    }
  });
  return issues;
}
async function persistReconciliation(oldStatements, newStatements) {
  const oldById = Object.fromEntries(oldStatements.map((s) => [s.id, s]));
  await Promise.all(newStatements.map((s) => {
    const o = oldById[s.id];
    if (o && o.status === s.status && o.computed === s.computed && o.difference === s.difference) return Promise.resolve();
    return supabaseClient.from("statements").update({ computed_closing: s.computed, difference: s.difference, status: s.status }).eq("id", s.id);
  }));
}

/* Current balance per bank: anchor on the latest statement closing balance,
   then roll forward any transactions dated after that statement. Falls back
   to the onboarding starting balance if no statement has balances yet. */
function computeBankBalance(bank, statements, transactions, bankRow) {
  const withClosing = statements.filter((s) => s.bank === bank && s.closing !== null && s.periodEnd).sort((a, b) => a.periodEnd.localeCompare(b.periodEnd));
  if (withClosing.length) {
    const anchor = withClosing[withClosing.length - 1];
    const after = transactions.filter((t) => t.bank === bank && t.date && t.date > anchor.periodEnd).reduce((a, t) => a + t.amount, 0);
    return Math.round((anchor.closing + after) * 100) / 100;
  }
  if (bankRow && bankRow.starting_balance !== null && bankRow.starting_balance !== undefined) {
    const from = bankRow.as_of_date || "";
    const after = transactions.filter((t) => t.bank === bank && t.date && t.date >= from).reduce((a, t) => a + t.amount, 0);
    return Math.round((Number(bankRow.starting_balance) + after) * 100) / 100;
  }
  return null;
}

    name.trim().length > 0, banks.length > 0, savvy !== null, tracking !== null, balanceCheck !== null, goals.length > 0,
  ][step];

  const toggleBank = (b) => setBanks((prev) => prev.includes(b) ? prev.filter((x) => x !== b) : [...prev, b]);

  const next = async () => {
    if (step === ONBOARD_STEPS - 1) {
      setSubmitting(true);

      const { error: bErr } = await supabaseClient.from("banks").insert(banks.map((b) => ({ user_id: userId, bank_name: b })));
      const check = await fetchProfile(userId);
      const savedBanks = await fetchBanks(userId);

        pushToast("Couldn't save: " + msg, "error");

        return;

      setSubmitting(false);
      onDone({ name: name.trim(), banks });

  return (
    <div className="page stage-fade">
      <div className="blob blob1" /><div className="blob blob2" /><div className="blob blob3" />

        {step === 4 && (

              {BALANCE_OPTIONS.map((opt) => (

/* ---------------- Per-bank statement upload ---------------- */

const VALID_EXTENSIONS = [".pdf", ".csv"];
const MAX_FILE_SIZE = 10 * 1024 * 1024;

function validateFile(file) {
  const lower = file.name.toLowerCase();
  const validExt = VALID_EXTENSIONS.some((ext) => lower.endsWith(ext));
  if (!validExt) return "Only PDF or CSV files are supported.";
  if (file.size > MAX_FILE_SIZE) return "File too large (max 10MB).";
  return null;
}

function BankUploadBlock({ bank, files, error, onAdd, onRemove }) {
  const [dragActive, setDragActive] = useState(false);
  const inputRef = useRef(null);

  const handleDrop = (e) => {
    e.preventDefault(); setDragActive(false);
    if (e.dataTransfer.files?.length) onAdd(e.dataTransfer.files);
  };

  return (
    <div className="bank-upload-block">
      <div className="bank-upload-head">
        <span className="bank-upload-name">{bank}</span>
        <span className={"bank-upload-count " + (files.length >= 3 ? "count-good" : "")}>
          {files.length} file{files.length !== 1 ? "s" : ""} added
        </span>
      </div>
      <div
        className={"dropzone dropzone-compact " + (dragActive ? "dropzone-active" : "") + (error ? " dropzone-error" : "")}
        onDragOver={(e) => { e.preventDefault(); setDragActive(true); }}
        onDragLeave={() => setDragActive(false)}
        onDrop={handleDrop}
        onClick={() => inputRef.current?.click()}
      >
        <p className="dropzone-text">Drag & drop, or click to browse</p>
        <input ref={inputRef} type="file" multiple accept=".pdf,.csv" style={{ display: "none" }}
          onChange={(e) => e.target.files?.length && onAdd(e.target.files)} />
      </div>
      {error && <p className="error-text">{error}</p>}
      {files.length > 0 && (
        <div className="file-list">
          {files.map((f) => (
            <div key={f.id} className="file-row">
              <div className="file-info"><span className="file-name">{f.name}</span><span className="file-size">{formatSize(f.size)}</span></div>
              <button className="file-remove" onClick={() => onRemove(f.id)}>×</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function UploadScreen({ banks, onDone, pushToast, userId }) {
  const [filesByBank, setFilesByBank] = useState(() => Object.fromEntries(banks.map((b) => [b, []])));
  const [balanceByBank, setBalanceByBank] = useState(() => Object.fromEntries(banks.map((b) => [b, { balance: "", date: "" }])));
  const [errorsByBank, setErrorsByBank] = useState(() => Object.fromEntries(banks.map((b) => [b, null])));
  const [submitting, setSubmitting] = useState(false);

  const addFiles = (bank, fileList) => {
    const incoming = [];
    let firstError = null;
    Array.from(fileList).forEach((f) => {
      const err = validateFile(f);
      if (err) { if (!firstError) firstError = err; return; }
      incoming.push({ name: f.name, size: f.size, id: f.name + f.size + Math.random(), rawFile: f });
    });
    if (firstError) {
      setErrorsByBank((prev) => ({ ...prev, [bank]: firstError }));
      pushToast(firstError, "error");
      setTimeout(() => setErrorsByBank((prev) => ({ ...prev, [bank]: null })), 4000);
    }
    if (incoming.length) {
      setFilesByBank((prev) => ({ ...prev, [bank]: [...prev[bank], ...incoming] }));
      pushToast(incoming.length > 1 ? "Files added" : "File added", "success");
    }
  };
  const removeFile = (bank, id) => {
    setFilesByBank((prev) => ({ ...prev, [bank]: prev[bank].filter((f) => f.id !== id) }));
    pushToast("File removed", "info");
  };
  const setBalance = (bank, field, value) => setBalanceByBank((prev) => ({ ...prev, [bank]: { ...prev[bank], [field]: value } }));

  const allHaveAtLeastOne = banks.every((b) => filesByBank[b].length > 0);

  const handleContinue = async (skip) => {
    setSubmitting(true);
    const allParsed = [];
    const savedStatements = [];
    let totalSkipped = 0;
    for (const bank of banks) {
      const bal = balanceByBank[bank];
      if (bal.balance || bal.date) {
        try {
          await supabaseClient.from("banks").update({
            starting_balance: bal.balance ? Number(bal.balance) : null,
            as_of_date: bal.date || null,
          }).eq("user_id", userId).eq("bank_name", bank);
        } catch (e) {}
      }
      if (skip) continue;
      for (const f of filesByBank[bank]) {
        try {
          const path = userId + "/" + bank + "/" + Date.now() + "_" + f.name;
          await supabaseClient.storage.from("statements").upload(path, f.rawFile);
        } catch (e) {}
        try {
          const { transactions: parsed, meta } = await parseStatementFile(f.rawFile);
          parsed.forEach((t) => { t.bank = bank; });
          const { kept, skipped } = dedupeTransactions(parsed, allParsed);
          totalSkipped += skipped;
          let stmtRow = null;
          try {
            stmtRow = await saveStatementToDb(userId, {
              bank, fileName: f.name,
              periodStart: meta.periodStart, periodEnd: meta.periodEnd,
              opening: meta.opening, closing: meta.closing,
            });
            savedStatements.push(stmtRow);
          } catch (e) {}
          kept.forEach((t) => { t._stmtId = stmtRow ? stmtRow.id : null; });
          allParsed.push(...kept);
        } catch (e) {
          pushToast("Couldn't read " + f.name + " — " + (e.message || "check the format"), "error");
        }
      }
    }
    let saved = allParsed;
    if (allParsed.length) {
      try {
        saved = [];
        const byStmt = {};
        allParsed.forEach((t) => { (byStmt[t._stmtId || "none"] = byStmt[t._stmtId || "none"] || []).push(t); });
        for (const [stmtId, group] of Object.entries(byStmt)) {
          const rows = await saveTransactionsToDb(userId, null, group, stmtId === "none" ? null : stmtId);
          saved.push(...rows);
        }
      } catch (e) { saved = allParsed; pushToast("Transactions parsed but couldn't be saved to your account", "error"); }
      pushToast(allParsed.length + " transaction" + (allParsed.length !== 1 ? "s" : "") + " imported" + (totalSkipped > 0 ? " · " + totalSkipped + " duplicate" + (totalSkipped !== 1 ? "s" : "") + " skipped" : ""), "success");
    }
    setSubmitting(false);
    onDone(filesByBank, balanceByBank, saved, savedStatements);
  };

  return (
    <div className="page stage-fade">
      <div className="blob blob1" /><div className="blob blob2" /><div className="blob blob3" />
      <div className="glass-card upload-card">
        <div className="brand-row"><div className="brand-dot" /><span className="brand-name">{APP_NAME}</span></div>
        <h1 className="title">Upload your bank statements</h1>
        <p className="subtitle">Add at least 3 months per bank so we can spot regular patterns.</p>

        <div className="bank-upload-list">
          {banks.map((b) => (
            <div key={b}>
              <BankUploadBlock
                bank={b}
                files={filesByBank[b]}
                error={errorsByBank[b]}
                onAdd={(fl) => addFiles(b, fl)}
                onRemove={(id) => removeFile(b, id)}
              />
            </div>
          ))}
        </div>

        <div className="nav-row">
          <button className="glass-btn ghost" disabled={submitting} onClick={() => handleContinue(true)}>Skip for now</button>
          <button className="glass-btn primary" disabled={!allHaveAtLeastOne || submitting} onClick={() => handleContinue(false)}>
            {submitting ? <span className="btn-spinner" /> : "Continue"}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ---------------- Processing simulation ---------------- */

function ProcessingScreen({ onDone, transactions }) {
  const sample = React.useMemo(() => {
    const spend = (transactions || []).filter((t) => t.amount < 0 && t.name);
    const seen = new Set();
    const uniq = [];
    for (const t of spend) {
      const k = t.name.toLowerCase();
      if (seen.has(k)) continue;
      seen.add(k); uniq.push(t);
      if (uniq.length >= 10) break;
    }
    if (uniq.length < 4) {
      const demo = [
        { name: "SPINNEYS DUBAI", category: "Groceries", amount: -184 },
        { name: "CAREEM RIDE", category: "Transport", amount: -32 },
        { name: "NETFLIX.COM", category: "Subscriptions", amount: -46 },
        { name: "STARBUCKS", category: "Dining", amount: -28 },
        { name: "AMAZON.AE", category: "Shopping", amount: -220 },
        { name: "DEWA", category: "Bills", amount: -310 },
      ];
      for (const d of demo) { if (uniq.length >= 6) break; uniq.push(d); }
    }
    return uniq;
  }, [transactions]);

  const [revealed, setRevealed] = useState(0);
  const [pct, setPct] = useState(0);

  useEffect(() => {
    const total = sample.length || 1;
    let i = 0;
    const tick = setInterval(() => {
      i += 1;
      setRevealed(Math.min(i, total));
      setPct(Math.min(100, Math.round((i / total) * 100)));
      if (i >= total) {
        clearInterval(tick);
        setTimeout(onDone, 900);
      }
    }, 420);
    return () => clearInterval(tick);
  }, [sample]);

  return (
    <div className="page stage-fade">
      <div className="blob blob1" /><div className="blob blob2" /><div className="blob blob3" />
      <div className="glass-card processing-card processing-anim-card">
        <div className="spinner" />
        <h1 className="title" style={{ marginTop: 18 }}>Coding up your transactions</h1>
        <p className="subtitle">Sorting each one into a category. This usually takes a few seconds.</p>

        <div className="code-feed">
          {sample.slice(0, revealed).map((t, i) => (
            <div className="code-row" key={i}>
              <span className="code-name">{t.name}</span>
              <span className="code-arrow">→</span>
              <span className="code-cat" style={{ background: catColor(t.category) + "22", color: catColor(t.category), borderColor: catColor(t.category) + "66" }}>
                <span className="code-cat-dot" style={{ background: catColor(t.category) }} />
                {t.category}
              </span>
            </div>
          ))}
        </div>

        <div className="progress-track" style={{ marginTop: 18 }}>
          <div className="progress-fill" style={{ width: pct + "%" }} />
        </div>
        <p className="summary-note">{pct}%</p>
      </div>
    </div>
  );
}

/* ---------------- Confirm one categorization (trust builder) ---------------- */

function ConfirmCategoryScreen({ transactions, onConfirm, onDone }) {
  const candidate = React.useMemo(() => {
    const spend = (transactions || []).filter((t) => t.amount < 0 && t.name);
    const known = (cat) => spend.find((t) => t.category === cat);
    return known("Groceries") || spend.find((t) => t.category && !["Uncategorized", "Income", "Other"].includes(t.category)) || spend[0]
      || { name: "SPINNEYS DUBAI", category: "Groceries", amount: -184 };
  }, [transactions]);

  const [choice, setChoice] = useState(candidate.category && candidate.category !== "Uncategorized" ? candidate.category : "Groceries");
  const [submitting, setSubmitting] = useState(false);
  const options = ALL_CATEGORIES.filter((c) => c !== "Uncategorized");

  const handleConfirm = async () => {
    setSubmitting(true);
    try { if (choice !== candidate.category && onConfirm) await onConfirm(candidate.name, choice); } catch (e) {}

function OpeningBalanceScreen({ banks, statements, userId, pushToast, onDone }) {
  const perBank = React.useMemo(() => {
    return banks.map((b) => {
      const stmts = (statements || []).filter((s) => s.bank === b && s.periodStart).sort((x, y) => (x.periodStart < y.periodStart ? -1 : 1));
      const first = stmts[0];
      return { bank: b, start: first ? first.periodStart : null, suggested: first && first.opening !== null && first.opening !== undefined ? first.opening : null };
    });
  }, [banks, statements]);

  const [vals, setVals] = useState(() => Object.fromEntries(perBank.map((p) => [p.bank, { balance: p.suggested !== null && p.suggested !== undefined ? String(p.suggested) : "", date: p.start || "" }])));
  const [submitting, setSubmitting] = useState(false);
  const setV = (bank, field, value) => setVals((prev) => ({ ...prev, [bank]: { ...prev[bank], [field]: value } }));

  const handleContinue = async () => {
    setSubmitting(true);
    for (const p of perBank) {
      const v = vals[p.bank];
      if (v && (v.balance !== "" || v.date)) {
        try {
          await supabaseClient.from("banks").update({
            starting_balance: v.balance !== "" ? Number(v.balance) : null,
            as_of_date: v.date || null,
          }).eq("user_id", userId).eq("bank_name", p.bank);
        } catch (e) {}
      }
    }
    setSubmitting(false);
    onDone(vals);
  };

  return (
    <div className="page stage-fade">
      <div className="blob blob1" /><div className="blob blob2" /><div className="blob blob3" />
      <div className="glass-card upload-card">
        <div className="brand-row"><div className="brand-dot" /><span className="brand-name">{APP_NAME}</span></div>
        <h1 className="title">Your opening balance</h1>
        <p className="subtitle">What was the balance in each account at the start of the period you uploaded? This anchors your running balance and forecasts.</p>

        <div className="bank-upload-list">
          {perBank.map((p) => (
            <div className="bank-upload-block" key={p.bank}>
              <div className="bank-upload-head">
                <span className="bank-upload-name">{p.bank}</span>
                {p.suggested !== null && p.suggested !== undefined && <span className="bank-upload-count count-good">detected from statement</span>}
              </div>
              <div className="balance-row">
                <div className="balance-field">
                  <label className="field-label">Opening balance</label>
                  <div className="target-input-wrap" style={{ width: "100%" }}>
                    <span className="target-currency">£</span>
                    <input className="target-input" style={{ width: "100%" }} type="number" placeholder="0"
                      value={vals[p.bank].balance} onChange={(e) => setV(p.bank, "balance", e.target.value)} />
                  </div>
                </div>
                <div className="balance-field">
                  <label className="field-label">As of date</label>
                  <input className="glass-input" style={{ padding: "10px 12px", fontSize: 13, marginTop: 4 }} type="date"
                    value={vals[p.bank].date} onChange={(e) => setV(p.bank, "date", e.target.value)} />
                </div>
              </div>
            </div>
          ))}
        </div>

        <div className="nav-row">
          <button className="glass-btn ghost" disabled={submitting} onClick={() => onDone(vals)}>Skip</button>
          <button className="glass-btn primary" disabled={submitting} onClick={handleContinue}>

    perMonth.forEach((o) => Object.keys(o).forEach((c) => catSet.add(c)));
    categories = [...TX_CATEGORIES.filter((c) => catSet.has(c)), ...[...catSet].filter((c) => !TX_CATEGORIES.includes(c))];

function TargetSettingScreen({ onDone, pushToast, userId, transactions }) {
  const categories = TX_CATEGORIES;
  const avg = React.useMemo(() => avgSpendByCategory(transactions), [transactions]);

  const months = React.useMemo(() => {
    const cur = currentMonthKey();
    const list = [{ key: cur, label: monthLabelFromKey(cur) + (isMidMonth() ? " · this month" : ""), current: true }];
    for (let i = 1; i <= 6; i++) { const k = addMonths(cur, i); list.push({ key: k, label: monthLabelFromKey(k) + " " + k.slice(0, 4) }); }
    return list;
  }, []);

  const [budgets, setBudgets] = useState(() => Object.fromEntries(months.map((m) => [m.key, { ...avg }])));
  const [activeMonth, setActiveMonth] = useState(months[0].key);
  const [submitting, setSubmitting] = useState(false);

  const setVal = (c, v) => setBudgets((prev) => ({ ...prev, [activeMonth]: { ...prev[activeMonth], [c]: v } }));
  const applyToAll = () => {
    const cur = budgets[activeMonth];
    setBudgets((prev) => Object.fromEntries(months.map((m) => [m.key, { ...cur }])));
    pushToast("Applied to all months", "success");
  };
  const monthTotal = (k) => categories.reduce((s, c) => s + (Number(budgets[k][c]) || 0), 0);

  const handleFinish = async () => {
    setSubmitting(true);
    const curKey = currentMonthKey();
    const rows = [];
    months.forEach((m) => categories.forEach((c) => rows.push({ user_id: userId, category: c, month: m.key, monthly_target: Number(budgets[m.key][c]) || 0 })));
    try {
      await supabaseClient.from("targets").delete().eq("user_id", userId).in("month", months.map((m) => m.key));
      const { error } = await supabaseClient.from("targets").insert(rows);
      if (error) throw error;
      pushToast("Budgets saved", "success");
    } catch (e) {
      pushToast("Couldn't save budgets — make sure your targets table has a 'month' column", "error");
    }
    setSubmitting(false);
    onDone(budgets[curKey] || budgets[months[0].key]);
  };

  return (
    <div className="page stage-fade">
      <div className="blob blob1" /><div className="blob blob2" /><div className="blob blob3" />
      <div className="glass-card target-card">
        <div className="brand-row"><div className="brand-dot" /><span className="brand-name">{APP_NAME}</span></div>

        <p className="subtitle">Pre-filled from your recent averages. Adjust any cell — categories down the side, months across the top.</p>

        <div className="budget-table-wrap">
          <table className="budget-table">
            <thead>
              <tr>
                <th className="bt-corner">Category</th>
                {months.map((m) => (
                  <th key={m.key} className={"bt-month-head " + (m.current ? "bt-month-current" : "")}>
                    {monthLabelFromKey(m.key)}{m.current ? " •" : ""}
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {categories.map((c) => (
                <tr key={c}>
                  <td className="bt-cat">
                    <span className="cat-dot" style={{ background: CATEGORY_COLORS[c] }} />
                    {c}
                  </td>
                  {months.map((m) => (
                    <td key={m.key} className="bt-cell">
                      <input
                        className="bt-input"
                        type="number"
                        min="0"
                        value={budgets[m.key][c]}
                        onChange={(e) => setBudgets((prev) => ({ ...prev, [m.key]: { ...prev[m.key], [c]: e.target.value } }))}
                      />
                    </td>

                {months.map((m) => (

function SummaryCard({ targets, transactions }) {
  const lastIdx = MONTH_LABELS.length - 1;
  const spent = spendForMonth(transactions || [], latestMonthKey(transactions || []));
  const target = Object.values(targets).reduce((s, v) => s + (Number(v) || 0), 0) || 1;
  const pct = Math.min(100, Math.round((spent / target) * 100));
  const expectedPct = Math.round((DAYS_INTO_MONTH() / daysInCurrentMonth()) * 100);
  const dataMonth = (transactions && transactions.length > 0) ? latestMonthKey(transactions) : null;
  const isCurrentMonth = dataMonth === currentMonthKey();
  const projected = isCurrentMonth ? projectMonthEnd(spent) : null;
  const overPace = projected !== null ? projected > target : pct > expectedPct;
  const paceNote = projected !== null
    ? (projected > target
      ? "At this rate you'll spend ~" + formatMoney(projected) + " — " + formatMoney(projected - target) + " over target"
      : "At this rate you'll spend ~" + formatMoney(projected) + " — " + formatMoney(target - projected) + " under target")
    : null;
  const overspent = spent > target;
  const filledPct = Math.min(100, pct);
  const R = 70, CIRC = 2 * Math.PI * R;
  const ringColor = overspent ? "#ff8b8b" : "#4f8cff";
  return (
    <div className="glass-card dash-card">
      <div className="summary-head">
        <span className="card-label">This month</span>
        <span className={"pace-badge " + (overPace ? "pace-over" : "pace-good")}>{overPace ? "Over pace" : "On track"}</span>
      </div>
      <div className="budget-ring-wrap">
        <svg className="budget-ring" viewBox="0 0 160 160">
          <circle cx="80" cy="80" r={R} fill="none" stroke="rgba(255,255,255,0.12)" strokeWidth="14" />
          <circle cx="80" cy="80" r={R} fill="none" stroke={ringColor} strokeWidth="14" strokeLinecap="round"
            strokeDasharray={CIRC} strokeDashoffset={CIRC - CIRC * (filledPct / 100)} transform="rotate(-90 80 80)"
            style={{ transition: "stroke-dashoffset 0.6s ease" }} />
        </svg>
        <div className="budget-ring-center">
          <span className="budget-ring-pct" style={overspent ? { color: "#ff8b8b" } : null}>{pct}%</span>
          <span className="budget-ring-sub">of budget</span>
        </div>
      </div>
      {overspent && <div className="overspend-alert">🚨 Over budget — {formatMoney(spent - target)} over your {formatMoney(target)} target</div>}
      <div className="summary-amounts" style={{ justifyContent: "center" }}>
        <span className="summary-spent">{formatMoney(spent)}</span>
        <span className="summary-target">of {formatMoney(target)} target</span>
      </div>
      <p className="summary-note">{pct}% of budget used</p>
      {paceNote && <p className={"summary-note pace-note " + (overPace ? "pace-note-over" : "pace-note-under")}>{paceNote}</p>}
    </div>
  );
}

          const color = catColor(name);
          const overBudget = budget > 0 && amount > budget;
          const fillPct = budget > 0 ? Math.min(100, (amount / budget) * 100) : (amount > 0 ? 100 : 0);
          const projected = isCurrentMonth ? projectMonthEnd(amount) : null;
          const showPace = budget > 0 && projected !== null;
          const paceOver = showPace && projected > budget;
          return (
            <div className="category-row" key={name}>
              <div className="category-top">
                <span className="category-name"><span className="cat-dot" style={{ background: color }} />{name}</span>
                <span className="category-amount">{formatMoney(amount)}{budget > 0 ? " / " + formatMoney(budget) : ""}</span>
              </div>
              <div className="category-track"><div className="category-fill" style={{ width: fillPct + "%", background: overBudget ? "#ff8b8b" : color }} /></div>
              {showPace && (
                <div className={"category-pace " + (paceOver ? "pace-note-over" : "pace-note-under")}>
                  On pace for ~{formatMoney(projected)} ({paceOver ? formatMoney(projected - budget) + " over" : formatMoney(budget - projected) + " under"})
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function GoalRow({ goal, onUpdate, onDelete }) {
  const [adding, setAdding] = useState(false);
  const [addAmount, setAddAmount] = useState("");
  const pct = goal.target > 0 ? Math.min(100, Math.round((goal.saved / goal.target) * 100)) : 0;
  const remaining = Math.max(0, goal.target - goal.saved);
  const months = monthsUntil(goal.targetDate);
  const perMonth = months && months > 0 ? remaining / months : null;
  const done = goal.saved >= goal.target && goal.target > 0;
  return (
    <div className="goal-row">
      <div className="goal-row-head">
        <span className="goal-name">{goal.name}</span>
        <button className="file-remove" onClick={() => onDelete(goal.id)} aria-label="Delete goal">×</button>
      </div>
      <div className="summary-amounts" style={{ margin: "4px 0 10px" }}>
        <span className="summary-spent" style={{ fontSize: 24 }}>{formatMoney(goal.saved)}</span>
        <span className="summary-target">of {formatMoney(goal.target)}</span>
      </div>
      <div className="progress-track" style={{ marginTop: 8 }}><div className="progress-fill goal-fill" style={{ width: pct + "%" }} /></div>
      <p className="summary-note" style={{ textAlign: "left" }}>
        {done ? "Goal reached 🎉" : pct + "% there · " + formatMoney(remaining) + " to go" +
          (months !== null ? " · " + months + " month" + (months !== 1 ? "s" : "") + " left" : "") +
          (perMonth !== null && !done ? " · save ~" + formatMoney(perMonth) + "/month to hit it" : "")}
      </p>
      {adding ? (
        <div className="goal-add-row">
          <div className="target-input-wrap" style={{ flex: 1 }}>
            <span className="target-currency">£</span>
            <input className="target-input" style={{ width: "100%" }} type="number" min="0" placeholder="Amount" value={addAmount} onChange={(e) => setAddAmount(e.target.value)} autoFocus />
          </div>
          <button className="glass-btn primary goal-add-btn" disabled={!(Number(addAmount) > 0)} onClick={() => {
            onUpdate(goal.id, { saved: goal.saved + Number(addAmount) });
            setAddAmount(""); setAdding(false);
          }}>Add</button>
          <button className="glass-btn ghost goal-add-btn" onClick={() => { setAdding(false); setAddAmount(""); }}>Cancel</button>
        </div>
      ) : (
        !done && <button className="link-btn inline" style={{ marginTop: 8, alignSelf: "flex-start" }} onClick={() => setAdding(true)}>+ Add money</button>
      )}
    </div>
  );
}

function TrendsCard({ transactions }) {
  const txs = transactions || [];

  const net = keys.map((k) => Math.round(incomeForMonth(txs, k) - spendForMonth(txs, k)));
  const catSpend = keys.map((k) => Math.round(spendByCategoryForMonth(txs, k)[cat] || 0));
  const flowMax = Math.max(...income, ...spend, 1);

function BillsCard({ transactions, excludes, onToggleExclude, editable }) {
  const [editing, setEditing] = useState(false);
  const ex = excludes || [];
  const detected = detectRecurringBills(transactions || []);
  if (!detected.length) return <EmptyState text="No recurring payments detected yet — they show up once the same payment appears in 2+ months." />;
  const bills = detected.filter((b) => !ex.includes(b.name));
  const excluded = detected.filter((b) => ex.includes(b.name));
  const total = bills.reduce((s, b) => s + b.amount, 0);
  return (
    <div className="glass-card dash-card">
      <div className="summary-head">
        <span className="card-label">Bills & subscriptions</span>
        {editable && <button className="link-btn inline" onClick={() => setEditing((v) => !v)}>{editing ? "Done" : "Edit"}</button>}

      {editing && <p className="subtitle" style={{ margin: "0 0 8px" }}>Remove anything that isn't really a bill — it'll stop being counted here.</p>}
      <div className="tx-list">
        {bills.map((b) => (
          <div className="tx-row" key={b.name}>
            <div className="tx-info"><span className="tx-name">{b.name}</span><span className="tx-category">{b.frequency} {"\u00B7"} due {b.due}</span></div>
            <div className="bill-right">

function BankAccountsCard({ banks, transactions, accountData }) {
  const statements = (accountData && accountData.statements) || [];
  const bankRows = (accountData && accountData.bankRows) || [];
  const txs = transactions || [];
  const list = banks && banks.length > 0 ? banks : [];
  const issues = chainIssues(statements);

  if (!list.length) {
    return (
      <div className="glass-card dash-card">
        <span className="card-label">Bank accounts</span>
        <div className="tx-list"><div className="tx-row"><div className="tx-info"><span className="tx-name">No banks linked yet</span></div></div></div>
      </div>
    );
  }

  return (
    <div className="glass-card dash-card">
      <span className="card-label">Bank accounts</span>
      <div className="tx-list">
        {list.map((b) => {
          const row = bankRows.find((r) => r.bank_name === b);
          const balance = computeBankBalance(b, statements, txs, row);
          const bankStmts = statements.filter((s) => s.bank === b).sort((x, y) => (x.periodStart || "").localeCompare(y.periodStart || ""));
          const bankIssues = issues.filter((i) => i.bank === b);
          return (
            <div className="account-block" key={b}>
              <div className="tx-row" style={{ borderBottom: "none" }}>
                <div className="tx-info">
                  <span className="tx-name">{b}</span>

                </div>
                {balance !== null && <span className={"tx-amount " + (balance >= 0 ? "tx-positive" : "")}>{formatMoney(balance)}</span>}
              </div>
              {bankStmts.length > 0 && (
                <div className="stmt-list">
                  {bankStmts.map((s) => (
                    <div className="stmt-row" key={s.id}>
                      <span className="stmt-period">{s.periodStart && s.periodEnd ? s.periodStart + " → " + s.periodEnd : (s.fileName || "Statement")}</span>
                      {s.status === "reconciled" && <span className="stmt-badge stmt-ok">✓ Balances</span>}
                      {s.status === "mismatch" && <span className="stmt-badge stmt-bad">⚠ Off by {formatMoney(Math.abs(s.difference))}</span>}
                      {s.status === "unverified" && <span className="stmt-badge stmt-na">○ Unchecked</span>}
                    </div>
                  ))}
                </div>
              )}
              {bankIssues.map((iss, i) => (
                <div className="stmt-issue" key={i}>⚠ {iss.text}</div>
              ))}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function renderOverviewWidget(key, { targets, banks, hasData, transactions, goals, goalsApi, accountData, billExcludes }) {
  switch (key) {
    case "summary": return hasData ? <SummaryCard targets={targets} transactions={transactions} /> : <EmptyState text="No transactions yet — upload a statement to see your monthly summary." />;
    case "transactions": return hasData ? <TransactionFeed limit={5} transactions={transactions} /> : <EmptyState text="No transactions yet — upload a statement to see them here." />;
    case "breakdown": return hasData ? <BreakdownCard transactions={transactions} targets={targets} /> : <EmptyState text="No spending data yet — upload a statement to see your breakdown." />;
    case "goals": return <GoalsCard goals={goals} onAdd={goalsApi.add} onUpdate={goalsApi.update} onDelete={goalsApi.remove} />;
    case "trends": return hasData ? <TrendsCard transactions={transactions} /> : <EmptyState text="No trend data yet — upload a few months of statements." />;
    case "cashflow": return hasData ? <CashFlowCard transactions={transactions} /> : <EmptyState text="No cash flow data yet — upload a statement to get started." />;
    case "bills": return hasData ? <BillsCard transactions={transactions} excludes={billExcludes} /> : <EmptyState text="No bills detected yet — upload a statement to get started." />;
    case "accounts": return <BankAccountsCard banks={banks} transactions={transactions} accountData={accountData} />;
    case "merchants": return hasData ? <MerchantsCard transactions={transactions} /> : <EmptyState text="No merchant data yet — upload a statement to get started." />;
    case "insights": return hasData ? <InsightsCard transactions={transactions} targets={targets} /> : <EmptyState text="No insights yet — upload a statement to get started." />;
    case "empty": return <div className="slot-empty"><div className="slot-empty-icon">+</div><p>Pick a widget from the menu above</p></div>;
    default: return null;
  }
}

function OverviewSlot({ widgetKey, onChange, index, runTour, tourStep, targets, banks, hasData, transactions, goals, goalsApi, accountData, billExcludes }) {
  const revealed = !runTour || index <= tourStep;

  if (runTour && !revealed) {
    return <div className="overview-slot overview-slot-coming"><span className="coming-soon">Coming up…</span></div>;
  }
  return (
    <div className={"overview-slot" + (active ? " tour-active" : "")}>
      {!runTour && (
        <div className="overview-slot-head">
          <select className="slot-select" value={widgetKey} onChange={(e) => onChange(e.target.value)}>
            {OVERVIEW_WIDGETS.map((w) => <option key={w.key} value={w.key}>{w.label}</option>)}
          </select>
        </div>
      )}
      <div className="overview-slot-body">
        {renderOverviewWidget(widgetKey, { targets, banks, hasData, transactions, goals, goalsApi, accountData, billExcludes })}

  );

    <div className="overview-grid">

      ))}
    </div>
  );
}

function MappingScreen({ transactions, onRecategorize, onBack }) {
  const [query, setQuery] = useState("");
  const map = {};
  (transactions || []).forEach((t) => {
    if (!map[t.name]) map[t.name] = { name: t.name, category: t.category, count: 0, total: 0 };
    map[t.name].count += 1;
    if (t.amount < 0) map[t.name].total += Math.abs(t.amount);
  });
  let rows = Object.values(map);
  const q = query.trim().toLowerCase();
  if (q) rows = rows.filter((r) => r.name.toLowerCase().includes(q));
  rows.sort((a, b) => b.count - a.count);
  return (
    <div className="app-shell stage-fade">
      <div className="topbar">
        <div className="topbar-left">
          <button className="icon-btn back-btn" onClick={onBack} aria-label="Back">\u2190</button>
          <div className="brand">Category Mapping</div>
        </div>
      </div>
      <div className="settings-body">
        <div className="dash-card settings-section">
          <span className="card-label">Merchant categories</span>
          <p className="subtitle" style={{ margin: "8px 0 0" }}>Change a merchant\u2019s category and it updates every transaction with that name \u2014 and applies to future uploads.</p>
          <input className="glass-input" style={{ marginTop: 12 }} placeholder="Search merchant name\u2026" value={query} onChange={(e) => setQuery(e.target.value)} />
          <p className="mapping-count">{rows.length} unique merchant{rows.length !== 1 ? "s" : ""}</p>
          <div className="mapping-list">
            {rows.length === 0 ? (
              <p className="subtitle" style={{ margin: 0 }}>No merchants to show yet.</p>
            ) : rows.map((r) => (
              <div className="mapping-row" key={r.name}>
                <div className="mapping-info">
                  <span className="mapping-name">{r.name}</span>
                  <span className="mapping-meta">{r.count} txn{r.count !== 1 ? "s" : ""}{r.total > 0 ? " \u00B7 " + formatMoney(r.total) : ""}</span>
                </div>
                <CategoryEditor value={r.category} onChange={(cat) => onRecategorize(r.name, cat)} />
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}
function DashboardScreen({ name, targets, banks, onOpenSettings, onOpenMapping, showExtraBanner, onCompleteExtra, onDismissExtra, hasData, onLogout, transactions, onAddTransactions, pushToast, overviewSlots, onChangeOverviewSlots, goals, goalsApi, accountData, isDev, onResetDev, onRecategorize, runTour, onFinishTour, navViews, onChangeNavViews, billExcludes, onToggleBillExclude }) {

        <div className={"main-content " + (effectiveView === "overview" ? "main-content-wide" : "")}><MainContent view={effectiveView} name={name} targets={targets} banks={banks} hasData={hasData} transactions={transactions} overviewSlots={overviewSlots} onChangeOverviewSlots={onChangeOverviewSlots} goals={goals} goalsApi={goalsApi} accountData={accountData} onRecategorize={onRecategorize} runTour={runTour} tourStep={tourStep} billExcludes={billExcludes} onToggleBillExclude={onToggleBillExclude} /></div>

      {uploadOpen && (
        <UploadStatementModal
          onClose={() => setUploadOpen(false)}
          pushToast={pushToast}
          banks={banks}
          onImport={(list, bank, meta, fileName) => { onAddTransactions(list, bank, meta, fileName); setUploadOpen(false); }}

function App() {
  const [stage, setStage] = useState("landing");
  const [checkingSession, setCheckingSession] = useState(true);
  const [userId, setUserId] = useState(null);
  const [name, setName] = useState("");
  const [banks, setBanks] = useState([]);
  const [targets, setTargets] = useState({});
  const [balances, setBalances] = useState({});
  const [uploadedFiles, setUploadedFiles] = useState({});
  const [customTransactions, setCustomTransactions] = useState([]);
  const [statements, setStatements] = useState([]);
  const [bankRows, setBankRows] = useState([]);
  const [overviewSlots, setOverviewSlots] = useState(DEFAULT_OVERVIEW_SLOTS);
  const [navViews, setNavViews] = useState(VIEWS.map((v) => v.key));
  const [billExcludes, setBillExcludes] = useState([]);
  const [extraProfile, setExtraProfile] = useState(null);
  const [showExtraBanner, setShowExtraBanner] = useState(false);
  const [legalTab, setLegalTab] = useState("privacy");
  const [returnStage, setReturnStage] = useState("welcome");
  const [toasts, setToasts] = useState([]);
  const [goals, setGoals] = useState([]);
  const [isDev, setIsDev] = useState(false);
  const [runTour, setRunTour] = useState(false);

  const pushToast = (message, type) => {
    const id = Date.now() + Math.random();
    setToasts((prev) => [...prev, { id, message, type }]);
    setTimeout(() => setToasts((prev) => prev.filter((t) => t.id !== id)), 2600);
  };

  const hasData = customTransactions.length > 0;

  const runAiFallback = async (txs) => {
    const uncats = txs.filter((t) => t.category === "Uncategorized");
    if (!uncats.length) return;
    try {
      const unique = [...new Set(uncats.map((t) => t.name))].slice(0, 200);
      const mapping = await aiCategorize(unique);
      if (!mapping || !Object.keys(mapping).length) return;
      setCustomTransactions((prev) => prev.map((t) =>
        t.category === "Uncategorized" && mapping[t.name] ? { ...t, category: mapping[t.name] } : t
      ));
      const idToCat = {};
      txs.forEach((t) => { if (t.id && t.category === "Uncategorized" && mapping[t.name]) idToCat[t.id] = mapping[t.name]; });
      if (Object.keys(idToCat).length) await updateTransactionCategoriesInDb(idToCat);
      pushToast("AI categorized " + Object.keys(idToCat).length + " transactions", "success");
    } catch (e) { /* stays Uncategorized if AI unavailable */ }
  };

  const goalsApi = {
    add: async (g) => {
      try {
        const saved = await addGoalToDb(userId, g);
        setGoals((prev) => [...prev, saved]);
        pushToast("Goal added", "success");
      } catch (e) {
        setGoals((prev) => [...prev, { ...g, id: "local-" + Date.now() }]);
        pushToast("Goal added here, but couldn't save to your account — run the goals SQL setup", "error");
      }
    },
    update: async (id, fields) => {
      setGoals((prev) => prev.map((g) => (g.id === id ? { ...g, ...fields } : g)));
      try { if (!String(id).startsWith("local-")) await updateGoalInDb(id, fields); }
      catch (e) { pushToast("Couldn't save that change to your account", "error"); }
    },
    remove: async (id) => {
      setGoals((prev) => prev.filter((g) => g.id !== id));
      pushToast("Goal deleted", "info");
      try { if (!String(id).startsWith("local-")) await deleteGoalFromDb(id); }
      catch (e) {}
    },
  };

  /* After any upload, re-check every statement for the affected bank against
     ALL stored transactions, persist statuses, and surface any problems. */
  const runReconciliation = async (allStatements, allTransactions, focusBank) => {
    const rechecked = reconcileStatements(allStatements, allTransactions);
    try { await persistReconciliation(allStatements, rechecked); } catch (e) {}
    setStatements(rechecked);
    const focus = focusBank ? rechecked.filter((s) => s.bank === focusBank) : rechecked;
    const mismatches = focus.filter((s) => s.status === "mismatch");
    if (mismatches.length) {
      const m = mismatches[mismatches.length - 1];
      pushToast("⚠ " + m.bank + " statement doesn't balance — off by " + formatMoney(Math.abs(m.difference)) + ". Try uploading a statement covering a longer period to find what's missing.", "error");
    } else if (focus.some((s) => s.status === "reconciled")) {
      pushToast("Balances check out ✓", "success");
    }
    const issues = chainIssues(rechecked).filter((i) => !focusBank || i.bank === focusBank);
    if (issues.length) pushToast("⚠ " + issues[0].bank + ": " + issues[0].text, "error");
    return rechecked;
  };

  const recategorizeDescription = async (description, newCategory) => {
    setCustomTransactions((prev) => prev.map((t) => (t.name === description ? { ...t, category: newCategory } : t)));
    if (userId) {
      try {
        await supabaseClient.from("transactions").update({ category: newCategory }).eq("user_id", userId).eq("description", description);
      } catch (e) { pushToast("Changed here, but couldn't save to your account", "error"); return; }
    }
    pushToast("\u201C" + description + "\u201D \u2192 " + newCategory, "success");
  };

  const handleAddTransactions = async (list, bankName, meta, fileName) => {
    const overrideMap = {};
    customTransactions.forEach((t) => { if (!(t.name in overrideMap)) overrideMap[t.name] = t.category; });
    list.forEach((t) => { const o = overrideMap[t.name]; if (o && o !== "Uncategorized") t.category = o; });
    const { kept, skipped } = dedupeTransactions(list, customTransactions);
    let stmtRow = null;
    if (bankName && meta) {
      try {
        stmtRow = await saveStatementToDb(userId, {
          bank: bankName, fileName: fileName || null,
          periodStart: meta.periodStart, periodEnd: meta.periodEnd,
          opening: meta.opening, closing: meta.closing,
        });
      } catch (e) { pushToast("Couldn't record the statement — run the statements SQL setup", "error"); }
    }
    let saved = kept;
    if (kept.length) {
      try { saved = await saveTransactionsToDb(userId, bankName || null, kept, stmtRow ? stmtRow.id : null); }
      catch (e) { pushToast("Imported, but couldn't save to your account — run the transactions SQL setup", "error"); }
      saved.forEach((t) => { if (!t.bank) t.bank = bankName || null; });
      setCustomTransactions((prev) => [...saved, ...prev]);
      pushToast(kept.length + " transaction" + (kept.length !== 1 ? "s" : "") + " imported" + (skipped > 0 ? " · " + skipped + " duplicate" + (skipped !== 1 ? "s" : "") + " skipped" : ""), "success");
    } else {
      pushToast("All " + list.length + " transactions were already imported — nothing new added", "info");
    }
    const allTx = [...(kept.length ? saved : []), ...customTransactions];
    const allStmts = stmtRow ? [...statements.filter((s) => s.id !== stmtRow.id), stmtRow] : statements;
    await runReconciliation(allStmts, allTx, bankName || null);
    if (kept.length) runAiFallback(saved);
  };

  useEffect(() => {
    (async () => {
     try {
      const { data } = await supabaseClient.auth.getSession();
      const session = data?.session;
      if (session?.user) {
        const { data: userCheck, error: userErr } = await supabaseClient.auth.getUser();
        if (userErr || !userCheck?.user) {
          await supabaseClient.auth.signOut();
          setCheckingSession(false);
          return;
        }
        const uid = session.user.id;
        setUserId(uid);
        setIsDev(session.user.email === DEV_EMAIL);
        const profile = await fetchProfile(uid);
        if (profile?.name) {
          const bankRows = await fetchBanks(uid);
          const targetObj = await fetchTargets(uid);
          const txRows = await fetchTransactions(uid);
          const goalRows = await fetchGoals(uid);
          const stmtRows = await fetchStatements(uid);
          setGoals(goalRows);
          setName(profile.name);
          setBanks(bankRows.map((b) => b.bank_name));
          setBankRows(bankRows);
          setTargets(targetObj);
          setCustomTransactions(txRows);
          setStatements(stmtRows);
          setUploadedFiles(Object.fromEntries(bankRows.map((b) => [b.bank_name, [{ name: "existing", size: 1, id: b.id }]])));
          setOverviewSlots(parseOverviewLayout(profile));
          setNavViews(parseNavLayout(profile));
          setBillExcludes(parseBillExcludes(profile));
          setStage("dashboard");
        } else {
          setStage("onboarding");
        }
      }
      setCheckingSession(false);
     } catch (e) {
       console.error("Session restore failed:", e);
       setCheckingSession(false);
     }
    })();
  }, []);

  const openLegal = (tab, from) => { setLegalTab(tab); setReturnStage(from); setStage("legal"); };

  const DEV_EMAIL = "dev@mybudgetpal.test";
  const DEV_PASSWORD = "DevAccount123!";

  const skipToHomepage = async () => {
    setCheckingSession(true);
    try {
      let signIn = await supabaseClient.auth.signInWithPassword({ email: DEV_EMAIL, password: DEV_PASSWORD });
      if (signIn.error) {
        const msg = signIn.error.message || "";
        if (msg.toLowerCase().includes("confirm")) {
          pushToast("Dev account needs email confirmation disabled in Supabase settings", "error");
          setCheckingSession(false);
          return;
        }
        const signUp = await supabaseClient.auth.signUp({ email: DEV_EMAIL, password: DEV_PASSWORD });
        if (signUp.error) { pushToast("Dev login failed: " + signUp.error.message, "error"); setCheckingSession(false); return; }
        signIn = await supabaseClient.auth.signInWithPassword({ email: DEV_EMAIL, password: DEV_PASSWORD });
        if (signIn.error) {
          pushToast("Dev account created but needs email confirmation disabled in Supabase settings", "error");
          setCheckingSession(false);
          return;
        }
      }
      const uid = signIn.data.user.id;
      setUserId(uid);
      setIsDev(true);

      let profile = await fetchProfile(uid);
      if (!profile?.name) {
        await supabaseClient.from("profiles").upsert({ id: uid, name: "Shezaad" });
        await supabaseClient.from("banks").insert([
          { user_id: uid, bank_name: "HSBC" },
          { user_id: uid, bank_name: "Emirates NBD" },
        ]);
        const rows = Object.keys(CATEGORY_MONTHLY).map((c) => ({
          user_id: uid, category: c, monthly_target: CATEGORY_MONTHLY[c][CATEGORY_MONTHLY[c].length - 1],
        }));
        await supabaseClient.from("targets").insert(rows);
      }

      const bankRows = await fetchBanks(uid);
      const targetObj = await fetchTargets(uid);
      const txRows = await fetchTransactions(uid);
      const goalRows = await fetchGoals(uid);
      const stmtRows = await fetchStatements(uid);
      setGoals(goalRows);
      profile = await fetchProfile(uid);
      setName(profile?.name || "Shezaad");
      setBanks(bankRows.map((b) => b.bank_name));
      setBankRows(bankRows);
      setTargets(targetObj);
      setCustomTransactions(txRows);
      setStatements(stmtRows);
      setUploadedFiles(Object.fromEntries(bankRows.map((b) => [b.bank_name, [{ name: "existing", size: 1, id: b.id }]])));
      setOverviewSlots(parseOverviewLayout(profile));
      setNavViews(parseNavLayout(profile));
      setBillExcludes(parseBillExcludes(profile));
      setStage("dashboard");
    } catch (e) {
      pushToast("Dev login failed — check connection", "error");
    }
    setCheckingSession(false);
  };
  const handleSaveName = async (newName) => {
    setName(newName);
    if (userId) {
      try { await supabaseClient.from("profiles").upsert({ id: userId, name: newName }); }
      catch (e) { pushToast("Couldn't save name", "error"); }
    }
  };
  const handleChangeOverviewSlots = (newSlots) => {
    setOverviewSlots(newSlots);
    if (userId) {
      supabaseClient.from("profiles").upsert({ id: userId, overview_layout: newSlots }).then(() => {});
    }
  };
  const handleChangeNavViews = (newViews) => {
    setNavViews(newViews);
    if (userId) supabaseClient.from("profiles").upsert({ id: userId, nav_layout: newViews }).then(() => {}, () => {});
  };
  const handleToggleBillExclude = (name) => {
    setBillExcludes((prev) => {
      const next = prev.includes(name) ? prev.filter((n) => n !== name) : [...prev, name];
      if (userId) supabaseClient.from("profiles").upsert({ id: userId, bill_excludes: next }).then(() => {}, () => {});
      return next;
    });
  };
  const handleSaveTargets = async (newTargets) => {
    const cleaned = Object.fromEntries(Object.entries(newTargets).map(([c, v]) => [c, Number(v) || 0]));
    setTargets(cleaned);
    if (userId) {
      const key = currentMonthKey();
      try {
        await supabaseClient.from("targets").delete().eq("user_id", userId).eq("month", key);
        const rows = Object.entries(cleaned).map(([category, monthly_target]) => ({ user_id: userId, category, month: key, monthly_target }));
        if (rows.length) await supabaseClient.from("targets").insert(rows);
      } catch (e) { pushToast("Couldn't save targets", "error"); }
    }
  };
  const handleRemoveBank = async (bankName) => {
    setBanks((prev) => prev.filter((b) => b !== bankName));
    setUploadedFiles((prev) => { const next = { ...prev }; delete next[bankName]; return next; });
    if (userId) {
      try { await supabaseClient.from("banks").delete().eq("user_id", userId).eq("bank_name", bankName); }
      catch (e) { pushToast("Couldn't remove bank", "error"); }
    }
    pushToast("Bank removed", "info");
  };
  const resetDevAccount = async () => {
    if (!userId) return;
    setCheckingSession(true);
    try {
      await supabaseClient.from("transactions").delete().eq("user_id", userId);
      await supabaseClient.from("targets").delete().eq("user_id", userId);
      await supabaseClient.from("goals").delete().eq("user_id", userId);
      await supabaseClient.from("statements").delete().eq("user_id", userId);
      await supabaseClient.from("banks").delete().eq("user_id", userId);
      await supabaseClient.from("profiles").upsert({ id: userId, name: null, occupation: null, salary_range: null, employment_type: null, overview_layout: null });
      try {
        const { data: topLevel } = await supabaseClient.storage.from("statements").list(userId);
        const toRemove = [];
        for (const entry of (topLevel || [])) {
          if (entry.id === null || entry.metadata == null) {
            const { data: sub } = await supabaseClient.storage.from("statements").list(userId + "/" + entry.name);
            (sub || []).forEach((fx) => toRemove.push(userId + "/" + entry.name + "/" + fx.name));
          } else {
            toRemove.push(userId + "/" + entry.name);
          }
        }
        if (toRemove.length) await supabaseClient.storage.from("statements").remove(toRemove);
      } catch (e) {}
      setName(""); setBanks([]); setBankRows([]); setTargets({}); setUploadedFiles({});
      setGoals([]); setCustomTransactions([]); setStatements([]); setBalances({});
      setOverviewSlots(DEFAULT_OVERVIEW_SLOTS); setExtraProfile(null); setShowExtraBanner(false);
      pushToast("Dev account reset \u2014 starting fresh", "success");
      setStage("onboarding");
    } catch (e) {
      pushToast("Reset failed \u2014 check connection", "error");
    }
    setCheckingSession(false);
  };
  const handleResetDev = () => {
    if (window.confirm("Reset the dev account? This deletes all its data and restarts onboarding from scratch.")) {
      resetDevAccount();
    }
  };
  const handleLogout = async () => {
    await supabaseClient.auth.signOut();
    setIsDev(false);
    setUserId(null); setName(""); setBanks([]); setBankRows([]); setTargets({}); setUploadedFiles({}); setGoals([]); setCustomTransactions([]); setStatements([]);
    setOverviewSlots(DEFAULT_OVERVIEW_SLOTS);
    pushToast("Logged out", "info");
    setStage("landing");
  };

  if (checkingSession) return null;

  let content;
  if (stage === "landing") {
    content = (
      <LandingScreen
        onSignup={() => { setReturnStage("landing"); setStage("signup"); }}
        onLogin={() => { setReturnStage("landing"); setStage("login"); }}
        onSkip={skipToHomepage}
      />
    );
  } else if (stage === "welcome") {
    content = (
      <WelcomeScreen
        onChoose={(mode) => { setReturnStage("welcome"); setStage(mode === "signup" ? "signup" : "login"); }}
        onSkip={skipToHomepage}
        onOpenLegal={(tab) => openLegal(tab, "welcome")}
      />
    );
  } else if (stage === "legal") {
    content = <LegalScreen initialTab={legalTab} onBack={() => setStage(returnStage)} />;
  } else if (stage === "login" || stage === "signup") {
    content = (
      <AuthScreen
        initialMode={stage}
        onError={(msg, type) => pushToast(msg, type || "error")}
        onDone={async (mode, uid, profile) => {
          setUserId(uid);
          if (mode === "login") {
            if (profile?.name) {
              const bankRows = await fetchBanks(uid);
              const targetObj = await fetchTargets(uid);
              const txRows = await fetchTransactions(uid);
              const goalRows = await fetchGoals(uid);
              const stmtRows = await fetchStatements(uid);
              setGoals(goalRows);
              setName(profile.name);
              setBanks(bankRows.map((b) => b.bank_name));
              setBankRows(bankRows);
              setTargets(targetObj);
              setCustomTransactions(txRows);
              setStatements(stmtRows);
              setUploadedFiles(Object.fromEntries(bankRows.map((b) => [b.bank_name, [{ name: "existing", size: 1, id: b.id }]])));
              setOverviewSlots(parseOverviewLayout(profile));
              setStage("dashboard");
            } else {
              setStage("onboarding");
            }
          } else {
            setStage("onboarding");
          }
        }}
        onOpenLegal={(tab) => openLegal(tab, stage)}
      />
    );
  } else if (stage === "onboarding") {
    content = <OnboardingScreen userId={userId} pushToast={pushToast} onLogout={handleLogout} onDone={(d) => { setName(d.name); setBanks(d.banks); setStage("upload"); }} />;
  } else if (stage === "upload") {
    content = (
      <UploadScreen
        banks={banks}
        userId={userId}
        pushToast={pushToast}
        onDone={(files, bal, parsedTxs, newStatements) => {
          setUploadedFiles(files); setBalances(bal);
          const allTx = [...(parsedTxs || []), ...customTransactions];
          const allStmts = [...statements, ...(newStatements || [])];
          if (newStatements && newStatements.length) setStatements(allStmts);
          if (parsedTxs && parsedTxs.length) { setCustomTransactions((prev) => [...parsedTxs, ...prev]); runAiFallback(parsedTxs); }
          if (newStatements && newStatements.length) runReconciliation(allStmts, allTx, null);
          fetchBanks(userId).then((rows) => setBankRows(rows));
          setStage("processing");
        }}
      />
    );
  } else if (stage === "processing") {
    content = <ProcessingScreen transactions={customTransactions} onDone={() => setStage("confirmCategory")} />;
  } else if (stage === "confirmCategory") {
    content = <ConfirmCategoryScreen transactions={customTransactions} onConfirm={recategorizeDescription} onDone={() => setStage("openingBalance")} />;
  } else if (stage === "openingBalance") {
    content = <OpeningBalanceScreen banks={banks} statements={statements} userId={userId} pushToast={pushToast} onDone={() => { fetchBanks(userId).then((rows) => setBankRows(rows)); setStage("breakdown"); }} />;
  } else if (stage === "breakdown") {
    content = <MonthlyBreakdownScreen transactions={customTransactions} onDone={() => setStage("targets")} />;
  } else if (stage === "targets") {
    content = <TargetSettingScreen userId={userId} transactions={customTransactions} pushToast={pushToast} onDone={(t) => { setTargets(t); setOverviewSlots(TOUR_DEFAULT_SLOTS); if (userId) supabaseClient.from("profiles").upsert({ id: userId, overview_layout: TOUR_DEFAULT_SLOTS }).then(() => {}); setShowExtraBanner(true); setRunTour(true); setStage("dashboard"); }} />;
  } else if (stage === "extraQuestions") {
    content = (
      <ExtraQuestionsScreen
        userId={userId}
        pushToast={pushToast}
        onDone={(data) => { setExtraProfile(data); setShowExtraBanner(false); setStage("dashboard"); }}
        onSkip={() => { setShowExtraBanner(false); setStage("dashboard"); }}
      />
    );
  } else if (stage === "mapping") {
    content = <MappingScreen transactions={customTransactions} onRecategorize={recategorizeDescription} onBack={() => setStage("dashboard")} />;
  } else if (stage === "settings") {
    content = (
      <SettingsScreen
        name={name} banks={banks} targets={targets} userId={userId}
        pushToast={pushToast}
        onBack={() => setStage("dashboard")}
        onOpenLegal={(tab) => openLegal(tab, "settings")}
        onLogout={handleLogout}
        onSaveName={handleSaveName}
        onRemoveBank={handleRemoveBank}
        onSaveTargets={handleSaveTargets}
      />
    );
  } else {
    content = (
      <DashboardScreen
        name={name}
        targets={targets}
        banks={banks}
        hasData={hasData}
        onOpenSettings={() => setStage("settings")}
        onOpenMapping={() => setStage("mapping")}
        onRecategorize={recategorizeDescription}
        showExtraBanner={showExtraBanner}
        onCompleteExtra={() => setStage("extraQuestions")}
        onDismissExtra={() => setShowExtraBanner(false)}
        onLogout={handleLogout}
        transactions={customTransactions}
        onAddTransactions={handleAddTransactions}
        pushToast={pushToast}
        overviewSlots={overviewSlots}
        onChangeOverviewSlots={handleChangeOverviewSlots}
        navViews={navViews}
        onChangeNavViews={handleChangeNavViews}
        billExcludes={billExcludes}
        onToggleBillExclude={handleToggleBillExclude}
        goals={goals}
        goalsApi={goalsApi}
        accountData={{ statements, bankRows }}
        isDev={isDev}
        onResetDev={handleResetDev}
        runTour={runTour}
        onFinishTour={() => setRunTour(false)}
      />
    );
  }

  return (
    <>
      {content}
      <ToastContainer toasts={toasts} />
    </>
  );
}

</script>

  /* settings */

    .brand { font-size: 15px; }
