async function fetchProfile(userId) {
  const { data } = await supabaseClient.from("profiles").select("*").eq("id", userId).single();
  return data;
}
async function fetchBanks(userId) {
  const { data } = await supabaseClient.from("banks").select("*").eq("user_id", userId);
  return data || [];
}
async function fetchTargets(userId) {
  const { data } = await supabaseClient.from("targets").select("*").eq("user_id", userId);
  const obj = {};
  (data || []).forEach((row) => { obj[row.category] = row.monthly_target; });

}

function formatMoney(n) {
  const sign = n < 0 ? "-" : "";
  return sign + "£" + Math.abs(n).toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}
function formatSize(bytes) {
  if (bytes < 1024) return bytes + " B";
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
  return (bytes / (1024 * 1024)).toFixed(1) + " MB";
}

/* ---------------- Toasts ---------------- */

function ToastContainer({ toasts }) {
  if (!toasts.length) return null;
  return (
    <div className="toast-stack">
      {toasts.map((t) => (
        <div key={t.id} className={"toast toast-" + (t.type || "info")}>{t.message}</div>

  );
}

/* ---------------- Auth ---------------- */

function AuthScreen({ onDone, onSkip, initialMode, onOpenLegal, onError }) {
  const [mode, setMode] = useState(initialMode || "login");
  const [submitting, setSubmitting] = useState(false);
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [confirmPassword, setConfirmPassword] = useState("");
  const isLogin = mode === "login", isSignup = mode === "signup", isForgot = mode === "forgot";
  const canSubmit = isForgot
    ? email.trim().length > 0
    : isSignup
    ? email.trim().length > 0 && password.length > 0 && password === confirmPassword
    : email.trim().length > 0 && password.length > 0;

  return (
    <div className="page stage-fade">
      <div className="blob blob1" /><div className="blob blob2" /><div className="blob blob3" />
      <div className="glass-card auth-card">
        <div className="brand-row"><div className="brand-dot" /><span className="brand-name">{APP_NAME}</span></div>
        {isForgot ? (
          <><h1 className="title">Reset your password</h1><p className="subtitle">We'll send a reset link to your email.</p></>
        ) : (
          <><h1 className="title">{isLogin ? "Welcome back" : "Create your account"}</h1>
          <p className="subtitle">{isLogin ? "Log in to keep tracking your finances." : "Let's get you set up."}</p></>
        )}
        <div className="field-group">
          <label className="field-label">Email</label>
          <input className="glass-input" type="email" placeholder="you@example.com" value={email} onChange={(e) => setEmail(e.target.value)} />
        </div>
        {!isForgot && (
          <div className="field-group">
            <label className="field-label">Password</label>
            <input className="glass-input" type="password" placeholder="••••••••" value={password} onChange={(e) => setPassword(e.target.value)} />
          </div>
        )}
        {isSignup && (
          <div className="field-group">
            <label className="field-label">Confirm password</label>
            <input className="glass-input" type="password" placeholder="••••••••" value={confirmPassword} onChange={(e) => setConfirmPassword(e.target.value)} />
          </div>
        )}
        {isLogin && <button className="link-btn" onClick={() => setMode("forgot")}>Forgot password?</button>}
        <button className="glass-btn primary" disabled={!canSubmit || submitting} onClick={async () => {
          if (isForgot) {
            setSubmitting(true);
            const { error } = await supabaseClient.auth.resetPasswordForEmail(email);
            setSubmitting(false);
            if (error) return onError(error.message);
            onError("Check your email for a reset link.", "success");
            return;
          }
          setSubmitting(true);
          if (mode === "signup") {
            const { data, error } = await supabaseClient.auth.signUp({ email, password });
            setSubmitting(false);
            if (error) return onError(error.message);
            onDone(mode, data.user?.id, null);
          } else {
            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            setSubmitting(false);
            if (error) return onError(error.message);
            const profile = await fetchProfile(data.user.id);
            onDone(mode, data.user.id, profile);
          }
        }}>
          {submitting ? <span className="btn-spinner" /> : isForgot ? "Send reset link" : isLogin ? "Log in" : "Sign up"}
        </button>
        <div className="switch-row">
          {isForgot ? (
            <span>Remembered it? <button className="link-btn inline" onClick={() => setMode("login")}>Log in</button></span>
          ) : isLogin ? (
            <span>New here? <button className="link-btn inline" onClick={() => setMode("signup")}>Sign up</button></span>
          ) : (
            <span>Already have an account? <button className="link-btn inline" onClick={() => setMode("login")}>Log in</button></span>
          )}
        </div>
        <p className="legal-note">
          By continuing you agree to our{" "}
          <button className="link-btn inline" onClick={() => onOpenLegal("terms")}>Terms</button> and{" "}
          <button className="link-btn inline" onClick={() => onOpenLegal("privacy")}>Privacy Policy</button>
        </p>
      </div>
    </div>
  );
}

function OnboardingScreen({ onDone, userId, pushToast }) {
  const [step, setStep] = useState(0);
  const [name, setName] = useState("");
  const [banks, setBanks] = useState([]);
  const [savvy, setSavvy] = useState(null);
  const [tracking, setTracking] = useState(null);
  const [balanceCheck, setBalanceCheck] = useState(null);
  const [goals, setGoals] = useState([]);
  const [submitting, setSubmitting] = useState(false);

  const canContinue = [
    name.trim().length > 0, banks.length > 0, savvy !== null, tracking !== null, balanceCheck !== null, goals.length > 0,
  ][step];

  const toggleBank = (b) => setBanks((prev) => prev.includes(b) ? prev.filter((x) => x !== b) : [...prev, b]);
  const toggleGoal = (g) => setGoals((prev) => prev.includes(g) ? prev.filter((x) => x !== g) : [...prev, g]);
  const next = async () => {
    if (step === ONBOARD_STEPS - 1) {
      setSubmitting(true);
      try {
        await supabaseClient.from("profiles").update({ name: name.trim() }).eq("id", userId);
        await supabaseClient.from("banks").insert(banks.map((b) => ({ user_id: userId, bank_name: b })));
      } catch (e) {
        pushToast("Couldn't save — check your connection", "error");
      }
      setSubmitting(false);
      onDone({ name: name.trim(), banks });
    }
    else setStep((s) => s + 1);
  };
  const back = () => setStep((s) => Math.max(s - 1, 0));

  return (
    <div className="page stage-fade">
      <div className="blob blob1" /><div className="blob blob2" /><div className="blob blob3" />
      <div className={"glass-card " + CARD_SIZE[step]}>
        <div className="progress-dots">
          {Array.from({ length: ONBOARD_STEPS }).map((_, i) => (
            <div key={i} className={"dot " + (i <= step ? "dot-active" : "")} />
          ))}
        </div>

        {step === 0 && (
          <div className="step">
            <h1 className="title">Nice to meet you, what's your name?</h1>
            <input className="glass-input" type="text" placeholder="Your name" value={name} onChange={(e) => setName(e.target.value)} autoFocus />
          </div>
        )}
        {step === 1 && (
          <div className="step">
            <h1 className="title">Who's your bank?</h1>
            <p className="subtitle">Select all that apply. We'll get more specific by country later.</p>
            <div className="bank-grid">
              {BANKS.map((b) => (
                <button key={b} className={"chip bank-chip " + (banks.includes(b) ? "chip-selected" : "")} onClick={() => toggleBank(b)}>
                  <span>{b}</span>
                  {banks.includes(b) && <span className="check-badge">✓</span>}
                </button>
              ))}
            </div>
          </div>
        )}
        {step === 2 && (
          <div className="step">
            <h1 className="title">How smart are you with your finances?</h1>
            <div className="segmented">
              {SAVVY_OPTIONS.map((opt) => (
                <button key={opt.key} className={"segment " + (savvy === opt.key ? "segment-active" : "")} onClick={() => setSavvy(opt.key)}>

        {step === 4 && (

              {BALANCE_OPTIONS.map((opt) => (

                </button>
              ))}
            </div>
          </div>
        )}
        {step === 5 && (
          <div className="step">
            <h1 className="title">What do you want to achieve?</h1>
            <p className="subtitle">Pick as many as apply.</p>
            <div className="goal-wrap">
              {GOALS.map((g) => (
                <button key={g} className={"chip goal-chip " + (goals.includes(g) ? "chip-selected" : "")} onClick={() => toggleGoal(g)}>
                  <span>{g}</span>
                  {goals.includes(g) && <span className="check-badge">✓</span>}
                </button>
              ))}
            </div>
          </div>
        )}

        <div className="nav-row">
          {step > 0 && <button className="glass-btn ghost" onClick={back} disabled={submitting}>Back</button>}
          <button className="glass-btn primary" disabled={!canContinue || submitting} onClick={next}>
            {submitting ? <span className="btn-spinner" /> : step === ONBOARD_STEPS - 1 ? "Finish" : "Continue"}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ---------------- Per-bank statement upload ---------------- */

const VALID_EXTENSIONS = [".pdf", ".csv"];
const MAX_FILE_SIZE = 10 * 1024 * 1024;

function validateFile(file) {
  const lower = file.name.toLowerCase();
  const validExt = VALID_EXTENSIONS.some((ext) => lower.endsWith(ext));
  if (!validExt) return "Only PDF or CSV files are supported.";
  if (file.size > MAX_FILE_SIZE) return "File too large (max 10MB).";
  return null;
}

function BankUploadBlock({ bank, files, error, onAdd, onRemove }) {
  const [dragActive, setDragActive] = useState(false);
  const inputRef = useRef(null);

  const handleDrop = (e) => {
    e.preventDefault(); setDragActive(false);
    if (e.dataTransfer.files?.length) onAdd(e.dataTransfer.files);
  };

  return (
    <div className="bank-upload-block">
      <div className="bank-upload-head">
        <span className="bank-upload-name">{bank}</span>
        <span className={"bank-upload-count " + (files.length >= 3 ? "count-good" : "")}>
          {files.length} file{files.length !== 1 ? "s" : ""} added
        </span>
      </div>
      <div
        className={"dropzone dropzone-compact " + (dragActive ? "dropzone-active" : "") + (error ? " dropzone-error" : "")}
        onDragOver={(e) => { e.preventDefault(); setDragActive(true); }}
        onDragLeave={() => setDragActive(false)}
        onDrop={handleDrop}
        onClick={() => inputRef.current?.click()}
      >
        <p className="dropzone-text">Drag & drop, or click to browse</p>
        <input ref={inputRef} type="file" multiple accept=".pdf,.csv" style={{ display: "none" }}
          onChange={(e) => e.target.files?.length && onAdd(e.target.files)} />
      </div>
      {error && <p className="error-text">{error}</p>}
      {files.length > 0 && (
        <div className="file-list">
          {files.map((f) => (
            <div key={f.id} className="file-row">
              <div className="file-info"><span className="file-name">{f.name}</span><span className="file-size">{formatSize(f.size)}</span></div>
              <button className="file-remove" onClick={() => onRemove(f.id)}>×</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function UploadScreen({ banks, onDone, pushToast, userId }) {
  const [filesByBank, setFilesByBank] = useState(() => Object.fromEntries(banks.map((b) => [b, []])));
  const [balanceByBank, setBalanceByBank] = useState(() => Object.fromEntries(banks.map((b) => [b, { balance: "", date: "" }])));
  const [errorsByBank, setErrorsByBank] = useState(() => Object.fromEntries(banks.map((b) => [b, null])));
  const [submitting, setSubmitting] = useState(false);

  const addFiles = (bank, fileList) => {
    const incoming = [];
    let firstError = null;
    Array.from(fileList).forEach((f) => {
      const err = validateFile(f);
      if (err) { if (!firstError) firstError = err; return; }
      incoming.push({ name: f.name, size: f.size, id: f.name + f.size + Math.random(), rawFile: f });
    });
    if (firstError) {
      setErrorsByBank((prev) => ({ ...prev, [bank]: firstError }));
      pushToast(firstError, "error");
      setTimeout(() => setErrorsByBank((prev) => ({ ...prev, [bank]: null })), 4000);
    }
    if (incoming.length) {
      setFilesByBank((prev) => ({ ...prev, [bank]: [...prev[bank], ...incoming] }));
      pushToast(incoming.length > 1 ? "Files added" : "File added", "success");
    }
  };
  const removeFile = (bank, id) => {
    setFilesByBank((prev) => ({ ...prev, [bank]: prev[bank].filter((f) => f.id !== id) }));
    pushToast("File removed", "info");
  };
  const setBalance = (bank, field, value) => setBalanceByBank((prev) => ({ ...prev, [bank]: { ...prev[bank], [field]: value } }));

  const allHaveAtLeastOne = banks.every((b) => filesByBank[b].length > 0);

  const handleContinue = async (skip) => {
    setSubmitting(true);
    try {
      for (const bank of banks) {
        const bal = balanceByBank[bank];
        if (bal.balance || bal.date) {
          await supabaseClient.from("banks").update({
            starting_balance: bal.balance ? Number(bal.balance) : null,
            as_of_date: bal.date || null,
          }).eq("user_id", userId).eq("bank_name", bank);
        }
        if (!skip) {
          for (const f of filesByBank[bank]) {
            const path = userId + "/" + bank + "/" + Date.now() + "_" + f.name;
            await supabaseClient.storage.from("statements").upload(path, f.rawFile);
          }
        }
      }
    } catch (e) {
      pushToast("Some files failed to upload", "error");
    }
    setSubmitting(false);
    onDone(filesByBank, balanceByBank);
  };

  return (
    <div className="page stage-fade">
      <div className="blob blob1" /><div className="blob blob2" /><div className="blob blob3" />
      <div className="glass-card upload-card">
        <div className="brand-row"><div className="brand-dot" /><span className="brand-name">{APP_NAME}</span></div>
        <h1 className="title">Upload your bank statements</h1>
        <p className="subtitle">Add at least 3 months per bank so we can spot regular patterns.</p>

        <div className="bank-upload-list">
          {banks.map((b) => (
            <div key={b}>
              <BankUploadBlock
                bank={b}
                files={filesByBank[b]}
                error={errorsByBank[b]}
                onAdd={(fl) => addFiles(b, fl)}
                onRemove={(id) => removeFile(b, id)}
              />
              <div className="balance-row">
                <div className="balance-field">
                  <label className="field-label">Starting balance</label>
                  <div className="target-input-wrap" style={{ width: "100%" }}>
                    <span className="target-currency">£</span>
                    <input
                      className="target-input"
                      style={{ width: "100%" }}
                      type="number"
                      placeholder="0"
                      value={balanceByBank[b].balance}
                      onChange={(e) => setBalance(b, "balance", e.target.value)}
                    />
                  </div>
                </div>
                <div className="balance-field">
                  <label className="field-label">As of date</label>
                  <input
                    className="glass-input"
                    style={{ padding: "10px 12px", fontSize: 13, marginTop: 4 }}
                    type="date"
                    value={balanceByBank[b].date}
                    onChange={(e) => setBalance(b, "date", e.target.value)}
                  />
                </div>
              </div>
            </div>
          ))}
        </div>

        <div className="nav-row">
          <button className="glass-btn ghost" disabled={submitting} onClick={() => handleContinue(true)}>Skip for now</button>
          <button className="glass-btn primary" disabled={!allHaveAtLeastOne || submitting} onClick={() => handleContinue(false)}>
            {submitting ? <span className="btn-spinner" /> : "Continue"}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ---------------- Processing simulation ---------------- */

function ProcessingScreen({ onDone }) {
  const [pct, setPct] = useState(0);

  useEffect(() => {
    const start = Date.now();
    const duration = 2400;
    const interval = setInterval(() => {
      const elapsed = Date.now() - start;
      const p = Math.min(100, Math.round((elapsed / duration) * 100));
      setPct(p);
      if (p >= 100) {
        clearInterval(interval);
        setTimeout(onDone, 300);
      }
    }, 60);
    return () => clearInterval(interval);
  }, []);

  return (
    <div className="page stage-fade">
      <div className="blob blob1" /><div className="blob blob2" /><div className="blob blob3" />
      <div className="glass-card processing-card">
        <div className="spinner" />
        <h1 className="title" style={{ marginTop: 20 }}>We're reviewing your data</h1>
        <p className="subtitle">Matching transactions to categories. This usually takes a few seconds.</p>
        <div className="progress-track">
          <div className="progress-fill" style={{ width: pct + "%" }} />
        </div>
        <p className="summary-note">{pct}%</p>
      </div>
    </div>
  );
}

function MainContent({ view, targets, banks, hasData }) {
  if (view === "overview") return hasData ? (<><SummaryCard targets={targets} /><TransactionFeed limit={5} /></>) : <EmptyState text="No transactions yet — upload a statement to see your monthly summary." />;
  if (view === "breakdown") return hasData ? <BreakdownCard /> : <EmptyState text="No spending data yet — upload a statement to see your breakdown." />;
  if (view === "goals") return <GoalsCard />;
  if (view === "transactions") return hasData ? <TransactionFeed /> : <EmptyState text="No transactions yet — upload a statement to see them here." />;
  if (view === "trends") return hasData ? <TrendsCard /> : <EmptyState text="No trend data yet — upload a few months of statements." />;
  if (view === "cashflow") return hasData ? <CashFlowCard /> : <EmptyState text="No cash flow data yet — upload a statement to get started." />;
  if (view === "bills") return hasData ? <BillsCard /> : <EmptyState text="No bills detected yet — upload a statement to get started." />;
  if (view === "accounts") return <BankAccountsCard banks={banks} />;
  if (view === "merchants") return hasData ? <MerchantsCard /> : <EmptyState text="No merchant data yet — upload a statement to get started." />;
  if (view === "insights") return hasData ? <InsightsCard /> : <EmptyState text="No insights yet — upload a statement to get started." />;
  return null;
}
function DashboardScreen({ name, targets, banks, onOpenSettings, showExtraBanner, onCompleteExtra, onDismissExtra, hasData, onLogout }) {
  const [panelOpen, setPanelOpen] = useState(true);
  const [view, setView] = useState("overview");
  return (
    <div className="app-shell stage-fade">
      {showExtraBanner && <ExtraInfoBanner onComplete={onCompleteExtra} onDismiss={onDismissExtra} />}

/* ---------------- App shell / router ---------------- */

function App() {
  const [stage, setStage] = useState("landing");
  const [checkingSession, setCheckingSession] = useState(true);
  const [userId, setUserId] = useState(null);
  const [name, setName] = useState("");
  const [banks, setBanks] = useState([]);
  const [targets, setTargets] = useState({});
  const [balances, setBalances] = useState({});
  const [uploadedFiles, setUploadedFiles] = useState({});
  const [extraProfile, setExtraProfile] = useState(null);
  const [showExtraBanner, setShowExtraBanner] = useState(false);
  const [legalTab, setLegalTab] = useState("privacy");
  const [returnStage, setReturnStage] = useState("welcome");
  const [toasts, setToasts] = useState([]);

  const pushToast = (message, type) => {
    const id = Date.now() + Math.random();
    setToasts((prev) => [...prev, { id, message, type }]);
    setTimeout(() => setToasts((prev) => prev.filter((t) => t.id !== id)), 2600);
  };

  const hasData = Object.values(uploadedFiles).some((arr) => arr && arr.length > 0);

  useEffect(() => {
    supabaseClient.auth.getSession().then(async ({ data }) => {
      const session = data?.session;
      if (session?.user) {
        const uid = session.user.id;
        setUserId(uid);
        const profile = await fetchProfile(uid);
        if (profile?.name) {
          const bankRows = await fetchBanks(uid);
          const targetObj = await fetchTargets(uid);
          setName(profile.name);
          setBanks(bankRows.map((b) => b.bank_name));
          setTargets(targetObj);
          setUploadedFiles(Object.fromEntries(bankRows.map((b) => [b.bank_name, [{ name: "existing", size: 1, id: b.id }]])));
          setStage("dashboard");
        } else {
          setStage("onboarding");
        }
      }
      setCheckingSession(false);
    });
  }, []);

  const openLegal = (tab, from) => { setLegalTab(tab); setReturnStage(from); setStage("legal"); };
  const skipToHomepage = () => {
    setName("Shezaad");
    setBanks(["HSBC", "Emirates NBD"]);
    setTargets(Object.fromEntries(Object.keys(CATEGORY_MONTHLY).map((c) => [c, CATEGORY_MONTHLY[c][CATEGORY_MONTHLY[c].length - 1]])));
    setUploadedFiles({ HSBC: [{ name: "dummy.pdf", size: 1000, id: "dummy" }] });
    setStage("dashboard");
  };
  const handleLogout = async () => {
    await supabaseClient.auth.signOut();
    setUserId(null); setName(""); setBanks([]); setTargets({}); setUploadedFiles({});
    pushToast("Logged out", "info");
    setStage("landing");
  };

  if (checkingSession) return null;

  let content;
  if (stage === "landing") {
    content = (
      <LandingScreen
        onSignup={() => { setReturnStage("landing"); setStage("signup"); }}
        onLogin={() => { setReturnStage("landing"); setStage("login"); }}
        onSkip={skipToHomepage}
      />
    );
  } else if (stage === "welcome") {
    content = (
      <WelcomeScreen
        onChoose={(mode) => { setReturnStage("welcome"); setStage(mode === "signup" ? "signup" : "login"); }}
        onSkip={skipToHomepage}
        onOpenLegal={(tab) => openLegal(tab, "welcome")}
      />
    );
  } else if (stage === "legal") {
    content = <LegalScreen initialTab={legalTab} onBack={() => setStage(returnStage)} />;
  } else if (stage === "login" || stage === "signup") {
    content = (
      <AuthScreen
        initialMode={stage}
        onError={(msg, type) => pushToast(msg, type || "error")}
        onDone={async (mode, uid, profile) => {
          setUserId(uid);
          if (mode === "login") {
            if (profile?.name) {
              const bankRows = await fetchBanks(uid);
              const targetObj = await fetchTargets(uid);
              setName(profile.name);
              setBanks(bankRows.map((b) => b.bank_name));
              setTargets(targetObj);
              setUploadedFiles(Object.fromEntries(bankRows.map((b) => [b.bank_name, [{ name: "existing", size: 1, id: b.id }]])));
              setStage("dashboard");
            } else {
              setStage("onboarding");
            }
          } else {
            setStage("onboarding");
          }
        }}
        onOpenLegal={(tab) => openLegal(tab, stage)}
      />
    );
  } else if (stage === "onboarding") {
    content = <OnboardingScreen userId={userId} pushToast={pushToast} onDone={(d) => { setName(d.name); setBanks(d.banks); setStage("upload"); }} />;
  } else if (stage === "upload") {
    content = (
      <UploadScreen
        banks={banks}
        userId={userId}
        pushToast={pushToast}
        onDone={(files, bal) => { setUploadedFiles(files); setBalances(bal); setStage("processing"); }}
      />
    );
  } else if (stage === "processing") {
    content = <ProcessingScreen onDone={() => setStage("breakdown")} />;
  } else if (stage === "breakdown") {
    content = <MonthlyBreakdownScreen onDone={() => setStage("targets")} />;
  } else if (stage === "targets") {
    content = <TargetSettingScreen userId={userId} pushToast={pushToast} onDone={(t) => { setTargets(t); setShowExtraBanner(true); setStage("dashboard"); }} />;
  } else if (stage === "extraQuestions") {
    content = (
      <ExtraQuestionsScreen
        userId={userId}
        pushToast={pushToast}
        onDone={(data) => { setExtraProfile(data); setShowExtraBanner(false); setStage("dashboard"); }}
        onSkip={() => { setShowExtraBanner(false); setStage("dashboard"); }}
      />
    );
  } else if (stage === "settings") {
    content = (
      <SettingsScreen
        name={name} banks={banks} targets={targets}
        pushToast={pushToast}
        onBack={() => setStage("dashboard")}
        onOpenLegal={(tab) => openLegal(tab, "settings")}
        onLogout={handleLogout}
      />
    );
  } else {
    content = (
      <DashboardScreen
        name={name}
        targets={targets}
        banks={banks}
        hasData={hasData}
        onOpenSettings={() => setStage("settings")}
        showExtraBanner={showExtraBanner}
        onCompleteExtra={() => setStage("extraQuestions")}
        onDismissExtra={() => setShowExtraBanner(false)}
        onLogout={handleLogout}
      />
    );
  }

  return (
    <>
      {content}
      <ToastContainer toasts={toasts} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

  .features { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .feature-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); border-radius: 18px; padding: 20px; backdrop-filter: blur(14px); }
  .feature-icon { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; background: rgba(79,140,255,0.16); color: #8fb4ff; font-size: 16px; margin-bottom: 10px; }
  .feature-card h3 { font-size: 14px; margin: 0 0 5px; color: #fff; }
  .feature-card p { font-size: 12px; color: rgba(255,255,255,0.5); margin: 0; line-height: 1.5; }

  .pricing { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; max-width: 620px; margin: 0 auto; }
  .price-card { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.16); border-radius: 22px; padding: 28px; text-align: center; backdrop-filter: blur(16px); }
  .price-card.highlight { border-color: rgba(79,140,255,0.6); background: linear-gradient(160deg, rgba(79,140,255,0.14), rgba(181,107,255,0.1)); box-shadow: 0 8px 30px rgba(79,140,255,0.2); }
  .price-tag { font-size: 12px; font-weight: 700; color: #8fb4ff; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
  .price-amount { font-size: 32px; font-weight: 700; margin-bottom: 4px; color: #fff; }
  .price-period { font-size: 13px; color: rgba(255,255,255,0.45); margin-bottom: 18px; }
  .price-features { list-style: none; padding: 0; margin: 0 0 22px; text-align: left; }
  .price-features li { font-size: 13px; color: rgba(255,255,255,0.65); padding: 6px 0; padding-left: 22px; position: relative; }
  .price-features li::before { content: "✓"; position: absolute; left: 0; color: #4fe0c0; font-weight: 700; }

  .lp-final-cta { text-align: center; padding: 70px 24px 90px; position: relative; z-index: 1; }
  .lp-final-cta h2 { font-size: 28px; margin: 0 0 12px; letter-spacing: -0.01em; color: #fff; }
  .lp-final-cta p { color: rgba(255,255,255,0.55); margin: 0 0 24px; }

  .lp-footer { position: relative; z-index: 1; text-align: center; padding: 22px; color: rgba(255,255,255,0.35); font-size: 12px; border-top: 1px solid rgba(255,255,255,0.08); }

  @media (max-width: 720px) {
    .lp-hero h1 { font-size: 36px; }
    .steps, .features { grid-template-columns: 1fr; }
    .pricing { grid-template-columns: 1fr; }
  }

  /* stage transitions */
  .stage-fade { animation: stageFadeIn 0.35s ease; }
  @keyframes stageFadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* button loading spinner */
  .btn-spinner {
    display: inline-block; width: 16px; height: 16px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.35); border-top-color: #fff;
    animation: spin 0.7s linear infinite;
  }

  /* error states */
  .dropzone-error { border-color: rgba(255,139,139,0.6); background: rgba(255,139,139,0.06); }
  .error-text { color: #ff8b8b; font-size: 12px; margin: 6px 2px 0; }

  /* empty states */
  .empty-state { align-items: center; text-align: center; padding: 36px 22px; }
  .empty-icon { font-size: 28px; color: rgba(255,255,255,0.3); margin-bottom: 10px; }
  .empty-text { color: rgba(255,255,255,0.5); font-size: 13px; margin: 0; max-width: 280px; }

  /* toasts */
  .toast-stack {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    z-index: 100; display: flex; flex-direction: column; gap: 8px; align-items: center;
  }
  .toast {
    padding: 10px 18px; border-radius: 14px; font-size: 13px; font-weight: 500; color: #fff;
    background: rgba(20,20,35,0.9); backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow: 0 6px 20px rgba(0,0,0,0.35);
    animation: toastIn 0.25s ease;
  }
  .toast-success { border-color: rgba(79,224,192,0.4); }
  .toast-error { border-color: rgba(255,139,139,0.4); }
  .toast-info { border-color: rgba(255,255,255,0.2); }
  @keyframes toastIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</body>
</html>
