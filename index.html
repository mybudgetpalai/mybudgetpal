function App() {
  const [stage, setStage] = useState("landing");
  const [showSplash, setShowSplash] = useState(false);
  const [checkingSession, setCheckingSession] = useState(true);
  const [userId, setUserId] = useState(null);
  const [name, setName] = useState("");
  const [banks, setBanks] = useState([]);
  const [targets, setTargets] = useState({});
  const [balances, setBalances] = useState({});
  const [uploadedFiles, setUploadedFiles] = useState({});
  const [customTransactions, setCustomTransactions] = useState([]);
  const [statements, setStatements] = useState([]);
  const [bankRows, setBankRows] = useState([]);
  const [overviewSlots, setOverviewSlots] = useState(DEFAULT_OVERVIEW_SLOTS);
  const [homeLayout, setHomeLayout] = useState(DEFAULT_HOME_LAYOUT);
  const [showSetupBanner, setShowSetupBanner] = useState(false);
  const [setupResume, setSetupResume] = useState(false);
  const [setupIntroOpen, setSetupIntroOpen] = useState(false);
  const [setupQuestionsOpen, setSetupQuestionsOpen] = useState(false);
  const [setupAnswers, setSetupAnswers] = useState(null);
  const [personaKey, setPersonaKey] = useState(null);
  const [navViews, setNavViews] = useState(VIEWS.map((v) => v.key));
  const [allTargets, setAllTargets] = useState({});
  const [targetsEditReq, setTargetsEditReq] = useState(false);
  const [billExcludes, setBillExcludes] = useState([]);
  const [catConfig, setCatConfig] = useState({ renames: {}, custom: [] });
  const [extraProfile, setExtraProfile] = useState(null);
  const [showExtraBanner, setShowExtraBanner] = useState(false);
  const [legalTab, setLegalTab] = useState("privacy");
  const [returnStage, setReturnStage] = useState("welcome");
  const [toasts, setToasts] = useState([]);
  const [goals, setGoals] = useState([]);
  const [isDev, setIsDev] = useState(false);
  const [isAdmin, setIsAdmin] = useState(false);
  const [notifications, setNotifications] = useState([]);
  const [theme, setTheme] = useState("light");
  const [runTour, setRunTour] = useState(false);
  const [usingDemo, setUsingDemo] = useState(false);
  const [demoCurrencies, setDemoCurrencies] = useState(["GBP"]);
  const [monthReviews, setMonthReviews] = useState([]);
  const [plan, setPlan] = useState(null);
  const [rollovers, setRollovers] = useState([]);
  const [reviewMonth, setReviewMonth] = useState(null);
  const [signupMonth, setSignupMonth] = useState(null);
  const [devNow, setDevNow] = useState(null);
  const [mobilePreview, setMobilePreview] = useState(false);
  const setDevDate = (val) => { DEV_NOW = val || null; setDevNow(val || null); };
  const [reviewManual, setReviewManual] = useState(false);
  const [sessionDismissed, setSessionDismissed] = useState([]);

  const pushToast = (message, type) => {
    const id = Date.now() + Math.random();
    setToasts((prev) => [...prev, { id, message, type }]);
    setTimeout(() => setToasts((prev) => prev.filter((t) => t.id !== id)), 2600);
  };

  const hasData = customTransactions.length > 0;

  React.useEffect(() => {
    if (!userId) { setMonthReviews([]); setRollovers([]); setNotifications([]); return; }
    (async () => {
      try {
        const [mr, ro] = await Promise.all([fetchMonthReviews(userId), fetchRollovers(userId)]);
        setMonthReviews(mr); setRollovers(ro);
      } catch (e) {}
      try {
        const { data: notes } = await supabaseClient.from("notifications").select("*").eq("user_id", userId).eq("read", false).order("created_at", { ascending: false });
        setNotifications(notes || []);
      } catch (e) {}
    })();
  }, [userId]);

  React.useEffect(() => {
    // Hold the month-end review until the user has finished the welcome tour and
    // any first-run setup — it should never interrupt onboarding.
    if (stage !== "dashboard" || reviewMonth || runTour) return;
    if (!hasData) return;
    // Real month-end: only review the month that has JUST completed (previous month
    // relative to today), never retrospectively surface older months.
    const prev = addMonths(currentMonthKey(), -1);
    // Never review months that closed before the customer signed up — the first
    // review a Cx should ever see is the signup month, once a new month opens.
    const baseline = signupMonth || new Date().toISOString().slice(0, 7);
    if (prev < baseline) return;
    const done = completedMonthsWithData(customTransactions);
    if (!done.includes(prev)) return;
    const reviewed = new Set(monthReviews.map((r) => r.month));
    if (reviewed.has(prev) || sessionDismissed.includes(prev)) return;
    const b = (allTargets && allTargets[prev]) || {};
    const hasBudget = TX_CATEGORIES.some((c) => Number(b[c]) > 0) || !!plan;
    if (hasBudget) { setReviewManual(false); setReviewMonth(prev); }
  }, [stage, customTransactions, allTargets, monthReviews, reviewMonth, sessionDismissed, isDev, runTour, showExtraBanner, hasData, plan, devNow, signupMonth]);

  const reviewBudgets = (() => {
    if (!reviewMonth) return {};
    const b = (allTargets && allTargets[reviewMonth]) || {};
    const hasBudget = TX_CATEGORIES.some((c) => Number(b[c]) > 0);
    return (!hasBudget && isDev) ? DEMO_TARGETS : b;
  })();

  const closeReview = () => {
    if (reviewMonth && !reviewManual) setSessionDismissed((p) => [...p, reviewMonth]);
    setReviewMonth(null); setReviewManual(false);
  };
  const openReviewManual = (monthKey) => { setReviewManual(true); setReviewMonth(monthKey); };

  const handleReviewAction = async (month, action, payload) => {
    const net = (payload && payload.net) || 0;
    try { await supabaseClient.from("month_reviews").upsert({ user_id: userId, month, net, action }, { onConflict: "user_id,month" }); } catch (e) {}
    setMonthReviews((prev) => [...prev.filter((r) => r.month !== month), { month, net, action }]);
    const insertRollovers = async (rows) => {
      try { const { data } = await supabaseClient.from("budget_rollovers").insert(rows).select(); if (data) setRollovers((p) => [...p, ...data.map(rowToRollover)]); }
      catch (e) { setRollovers((p) => [...p, ...rows.map((r) => ({ ...r, id: "local-" + Math.random() }))]); }
    };
    if (action === "catchup" && payload && payload.perMonth > 0) {
      const rows = [];
      for (let i = 1; i <= payload.months; i++) rows.push({ user_id: userId, month: addMonths(month, i), amount: -Math.abs(payload.perMonth), source: "catchup" });
      await insertRollovers(rows);
      pushToast("Plan applied — budgets trimmed by " + formatMoney(payload.perMonth) + "/mo", "success");
    } else if (action === "full" && net) {
      await insertRollovers([{ user_id: userId, month: addMonths(month, 1), amount: net, source: "rollover" }]);
      pushToast(formatMoney(Math.abs(net)) + " carried into next month", "success");
    } else if (action === "bank_surplus" && payload && payload.goalId && payload.amount > 0) {
      const g = goals.find((x) => x.id === payload.goalId);
      if (g) await goalsApi.update(g.id, { saved: (Number(g.saved) || 0) + payload.amount });
      pushToast(formatMoney(payload.amount) + " added to " + (g ? g.name : "your goal"), "success");
    } else if (action === "roll_surplus" && payload && payload.amount > 0) {
      await insertRollovers([{ user_id: userId, month: addMonths(month, 1), amount: Math.abs(payload.amount), source: "surplus" }]);
      pushToast(formatMoney(payload.amount) + " rolled into next month", "success");
    } else if (action === "plan_accept" && plan) {
      const p = { ...plan, targetBalance: Math.round(plan.targetBalance - (payload && payload.amount ? payload.amount : 0)) };
      setPlan(p); try { await savePlanToDb(userId, p); } catch (e) {}

    try { await supabaseClient.from("notifications").update({ read: true }).eq("id", id); } catch (e) {}
  };

  if (checkingSession) return null;

  const inApp = ["dashboard", "settings", "mapping", "planSetup", "admin"].includes(stage);

  let content;
  let overlayScreen = null;
  if (stage === "targets") {
    overlayScreen = <TargetSettingScreen overlay userId={userId} transactions={customTransactions} pushToast={pushToast} banks={banks} accountData={{ statements, bankRows }} onBack={() => setStage(setupResume ? "setupQuestions" : "breakdown")} onDone={(t, p) => {
      setTargets(t); setPlan(p || null);
      if (!setupResume) setSignupMonth(new Date().toISOString().slice(0, 7));
      if (userId) fetchAllTargets(userId).then(setAllTargets).catch(() => {});
      setShowExtraBanner(true);
      if (setupAnswers) {
        const pk = scorePersona(setupAnswers);
        const tpl = PERSONA_TEMPLATES[pk];
        if (tpl) {
          setHomeLayout(tpl.layout);
          if (userId) supabaseClient.from("profiles").upsert({ id: userId, home_layout: tpl.layout, persona: pk }).then(() => {}, () => {});
        }
        setPersonaKey(pk);
        setStage("buildingDashboard");
      } else {
        if (!setupResume) setRunTour(true);
        setSetupResume(false);
        setStage("dashboard");
      }
    }} />;
  } else if (stage === "buildingDashboard") {
    overlayScreen = <BuildingDashboardScreen overlay personaKey={personaKey} onDone={() => { const first = !setupResume; setSetupResume(false); setSetupAnswers(null); if (first) setRunTour(true); setStage("dashboard"); }} />;
  }
  if (stage === "landing") {
    content = (
      <LandingScreen
        onSignup={() => { setReturnStage("landing"); setStage("signup"); }}
        onLogin={() => { setReturnStage("landing"); setStage("login"); }}
        onTest={handleTest}
      />
    );
  } else if (stage === "welcome") {
    content = (
      <WelcomeScreen
        onChoose={(mode) => { setReturnStage("welcome"); setStage(mode === "signup" ? "signup" : "login"); }}
        onOpenLegal={(tab) => openLegal(tab, "welcome")}
      />
    );
  } else if (stage === "legal") {
    content = <LegalScreen initialTab={legalTab} onBack={() => setStage(returnStage)} theme={theme} />;
  } else if (stage === "login" || stage === "signup") {
    content = (
      <AuthScreen
        initialMode={stage}
        onBack={() => setStage(returnStage)}
        onError={(msg, type) => pushToast(msg, type || "error")}
        onDone={async (mode, uid, profile) => {
          setUserId(uid);
          try { const em = (await supabaseClient.auth.getUser()).data?.user?.email || ""; setIsDev(em === DEV_EMAIL); setIsAdmin(em === ADMIN_EMAIL); DEV_MODE = em === DEV_EMAIL; } catch (e) {}
          if (mode === "login") {
            if (profile?.name) {
              const bankRows = await fetchBanks(uid);
              const targetObj = await fetchTargets(uid);
              const txRows = await fetchTransactions(uid);
              const goalRows = await fetchGoals(uid);
              const stmtRows = await fetchStatements(uid);
              setGoals(goalRows);
              setName(profile.name);
              setSignupMonth((profile.created_at || "").slice(0, 7) || null);
              setBanks(bankRows.map((b) => b.bank_name));
              setBankRows(bankRows);
              setTargets(targetObj); fetchAllTargets(uid).then(setAllTargets).catch(() => {});
              setCustomTransactions(txRows);
              setStatements(stmtRows);
              setUploadedFiles(Object.fromEntries(bankRows.map((b) => [b.bank_name, [{ name: "existing", size: 1, id: b.id }]])));
              setOverviewSlots(parseOverviewLayout(profile)); setHomeLayout(parseHomeLayout(profile)); setTheme(normalizeTheme(profile && profile.theme)); setShowSetupBanner(!!profile && profile.setup_completed === false); setPersonaKey((profile && profile.persona) || null);
              setNavViews(parseNavLayout(profile));
              setBillExcludes(parseBillExcludes(profile)); { const _cc = parseCategoryConfig(profile); CAT_CONFIG = _cc; setCatConfig(_cc); }
      setPlan(planFromProfile(profile));
              setShowSplash(true);
              setTimeout(() => setShowSplash(false), 2900);
              setStage("dashboard");
            } else {
              setStage("onboarding");
            }
          } else {
            setStage("onboarding");
          }
        }}
        onOpenLegal={(tab) => openLegal(tab, stage)}
      />
    );
  } else if (stage === "onboarding") {
    content = <OnboardingScreen userId={userId} pushToast={pushToast} onLogout={handleLogout} initialName={name} initialBanks={banks} onDone={(d) => { setName(d.name); setBanks(d.banks); setDemoCurrencies((d.currencies && d.currencies.length ? d.currencies : ["GBP"])); setStage("upload"); }} />;
  } else if (stage === "upload") {
    content = (
      <UploadScreen
        banks={banks}
        userId={userId}
        pushToast={pushToast}
        onBack={() => setStage("onboarding")}
        onSkip={() => setStage("demoUpload")}
        onDone={(files, bal, parsedTxs, newStatements) => {
          setUploadedFiles(files); setBalances(bal);
          const allTx = [...(parsedTxs || []), ...customTransactions];
          const allStmts = [...statements, ...(newStatements || [])];
          if (newStatements && newStatements.length) setStatements(allStmts);
          if (parsedTxs && parsedTxs.length) { setCustomTransactions(parsedTxs); runAiFallback(parsedTxs); }
          if (newStatements && newStatements.length) runReconciliation(allStmts, allTx, null);
          fetchBanks(userId).then((rows) => setBankRows(rows));
          setStage("processing");
        }}
      />
    );
  } else if (stage === "demoUpload") {
    {
      const bankCurs = [...new Set((bankRows || []).map((r) => r.currency || "GBP"))];
      const effDemoCurs = bankCurs.length ? bankCurs.slice(0, 2) : demoCurrencies;
      content = <DemoUploadScreen currencies={effDemoCurs} onUseDemo={startDemo} onSkipEmpty={() => setStage("processing")} onBack={() => setStage("upload")} />;
    }
  } else if (stage === "processing") {
    content = <ProcessingScreen transactions={customTransactions} onDone={() => setStage("confirmCategory")} />;
  } else if (stage === "confirmCategory") {
    content = <ConfirmCategoryScreen transactions={customTransactions} onConfirm={recategorizeDescription} onDone={() => setStage("openingBalance")} />;
  } else if (stage === "openingBalance") {
    content = <OpeningBalanceScreen banks={banks} statements={statements} userId={userId} pushToast={pushToast} onBack={() => setStage("upload")} onDone={() => { fetchBanks(userId).then((rows) => setBankRows(rows)); setStage("breakdown"); }} />;
  } else if (stage === "breakdown") {
    content = <MonthlyBreakdownScreen transactions={customTransactions} bankRows={bankRows} onBack={() => setStage("openingBalance")} onDone={() => { setSetupIntroOpen(true); setStage("dashboard"); }} />;
  } else if (stage === "extraQuestions") {
    content = (
      <ExtraQuestionsScreen
        userId={userId}
        pushToast={pushToast}
        onDone={(data) => { setExtraProfile(data); setShowExtraBanner(false); setStage("dashboard"); }}
        onSkip={() => { setShowExtraBanner(false); setStage("dashboard"); }}
      />
    );
  } else if (stage === "planSetup") {
    content = <TargetSettingScreen userId={userId} transactions={customTransactions} pushToast={pushToast} banks={banks} accountData={{ statements, bankRows }} isEdit onBack={() => setStage("dashboard")} onDone={(t, p) => { setTargets(t); setPlan(p || null); if (userId) fetchAllTargets(userId).then(setAllTargets).catch(() => {}); setStage("dashboard"); }} />;
  } else if (stage === "mapping") {
    content = <MappingScreen transactions={customTransactions} onRecategorize={recategorizeDescription} onBack={() => setStage("dashboard")} theme={theme} />;
  } else if (stage === "settings") {
    content = (
      <SettingsScreen
        setupPending={showSetupBanner}
        onResumeSetup={() => { setSetupResume(true); setSetupQuestionsOpen(true); setStage("dashboard"); }}
        extraPending={showExtraBanner}
        onCompleteExtra={() => setStage("extraQuestions")}
        name={name} banks={banks} targets={targets} userId={userId}
        pushToast={pushToast}
        onBack={() => setStage("dashboard")}
        onOpenLegal={(tab) => openLegal(tab, "settings")}
        onLogout={handleLogout}
        onSaveName={handleSaveName}
        onRemoveBank={handleRemoveBank}
        onSaveTargets={handleSaveTargets}
        theme={theme}
        onChangeTheme={handleChangeTheme}
        onSaveCurrency={handleSaveCurrency}
        onSaveFxRate={handleSaveFxRate}
        onEditTargetsPage={() => { setTargetsEditReq(true); setStage("dashboard"); }}
      />
    );
  } else if (stage === "admin") {
    content = <AdminScreen onBack={() => setStage("dashboard")} pushToast={pushToast} />;
  } else {
    content = (
      <DashboardScreen
        name={name}
        signupMonth={signupMonth}
        targets={targets}
        banks={banks}
        hasData={hasData}
        onOpenSettings={() => setStage("settings")}
        onOpenMapping={() => setStage("mapping")}
        plan={plan}
        onEditPlan={() => setStage("planSetup")}
        onRecategorize={recategorizeDescription}
        showExtraBanner={showExtraBanner}
        onCompleteExtra={() => setStage("extraQuestions")}
        onDismissExtra={() => setShowExtraBanner(false)}
        onLogout={handleLogout}
        transactions={customTransactions}
        onAddTransactions={handleAddTransactions}
        usingDemo={usingDemo}
        pushToast={pushToast}
        overviewSlots={overviewSlots}
        homeLayout={homeLayout}
        onChangeHomeLayout={handleChangeHomeLayout}
        setupPending={showSetupBanner}
        onResumeSetup={() => { setSetupResume(true); setSetupQuestionsOpen(true); setStage("dashboard"); }}
        persona={personaKey}
        setupIntroOpen={setupIntroOpen}
        setupQuestionsOpen={setupQuestionsOpen}
        setupQuestionsProps={{
          userId: userId,
          pushToast: pushToast,
          onBack: () => { setSetupQuestionsOpen(false); if (!setupResume) setSetupIntroOpen(true); },
          onDone: (ans) => { setSetupAnswers(ans); setShowSetupBanner(false); setSetupQuestionsOpen(false); setStage("targets"); },
        }}
        onSetupStart={() => { setSetupIntroOpen(false); setSetupQuestionsOpen(true); }}
        onSetupSkip={() => {
          setSetupIntroOpen(false);
          setSignupMonth(new Date().toISOString().slice(0, 7));
          setShowSetupBanner(true); setShowExtraBanner(true);
          if (userId) supabaseClient.from("profiles").upsert({ id: userId, setup_completed: false }).then(() => {}, () => {});
          pushToast("No problem — you can finish this anytime from your Profile in Settings", "info");
          setRunTour(true);
        }}
        onChangeOverviewSlots={handleChangeOverviewSlots}
        navViews={navViews}
        onChangeNavViews={handleChangeNavViews}
        allTargets={allTargets}
        billExcludes={billExcludes}
        onToggleBillExclude={handleToggleBillExclude}
        overlayScreen={overlayScreen}
        catConfig={catConfig}
        onSaveCatConfig={handleSaveCatConfig}
        onRescanCategories={rescanCategories}
        goals={goals}
        goalsApi={goalsApi}
        accountData={{ statements, bankRows }}
        isDev={isDev}
        isAdmin={isAdmin}
        onOpenAdmin={() => setStage("admin")}
        onResetDev={handleResetDev}
        runTour={runTour}
        onFinishTour={() => setRunTour(false)}
        theme={theme}
        rollovers={rollovers}
        onOpenReview={openReviewManual}
        onSaveAllTargets={handleSaveAllTargets}
        openTargetsEdit={targetsEditReq}
        onConsumeTargetsEdit={() => setTargetsEditReq(false)}
      />
    );
  }

  return (
    <>
      {isAdmin && inApp && <AdminBar onOpen={() => setStage("admin")} />}
      {isDev && inApp && <TestingBar personaKey={personaKey} onSetPersona={handleSetPersona} />}
      {(isDev || DEV_FLAG) && inApp && (
        <div style={{ position: "fixed", bottom: 68, left: 12, zIndex: 9999, background: "#1a1f2b", color: "#e8edf4", padding: "6px 10px", borderRadius: 8, fontSize: 12, display: "flex", gap: 8, alignItems: "center", boxShadow: "0 4px 16px rgba(0,0,0,.3)" }}>
          <span style={{ opacity: 0.7 }}>DEV date:</span>
          <input type="date" value={devNow || ""} onChange={(e) => setDevDate(e.target.value)} style={{ fontSize: 12, padding: "2px 4px", borderRadius: 4, border: "1px solid #3a4356", background: "#0f1420", color: "#e8edf4" }} />
          {devNow && <button onClick={() => setDevDate("")} style={{ fontSize: 11, cursor: "pointer", background: "none", border: "none", color: "#8fa3bd", textDecoration: "underline" }}>reset</button>}
          <button onClick={() => setMobilePreview((v) => !v)} style={{ fontSize: 11, cursor: "pointer", background: mobilePreview ? "#2E5BFF" : "#0f1420", border: "1px solid #3a4356", color: "#e8edf4", borderRadius: 4, padding: "3px 8px" }}>{mobilePreview ? "Exit mobile" : "📱 Mobile"}</button>
        </div>
      )}
      {mobilePreview && inApp && (
        <div style={{ position: "fixed", inset: 0, zIndex: 10000, background: "rgba(15,18,24,0.72)", display: "flex", alignItems: "center", justifyContent: "center" }} onClick={() => setMobilePreview(false)}>
          <div onClick={(e) => e.stopPropagation()} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 10 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <span style={{ color: "#e8edf4", fontSize: 13, fontWeight: 600 }}>Mobile preview {"·"} 390px</span>
              <button onClick={() => setMobilePreview(false)} style={{ fontSize: 12, cursor: "pointer", background: "#2E5BFF", color: "#fff", border: "none", borderRadius: 6, padding: "5px 12px" }}>Close</button>
            </div>
            <iframe src={typeof window !== "undefined" ? window.location.href : ""} title="Mobile preview" style={{ width: 390, height: "84vh", border: "10px solid #1a1f2b", borderRadius: 28, background: "#fff", boxShadow: "0 20px 60px rgba(0,0,0,.5)" }} />
          </div>
        </div>
      )}
      {isDev && stage !== "dashboard" && (
        <button onClick={doSkipToDashboard} title="Load the dummy statement data + Dec £15,000 goal and jump straight to the dashboard" style={{ position: "fixed", bottom: 12, right: 12, zIndex: 9999, background: "#2E5BFF", color: "#fff", padding: "11px 18px", borderRadius: 10, fontSize: 13, fontWeight: 700, border: "none", cursor: "pointer", boxShadow: "0 6px 20px rgba(46,91,255,.4)" }}>⚡ Skip to dashboard</button>
      )}
      {stage === "dashboard" && <NotificationBanner notes={notifications} onDismiss={dismissNote} />}
      {content}
      {reviewMonth && (
        <MonthEndReviewModal
          month={reviewMonth}
          transactions={customTransactions}
          budgets={reviewBudgets}
          goal={goals && goals.length ? goals[0] : null}
          onAction={handleReviewAction}
          onClose={closeReview}
          isManual={reviewManual}
          plan={plan}
          allTargets={allTargets}
        />
      )}
      {showSplash && <LoginSplash />}
      <ToastContainer toasts={toasts} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

  .btn-primary:hover { filter: brightness(1.08); }
  .btn-ghost { color: var(--ink); background: var(--surface-2); }
  .btn-ghost:hover { background: var(--surface-3); }
  .btn-large { padding: 16px 32px; font-size: 16px; border-radius: 16px; }

  .lp-hero { text-align: center; padding: 90px 24px 60px; position: relative; z-index: 1; }
  .hero-eyebrow { display: inline-block; font-size: 12px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--accent); background: var(--accent-soft); border: 1px solid var(--accent-soft); padding: 6px 14px; border-radius: 999px; margin-bottom: 20px; }
  .lp-hero h1 { font-size: 56px; font-weight: 700; letter-spacing: -0.02em; margin: 0 0 16px; line-height: 1.15; color: var(--ink); }
  .lp-hero p { font-size: 18px; color: var(--ink-2); max-width: 520px; margin: 0 auto 32px; line-height: 1.5; }
  .hero-actions { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }

  .lp-section { padding: 60px 24px; position: relative; z-index: 1; }
  .section-head { text-align: center; max-width: 560px; margin: 0 auto 36px; }
  .section-head h2 { font-size: 26px; font-weight: 700; letter-spacing: -0.01em; margin: 0 0 8px; color: var(--ink); }
  .section-head p { color: var(--ink-2); font-size: 14px; margin: 0; }

  .reveal { opacity: 0; transform: translateY(24px); transition: opacity 0.7s ease, transform 0.7s ease; will-change: opacity, transform; }
  .reveal.in-view { opacity: 1; transform: translateY(0); will-change: auto; }

  /* --- immersive how-it-works --- */
  .lp-step { display: grid; grid-template-columns: 1fr 1.2fr; gap: 40px; align-items: center; margin: 56px 0; }
  .lp-step-flip { direction: rtl; }
  .lp-step-flip > * { direction: ltr; }
  .lp-step-copy h3 { color: var(--ink); font-size: 26px; margin: 14px 0 10px; letter-spacing: -0.01em; }
  .lp-step-copy p { color: var(--ink-2); font-size: 16px; line-height: 1.6; margin: 0; }
  .lp-demo-card { background: var(--surface-2); border: 1px solid var(--line); border-radius: 16px; padding: 26px; min-height: 250px; position: relative; overflow: hidden; }

  /* step 1: file drop */
  .lpd-upload { display: flex; align-items: center; justify-content: center; }
  .lpd-zone { width: 100%; border: 2px dashed var(--line); border-radius: 16px; padding: 38px 20px; text-align: center; transition: border-color .3s; }
  .lpd-zone-inner { position: relative; }
  .lpd-zone-hint { color: var(--ink-2); font-size: 14px; display: block; }
  .lpd-file { position: absolute; top: 18px; left: 24px; z-index: 2; background: var(--card); box-shadow: var(--shadow-pop); border: 1px solid var(--line); border-radius: 12px; padding: 10px 14px; display: flex; align-items: center; gap: 8px; opacity: 0; }
  .lpd-file-icon { font-size: 18px; }
  .lpd-file-name { color: var(--ink); font-size: 12px; font-weight: 600; }
  .lpd-progress { height: 6px; border-radius: 3px; background: var(--surface-3); margin: 16px auto 0; max-width: 260px; overflow: hidden; opacity: 0; }
  .lpd-progress-fill { height: 100%; width: 0; border-radius: 3px; background: var(--grad-2, var(--accent)); }
  .lpd-done { color: var(--pos); font-size: 14px; font-weight: 600; margin-top: 12px; opacity: 0; }
  .in-view .lpd-file { animation: lpdFly 1.5s ease-in-out 0.4s forwards; }
  .in-view .lpd-zone { animation: lpdZonePulse 0.5s ease 1.7s; }
  .in-view .lpd-progress { animation: lpdShow 0.3s ease 1.9s forwards; }
  .in-view .lpd-progress-fill { animation: lpdFill 1s ease 2.1s forwards; }
  .in-view .lpd-done { animation: lpdPop 0.4s ease 3.2s forwards; }
  @keyframes lpdFly { 0% { opacity: 0; transform: translate(-30px,-30px) rotate(-6deg); } 15% { opacity: 1; } 70% { opacity: 1; transform: translate(140px, 70px) rotate(3deg) scale(1); } 100% { opacity: 0; transform: translate(150px, 90px) scale(0.55); } }
  @keyframes lpdZonePulse { 0% { border-color: var(--line); } 40% { border-color: var(--pos); box-shadow: 0 0 0 4px rgba(18,161,80,0.15); } 100% { border-color: var(--line); } }
  @keyframes lpdShow { to { opacity: 1; } }
  @keyframes lpdFill { to { width: 100%; } }
  @keyframes lpdPop { 0% { opacity: 0; transform: translateY(8px) scale(0.9); } 100% { opacity: 1; transform: translateY(0) scale(1); } }

  /* step 2: categorise */
  .lpd-cat { display: flex; flex-direction: column; gap: 12px; }
  .lpd-tx { display: flex; justify-content: space-between; align-items: center; gap: 12px; opacity: 0; transform: translateY(10px); }
  .in-view .lpd-tx { animation: lpdRow 0.45s ease forwards; }
  .lpd-tx-left { display: flex; flex-direction: column; gap: 2px; }
  .lpd-tx-name { color: var(--ink); font-size: 13px; font-weight: 600; letter-spacing: 0.01em; }
  .lpd-tx-amt { color: var(--ink-3); font-size: 12px; }
  .lpd-chip { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; padding: 5px 11px; border-radius: 999px; opacity: 0; transform: scale(0.6); }
  .in-view .lpd-chip { animation: lpdChip 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards; }
  .lpd-ai-note { color: var(--ink-2); font-size: 13px; margin-top: 6px; opacity: 0; }
  .in-view .lpd-ai-note { animation: lpdShow 0.5s ease forwards; }
  @keyframes lpdRow { to { opacity: 1; transform: translateY(0); } }
  @keyframes lpdChip { to { opacity: 1; transform: scale(1); } }

  /* step 3: views */
  .lpd-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
  .lpd-tab { font-family: inherit; font-size: 13px; font-weight: 600; color: var(--ink-2); background: var(--surface-2); border: 1px solid var(--line); border-radius: 999px; padding: 8px 15px; cursor: pointer; transition: all .15s; }
  .lpd-tab:hover { background: var(--surface-3); color: var(--ink); }
  .lpd-tab-active { background: var(--grad-2, var(--accent)); color: var(--on-accent); border-color: transparent; }
  .lpd-pane { display: flex; flex-direction: column; gap: 13px; min-height: 170px; }
  .lpd-bar-row { display: grid; grid-template-columns: 120px 1fr 56px; gap: 12px; align-items: center; }
  .lpd-bar-label { color: var(--ink); font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .lpd-bar-track { height: 8px; border-radius: 4px; background: var(--surface-2); overflow: hidden; }
  .lpd-bar-fill { height: 100%; border-radius: 4px; }
  .lpd-bar-amt { color: var(--ink); font-size: 13px; text-align: right; font-variant-numeric: tabular-nums; }
  .lpd-review-row { display: grid; grid-template-columns: 1.4fr 0.8fr 0.8fr 1.1fr; gap: 10px; align-items: center; font-size: 13px; color: var(--ink); padding: 4px 0; }
  .lpd-review-row > span:nth-child(2), .lpd-review-row > span:nth-child(3) { text-align: right; font-variant-numeric: tabular-nums; }
  .lpd-review-head { color: var(--ink-3); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; font-weight: 700; }
  .lpd-under { color: var(--pos); font-weight: 600; text-align: right; }
  .lpd-trend { flex-direction: row; align-items: flex-end; gap: 14px; padding: 10px 6px 0; }
  .lpd-trend-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; height: 160px; justify-content: flex-end; }
  .lpd-trend-bar { width: 100%; max-width: 42px; border-radius: 6px 6px 3px 3px; background: var(--grad-2, var(--accent)); transition: height .4s ease; }
  .lpd-trend-label { color: var(--ink-3); font-size: 11px; }
  .lpd-goal { display: flex; flex-direction: column; gap: 8px; background: var(--surface-2); border-radius: 14px; padding: 14px; }
  .lpd-goal-top { display: flex; justify-content: space-between; color: var(--ink); font-size: 13px; font-weight: 600; }
  .lpd-goal-note { color: var(--ink-2); font-size: 12px; }
  .lpd-views-hint { color: var(--ink-3); font-size: 12px; margin-top: 16px; text-align: center; }
  .lpd-cur-num { font-size: 20px; letter-spacing: -1px; }
  .lpd-cur-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .lpd-cur-label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-3); font-weight: 600; }
  .lpd-cur-toggle { display: flex; background: var(--surface-2); border: 1px solid var(--line); border-radius: 999px; padding: 3px; }
  .lpd-cur-opt { font-family: inherit; font-size: 13px; font-weight: 700; color: var(--ink-2); background: none; border: none; border-radius: 999px; padding: 6px 16px; cursor: pointer; transition: all .15s; }
  .lpd-cur-opt-on { background: var(--grad-2, var(--accent)); color: var(--on-accent); }
  .lpd-cur-accounts { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .lpd-cur-acc { font-size: 12px; font-weight: 600; color: var(--ink-2); background: var(--surface-2); border: 1px solid var(--line); border-radius: 8px; padding: 5px 10px; }
  .lpd-cur-tx { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--line); }
  .lpd-cur-tx-name { font-size: 13px; color: var(--ink); }
  .lpd-cur-tx-amt { display: flex; flex-direction: column; align-items: flex-end; line-height: 1.3; }
  .lpd-cur-tx-amt > span:first-child { font-size: 14px; font-weight: 700; color: var(--ink); font-variant-numeric: tabular-nums; }
  .lpd-cur-conv { font-size: 11px; color: var(--ink-3); font-weight: 500; }
  .lpd-cur-pos { color: var(--pos) !important; }
  .lpd-cur-total { display: flex; align-items: center; justify-content: space-between; margin-top: 14px; padding: 13px 14px; background: var(--accent-soft); border: 1px solid var(--accent); border-radius: 12px; }
  .lpd-cur-total span { font-size: 13px; color: var(--ink-2); }
  .lpd-cur-total b { font-size: 18px; color: var(--ink); font-variant-numeric: tabular-nums; }
  @media (max-width: 760px) {
    .lp-step { grid-template-columns: 1fr; gap: 20px; margin: 40px 0; }
    .lp-step-flip { direction: ltr; }
    .lpd-bar-row { grid-template-columns: 100px 1fr 50px; }
  }

  .steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
  .step-card { background: var(--surface-2); border: 1px solid var(--line); border-radius: 16px; padding: 24px; }
  .step-num { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: var(--accent); font-weight: 700; font-size: 13px; margin-bottom: 12px; color: var(--on-accent); }
  .step-card h3 { font-size: 14px; margin: 0 0 6px; color: var(--ink); }
  .step-card p { font-size: 13px; color: var(--ink-2); margin: 0; line-height: 1.5; }

  .features { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .feature-card { background: var(--surface-2); border: 1px solid var(--line); border-radius: 16px; padding: 20px; }
  .feature-icon { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; background: var(--accent-soft); color: var(--accent); font-size: 16px; margin-bottom: 10px; }
  .feature-card h4 { font-size: 14px; margin: 0 0 5px; color: var(--ink); }
  .feature-card p { font-size: 12px; color: var(--ink-3); margin: 0; line-height: 1.5; }

  .pricing { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; max-width: 620px; margin: 0 auto; align-items: stretch; }
  .price-card { background: var(--surface-2); border: 1px solid var(--line); border-radius: 16px; padding: 28px; text-align: center; display: flex; flex-direction: column; }
  .price-card.highlight { border-color: var(--accent); background: linear-gradient(160deg, var(--accent-soft), var(--accent-soft)); box-shadow: 0 8px 30px var(--accent-shadow); }
  .price-tag { font-size: 12px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
  .price-amount { font-size: 32px; font-weight: 700; margin-bottom: 4px; color: var(--ink); }
  .price-period { font-size: 13px; color: var(--ink-3); margin-bottom: 18px; }
  .price-features { list-style: none; padding: 0; margin: 0 0 22px; text-align: left; } .price-card .btn { margin-top: auto; }
  .price-features li { font-size: 13px; color: var(--ink-2); padding: 6px 0; padding-left: 22px; position: relative; }
  .price-features li::before { content: "✓"; position: absolute; left: 0; color: var(--pos); font-weight: 700; }

  .lp-final-cta { text-align: center; padding: 70px 24px 90px; position: relative; z-index: 1; }
  .lp-final-cta h2 { font-size: 28px; margin: 0 0 12px; letter-spacing: -0.01em; color: var(--ink); }
  .lp-final-cta p { color: var(--ink-2); margin: 0 0 24px; }

  .lp-footer { position: relative; z-index: 1; text-align: center; padding: 22px; color: var(--ink-3); font-size: 12px; border-top: 1px solid var(--line); }

  @media (max-width: 720px) {
    .lp-hero h1 { font-size: 36px; }
    .steps, .features { grid-template-columns: 1fr; }
    .pricing { grid-template-columns: 1fr; }
    /* perf: drop per-frame blur compositing that janks scroll on mobile */
    .lp-nav { background: var(--card); will-change: auto; }
    .lp-demo-card { background: var(--card); }
    .feature-card { background: var(--card); }
    .price-card { background: var(--card); }
    .landing-page .blob3 { display: none; }
    .landing-page .blob { filter: blur(38px); opacity: 0.4; }
  }

  /* stage transitions */
  .stage-fade { animation: stageFadeIn 0.35s ease; }
  @keyframes stageFadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* button loading spinner */
  .rollover-banner { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 10px 18px; font-size: 14px; color: #dfe8ff; background: linear-gradient(90deg, var(--accent-soft), var(--accent-soft)); border-bottom: 1px solid var(--accent); }
  .rollover-banner strong { color: var(--ink); }
  .modal-backdrop { position: fixed; inset: 0; background: rgba(6,10,18,0.72); display: flex; align-items: center; justify-content: center; padding: 18px; z-index: 200; animation: mbFade .2s ease; }
  @keyframes mbFade { from { opacity: 0; } to { opacity: 1; } }
  .review-modal { position: relative; width: 100%; max-width: 440px; max-height: 92vh; overflow-y: auto; padding: 24px 22px; animation: mbPop .25s cubic-bezier(0.34,1.4,0.64,1); }

  /* ---- plan wizard ---- */
  .pw-methods { display: flex; flex-direction: column; gap: 10px; margin: 14px 0 4px; }
  .pw-method { text-align: left; background: var(--surface-2); border: 1px solid var(--line); border-radius: 14px; padding: 14px 16px; cursor: pointer; color: var(--ink); font-family: inherit; display: flex; flex-direction: column; gap: 4px; transition: border-color .15s, background .15s; }
  .pw-method:hover { border-color: var(--accent-solid); background: var(--surface-2); }

  .pw-method-sub { font-size: 13px; color: var(--ink-2); line-height: 1.45; }
  .pw-goal-line { font-size: 13px; color: var(--ink-2); line-height: 1.55; background: var(--surface-2); border: 1px solid var(--line); border-radius: 12px; padding: 10px 14px; margin: 4px 0 0; }
  .pw-goal-line b { color: var(--ink); }
  .pw-summary { font-size: 13px; color: var(--ink-2); line-height: 1.55; background: var(--accent-soft); border: 1px solid var(--accent); border-radius: 12px; padding: 10px 14px; margin: 10px 0 0; }
  .pw-summary b { color: var(--ink); }
  .bt-income-row .bt-input, .bt-income-row .bt-cur { color: var(--pos); }
  .bt-net-pos { color: var(--pos) !important; }
  .bt-net-neg { color: #ff6b6b !important; }

  /* ---- month-end review plan options ---- */
  .plan-opt { text-align: left; width: 100%; background: var(--surface-2); border: 1px solid var(--line); border-radius: 14px; padding: 13px 15px; cursor: pointer; color: var(--ink); font-family: inherit; display: flex; flex-direction: column; gap: 4px; margin-top: 10px; transition: border-color .15s, background .15s; }

  .bd-hero-ring .budget-ring-pct { font-size: 22px; }
  .bd-hero-ring .budget-ring-sub { font-size: 10px; }

  .ltp-proj-chart { height: 150px; margin-top: 30px; }

  /* ================= mobile usability fixes (2026-07-09_) ================= */

  /* Fix: wide tables were forcing the whole page/card wide instead of scrolling
     within the table. Stop flex children from expanding to content width. */
  .body-row { min-width: 0; }
  .main-content, .main-content-wide { min-width: 0; }
  .main-content > *, .main-content-wide > * { min-width: 0; max-width: 100%; }
  .glass-card, .dash-card { min-width: 0; }
  .table-wrap, .ltp-wrap, .budget-table-wrap { min-width: 0; max-width: 100%; -webkit-overflow-scrolling: touch; }

  /* Freeze the first (label) column so it stays visible while scrolling right */
  .month-table th:first-child, .month-table td:first-child {
    position: sticky; left: 0; z-index: 2; background: var(--card);
  }
  .budget-table th:first-child, .budget-table td:first-child {
    position: sticky; left: 0; z-index: 2;
  }
  .budget-table thead th:first-child, .budget-table .bt-total-row td:first-child { background: var(--surface-2); }
  .budget-table tbody td:first-child { background: var(--card); }
  .budget-table tbody tr:hover td:first-child { background: var(--surface-2); }

  /* LTP banners: allow long lines to wrap instead of running off-screen */
  .plan-verdict, .plan-sub, .plan-headline { overflow-wrap: anywhere; word-break: break-word; }

  /* Sidebar close (x) — only shows on mobile where the hamburger sits behind the drawer */
  .side-panel-label-actions { display: flex; align-items: center; gap: 4px; }
  .side-close-btn { display: none; background: none; border: none; color: var(--ink-2); font-size: 22px; line-height: 1; cursor: pointer; padding: 0 6px; border-radius: 6px; }
  .side-close-btn:hover { color: var(--ink); background: var(--surface-2); }

  /* Modals: never let the top get clipped; scroll inside the card if it's tall */
  .modal-overlay { overflow-y: auto; }
  .modal-card { max-height: calc(100dvh - 40px); overflow-y: auto; }
