function TransactionFeed({ limit, transactions, onRecategorize }) {
  const source = transactions || [];
  const [query, setQuery] = useState("");
  const [cat, setCat] = useState("all");
  const [month, setMonth] = useState("all");
  const [type, setType] = useState("all");
  const [minAmt, setMinAmt] = useState("");
  const [sort, setSort] = useState("new");
  const monthsWithData = React.useMemo(() => {
    const set = new Set(source.filter((t) => t.date).map((t) => t.date.slice(0, 7)));
    return [...set].sort().reverse();
  }, [source]);
  const catsPresent = React.useMemo(() => {
    const set = new Set(source.map((t) => t.category).filter(Boolean));
    return [...set].sort();
  }, [source]);

  if (limit) {
    const list = source.slice(0, limit);
    return (
      <div className="glass-card dash-card">
        <span className="card-label">Recent transactions</span>
        <div className="tx-list">
          {list.map((t, i) => (
            <div className="tx-row" key={i}>
              <span className="tx-cat-ico" style={{ color: catColor(t.category) }}><Icon name={CATEGORY_ICONS[t.category] || "tag"} size={14} /></span><div className="tx-info"><span className="tx-name">{t.name}</span><span className="tx-category">{displayCat(t.category)} {"\u00B7"} {formatTxDate(t.date)}</span></div>
              <span className={"tx-amount " + (t.amount > 0 ? "tx-positive" : "")}>{t.currency && t.currency !== FX.home ? (<span className="tx-amt-stack"><span>{formatMoneyNative(t.amountNative, t.currency)}</span><span className="tx-amt-conv">&asymp; {formatMoney(t.amount)}</span></span>) : formatMoney(t.amount)}</span>
            </div>
          ))}
        </div>
      </div>
    );
  }

  const q = query.trim().toLowerCase();
  const minVal = Number(minAmt) > 0 ? Number(minAmt) : 0;
  let filtered = source.filter((t) => {
    if (cat !== "all" && t.category !== cat) return false;
    if (month !== "all" && (t.date || "").slice(0, 7) !== month) return false;
    if (type === "out" && !(t.amount < 0)) return false;
    if (type === "in" && !(t.amount > 0)) return false;
    if (minVal > 0 && Math.abs(t.amount) < minVal) return false;
    if (q) {
      const hay = (t.name + " " + (t.category || "") + " " + (t.date ? monthLabelFromKey(t.date.slice(0, 7)) : "")).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
  filtered = filtered.slice().sort((a, b) => sort === "amt" ? Math.abs(b.amount) - Math.abs(a.amount) : (b.date || "").localeCompare(a.date || ""));

  const spentTotal = filtered.filter((t) => t.amount < 0).reduce((s, t) => s + Math.abs(t.amount), 0);
  const hasFilter = q || cat !== "all" || month !== "all" || type !== "all" || minVal > 0;

  return (
    <div className="glass-card dash-card">
      <div className="bd-box-head">
        <span className="card-label">Transactions</span>
        <span className="tx-count">{filtered.length} {filtered.length === 1 ? "result" : "results"}{filtered.length ? " \u00B7 " + formatMoney(spentTotal) + " out" : ""}</span>
      </div>
      <p className="tx-instructions">Search or filter to find any transaction. Hit <b>Edit</b> under a category to recategorise it — the change applies to that merchant everywhere.</p>
      <div className="tx-filters">
        <input className="tx-input tx-search" type="text" placeholder="Search merchant, category, month…" value={query} onChange={(e) => setQuery(e.target.value)} />
        <select className="bd-month-select" value={cat} onChange={(e) => setCat(e.target.value)}>
          <option value="all">All categories</option>
          {catsPresent.map((c) => (<option key={c} value={c}>{displayCat(c)}</option>))}
        </select>
        <select className="bd-month-select" value={month} onChange={(e) => setMonth(e.target.value)}>
          <option value="all">All months</option>
          {monthsWithData.map((k) => (<option key={k} value={k}>{monthLabelFromKey(k)} {k.slice(0, 4)}</option>))}
        </select>
        <select className="bd-month-select" value={type} onChange={(e) => setType(e.target.value)}>
          <option value="all">Money in &amp; out</option>
          <option value="out">Money out</option>
          <option value="in">Money in</option>
        </select>
        <input className="tx-input tx-min" type="number" inputMode="numeric" placeholder={"Min " + homeSym()} value={minAmt} onChange={(e) => setMinAmt(e.target.value)} />
        <select className="bd-month-select" value={sort} onChange={(e) => setSort(e.target.value)}>
          <option value="new">Newest first</option>
          <option value="amt">Highest amount</option>
        </select>
        {hasFilter && <button className="tx-clear" onClick={() => { setQuery(""); setCat("all"); setMonth("all"); setType("all"); setMinAmt(""); }}>Clear</button>}
      </div>
      <div className="tx-list">
        {filtered.length === 0 ? (
          <div className="tx-empty">No transactions match your filters.</div>
        ) : filtered.map((t, i) => (

          </div>

function bdArc(cx, cy, r, a0, a1) {
  const x0 = cx + r * Math.cos(a0), y0 = cy + r * Math.sin(a0);
  const x1 = cx + r * Math.cos(a1), y1 = cy + r * Math.sin(a1);
  const large = (a1 - a0) > Math.PI ? 1 : 0;
  return "M " + cx + " " + cy + " L " + x0 + " " + y0 + " A " + r + " " + r + " 0 " + large + " 1 " + x1 + " " + y1 + " Z";
}
function PieChart({ slices, total }) {
  const [hover, setHover] = useState(null);
  const [pos, setPos] = useState({ x: 0, y: 0 });
  const wrapRef = React.useRef(null);
  const cx = 100, cy = 100, r = 92;
  let ang = -Math.PI / 2;
  const paths = slices.map((s, i) => {
    const frac = total > 0 ? s.value / total : 0;
    const start = ang, end = ang + frac * Math.PI * 2;
    ang = end;
    return { name: s.name, color: s.color, i, start, end, frac, full: frac >= 0.9999 };
  });
  function onMove(e) {
    if (!wrapRef.current) return;
    const rect = wrapRef.current.getBoundingClientRect();
    setPos({ x: e.clientX - rect.left, y: e.clientY - rect.top });
  }
  return (
    <div className="bd-pie-wrap" ref={wrapRef} onMouseMove={onMove} onMouseLeave={() => setHover(null)}>
      <svg viewBox="0 0 200 200" className="bd-pie-svg">
        {paths.map((p) => (
          p.full
            ? <circle key={p.i} cx={cx} cy={cy} r={r} fill={p.color} style={{ opacity: hover === null || hover === p.i ? 1 : 0.4, transition: "opacity .12s" }} onMouseEnter={() => setHover(p.i)} />
            : <path key={p.i} d={bdArc(cx, cy, r, p.start, p.end)} fill={p.color} style={{ opacity: hover === null || hover === p.i ? 1 : 0.4, transition: "opacity .12s", cursor: "default" }} onMouseEnter={() => setHover(p.i)} />
        ))}
      </svg>
      {hover !== null && (
        <div className="bd-pie-tip" style={{ left: pos.x, top: pos.y }}>
          <span className="cat-dot" style={{ background: paths[hover].color }} />{paths[hover].name} {Math.round(paths[hover].frac * 100)}%
        </div>
      )}
    </div>
  );
}

  const avgByCat = {};
  avgKeys.forEach((k) => { const o = spendByCategoryForMonth(txs, k); Object.keys(o).forEach((c) => { avgByCat[c] = (avgByCat[c] || 0) + o[c]; }); });
  Object.keys(avgByCat).forEach((c) => { avgByCat[c] = avgByCat[c] / avgKeys.length; });

  const monthUncat0 = txs.filter((t) => t.amount < 0 && t.category === "Uncategorized" && t.date.slice(0, 7) === activeKey).length;

  const prevTotal = Object.values(byCatPrev).reduce((s, v) => s + v, 0);

              </div>
            )}
            {!isCurrentMonth && totalDiff === 0 && prevTotal > 0 && <div className="bd-total-delta delta-flat">About the same as {monthLabelFromKey(prevKey)}</div>}
          </div>

          <div className="category-list bd-list">
            {cats.map((name) => {
              const amount = byCat[name] || 0;

              const budget = targets && Number(targets[name]) > 0 ? Number(targets[name]) : 0;
              const isOpen = openCat === name;

              if (compareTargets) {

                        <div className="bd-tx-row" key={t.id || i}>

              ))}
            </div>
          </div>
        </div>

        {showTrend && (
          <div className="glass-card dash-card bd-box bd-box-trend">
            <span className="bd-box-title">Trend analysis</span>
            <div className="bd-movers">
              {movers.map((m) => {

function BillsCard({ transactions, confirmed, onToggleConfirm, editable }) {
  const [dismissed, setDismissed] = useState([]);
  const [pickerOpen, setPickerOpen] = useState(false);
  const [search, setSearch] = useState("");
  const conf = confirmed || [];
  const detected = detectRecurringBills(transactions || []);
  const detectedNames = new Set(detected.map((b) => b.name));
  const confirmedBills = detected.filter((b) => conf.includes(b.name));
  const manualBills = conf.filter((n) => !detectedNames.has(n)).map((n) => {
    const rows = (transactions || []).filter((t) => t.amount < 0 && t.name === n);
    const avg = rows.length ? rows.reduce((s, t) => s + Math.abs(t.amount), 0) / rows.length : 0;
    return { name: n, amount: Math.round(avg * 100) / 100, frequency: "Monthly", due: "" };
  });
  const myBills = [...confirmedBills, ...manualBills].sort((a, b) => b.amount - a.amount);
  const total = myBills.reduce((s, b) => s + b.amount, 0);
  const _billNorm = (n) => String(n || "").toLowerCase().replace(/\d+/g, "").replace(/\s+/g, " ").trim();
  const _paidThisMonth = new Set((transactions || []).filter((t) => t.amount < 0 && t.date && t.date.slice(0, 7) === currentMonthKey()).map((t) => _billNorm(t.name)));
  const billStatus = (b) => { const dueDay = parseInt(b.due, 10) || 0; const paid = dueDay > 0 && _paidThisMonth.has(_billNorm(b.name)); return { overdue: dueDay > 0 && !paid && dueDay < today().getDate() }; };

  if (!editable) {
    if (!myBills.length) return <EmptyState text="No bills yet — head to Bills & Subscriptions to pick which recurring payments are bills." />;
    return (
      <div className="glass-card dash-card">
        <div className="summary-head"><span className="card-label">Bills & subscriptions</span></div>
        <div className="tx-list">
          {myBills.map((b) => (
            <div className="tx-row" key={b.name}>
              <div className="tx-info"><span className="tx-name">{b.name}</span><span className="tx-category">{b.frequency}{b.due ? " \u00B7 due " + b.due : ""}{billStatus(b).overdue ? <span className="blc-od-lb"> · overdue</span> : ""}</span></div>
              <span className={"tx-amount" + (billStatus(b).overdue ? " blc-amt-od" : "")}>{formatMoney(-b.amount)}</span>
            </div>
          ))}
        </div>
        <p className="summary-note">Total recurring: {formatMoney(total)} / month</p>
      </div>
    );
  }

  const suspected = detected.filter((b) => !conf.includes(b.name) && !dismissed.includes(b.name));
  const merchantMap = {};
  (transactions || []).filter((t) => t.amount < 0 && t.name).forEach((t) => {
    merchantMap[t.name] = (merchantMap[t.name] || 0) + Math.abs(t.amount);
  });
  const allMerchants = Object.keys(merchantMap)
    .filter((n) => !conf.includes(n))
    .filter((n) => n.toLowerCase().includes(search.trim().toLowerCase()))
    .sort((a, b) => a.localeCompare(b));

  return (
    <div className="glass-card dash-card">
      <div className="summary-head"><span className="card-label">Bills & subscriptions</span></div>
      <p className="subtitle" style={{ margin: "0 0 12px" }}>Nothing's counted as a bill until you say so. We've spotted a few regular payments below {"—"} tell us which are really bills, and add any we missed.</p>

      {suspected.length > 0 && (
        <div style={{ marginBottom: 4 }}>
          <span className="card-label" style={{ display: "block", margin: "0 0 6px" }}>Is this a bill?</span>
          {suspected.map((b) => (
            <div className="tx-row" key={b.name}>
              <div className="tx-info"><span className="tx-name">{b.name}</span><span className="tx-category">{b.frequency} {"\u00B7"} ~{formatMoney(b.amount)}{b.due ? " \u00B7 due " + b.due : ""}</span></div>
              <div className="bill-right">
                <button className="glass-btn primary" style={{ padding: "5px 12px", fontSize: 13 }} onClick={() => onToggleConfirm(b.name)}>Yes</button>
                <button className="bill-remove" onClick={() => setDismissed((d) => [...d, b.name])}>No</button>
              </div>
            </div>
          ))}
        </div>
      )}

      <span className="card-label" style={{ display: "block", margin: "16px 0 6px" }}>Your bills</span>
      {myBills.length === 0 ? (
        <p className="subtitle" style={{ margin: "0 0 4px" }}>No bills added yet {"—"} confirm the ones above, or add your own below.</p>
      ) : (
        <>
          <div className="tx-list">
            {myBills.map((b) => (
              <div className="tx-row" key={b.name}>
                <div className="tx-info"><span className="tx-name">{b.name}</span><span className="tx-category">{b.frequency}{b.due ? " \u00B7 due " + b.due : ""}{billStatus(b).overdue ? <span className="blc-od-lb"> · overdue</span> : ""}</span></div>
                <div className="bill-right">
                  <span className={"tx-amount" + (billStatus(b).overdue ? " blc-amt-od" : "")}>{formatMoney(-b.amount)}</span>
                  <button className="bill-remove" onClick={() => onToggleConfirm(b.name)}>Remove</button>
                </div>
              </div>
            ))}
          </div>
          <p className="summary-note">Total recurring: {formatMoney(total)} / month</p>
        </>
      )}

      <div style={{ marginTop: 14 }}>
        <button className="glass-btn" onClick={() => setPickerOpen((v) => !v)}>{pickerOpen ? "Close" : "Add another bill"}</button>
        {pickerOpen && (
          <div style={{ marginTop: 10 }}>
            <input className="catman-input" style={{ width: "100%", marginBottom: 8 }} placeholder="Search all your payments\u2026" value={search} onChange={(e) => setSearch(e.target.value)} />
            <div className="tx-list" style={{ maxHeight: 280, overflowY: "auto" }}>
              {allMerchants.length === 0 ? (
                <p className="subtitle" style={{ margin: 0 }}>No payments match.</p>
              ) : allMerchants.slice(0, 60).map((n) => (
                <div className="tx-row" key={n}>
                  <div className="tx-info"><span className="tx-name">{n}</span><span className="tx-category">~{formatMoney(merchantMap[n])} total</span></div>
                  <button className="glass-btn" style={{ padding: "5px 12px", fontSize: 13 }} onClick={() => onToggleConfirm(n)}>Add</button>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function dataGapDays(transactions) {
  const dates = (transactions || []).filter((t) => t.date).map((t) => t.date).sort();
  const latest = dates.length ? dates[dates.length - 1] : null;
  if (!latest) return null;
  return Math.floor((today().getTime() - new Date(latest + "T00:00:00").getTime()) / 86400000);
}

function MonthEndReviewModal({ month, transactions, budgets, goal, onAction, onClose, isManual, plan, allTargets }) {
  const [step, setStep] = useState(0);
  const [busy, setBusy] = useState(false);
  const txs = transactions || [];
  const byCat = spendByCategoryForMonth(txs, month);
  const actualSpend = Math.round(spendForMonth(txs, month));
  const plannedSpend = Math.round(TX_CATEGORIES.reduce((s, c) => s + (Number(budgets[c]) || 0), 0));
  const net = plannedSpend - actualSpend; // + under (good), - over (tough)
  const over = net < 0;
  const label = monthLabelFromKey(month) + " " + month.slice(0, 4);
  const winCat = TX_CATEGORIES.map((c) => ({ c, diff: (Number(budgets[c]) || 0) - Math.round(byCat[c] || 0) })).sort((a, b) => b.diff - a.diff)[0];
  const extraCats = Object.keys(byCat).filter((c) => !TX_CATEGORIES.includes(c) && Math.round(byCat[c]) > 0).sort((a, b) => byCat[b] - byCat[a]);
  const max = Math.max(1, ...TX_CATEGORIES.map((c) => Math.max(Number(budgets[c]) || 0, Math.round(byCat[c] || 0))), ...extraCats.map((c) => Math.round(byCat[c] || 0)));

  let monthsLeft = 4;
  if (goal && goal.targetDate) {
    const now = new Date(); const td = new Date(goal.targetDate);
    const diff = (td.getFullYear() - now.getFullYear()) * 12 + (td.getMonth() - now.getMonth());
    if (diff > 0) monthsLeft = diff; else monthsLeft = 1;
  }
  const perMonth = over ? Math.round(Math.abs(net) / monthsLeft) : 0;
  const surplus = over ? 0 : net;

  /* ---- plan-aware reconciliation ---- */
  const planOn = !!(plan && plan.targetMonth);
  const actualIncome = Math.round(incomeForMonth(txs, month));
  const actualNet = actualIncome - actualSpend;
  const plannedIncomeM = planOn ? plannedIncomeFor(allTargets, month, txs) : 0;
  const plannedNetM = plannedIncomeM - plannedSpend;
  const planVar = actualNet - plannedNetM;
  const planBehind = planOn && planVar < 0;
  const planAhead = planOn && planVar > 0;
  const avgAll = React.useMemo(() => avgSpendByCategory(txs), [txs]);
  const firstFuture = addMonths(month, 1) > currentMonthKey() ? addMonths(month, 1) : currentMonthKey();
  const planFutureKeys = planOn ? monthKeysBetween(firstFuture, plan.targetMonth) : [];
  const planMonthsLeft = Math.max(1, planFutureKeys.length);
  const planPerMonth = Math.round(Math.abs(planVar) / planMonthsLeft);
  const planTrims = planBehind ? flexTrimBreakdown(allTargets, planFutureKeys[0] || firstFuture, planPerMonth, avgAll) : {};
  const planTrimTotal = Object.values(planTrims).reduce((s, v) => s + v, 0);
  const planAdds = (() => {
    if (!planAhead) return {};
    const base = {}; FLEX_CATEGORIES.forEach((c) => { base[c] = plannedCatFor(allTargets, planFutureKeys[0] || firstFuture, c, avgAll); });
    const total = FLEX_CATEGORIES.reduce((s, c) => s + base[c], 0);
    const out = {}; let used = 0;
    FLEX_CATEGORIES.forEach((c, i) => {
      const a = i === FLEX_CATEGORIES.length - 1 ? planPerMonth - used : Math.round(planPerMonth * (total > 0 ? base[c] / total : 1 / FLEX_CATEGORIES.length));
      out[c] = Math.max(0, a); used += out[c];
    });
    return out;
  })();
  const extendKey = planOn ? addMonths(plan.targetMonth, 1) : null;

  const act = async (action, payload) => {
    setBusy(true);
    await onAction(month, action, { net, ...payload });
    setBusy(false);
    setStep(3);
  };

  const pace = (() => {
    if (!goal) return null;
    const saved = Number(goal.saved) || 0, target = Number(goal.target) || 0;
    const savedPct = target ? Math.min(100, (saved / target) * 100) : 0;
    const projPct = target ? Math.max(0, Math.min(100, ((saved + net) / target) * 100)) : 0;
    return { saved, target, savedPct, projPct };
  })();

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="glass-card review-modal" onClick={(e) => e.stopPropagation()}>
        <button className="modal-x" onClick={onClose}><Icon name="x" size={16} /></button>
        <div className="review-steps">
          {[0, 1, 2, 3].map((i) => <div key={i} className={"review-step-dot " + (i <= step ? "rsd-on" : "")} />)}
        </div>

        {step === 0 && (
          <div className="review-step">
            <div className="card-label" style={{ color: "var(--accent)" }}>{label}</div>
            <h2 className="review-h2">{label.split(" ")[0]} is done. Let’s see how it went.</h2>
            <div className="review-bigstat">
              <span className="review-bignum"><CountUp value={actualSpend} format={formatMoney} /></span>
              <span className="review-biglabel">spent of {formatMoney(plannedSpend)} budgeted</span>
            </div>
            {winCat && winCat.diff > 0 && <div className="review-win"><Icon name="sparkles" size={13} /> Top category win — you came in {formatMoney(winCat.diff)} under on {winCat.c}</div>}
            <div className="review-minibars">
              {TX_CATEGORIES.map((c) => {
                const b = Number(budgets[c]) || 0, a = Math.round(byCat[c] || 0), o = a > b;
                return (
                  <div className="rmb-row" key={c}>
                    <span className="rmb-name">{c}</span>
                    <div className="rmb-track">
                      <div className="rmb-budget" style={{ width: (b / max) * 100 + "%" }} />
                      <div className="rmb-spent" style={{ width: (a / max) * 100 + "%", background: o ? "#ff6b6b" : "var(--accent)" }} />
                    </div>
                    <span className="rmb-val" style={{ color: o ? "#ff6b6b" : "var(--ink-2)" }}>{formatMoney(a)}</span>
                  </div>
                );
              })}
              {extraCats.map((c) => {
                const a = Math.round(byCat[c] || 0);
                return (
                  <div className="rmb-row" key={c}>
                    <span className="rmb-name">{displayCat(c)}</span>
                    <div className="rmb-track">
                      <div className="rmb-spent" style={{ width: (a / max) * 100 + "%", background: catColor(c) }} />
                    </div>
                    <span className="rmb-val" style={{ color: "var(--ink-2)" }}>{formatMoney(a)}</span>
                  </div>
                );
              })}
            </div>
            <button className="glass-btn primary" onClick={() => setStep(1)}>See the verdict</button>
          </div>
        )}

        {step === 1 && (
          <div className="review-step">
            <div className="card-label" style={{ color: "var(--accent)" }}>The verdict</div>
            {planOn
              ? <h2 className="review-h2">You saved <span style={{ color: planBehind ? "#ff6b6b" : "var(--accent)" }}>{formatMoney(actualNet)}</span> of the {formatMoney(plannedNetM)} planned</h2>
              : <h2 className="review-h2">{over ? "You overspent by " : "You saved "}<span style={{ color: over ? "#ff6b6b" : "var(--accent)" }}>{formatMoney(Math.abs(net))}</span></h2>}
            <p className="subtitle">{planOn ? "Money in minus money out, across all your accounts, in your home currency." : (over ? "Across all your accounts, in your home currency." : "Money left in the budget this month, in your home currency.")}</p>
            {planOn ? (
              <div className="pace-wrap">
                <div className="pace-head"><span>Your plan — {formatMoney(plan.targetBalance)} by {monthLabelFromKey(plan.targetMonth)} {plan.targetMonth.slice(0, 4)}</span><span style={{ color: planBehind ? "#ff6b6b" : "var(--accent)", fontWeight: 700 }}>{planVar === 0 ? "bang on plan" : formatMoney(Math.abs(planVar)) + (planBehind ? " behind" : " ahead")}</span></div>
                <p className="subtitle" style={{ margin: "8px 0 0" }}>{planBehind ? "Nothing has been changed — next you choose what this means for your goal." : planAhead ? "Nice work — next you choose what to do with the extra." : "Everything ties out — your goal is exactly where it should be."}</p>
              </div>
            ) : pace ? (
              <div className="pace-wrap">
                <div className="pace-head"><span>{goal.name}</span><span style={{ color: over ? "#ff6b6b" : "var(--accent)", fontWeight: 700 }}>{over ? formatMoney(Math.abs(net)) + " behind" : formatMoney(net) + " ahead"}</span></div>
                <div className="pace-track"><div className="pace-fill" style={{ width: pace.savedPct + "%" }} /><div className="pace-marker" style={{ left: pace.savedPct + "%" }} /></div>
                <div className="pace-foot"><span>{formatMoney(pace.saved)} saved</span><span>target {formatMoney(pace.target)}</span></div>
              </div>
            ) : (
              <p className="subtitle" style={{ fontStyle: "italic" }}>Set a savings goal to see how each month affects your pace.</p>
            )}
            <button className="glass-btn primary" onClick={() => setStep(2)}>{planOn && !planBehind && !planAhead ? "Continue" : "See my options"}</button>
            <button className="glass-btn ghost" onClick={() => setStep(0)}>Back</button>
          </div>
        )}

        {step === 2 && planOn && planBehind && (
          <div className="review-step">
            <div className="card-label" style={{ color: "var(--accent)" }}>Your call</div>
            <h2 className="review-h2">You're {formatMoney(-planVar)} behind plan. Three ways to handle it:</h2>
            <p className="subtitle">Nothing changes until you choose — it's your plan. Whichever you pick, the numbers on your Long-Term Plan update so everything still adds up.</p>
            <button className="plan-opt" disabled={busy} onClick={() => act("plan_accept", { amount: -planVar })}>
              <span className="plan-opt-title">1 · Accept it — move the goal</span>
              <span className="plan-opt-sub">Keep the same monthly targets. Your goal becomes <b>{formatMoney(plan.targetBalance + planVar)}</b> by {monthLabelFromKey(plan.targetMonth)} instead of {formatMoney(plan.targetBalance)}.</span>
            </button>
            <button className="plan-opt" disabled={busy} onClick={() => act("plan_catchup", { perMonth: planPerMonth, trims: planTrims, months: planFutureKeys })}>
              <span className="plan-opt-title">2 · Catch up — save a bit more each month</span>
              <span className="plan-opt-sub">Spread the {formatMoney(-planVar)} over the {planMonthsLeft} month{planMonthsLeft > 1 ? "s" : ""} left ≈ <b>{formatMoney(planPerMonth)}/month</b>, from your most flexible categories: {FLEX_CATEGORIES.filter((c) => planTrims[c] > 0).map((c) => c + " −" + formatMoney(planTrims[c])).join(", ") || "your budgets"}. You still hit <b>{formatMoney(plan.targetBalance)}</b>.{planTrimTotal < planPerMonth ? " (Flexible budgets only cover " + formatMoney(planTrimTotal) + "/mo — trim other categories on your plan for the rest.)" : ""}</span>
            </button>
            <button className="plan-opt" disabled={busy} onClick={() => act("plan_extend", {})}>
              <span className="plan-opt-title">3 · Extend — same goal, one month later</span>
              <span className="plan-opt-sub">Keep everything as it is. You still reach <b>{formatMoney(plan.targetBalance)}</b> — by {monthLabelFromKey(extendKey)} {extendKey.slice(0, 4)} instead of {monthLabelFromKey(plan.targetMonth)}.</span>
            </button>
            <button className="review-skip" disabled={busy} onClick={onClose}>Decide later — ask me again next time</button>
          </div>
        )}
        {step === 2 && planOn && planAhead && (
          <div className="review-step">
            <div className="card-label" style={{ color: "var(--accent)" }}>Ahead of plan</div>
            <h2 className="review-h2">You're {formatMoney(planVar)} ahead. What do you want to do with it?</h2>
            <p className="subtitle">Whichever you pick, your Long-Term Plan updates so everything still adds up.</p>
            <button className="plan-opt" disabled={busy} onClick={() => act("plan_bank", { amount: planVar })}>
              <span className="plan-opt-title">1 · Bank it — raise the goal</span>
              <span className="plan-opt-sub">Same monthly targets, bigger finish. Your goal becomes <b>{formatMoney(plan.targetBalance + planVar)}</b> by {monthLabelFromKey(plan.targetMonth)}.</span>
            </button>
            <button className="plan-opt" disabled={busy} onClick={() => act("plan_ease", { perMonth: planPerMonth, adds: planAdds, months: planFutureKeys })}>
              <span className="plan-opt-title">2 · Ease off — breathe a little</span>
              <span className="plan-opt-sub">Give yourself ≈ <b>{formatMoney(planPerMonth)}/month</b> back across {FLEX_CATEGORIES.filter((c) => planAdds[c] > 0).map((c) => c + " +" + formatMoney(planAdds[c])).join(", ")}. You still hit <b>{formatMoney(plan.targetBalance)}</b>.</span>
            </button>
            <button className="plan-opt" disabled={busy} onClick={() => act("plan_keep", {})}>
              <span className="plan-opt-title">3 · Keep it as a buffer</span>
              <span className="plan-opt-sub">Change nothing — you're simply ahead, and the buffer protects you if a future month slips.</span>
            </button>
          </div>
        )}
        {step === 2 && planOn && !planBehind && !planAhead && (
          <div className="review-step">
            <div className="card-label" style={{ color: "var(--accent)" }}>On plan</div>
            <h2 className="review-h2">Bang on plan — nothing to fix</h2>
            <p className="subtitle">You saved exactly what you planned, so your goal of {formatMoney(plan.targetBalance)} by {monthLabelFromKey(plan.targetMonth)} stays right on track.</p>
            <button className="glass-btn primary" disabled={busy} onClick={() => act("plan_keep", {})}>{busy ? <span className="btn-spinner" /> : "Great — continue"}</button>
          </div>
        )}
        {step === 2 && !planOn && over && (
          <div className="review-step">
            <div className="card-label" style={{ color: "var(--accent)" }}>Stay on track</div>
            <h2 className="review-h2">Trim the next {monthsLeft} month{monthsLeft > 1 ? "s" : ""} to stay on target?</h2>
            <p className="subtitle">Spreading the {formatMoney(Math.abs(net))} out keeps {goal ? goal.name : "your plan"} on track without one painful month.</p>
            <div className="plan-box">
              <div className="plan-row"><span>Reduce monthly budgets by</span><b style={{ color: "#ff6b6b" }}>{formatMoney(perMonth)}/mo</b></div>
              <div className="plan-row"><span>For</span><b>{monthsLeft} month{monthsLeft > 1 ? "s" : ""}</b></div>
            </div>
            <button className="glass-btn primary" disabled={busy} onClick={() => act("catchup", { perMonth, months: monthsLeft })}>{busy ? <span className="btn-spinner" /> : "Apply the plan"}</button>
            <button className="glass-btn ghost" disabled={busy} onClick={() => act("full", {})}>Take it all next month instead</button>
            <button className="review-skip" disabled={busy} onClick={() => act("skipped", {})}>Skip for now</button>
          </div>
        )}
        {step === 2 && !planOn && !over && (
          <div className="review-step">
            <div className="card-label" style={{ color: "var(--accent)" }}>Roll the win forward</div>
            <h2 className="review-h2">Move your {formatMoney(surplus)} surplus into savings?</h2>
            <p className="subtitle">{goal ? "Bank it toward " + goal.name + " and you’ll be ahead of pace." : "Roll it into next month, or set a savings goal to put it to work."}</p>
            <div className="plan-box">
              <div className="plan-row"><span>Add to</span><b>{goal ? goal.name : "next month"}</b></div>
              <div className="plan-row"><span>Amount</span><b style={{ color: "var(--accent)" }}>{formatMoney(surplus)}</b></div>
            </div>
            {goal
              ? <button className="glass-btn primary" disabled={busy} onClick={() => act("bank_surplus", { goalId: goal.id, amount: surplus })}>{busy ? <span className="btn-spinner" /> : "Add to savings"}</button>
              : <button className="glass-btn primary" disabled={busy} onClick={() => act("roll_surplus", { amount: surplus })}>{busy ? <span className="btn-spinner" /> : "Roll into next month"}</button>}
            <button className="review-skip" disabled={busy} onClick={() => act("skipped", {})}>Keep it in checking</button>
          </div>
        )}

        {step === 3 && (
          <div className="review-step review-done">
            <div className="review-check">✓</div>
            <h2 className="review-h2" style={{ textAlign: "center" }}>All set</h2>
            <p className="subtitle" style={{ textAlign: "center" }}>We’ve saved your {label} review. You can re-run it any time from the Monthly Review page.</p>
            <button className="glass-btn primary" onClick={onClose}>Done</button>
          </div>
        )}
      </div>
    </div>
  );
}

function MonthlyReviewCard({ transactions, allTargets, isDev, onOpenReview, signupMonth }) {
  const txs = transactions || [];
  const done = completedMonthsWithData(txs);
  const [monthKey, setMonthKey] = useState(done.length ? done[done.length - 1] : currentMonthKey());
  if (!done.length) return <EmptyState text="Your monthly review appears once a month has finished. Upload statements covering a completed month to see how you did versus your plan." />;
  const rawBudgets = (allTargets && allTargets[monthKey]) || {};
  const hasRealBudget = TX_CATEGORIES.some((c) => Number(rawBudgets[c]) > 0);
  const usingSampleTargets = isDev && !hasRealBudget;
  const budgets = usingSampleTargets ? DEMO_TARGETS : rawBudgets;
  const hasBudget = TX_CATEGORIES.some((c) => Number(budgets[c]) > 0);
  const byCat = spendByCategoryForMonth(txs, monthKey);
  const extraCats = Object.keys(byCat).filter((c) => !TX_CATEGORIES.includes(c) && Math.round(byCat[c]) > 0).sort((a, b) => byCat[b] - byCat[a]);
  const actualSpend = Math.round(spendForMonth(txs, monthKey));
  const actualIncome = Math.round(incomeForMonth(txs, monthKey));
  const plannedSpend = Math.round(TX_CATEGORIES.reduce((s, c) => s + (Number(budgets[c]) || 0), 0));
  let plannedIncome = Math.round(typicalIncome(txs, addMonths(monthKey, -1)));
  if (!plannedIncome) plannedIncome = actualIncome;
  const actualNet = actualIncome - actualSpend;
  const plannedNet = plannedIncome - plannedSpend;
  const label = monthLabelFromKey(monthKey) + " " + monthKey.slice(0, 4);
  const spendDiff = actualSpend - plannedSpend;
  const incomeDiff = actualIncome - plannedIncome;
  const netDiff = actualNet - plannedNet;

  return (
    <div className="review-wrap">
      <div className="glass-card dash-card">
        <div className="summary-head">
          <span className="card-label">Monthly review</span>
          <select className="slot-select" value={monthKey} onChange={(e) => setMonthKey(e.target.value)}>
            {done.slice().reverse().map((k) => <option key={k} value={k}>{monthLabelFromKey(k) + " " + k.slice(0, 4)}</option>)}
          </select>
        </div>
        {onOpenReview && monthKey >= (signupMonth || new Date().toISOString().slice(0, 7)) && <button className="link-btn inline" style={{ marginTop: 4 }} onClick={() => onOpenReview(monthKey)}>▶ Run the month-end review for {monthLabelFromKey(monthKey)}</button>}
        <p className="subtitle" style={{ margin: "2px 0 14px" }}>How {label} actually turned out, next to what you planned.</p>
        {usingSampleTargets && <p className="subtitle mr-sample-note" style={{ margin: "-8px 0 14px" }}>Preview only — showing sample targets (dev account). Set real budgets in Settings.</p>}
        <div className="review-cards">
          <div className={"review-tile " + (spendDiff <= 0 ? "rt-good" : "rt-bad")}>
            <span className="rt-label">You spent</span>
            <span className="rt-actual">{formatMoney(actualSpend)}</span>
            <span className="rt-planned">planned {hasBudget ? formatMoney(plannedSpend) : "—"}</span>
            {hasBudget && <span className="rt-verdict">{spendDiff <= 0 ? formatMoney(-spendDiff) + " under budget" : formatMoney(spendDiff) + " over budget"}</span>}
          </div>
          <div className={"review-tile " + (incomeDiff >= 0 ? "rt-good" : "rt-bad")}>
            <span className="rt-label">You earned</span>
            <span className="rt-actual">{formatMoney(actualIncome)}</span>
            <span className="rt-planned">typical {formatMoney(plannedIncome)}</span>
            <span className="rt-verdict">{incomeDiff >= 0 ? formatMoney(incomeDiff) + " more than usual" : formatMoney(-incomeDiff) + " less than usual"}</span>
          </div>
          <div className={"review-tile " + (netDiff >= 0 ? "rt-good" : "rt-bad")}>
            <span className="rt-label">Left over</span>
            <span className="rt-actual">{formatMoney(actualNet)}</span>
            <span className="rt-planned">planned {hasBudget ? formatMoney(plannedNet) : "—"}</span>
            {hasBudget && <span className="rt-verdict">{netDiff >= 0 ? formatMoney(netDiff) + " better than plan" : formatMoney(-netDiff) + " worse than plan"}</span>}
          </div>
        </div>
      </div>

      <div className="glass-card dash-card">
        <span className="card-label">By category</span>
        {!hasBudget ? (
          <p className="subtitle" style={{ margin: "10px 0 0" }}>You didn't set budgets for {label}, so there's nothing to compare against. Set budgets in Settings to unlock the full review.</p>
        ) : (
          <div className="review-table">
            <div className="review-row review-head">
              <span>Category</span><span>Planned</span><span>Actual</span><span>Difference</span>
            </div>
            {TX_CATEGORIES.map((c) => {
              const b = Number(budgets[c]) || 0;
              const a = Math.round(byCat[c] || 0);
              const d = a - b;
              const over = d > 0;
              return (
                <div className="review-row" key={c}>
                  <span className="review-cat"><span className="cat-dot" style={{ background: catColor(c) }} />{c}</span>
                  <span>{formatMoney(b)}</span>
                  <span>{formatMoney(a)}</span>
                  <span className={over ? "rv-over" : "rv-under"}>{b === 0 ? "—" : (over ? "-" + formatMoney(d) : "+" + formatMoney(-d))}</span>
                </div>
              );
            })}
            {extraCats.map((c) => {
              const a = Math.round(byCat[c] || 0);
              return (
                <div className="review-row" key={c}>
                  <span className="review-cat"><span className="cat-dot" style={{ background: catColor(c) }} />{displayCat(c)}</span>
                  <span>{"—"}</span>
                  <span>{formatMoney(a)}</span>
                  <span className="rv-over">-{formatMoney(a)} unbudgeted</span>
                </div>
              );
            })}
            {(() => {
              const tp = TX_CATEGORIES.reduce((s, c) => s + (Number(budgets[c]) || 0), 0);
              const ta = [...TX_CATEGORIES, ...extraCats].reduce((s, c) => s + Math.round(byCat[c] || 0), 0);
              const td = ta - tp;
              const over = td > 0;
              return (
                <div className="review-row review-total">
                  <span className="review-cat">Total</span>
                  <span>{formatMoney(tp)}</span>
                  <span>{formatMoney(ta)}</span>
                  <span className={over ? "rv-over" : "rv-under"}>{tp === 0 ? "—" : (over ? "-" + formatMoney(td) : "+" + formatMoney(-td))}</span>
                </div>
              );
            })()}
          </div>
        )}
      </div>
    </div>
  );
}

function LongTermPlanCard({ transactions, allTargets, banks, accountData, plan, onEditPlan }) {
  const txs = transactions || [];
  const past = completedMonthsWithData(txs);
  const [horizon, setHorizon] = useState(6);
  const curKey = currentMonthKey();
  const avg = React.useMemo(() => avgSpendByCategory(txs), [txs]);

  const planActive = !!(plan && plan.targetMonth >= curKey);
  const planExpired = !!(plan && plan.targetMonth < curKey);
  if (!past.length && !planActive) return <EmptyState text="Your long-term plan appears once we have at least one finished month. Upload a few months of statements and set your plan to see where you're heading." />;

  const lastKey = planActive ? plan.targetMonth : addMonths(curKey, horizon - 1);
  const futureKeys = monthKeysBetween(curKey, lastKey);
  const monthsAll = [...past, ...futureKeys];
  const isActual = (k) => k < curKey;
  const incM = (k) => Math.round(incomeForMonth(txs, k));
  const spM = (k) => Math.round(spendForMonth(txs, k));

  const balNowRaw = totalEstimatedBalance(banks, accountData, txs);
  const sumPastNet = past.reduce((s, k) => s + (incM(k) - spM(k)), 0);
  const curNetSoFar = incM(curKey) - spM(curKey);
  /* plan.openingBalance = balance at the start of the current month when the plan was made.
     Used only as a fallback anchor when statements can't give us a balance. */
  const planAnchor = planActive && plan && plan.openingBalance != null ? Math.round(plan.openingBalance) + curNetSoFar : null;
  const haveBalance = balNowRaw !== null || planAnchor !== null;
  const balNow = balNowRaw !== null ? Math.round(balNowRaw) : (planAnchor !== null ? planAnchor : 0);
  const startBal = balNow - sumPastNet - curNetSoFar;

  let run = startBal;
  const cols = monthsAll.map((k) => {
    const open = run;
    const inc = isActual(k) ? incM(k) : plannedIncomeFor(allTargets, k, txs);
    const cats = {};
    TX_CATEGORIES.forEach((c) => { cats[c] = isActual(k) ? (spendByCategoryForMonth(txs, k)[c] || 0) : plannedCatFor(allTargets, k, c, avg); });
    const catSum = TX_CATEGORIES.reduce((s, c) => s + cats[c], 0);
    const other = isActual(k) ? spM(k) - catSum : 0;
    const net = inc - catSum - other;
    run += net;
    return { k, open, inc, cats, other, net, close: run, actual: isActual(k) };
  });
  const hasOther = cols.some((c) => Math.round(c.other) > 0);
  const endBal = cols.length ? cols[cols.length - 1].close : startBal;
  const gap = planActive ? Math.round(plan.targetBalance) - endBal : 0;
  const word = haveBalance ? "balance" : "total saved";

  const bals = cols.map((c) => c.close);
  const minB = Math.min(...bals, 0), maxB = Math.max(...bals, 1);
  const span = (maxB - minB) || 1;

  return (
    <div className="review-wrap">
      <div className="glass-card dash-card">
        <div className="summary-head">
          <span className="card-label">Long-term plan</span>
          {(planActive || planExpired)
            ? <button className="link-btn inline" onClick={onEditPlan}>Edit plan</button>
            : <select className="slot-select" value={horizon} onChange={(e) => setHorizon(Number(e.target.value))}>
                <option value={3}>Next 3 months</option>
                <option value={6}>Next 6 months</option>
                <option value={12}>Next 12 months</option>
              </select>}
        </div>
        {planActive && (
          <>
            <div className="plan-headline">
              <span className="plan-big">{formatMoney(plan.targetBalance)}</span>
              <span className="plan-sub">your goal — {word} by the end of {monthLabelFromKey(plan.targetMonth)} {plan.targetMonth.slice(0, 4)}</span>
            </div>
            <div className={"plan-verdict " + (gap <= 0 ? "rt-good" : "rt-bad")}>
              {gap <= 0
                ? (gap === 0 ? "You're exactly on plan — keep it up!" : "On track — heading for " + formatMoney(endBal) + ", about " + formatMoney(-gap) + " ahead of your goal.")
                : "Heading for " + formatMoney(endBal) + " — about " + formatMoney(gap) + " behind your goal. Your next month-end review will help you decide how to close the gap."}
            </div>
          </>
        )}
        {planExpired && (
          <>
            <div className="plan-headline">
              <span className="plan-big">{formatMoney(endBal)}</span>
              <span className="plan-sub">{word} at the end of your plan ({monthLabelFromKey(plan.targetMonth)} {plan.targetMonth.slice(0, 4)})</span>
            </div>
            <div className="plan-verdict rt-good">Your plan has finished — set a new one to keep the momentum going.</div>
            <button className="glass-btn primary" style={{ marginTop: 12 }} onClick={onEditPlan}>Set a new plan</button>
          </>
        )}
        {!plan && (
          <>
            <div className="plan-headline">
              <span className="plan-big">{formatMoney(endBal)}</span>
              <span className="plan-sub">projected {word} by {monthLabelFromKey(lastKey)} {lastKey.slice(0, 4)}, if you keep to your current budgets</span>
            </div>
            <div className="plan-verdict rt-good">Set a plan to turn this projection into a real goal — with monthly targets that all tie back to one number.</div>
            <button className="glass-btn primary" style={{ marginTop: 12 }} onClick={onEditPlan}>Set up your plan</button>
          </>
        )}
        <p className="subtitle" style={{ margin: "10px 0 0" }}>
          Finished months show what actually happened, straight from your statements. Future months show your plan. Every column follows the same simple sum: opening balance + income − spending = closing balance. The final closing balance is your goal — so when a month changes, you can see exactly what it does to the end number.{!haveBalance ? " Add your account balances in Settings to see this as a real balance instead of total saved." : ""}
        </p>
      </div>

      <div className="glass-card dash-card">
        <span className="card-label">Projected {word} over time</span>
        <div className="trend-chart ltp-proj-chart">
          {cols.map((r) => (
            <div className="trend-bar-col" key={r.k}>
              <div className="trend-bar-wrap">
                <div className={"trend-bar ltp-bar " + (r.actual ? "plan-bar-actual" : "plan-bar-forecast")} style={{ height: (((r.close - minB) / span) * 100) + "%" }} title={formatMoney(r.close)}>
                  <span className="ltp-bar-val">{formatMoney(r.close)}</span>
                </div>
              </div>
              <span className="trend-bar-label">{monthLabelFromKey(r.k)}</span>
            </div>
          ))}
        </div>
        <div className="legend-row">
          <span className="legend-item"><span className="legend-dot" style={{ background: catColor("Income") }} />Actual so far</span>
          <span className="legend-item"><span className="legend-dot" style={{ background: "var(--accent)" }} />Plan</span>
        </div>
      </div>

      <div className="glass-card dash-card">
        <span className="card-label">Month by month</span>
        <p className="subtitle" style={{ margin: "6px 0 10px" }}>Months across the top — columns tagged <span className="ltp-actual-chip">✓ actual</span> are finished (straight from your statements); the rest are your plan. The bottom-right cell is where you land.</p>
        <div className="ltp-wrap">
          <table className="ltp-table">
            <thead>
              <tr>
                <th className="ltp-sticky"></th>
                {cols.map((r) => (
                  <th key={r.k} className={r.actual ? "ltp-actual-head" : "ltp-plan-head"}>
                    {monthLabelFromKey(r.k)} {r.k.slice(2, 4)}{r.actual ? <span className="ltp-actual-chip">✓ actual</span> : null}
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              <tr className="ltp-bal-row">
                <td className="ltp-sticky">Opening balance</td>
                {cols.map((r) => <td key={r.k} className={r.actual ? "ltp-actual" : "ltp-plan"}>{formatMoney(r.open)}</td>)}
              </tr>
              <tr>
                <td className="ltp-sticky"><span className="cat-dot" style={{ background: catColor("Income") }} />Income</td>
                {cols.map((r) => <td key={r.k} className={r.actual ? "ltp-actual" : "ltp-plan"}>{formatMoney(r.inc)}</td>)}
              </tr>
              {TX_CATEGORIES.map((c) => (
                <tr key={c}>
                  <td className="ltp-sticky"><span className="cat-dot" style={{ background: catColor(c) }} />{c}</td>
                  {cols.map((r) => <td key={r.k} className={(r.actual ? "ltp-actual" : "ltp-plan") + " ltp-neg"}>{r.cats[c] ? "−" + formatMoney(r.cats[c]) : formatMoney(0)}</td>)}
                </tr>
              ))}
              {hasOther && (
                <tr>
                  <td className="ltp-sticky"><span className="cat-dot" style={{ background: "#8b93a7" }} />Other spending</td>
                  {cols.map((r) => <td key={r.k} className={(r.actual ? "ltp-actual" : "ltp-plan") + " ltp-neg"}>{r.other ? "−" + formatMoney(r.other) : formatMoney(0)}</td>)}
                </tr>
              )}
              <tr className="ltp-bal-row ltp-close-row">
                <td className="ltp-sticky">Closing balance</td>
                {cols.map((r, i) => <td key={r.k} className={(r.actual ? "ltp-actual" : "ltp-plan") + (i === cols.length - 1 ? " ltp-goal-cell" : "")}>{formatMoney(r.close)}</td>)}
              </tr>
              <tr className="ltp-net-row">
                <td className="ltp-sticky">Saved this month</td>
                {cols.map((r) => <td key={r.k} className={(r.actual ? "ltp-actual" : "ltp-plan") + " " + (r.net >= 0 ? "rv-under" : "rv-over")}>{formatMoney(r.net)}</td>)}
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

function OverviewSlot({ widgetKey, onChange, index, runTour, tourStep, targets, banks, hasData, transactions, goals, goalsApi, accountData, billExcludes, rollovers }) {
  const revealed = !runTour || index <= tourStep;
  const active = runTour && index === tourStep;
  const slotRef = React.useRef(null);
  React.useEffect(() => {
    if (active && slotRef.current) {
      const el = slotRef.current;
      const t = setTimeout(() => { try { el.scrollIntoView({ behavior: "smooth", block: "center" }); } catch (e) {} }, 120);

    }
  }, [active]);
  if (runTour && !revealed) {
    return <div className="overview-slot overview-slot-coming"><span className="coming-soon">Coming up…</span></div>;
  }
  return (
    <div ref={slotRef} className={"overview-slot" + (active ? " tour-active" : "")}>
      {!runTour && (
        <div className="overview-slot-head">
          <select className="slot-select" value={widgetKey} onChange={(e) => onChange(e.target.value)}>

function PaceFullCard({ transactions, targets, rollovers, billExcludes }) {
  const s = computeSafeToSpend(targets, transactions, rollovers, billExcludes);
  if (s.budget <= 0) return <div className="glass-card dash-card"><span className="card-label">Your pace</span><div className="oh-sub" style={{ marginTop: 8 }}>Set targets to see your spending pace.</div></div>;
  const day = today().getDate(), dim = s.daysInMonth;
  const expected = s.budget * (day / dim);
  const under = s.spent <= expected;
  const diff = Math.round(expected - s.spent);
  const projEnd = Math.round(projectMonthEnd(s.spent));
  const pctSpent = Math.min(100, (s.spent / Math.max(s.budget, 1)) * 100);
  const pctExpected = Math.min(100, (expected / Math.max(s.budget, 1)) * 100);
  const pctOf = (v) => Math.min(100, Math.max(0, (v / Math.max(s.budget, 1)) * 100));
  const spentPct = pctOf(s.spent), resPct = pctOf(s.reserved), expPct = pctOf(expected);
  return (
    <div className="glass-card dash-card pf-card">
      <div className="pace-head-row"><span className="card-label" style={{ margin: 0 }}>Your pace</span><span className={"cst-chip " + (under ? "cst-ok" : "cst-warn")}>{under ? "Under pace" : "Over pace"}</span></div>
      <div className="fs-budget-row" style={{ marginTop: 16 }}><span className="safe-hero-label" style={{ fontSize: 11 }}>This month's spend budget</span><span className="fs-budget-val" style={{ fontSize: 16 }}>{formatMoney(s.spent)} <span className="fs-budget-of">of {formatMoney(s.budget)}</span></span></div>
      <div className="pf-bar-wrap">
        <div className="pf-bar">

function goalProjection(goal, transactions) {
  if (!goal || goal.target <= 0) return null;
  const remaining = Math.max(0, goal.target - goal.saved);
  const keys = lastNMonthKeys(currentMonthKey(), 4).filter((k) => k !== currentMonthKey()).slice(0, 3);
  const paces = keys.map((k) => incomeForMonth(transactions || [], k) - spendForMonth(transactions || [], k)).filter((v) => v > 0);
  const pace = paces.length ? paces.reduce((a, b) => a + b, 0) / paces.length : 0;
  if (pace <= 0) return { remaining, pace: 0, projected: null };
  const monthsNeeded = remaining / pace;
  const proj = new Date(today());
  proj.setDate(proj.getDate() + Math.round(monthsNeeded * 30.44));
  return { remaining, pace, projected: proj };
}
function shortDate(d) { return d ? d.getDate() + " " + MONTHS_LABEL[d.getMonth()] : null; }

  if (proj && proj.projected && targetD && !isNaN(targetD)) {

  }
  const R = 52, C = 2 * Math.PI * R;
  const milestones = [0.25, 0.5, 0.75].map((f) => {

    return { x: 65 + R * Math.cos(a), y: 65 + R * Math.sin(a), passed: pct / 100 >= f };
  });
  const nextM = [0.25, 0.5, 0.75, 1].find((f) => pct / 100 < f);
  const nextAmt = nextM ? Math.round(goal.target * nextM) : null;

}

function SpendByWeekCard({ transactions }) {
  const key = currentMonthKey();
  const txs = (transactions || []).filter((t) => t.amount < 0 && t.date && t.date.slice(0, 7) === key);
  const dim = daysInCurrentMonth();
  const nWeeks = Math.ceil(dim / 7);
  const weeks = Array.from({ length: nWeeks }, () => 0);
  txs.forEach((t) => { const d = parseInt(t.date.slice(8, 10), 10) || 1; weeks[Math.min(nWeeks - 1, Math.floor((d - 1) / 7))] += Math.abs(t.amount); });
  const curW = Math.min(nWeeks - 1, Math.floor((today().getDate() - 1) / 7));
  const max = Math.max(...weeks, 1);
  const hotIdx = weeks.indexOf(Math.max(...weeks));
  const anySpend = weeks.some((v) => v > 0);
  return (
    <div className="glass-card dash-card">
      <span className="card-label">Spend by week</span>
      <div className="sbw2-plot">
        {weeks.map((v, i) => {
          const future = i > curW, now = i === curW;
          const bg = future ? "var(--surface-3)" : now ? "color-mix(in srgb, var(--accent-solid) 45%, transparent)" : "var(--accent-solid)";
          return (
            <div className="sbw2-col" key={i}>

            </div>
          );

      <div className="sbw2-x">{weeks.map((_, i) => <span key={i} className={i === curW ? "sbw2-xnow" : (i > curW ? "sbw2-xfut" : "")}>W{i + 1}{i === curW ? " · now" : ""}</span>)}</div>
      {anySpend
        ? <div className="oh-sub" style={{ marginTop: 16 }}>W{hotIdx + 1} is your heaviest so far at <strong>{formatMoney(Math.round(weeks[hotIdx]))}</strong>.{weeks[curW] === 0 ? " This week you've spent nothing yet." : ""}</div>

}

function PaceOutlookCard({ transactions, targets, billExcludes }) {
  const key = currentMonthKey();

function avg3moSpendByCategory(transactions) {
  const keys = lastNMonthKeys(currentMonthKey(), 4).slice(0, 3);
  const acc = {};
  keys.forEach((k) => {
    const c = spendByCategoryForMonth(transactions || [], k);
    Object.keys(c).forEach((cat) => { acc[cat] = (acc[cat] || 0) + c[cat]; });
  });
  const out = {};
  Object.keys(acc).forEach((cat) => { out[cat] = acc[cat] / keys.length; });
  return out;
}

function PowerViewHero({ targets, transactions, rollovers, billExcludes, banks, accountData, goals }) {
  const s = computeSafeToSpend(targets, transactions, rollovers, billExcludes);

  const elapsed = today().getDate() / s.daysInMonth;
  const spentVsAvg = avgTotal > 0 ? Math.round(((s.spent - avgTotal * elapsed) / Math.max(avgTotal * elapsed, 1)) * 100) : null;
  const nw = totalEstimatedBalance(banks, accountData, transactions || []);

  stats.push({ k: "Spent this month", v: formatMoney(Math.round(s.spent)), s: spentVsAvg === null ? null : Math.abs(spentVsAvg) + "% " + (spentVsAvg <= 0 ? "below" : "above") + " your 3-month average", good: spentVsAvg !== null ? spentVsAvg <= 0 : true });

}

function MerchantsProCard({ transactions }) {
  const key = currentMonthKey();
  const txs = (transactions || []).filter((t) => t.amount < 0 && t.date && t.date.slice(0, 7) === key);
  const norm = (n) => String(n || "Unknown").toLowerCase().replace(/\d+/g, "").replace(/\s+/g, " ").trim() || "unknown";
  const by = {};
  txs.forEach((t) => {
    const k = norm(t.name);
    const a = Math.abs(t.amount);
    if (!by[k]) by[k] = { amt: 0, disp: t.name || "Unknown", dispAmt: 0, cats: {} };
    by[k].amt += a;
    by[k].cats[t.category] = (by[k].cats[t.category] || 0) + a;
    if (a > by[k].dispAmt) { by[k].dispAmt = a; by[k].disp = t.name || "Unknown"; }
  });
  const rows = Object.values(by).map((g) => ({ disp: g.disp, amt: g.amt, cat: (Object.entries(g.cats).sort((a, b) => b[1] - a[1])[0] || ["Uncategorized"])[0] })).sort((a, b) => b.amt - a.amt);
  const total = rows.reduce((s, r) => s + r.amt, 0);
  if (!rows.length) return <div className="glass-card dash-card"><span className="card-label">Top merchants</span><div className="oh-sub" style={{ marginTop: 8 }}>No spending yet this month.</div></div>;
  const top = rows.slice(0, 3);
  const conc = Math.round((top.reduce((s, r) => s + r.amt, 0) / Math.max(total, 1)) * 100);
  const shades = ["var(--accent-solid)", "color-mix(in srgb, var(--accent-solid) 68%, transparent)", "color-mix(in srgb, var(--accent-solid) 42%, transparent)"];
  return (
    <div className="glass-card dash-card">
      <div className="mpc2-head"><span className="card-label" style={{ margin: 0 }}>Top merchants</span></div>
      <p className="pv-desc">Where most of your money went this month.</p>
      <div className="mpc2-list">
        {top.map((r, i) => {
          const pc = Math.round((r.amt / Math.max(total, 1)) * 100);
          return (
            <div key={i}>
              <div className="mpc2-row"><span className="mpc2-nm"><span className="cat-dot" style={{ background: catColor(r.cat) }} />{r.disp}</span><span className="mpc2-v">{formatMoney(Math.round(r.amt))}</span></div>
              <div className="mpc2-track"><div style={{ width: pc + "%", background: shades[i] }} /></div>
            </div>
          );
        })}

}

function Trend12Card({ transactions }) {
  const keys = lastNMonthKeys(currentMonthKey(), 12);
  const vals = keys.map((k) => spendForMonth(transactions || [], k));
  const withData = vals.filter((v) => v > 0);
  if (withData.length < 3) return <div className="glass-card dash-card"><span className="card-label">Spend {"·"} trailing 12 mo</span><div className="oh-sub" style={{ marginTop: 8 }}>Upload more history to unlock the long trend.</div></div>;
  const avg = withData.reduce((a, b) => a + b, 0) / withData.length;

  const W = 560, H = 64;

  const pts = vals.map((v, i) => (i * step) + "," + (H - 6 - (v / max) * (H - 14))).join(" ");
  const avgY = H - 6 - (avg / max) * (H - 14);
  return (
    <div className="glass-card dash-card">
      <span className="card-label">Spending {"—"} last 12 months</span>

      <svg viewBox={"0 0 " + W + " " + H} width="100%" height={H + 10} preserveAspectRatio="none" style={{ marginTop: 2, overflow: "visible" }}>
        <polygon points={pts + " " + W + "," + H + " 0," + H} fill="var(--accent-soft)" />
        <line x1="0" y1={avgY} x2={W} y2={avgY} stroke="var(--ink-3)" strokeWidth="1" strokeDasharray="4 5" opacity="0.55" vectorEffect="non-scaling-stroke" />
        <polyline points={pts} fill="none" stroke="var(--accent-solid)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" vectorEffect="non-scaling-stroke" />

function NetSavedCard({ transactions }) {
  const tx = transactions || [];
  const keys = lastNMonthKeys(currentMonthKey(), 13).slice(0, 12);
  const inc = keys.map((k) => incomeForMonth(tx, k));
  const spd = keys.map((k) => spendForMonth(tx, k));
  const net = keys.map((_, i) => inc[i] - spd[i]);
  const active = keys.map((_, i) => inc[i] > 0 || spd[i] > 0);
  const activeCount = active.filter(Boolean).length;
  if (activeCount < 3) return <div className="glass-card dash-card"><span className="card-label">Net saved each month</span><div className="oh-sub" style={{ marginTop: 8 }}>Upload more history to unlock the trend.</div></div>;
  const maxAbs = Math.max(...net.map((v) => Math.abs(v)), 1);
  const avgNet = net.reduce((a, b, i) => a + (active[i] ? b : 0), 0) / activeCount;
  const W = 560, H = 76, mid = H / 2, pad = 7, half = mid - pad, n = keys.length, slot = W / n, bw = slot * 0.5;
  return (
    <div className="glass-card dash-card">
      <span className="card-label">Net saved each month</span>
      <p className="pv-desc">Money in minus money out each month. Green months you saved; red months you overspent.</p>
      <svg viewBox={"0 0 " + W + " " + H} width="100%" height={H + 10} preserveAspectRatio="none" style={{ marginTop: 2, overflow: "visible" }}>
        <line x1="0" y1={mid} x2={W} y2={mid} stroke="var(--line-strong)" strokeWidth="1" vectorEffect="non-scaling-stroke" />
        {net.map((v, i) => {
          if (!active[i]) return null;
          const bh = Math.max((Math.abs(v) / maxAbs) * half, 1.5);
          const x = i * slot + (slot - bw) / 2;
          const y = v >= 0 ? mid - bh : mid;
          return <rect key={i} x={x} y={y} width={bw} height={bh} rx="2" fill={v >= 0 ? "var(--pos)" : "var(--neg)"} opacity={i === n - 1 ? 1 : 0.85} />;
        })}
      </svg>
      <div className="tr12-x"><span>{monthLabelFromKey(keys[0]).slice(0, 3)}</span><span>{monthLabelFromKey(keys[Math.floor(n / 2)]).slice(0, 3)}</span><span>{monthLabelFromKey(keys[n - 1]).slice(0, 3)}</span></div>
      <div className="cvt2-foot">{avgNet >= 0 ? "On average you saved " + formatMoney(Math.round(avgNet)) + " a month." : "On average you overspent by " + formatMoney(Math.round(Math.abs(avgNet))) + " a month."}</div>
    </div>
  );
}

  let score = 50;
  if (budget > 0) {
    const under = spent <= budget * (day / dim);
    score += under ? 15 : -10;
    parts.push({ t: "pace", ok: under });
  }
  if (income > 0) {
    const rate = (income - spent) / income;
    const ok = rate >= 0.2;
    score += ok ? 15 : -5;
    parts.push({ t: "savings", ok });
  }
  const bills = remainingBillsThisMonth(transactions, billExcludes);
  if (bills.length) {
    const covered = budget <= 0 || s.free >= 0;
    score += covered ? 10 : -10;
    parts.push({ t: "bills", ok: covered });
  }
  let drag = null;
  if (budget > 0) {
    const cats = spendByCategoryForMonth(transactions || [], key);
    const overs = TX_CATEGORIES.filter((c) => { const t = Number((targets || {})[c]) || 0; return t > 0 && (cats[c] || 0) > t; });
    if (overs.length) { score -= 4 * Math.min(3, overs.length); drag = displayCat(overs[0]); }
  }
  score = Math.max(5, Math.min(98, Math.round(score)));
  const ringCol = score >= 70 ? "var(--pos)" : score >= 45 ? "var(--warn)" : "var(--neg)";
  const partLabel = { pace: "Spending pace", savings: "Savings rate", bills: "Bills covered" };
  return (
    <div className="glass-card dash-card">
      <span className="card-label">Money score</span>
      <p className="pv-desc">A quick 0–100 health check of your month, based on your spending pace, savings rate and bills.</p>
      <div className="ms2-row">
        <div className="ms2-ring" style={{ background: "conic-gradient(" + ringCol + " 0% " + score + "%, var(--surface-3) " + score + "% 100%)" }}>
          <div className="ms2-hole">{score}</div>
        </div>
        <div className="ms2-legend">
          {parts.map((pt, i) => <div className="ms2-leg" key={i}><span>{partLabel[pt.t] || pt.t}</span><span className={pt.ok ? "ms-ok" : "ms-bad"}>{pt.ok ? "✓" : "✗"}</span></div>)}
          {drag && <div className="ms2-drag">{drag} is pulling it down</div>}
        </div>
      </div>
    </div>
  );
}

function BillsChecklistCard({ transactions, billExcludes }) {
  const bills = remainingBillsThisMonth(transactions, billExcludes)
    .slice().sort((a, b) => (a.paid ? 1 : 0) - (b.paid ? 1 : 0) || (a.dueDay || 31) - (b.dueDay || 31));
  if (!bills.length) return (
    <div className="glass-card dash-card"><span className="card-label">Bills this month</span><div className="oh-sub" style={{ marginTop: 8 }}>No bills confirmed yet — mark a recurring payment as a bill to track it here.</div></div>
  );
  const overdueTotal = bills.filter((b) => !b.paid && !b.upcoming).reduce((s, b) => s + b.amount, 0);
  const upcomingTotal = bills.filter((b) => !b.paid && b.upcoming).reduce((s, b) => s + b.amount, 0);
  return (
    <div className="glass-card dash-card">
      <span className="card-label">Bills this month</span>
      {bills.map((b, i) => {
        const overdue = !b.paid && !b.upcoming;
        const KEEP_UP = ["DD", "UK", "US", "EU", "UAE", "USA", "LLC", "PLC", "VAT"];
        const nm = String(b.name || "").toLowerCase().split(" ").map((w) => KEEP_UP.includes(w.toUpperCase()) ? w.toUpperCase() : (w.charAt(0).toUpperCase() + w.slice(1))).join(" ");
        return (
          <div className="blc-row" key={i}>
            <span className={"blc-dot " + (b.paid ? "blc-dot-paid" : overdue ? "blc-dot-od" : "blc-dot-up")} />
            <span className={"blc-nm" + (b.paid ? " blc-done" : "")}>{nm}{b.paid ? "" : overdue ? <span className="blc-od-lb"> · overdue</span> : <span className="blc-due-lb"> · due {ordinalDay(b.dueDay)}</span>}</span>
            <span className={"blc-amt" + (b.paid ? " blc-done" : overdue ? " blc-amt-od" : "")}>{formatMoney(b.amount)}</span>
          </div>
        );
      })}
      <div className="oh-sub" style={{ marginTop: 8 }}>
        {overdueTotal > 0
          ? <><strong className="blc-od-txt">{formatMoney(overdueTotal)} overdue</strong>{upcomingTotal > 0 ? <> · {formatMoney(upcomingTotal)} still to come</> : ""}</>
          : upcomingTotal > 0
          ? <><strong>{formatMoney(upcomingTotal)}</strong> still to come this month.</>
          : "All paid — you're clear for " + currentMonthName() + "."}
      </div>
    </div>
  );
}

function EditViewModal({ layout, onSave, onClose }) {
  const [draft, setDraft] = useState({ month: [...(layout.month || [])], big: [...(layout.big || [])] });
  const move = (sec, i, dir) => setDraft((d) => {
    const arr = [...d[sec]]; const j = i + dir;
    if (j < 0 || j >= arr.length) return d;
    [arr[i], arr[j]] = [arr[j], arr[i]];
    return { ...d, [sec]: arr };
  });
  const remove = (sec, i) => setDraft((d) => ({ ...d, [sec]: d[sec].filter((_, idx) => idx !== i) }));
  const add = (sec, k) => setDraft((d) => (d[sec].includes(k) ? d : { ...d, [sec]: [...d[sec], k] }));
  const reset = () => setDraft({ month: [...DEFAULT_HOME_LAYOUT.month], big: [...DEFAULT_HOME_LAYOUT.big] });
  const sections = [{ key: "month", title: "This month" }, { key: "big", title: "The big picture" }];
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="glass-card modal-card ev-modal" onClick={(e) => e.stopPropagation()}>
        <div className="brand-row" style={{ marginBottom: 4, justifyContent: "space-between" }}>
          <span className="brand-name">Edit your overview</span>
          <button className="icon-btn" onClick={onClose} aria-label="Close" style={{ color: "var(--ink)" }}>{"×"}</button>
        </div>
        <p style={{ fontSize: 13, color: "var(--ink-3)", margin: "0 0 12px" }}>Choose what shows in each section. Reorder or remove anything {"—"} you can always reset.</p>
        {sections.map((s) => {
          const available = HOME_WIDGET_KEYS[s.key].filter((k) => !draft[s.key].includes(k));
          return (
            <div className="ev-section" key={s.key}>
              <span className="card-label">{s.title}</span>
              <div className="ev-list">
                {draft[s.key].length === 0 && <div className="ev-empty">Nothing here yet {"—"} add a widget below.</div>}
                {draft[s.key].map((k, i) => (
                  <div className="ev-row" key={k}>
                    <span className="ev-row-name">{HOME_WIDGETS[k].label}</span>
                    <div className="ev-row-actions">
                      <button className="ev-ctl" disabled={i === 0} onClick={() => move(s.key, i, -1)} aria-label="Move up">{"\u2191"}</button>
                      <button className="ev-ctl" disabled={i === draft[s.key].length - 1} onClick={() => move(s.key, i, 1)} aria-label="Move down">{"\u2193"}</button>
                      <button className="ev-ctl ev-remove" onClick={() => remove(s.key, i)} aria-label="Remove">{"×"}</button>
                    </div>
                  </div>
                ))}
              </div>
              {available.length > 0 && (
                <div className="ev-add-row">
                  {available.map((k) => (
                    <button className="ev-add-chip" key={k} onClick={() => add(s.key, k)}>+ {HOME_WIDGETS[k].label}</button>
                  ))}
                </div>
              )}
            </div>
          );
        })}
        <div className="nav-row">
          <button className="glass-btn ghost" onClick={reset}>Reset to default</button>
          <button className="glass-btn primary" onClick={() => { onSave(draft); onClose(); }}>Save view</button>
        </div>
      </div>
    </div>
  );
}

function computePaceV2(s) {
  const day = today().getDate();
  const dim = s.daysInMonth;
  const paceDay = day > 0 ? Math.round(s.spent / day) : 0;
  const projected = paceDay * dim + s.reserved;
  const rawDiff = s.pot - projected;
  const under = rawDiff >= 0;
  const diff = Math.round(Math.abs(rawDiff));
  const showProj = day >= 5;
  const pw = (v) => Math.min(100, Math.max(0, (v / Math.max(s.pot, 1)) * 100));
  const spentPct = pw(s.spent);
  const resPct = pw(s.reserved);
  const expPct = Math.min(100, Math.max(0, (day / dim) * 100));
  const usedPct = Math.round((s.spent / Math.max(s.pot, 1)) * 100);
  return { day, dim, paceDay, projected, diff, under, showProj, spentPct, resPct, expPct, usedPct };
}

function GoalGetterHeroV2(props) {
  const { targets, transactions, rollovers, billExcludes, goals, plan, banks, accountData } = props;
  const s = computeSafeToSpend(targets, transactions, rollovers, billExcludes);
  const target = plan && plan.targetBalance > 0 ? plan.targetBalance : (goals && goals.length ? goals[0].target : 0);
  const targetMonth = plan && plan.targetMonth ? plan.targetMonth : null;
  if (target <= 0) return <FreshStartHeroV2 targets={targets} transactions={transactions} rollovers={rollovers} billExcludes={billExcludes} />;
  const nw = totalEstimatedBalance(banks, accountData, transactions || []);
  const saved = Math.max(0, nw !== null ? nw : (goals && goals.length ? goals[0].saved : 0));
  const toGo = Math.max(0, target - saved);
  const pct = target > 0 ? Math.min(100, Math.round((saved / target) * 100)) : 0;
  const targetDateStr = targetMonth ? (monthLabelFromKey(targetMonth).slice(0, 3) + " " + targetMonth.slice(0, 4)) : null;
  const proj = goalProjection({ target, saved }, transactions);
  const targetDateObj = targetMonth ? new Date(Number(targetMonth.slice(0, 4)), Number(targetMonth.slice(5, 7)), 0) : null;
  const onTrack = proj && proj.projected && targetDateObj ? proj.projected <= targetDateObj : true;
  const p = computePaceV2(s);
  const post = (s.budget > 0 && p.showProj) ? (
    <p className="v2-fore">You{"\u2019"}ve spent about <b>{formatMoney(p.paceDay)}/day</b> so far. If you stick at {formatMoney(p.paceDay)}/day, that ~<span className={"v2-u" + (p.under ? "" : " v2-u-neg")}>{formatMoney(p.diff)} {p.under ? "underspend" : "overspend"}</span> {p.under ? "goes toward" : "comes off"} your {formatMoney(target)} goal.</p>
  ) : null;
  return (
    <div className="v2-wrap">
      <div className="v2-hero">
        <div className="v2-gg-head"><span className="v2-lab">Your {formatMoney(target)} goal</span><span className="v2-gg-pct">{pct}% there</span></div>
        <div className="v2-gg-togo">{formatMoney(toGo)}<em>to go</em></div>
        <div className="v2-gg-bar"><div className="v2-gg-fill" style={{ width: pct + "%" }} /></div>
        <div className="v2-gg-scale"><span><b>{formatMoney(saved)}</b> saved</span><span>{formatMoney(target)}</span></div>

function computeSafeToSpend(targets, transactions, rollovers, billExcludes) {
  const key = currentMonthKey();
  const budget = TX_CATEGORIES.reduce((s, c) => s + (Number((targets || {})[c]) || 0), 0);
  const roll = rolloverForMonth(rollovers, key);
  const spent = spendForMonth(transactions || [], key);
  const reserved = remainingBillsThisMonth(transactions, billExcludes).filter((b) => b.upcoming).reduce((s, b) => s + b.amount, 0);
  const pot = budget + roll;
  const free = pot - spent - reserved;
  const now = today();
  const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
  const daysLeft = Math.max(1, daysInMonth - now.getDate() + 1);
  const over = free < 0;
  const perDay = over ? 0 : Math.floor(free / daysLeft);
  return { key, budget, roll, spent, reserved, pot, free, daysLeft, daysInMonth, over, perDay };
}

function SafeToSpendHero({ targets, transactions, rollovers, billExcludes }) {
  const s = computeSafeToSpend(targets, transactions, rollovers, billExcludes);
  if (s.budget <= 0) return null;
  const { spent, reserved, pot, free, daysLeft, over, perDay, roll } = s;
  const pw = (v) => Math.min(100, Math.max(0, (v / Math.max(pot, 1)) * 100));
  const spentPct = pw(spent), resPct = pw(reserved);
  return (
    <div className="safe-hero">
      <div className="safe-hero-row">
        <div className="safe-hero-main">
          <span className="safe-hero-label">Safe to spend today</span>
          <span className={"safe-hero-num" + (over ? " safe-hero-over" : "")}><CountUp value={perDay} format={formatMoney} /></span>
        </div>
        <div className="safe-hero-side">
          {over
            ? <span className="safe-hero-overtext">{formatMoney(Math.abs(free))} over budget this month{reserved > 0 ? " (incl. bills to come)" : ""}</span>
            : <span>{formatMoney(free)} free {"·"} {daysLeft} day{daysLeft !== 1 ? "s" : ""} to go</span>}
          {reserved > 0 && <span className="safe-hero-roll">{formatMoney(reserved)} bills set aside</span>}
          {roll !== 0 && <span className="safe-hero-roll">{roll < 0 ? "after " + formatMoney(Math.abs(roll)) + " rollover" : "incl. " + formatMoney(roll) + " rollover"}</span>}
        </div>
      </div>
      {!over && (
        <>
          <div className="safe-hero-track safe-hero-seg">
            <div className="seg-spent" style={{ width: spentPct + "%" }} />
            <div className="seg-reserved" style={{ width: resPct + "%" }} />
          </div>
          <div className="safe-hero-legend">
            <span><span className="seg-dot seg-dot-spent" /> {formatMoney(spent)} spent</span>
            {reserved > 0 && <span><span className="seg-dot seg-dot-res" /> {formatMoney(reserved)} bills set aside</span>}

          </div>
        </>
      )}
    </div>
  );
}

function CategoryManager({ transactions, catConfig, onSaveCatConfig, onRescanCategories, onRecategorize }) {
  const [renames, setRenames] = useState({ ...(catConfig.renames || {}) });
  const [custom, setCustom] = useState((catConfig.custom || []).map((c) => ({ ...c, keywords: [...(c.keywords || [])] })));
  const [newName, setNewName] = useState("");
  const [dirty, setDirty] = useState(false);

  const nextColor = () => { const used = custom.map((c) => c.color); return CAT_PALETTE.find((c) => !used.includes(c)) || CAT_PALETTE[custom.length % CAT_PALETTE.length]; };
  const setBuiltinName = (canonical, val) => {
    setRenames((prev) => { const nx = { ...prev }; const t = val.trim(); if (!t || t === canonical) delete nx[canonical]; else nx[canonical] = t; return nx; });
    setDirty(true);
  };
  const addCustom = () => {
    const nm = newName.trim(); if (!nm) return;
    const taken = [...spendCategories(), "Income", "Other"].some((c) => c.toLowerCase() === nm.toLowerCase()) || custom.some((c) => c.name.toLowerCase() === nm.toLowerCase());
    if (taken) return;
    setCustom((prev) => [...prev, { name: nm, color: nextColor(), keywords: [] }]); setNewName(""); setDirty(true);
  };
  const updateCustom = (i, patch) => { setCustom((prev) => prev.map((c, j) => (j === i ? { ...c, ...patch } : c))); setDirty(true); };
  const removeCustom = (i) => { setCustom((prev) => prev.filter((_, j) => j !== i)); setDirty(true); };
  const save = (thenRescan) => {
    const clean = { renames, custom: custom.map((c) => ({ name: c.name.trim(), color: c.color, keywords: (c.keywords || []).map((k) => String(k).trim()).filter(Boolean) })).filter((c) => c.name) };
    onSaveCatConfig(clean); setDirty(false);
    if (thenRescan && onRescanCategories) onRescanCategories();
  };

  return (
    <div className="catman">
      <div className="glass-card dash-card">
        <span className="card-label">Your categories</span>
        <p className="subtitle" style={{ margin: "2px 0 12px" }}>Rename any to suit you {"—"} {"\u201C"}Dining{"\u201D"} could be {"\u201C"}Eating out{"\u201D"}. Renaming only changes the label; your data stays put. Add your own buckets at the bottom.</p>
        <div className="catman-list">
          {TX_CATEGORIES.map((c) => (
            <div className="catman-row" key={c}>
              <span className="cat-dot" style={{ background: catColor(c) }} />
              <input className="catman-input" value={renames[c] || c} onChange={(e) => setBuiltinName(c, e.target.value)} />
              {renames[c] && renames[c] !== c && <span className="catman-orig">was {c}</span>}
            </div>
          ))}
          {custom.map((c, i) => (
            <div className="catman-custom" key={"cust-" + i}>
              <div className="catman-row">
                <span className="cat-dot" style={{ background: c.color }} />
                <input className="catman-input" value={c.name} onChange={(e) => updateCustom(i, { name: e.target.value })} />
                <span className="catman-orig">your own</span>
                <button className="catman-del" onClick={() => removeCustom(i)} aria-label="Delete category">{"×"}</button>
              </div>
              <div className="catman-swatches">
                {CAT_PALETTE.map((col) => (
                  <button key={col} className={"catman-swatch" + (c.color === col ? " on" : "")} style={{ background: col }} onClick={() => updateCustom(i, { color: col })} aria-label="Pick colour" />
                ))}
              </div>
              <input className="catman-kw" value={(c.keywords || []).join(", ")} placeholder="Keywords, comma separated (e.g. airbnb, emirates, booking.com)" onChange={(e) => updateCustom(i, { keywords: e.target.value.split(",").map((s) => s.trim()).filter(Boolean) })} />
            </div>
          ))}
        </div>
        <div className="catman-add">
          <input className="catman-input" value={newName} placeholder="Add a category (e.g. Holidays, Kids)" onChange={(e) => setNewName(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter") addCustom(); }} />
          <button className="glass-btn primary" onClick={addCustom}>Add</button>
        </div>
      </div>

      <div className="catman-actions">
        <button className="glass-btn primary" disabled={!dirty} onClick={() => save(false)}>{dirty ? "Save changes" : "Saved"}</button>
        <button className="glass-btn primary" onClick={() => save(true)}>Save {"\u0026"} re-sort transactions</button>
      </div>
    </div>
  );
}

function FeedbackModal({ name, onClose, onSubmitted, pushToast }) {

  const call = async (action, extra) => {
    const { data, error } = await supabaseClient.functions.invoke("admin", { body: { action, ...(extra || {}) } });
    if (error) throw error;
    if (data && data.error) throw new Error(data.error);
    return data;
  };
  const load = async () => {
    setLoading(true);
    try {
      const s = await call("stats"); setStats(s.stats);
      const u = await call("list"); setUsers(u.users || []);
      try { const { data: fb } = await supabaseClient.from("feedback").select("*").order("created_at", { ascending: false }); setFeedback(fb || []); } catch (e) {}
