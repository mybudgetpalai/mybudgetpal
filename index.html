function renderAskAnswer(text) {
  const bold = (s) => {
    const parts = String(s).split("**");
    return parts.map((p, i) => (i % 2 === 1 ? <strong key={i}>{p}</strong> : p));
  };
  const lines = String(text || "").split("\n");
  const out = [];
  let table = null;
  const flushTable = () => {
    if (!table || !table.length) { table = null; return; }
    const [head, ...body] = table;
    out.push(
      <table className="ask-md-table" key={"t" + out.length}>
        <thead><tr>{head.map((c, i) => <th key={i}>{bold(c)}</th>)}</tr></thead>
        <tbody>{body.map((r, ri) => <tr key={ri}>{r.map((c, ci) => <td key={ci}>{bold(c)}</td>)}</tr>)}</tbody>
      </table>
    );
    table = null;
  };
  lines.forEach((raw, idx) => {
    const line = raw.trim();
    if (line.startsWith("|")) {
      const cells = line.split("|").map((c) => c.trim()).filter((c, i, a) => !(i === 0 && c === "") && !(i === a.length - 1 && c === ""));
      if (cells.every((c) => /^:?-{2,}:?$/.test(c))) return; // separator row
      table = table || [];
      table.push(cells);
      return;
    }
    flushTable();
    if (!line) return;
    if (/^#{1,4}\s/.test(line)) { out.push(<p className="ask-md-h" key={idx}>{bold(line.replace(/^#{1,4}\s*/, ""))}</p>); return; }

function CountUp({ value, format, duration = 800 }) {
  const [display, setDisplay] = useState(() => Number(value) || 0);
  const rafRef = useRef(null);
  useEffect(() => {
    const target = Number(value) || 0;
    const reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (reduce) { setDisplay(target); return; }
    const startT = performance.now();
    const tick = (t) => {
      const p = Math.min(1, (t - startT) / duration);
      const e = 1 - Math.pow(1 - p, 3);
      setDisplay(target * e);
      if (p < 1) rafRef.current = requestAnimationFrame(tick);
    };
    setDisplay(0);
    rafRef.current = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(rafRef.current);
  }, [value]);
  return <React.Fragment>{(format || ((n) => Math.round(n)))(display)}</React.Fragment>;
}

const FLEX_CATEGORIES = ["Dining", "Shopping", "Subscriptions"];
function planFromProfile(profile) {

  const out = []; let k = fromKey;

function plannedIncomeFor(allTargets, k, txs) {
  const o = allTargets && allTargets[k];
  if (o && Number(o["Income"]) > 0) return Math.round(Number(o["Income"]));
  const keys = allTargets ? Object.keys(allTargets).sort() : [];
  for (let i = keys.length - 1; i >= 0; i--) { const x = Number(allTargets[keys[i]]["Income"]); if (x > 0) return Math.round(x); }

}
function plannedCatFor(allTargets, k, c, fallbackAvg) {
  const o = allTargets && allTargets[k];
  if (o && TX_CATEGORIES.some((x) => Number(o[x]) > 0)) return Math.round(Number(o[c]) || 0);
  const keys = allTargets ? Object.keys(allTargets).sort() : [];
  for (let i = keys.length - 1; i >= 0; i--) {
    const t = allTargets[keys[i]];
    if (TX_CATEGORIES.some((x) => Number(t[x]) > 0)) return Math.round(Number(t[c]) || 0);

function buildProportionalPlan(txs, monthKeys, monthlySave, incomeOverride) {
  const income = Math.round(incomeOverride != null ? incomeOverride : (typicalIncome(txs, null) || 0));
  const spendBudget = Math.max(0, income - Math.round(monthlySave));
  const avg = avgSpendByCategory(txs);
  const totalAvg = TX_CATEGORIES.reduce((s, c) => s + (avg[c] || 0), 0);
  const month = {};
  let allocated = 0;
  TX_CATEGORIES.forEach((c, i) => {
    let v;
    if (i === TX_CATEGORIES.length - 1) v = Math.max(0, spendBudget - allocated);
    else { v = totalAvg > 0 ? Math.round(spendBudget * ((avg[c] || 0) / totalAvg)) : Math.round(spendBudget / TX_CATEGORIES.length); allocated += v; }
    month[c] = v;
  });
  month["Income"] = income;
  const out = {};
  monthKeys.forEach((k) => { out[k] = { ...month }; });
  return out;
}
/* Suggest how to trim `perMonth` out of the flexible categories, in proportion to their current targets. */
function flexTrimBreakdown(allTargets, firstFutureKey, perMonth, fallbackAvg) {
  const base = {};
  FLEX_CATEGORIES.forEach((c) => { base[c] = plannedCatFor(allTargets, firstFutureKey, c, fallbackAvg); });
  const total = FLEX_CATEGORIES.reduce((s, c) => s + base[c], 0);
  const trims = {};
  if (total <= 0) return trims;
  const cap = Math.min(perMonth, total);
  let used = 0;
  FLEX_CATEGORIES.forEach((c, i) => {
    let t = i === FLEX_CATEGORIES.length - 1 ? cap - used : Math.round(cap * (base[c] / total));
    t = Math.max(0, Math.min(t, base[c]));

  });

}

function normalizeDate(raw) {
  if (!raw) return null;
  const s = String(raw).trim();
  let m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if (m) return m[1] + "-" + pad2(m[2]) + "-" + pad2(m[3]);
  m = s.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})$/);
  if (m) {
    let d = +m[1], mo = +m[2], y = +m[3];
    if (mo > 12 && d <= 12) { const t = d; d = mo; mo = t; }
    if (y < 100) y += 2000;
    if (mo < 1 || mo > 12 || d < 1 || d > 31) return null;
    return y + "-" + pad2(mo) + "-" + pad2(d);
  }
  m = s.toLowerCase().match(/^(\d{1,2})\s+([a-z]{3})[a-z]*\s*(\d{4})?/);
  if (m) {
    const mo = MONTHS_SHORT.indexOf(m[2]) + 1;
    if (mo > 0) return (m[3] || String(new Date().getFullYear())) + "-" + pad2(mo) + "-" + pad2(m[1]);
  }
  const dt = new Date(s);
  if (!isNaN(dt.getTime())) return dt.toISOString().slice(0, 10);
  return null;
}
function formatTxDate(d) {
  if (!d) return "";
  if (/^\d{4}-\d{2}-\d{2}/.test(d)) return (+d.slice(8, 10)) + " " + MONTHS_LABEL[+d.slice(5, 7) - 1];
  return d;
}
function monthLabelFromKey(k) { return MONTHS_LABEL[+k.slice(5, 7) - 1]; }
function latestMonthKey(txs) {
  let max = "";
  (txs || []).forEach((t) => { if (t.date && t.date.slice(0, 7) > max) max = t.date.slice(0, 7); });
  return max || new Date().toISOString().slice(0, 7);
}
function lastNMonthKeys(endKey, n) {
  let y = +endKey.slice(0, 4), m = +endKey.slice(5, 7);
  const keys = [];
  for (let i = 0; i < n; i++) { keys.unshift(y + "-" + pad2(m)); m--; if (m === 0) { m = 12; y--; } }
  return keys;
}
function spendForMonth(txs, k) { return txs.filter((t) => t.amount < 0 && t.date.slice(0, 7) === k).reduce((s, t) => s + Math.abs(t.amount), 0); }
function incomeForMonth(txs, k) { return txs.filter((t) => t.amount > 0 && t.date.slice(0, 7) === k).reduce((s, t) => s + t.amount, 0); }
function spendByCategoryForMonth(txs, k) {
  const o = {};
  txs.filter((t) => t.amount < 0 && t.date.slice(0, 7) === k).forEach((t) => { o[t.category] = (o[t.category] || 0) + Math.abs(t.amount); });
  return o;
}
function catColor(c) { return CATEGORY_COLORS[c] || "#9aa4b8"; }
function displayCat(c) { return c === "Uncategorized" ? "Needs review" : c; }
function addMonths(key, n) { let y = +key.slice(0, 4), m = +key.slice(5, 7) + n; while (m > 12) { m -= 12; y++; } while (m < 1) { m += 12; y--; } return y + "-" + pad2(m); }
function isMidMonth() { const d = today(); const last = new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate(); return d.getDate() < last; }
function avgSpendByCategory(transactions) {
  const out = {};
  const has = transactions && transactions.length > 0;
  const keys = has ? lastNMonthKeys(latestMonthKey(transactions), 3) : [];
  const perMonth = keys.map((k) => spendByCategoryForMonth(transactions, k));
  TX_CATEGORIES.forEach((c) => {
    if (!has) { out[c] = CATEGORY_MONTHLY[c] ? CATEGORY_MONTHLY[c][CATEGORY_MONTHLY[c].length - 1] : 0; return; }
    const vals = perMonth.map((o) => o[c] || 0);
    const nz = vals.filter((v) => v > 0);
    const base = nz.length ? nz.reduce((a, b) => a + b, 0) / nz.length : 0;
    out[c] = Math.round(base);
  });
  return out;
}

/* Deduplication: key = date + description + amount. Handles genuine same-day
   identical transactions by only skipping as many copies as already exist. */
function txKey(t) {
  return (t.date || "") + "|" + (t.name || "").toLowerCase().replace(/\s+/g, " ").trim() + "|" + (Number(t.amount) || 0).toFixed(2);
}
function dedupeTransactions(incoming, existing) {
  const existingCounts = {};
  (existing || []).forEach((t) => { const k = txKey(t); existingCounts[k] = (existingCounts[k] || 0) + 1; });
  const seen = {};
  const kept = [];
  let skipped = 0;
  (incoming || []).forEach((t) => {
    const k = txKey(t);
    seen[k] = (seen[k] || 0) + 1;
    if (seen[k] > (existingCounts[k] || 0)) kept.push(t);
    else skipped++;
  });
  return { kept, skipped };
}

/* Pacing projection helpers */
function currentMonthKey() {
  const d = today();
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0");
}
function currentMonthName() {
  return today().toLocaleString("en-US", { month: "long" });
}
function completedMonthsWithData(txs) {
  const set = new Set((txs || []).filter((t) => t.date).map((t) => t.date.slice(0, 7)));
  return [...set].filter((k) => k < currentMonthKey()).sort();
}
function typicalIncome(txs, uptoKey) {
  const keys = [...new Set((txs || []).filter((t) => t.date).map((t) => t.date.slice(0, 7)))].filter((k) => !uptoKey || k <= uptoKey).sort();
  const vals = keys.map((k) => incomeForMonth(txs, k)).filter((v) => v > 0);
  if (!vals.length) return 0;
  return vals.reduce((a, b) => a + b, 0) / vals.length;
}
function totalEstimatedBalance(banks, accountData, txs) {
  const statements = (accountData && accountData.statements) || [];
  const bankRows = (accountData && accountData.bankRows) || [];
  /* Union of the saved bank list and any bank tags present on transactions.
     Demo/sample banks (and any tag mismatch) live only on the transactions,
     so iterating just `banks` dropped their money from the combined balance
     while month nets still counted it — balances went negative. */
  const names = new Set(banks || []);
  (txs || []).forEach((t) => { if (t.bank) names.add(t.bank); });
  let total = 0, any = false;
  names.forEach((b) => {
    const row = bankRows.find((r) => r.bank_name === b);
    const bal = computeBankBalance(b, statements, txs, row);
    if (bal !== null) { const cur = FX.bankCurrency[b] || "GBP"; total += (cur === FX.home ? bal : fxConvert(bal, cur, nowMonth())); any = true; }
  });
  return any ? total : null;
}
function daysInCurrentMonth() {
  const d = today();
  return new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
}
function projectMonthEnd(spentSoFar) {
  const day = today().getDate();
  if (day <= 0) return spentSoFar;
  return (spentSoFar / day) * daysInCurrentMonth();
}
function monthsUntil(dateStr) {
  if (!dateStr) return null;
  const now = new Date();
  const d = new Date(dateStr + "T00:00:00");
  if (isNaN(d)) return null;
  const months = (d.getFullYear() - now.getFullYear()) * 12 + (d.getMonth() - now.getMonth());
  return Math.max(0, months);
}
function topMerchantsFor(txs, k, n) {
  const o = {};
  txs.filter((t) => t.amount < 0 && (!k || t.date.slice(0, 7) === k)).forEach((t) => { o[t.name] = (o[t.name] || 0) + Math.abs(t.amount); });
  return Object.entries(o).map(([name, amount]) => ({ name, amount })).sort((a, b) => b.amount - a.amount).slice(0, n);
}
function ordinalDay(n) { const s = ["th", "st", "nd", "rd"], v = n % 100; return n + (s[(v - 20) % 10] || s[v] || s[0]); }
function detectRecurringBills(txs) {
  const groups = {};
  txs.filter((t) => t.amount < 0 && t.date).forEach((t) => {
    const key = t.name.toLowerCase().replace(/\d+/g, "").replace(/\s+/g, " ").trim();
    (groups[key] = groups[key] || []).push(t);
  });
  const bills = [];
  Object.values(groups).forEach((list) => {
    const months = new Set(list.map((t) => t.date.slice(0, 7)));
    if (months.size < 2) return;
    const avg = list.reduce((s, t) => s + Math.abs(t.amount), 0) / list.length;
    const steady = list.every((t) => Math.abs(Math.abs(t.amount) - avg) <= Math.max(avg * 0.2, 2));
    if (!steady) return;
    const days = list.map((t) => +t.date.slice(8, 10));
    const due = Math.round(days.reduce((a, b) => a + b, 0) / days.length);
    bills.push({ name: list[0].name, amount: Math.round(avg * 100) / 100, frequency: "Monthly", due: ordinalDay(due) });
  });
  return bills.sort((a, b) => b.amount - a.amount);
}
function buildInsights(txs, targets) {
  const out = [];
  const cur = latestMonthKey(txs);
  const prev = lastNMonthKeys(cur, 2)[0];
  const curCats = spendByCategoryForMonth(txs, cur);
  const prevCats = spendByCategoryForMonth(txs, prev);
  Object.keys(curCats).forEach((c) => {
    const a = curCats[c], b = prevCats[c];
    if (b > 20 && a > 20) {
      const chg = Math.round(((a - b) / b) * 100);
      if (chg >= 25) out.push({ type: "warning", text: displayCat(c) + " spend is up " + chg + "% vs last month." });
      else if (chg <= -25) out.push({ type: "positive", text: displayCat(c) + " spend is down " + Math.abs(chg) + "% vs last month." });
    }
  });
  const totalTarget = Object.values(targets || {}).reduce((s, v) => s + (Number(v) || 0), 0);
  const spent = spendForMonth(txs, cur);
  if (totalTarget > 0 && cur === currentMonthKey()) {
    const projected = projectMonthEnd(spent);
    if (projected > totalTarget) out.unshift({ type: "warning", text: "At this rate you'll spend ~" + formatMoney(projected) + " this month — " + formatMoney(projected - totalTarget) + " over your target." });
    else out.push({ type: "positive", text: "At this rate you'll finish ~" + formatMoney(totalTarget - projected) + " under your monthly target." });
  }
  if (totalTarget > 0) {
    if (spent <= totalTarget) out.push({ type: "positive", text: "You've used " + Math.round((spent / totalTarget) * 100) + "% of your monthly target." });
    else out.push({ type: "warning", text: "You're " + formatMoney(spent - totalTarget) + " over your total monthly target." });
  }
  const top = topMerchantsFor(txs, cur, 1)[0];
  if (top) out.push({ type: "info", text: "Your biggest merchant this month is " + top.name + " (" + formatMoney(top.amount) + ")." });
  return out.slice(0, 5);
}

function parseStatementCSV(text) {
  const lines = text.split(/\r?\n/).filter((l) => l.trim().length > 0);
  if (lines.length < 2) throw new Error("empty");
  const header = parseCSVLine(lines[0]).map((h) => h.toLowerCase());
  const dateIdx = header.findIndex((h) => h.includes("date"));
  const descIdx = header.findIndex((h) => h.includes("desc") || h.includes("narrat") || h.includes("detail") || h.includes("particular") || h.includes("name") || h.includes("merchant") || h.includes("reference"));
  const catIdx = header.findIndex((h) => h.includes("categ"));
  const amtIdx = header.findIndex((h) => h.includes("amount") || h === "value");
  const debitIdx = header.findIndex((h) => h.includes("debit") || h.includes("money out") || h.includes("withdraw") || h.includes("paid out"));
  const creditIdx = header.findIndex((h) => h.includes("credit") || h.includes("money in") || h.includes("deposit") || h.includes("paid in"));
  if (dateIdx === -1 || descIdx === -1 || (amtIdx === -1 && debitIdx === -1 && creditIdx === -1)) throw new Error("headers");
  const balIdx = header.findIndex((h) => h.includes("balance"));
  const num = (v) => { const n = Number(String(v || "").replace(/[^0-9.\-]/g, "")); return isNaN(n) ? 0 : n; };

  const rows = lines.slice(1).map((line) => {
    const cols = parseCSVLine(line);
    let amount = 0;
    if (amtIdx !== -1 && cols[amtIdx]) amount = num(cols[amtIdx]);
    else {
      const dr = debitIdx !== -1 ? Math.abs(num(cols[debitIdx])) : 0;
      const cr = creditIdx !== -1 ? Math.abs(num(cols[creditIdx])) : 0;
      amount = cr - dr;
    }
    const name = (cols[descIdx] || "").trim();
    return {
      date: normalizeDate(cols[dateIdx]) || "",
      name,
      category: catIdx !== -1 && cols[catIdx] ? cols[catIdx].trim() : categorizeByRules(name, amount),
      amount,
      _bal: balIdx !== -1 && cols[balIdx] !== undefined && String(cols[balIdx]).trim() !== "" ? num(cols[balIdx]) : null,
    };
  }).filter((t) => t.name && t.amount !== 0);

  /* Detect opening/closing from a running-balance column, if the CSV has one */
  const meta = { opening: null, closing: null, periodStart: null, periodEnd: null };
  const dated = rows.filter((r) => r.date && r._bal !== null);
  if (dated.length >= 2) {
    const sorted = [...dated].sort((a, b) => a.date.localeCompare(b.date));
    const first = sorted[0], last = sorted[sorted.length - 1];
    meta.opening = Math.round((first._bal - first.amount) * 100) / 100;
    meta.closing = last._bal;
  }
  rows.forEach((r) => { delete r._bal; });
  return { transactions: rows, meta };
}

/* PDF text extraction (pdf.js, loaded on demand) */
let pdfjsPromise = null;
function loadPdfJs() {
  if (window.pdfjsLib) return Promise.resolve(window.pdfjsLib);
  if (!pdfjsPromise) {
    pdfjsPromise = new Promise((resolve, reject) => {
      const s = document.createElement("script");
      s.src = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
      s.onload = () => {
        window.pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
        resolve(window.pdfjsLib);
      };
      s.onerror = () => reject(new Error("Couldn't load PDF reader"));
      document.head.appendChild(s);
    });
  }
  return pdfjsPromise;
}
async function extractPdfText(file) {
  const pdfjs = await loadPdfJs();
  const buf = await file.arrayBuffer();
  const doc = await pdfjs.getDocument({ data: buf }).promise;
  let text = "";
  for (let p = 1; p <= doc.numPages; p++) {
    const page = await doc.getPage(p);
    const content = await page.getTextContent();
    text += content.items.map((i) => i.str).join(" ") + "\n";
  }
  return text;
}

/* AI helpers via Supabase Edge Function "ai-statement" */
async function aiParseStatementText(text) {
  const { data, error } = await supabaseClient.functions.invoke("ai-statement", {
    body: { action: "parse", text: String(text).slice(0, 150000) },
  });
  if (error || !data || !Array.isArray(data.transactions)) {
    const raw = (data && data.error) || (error && error.message) || "";
    throw new Error(!raw || /non-2xx|Failed to send|fetch|network/i.test(raw) ? "The AI reader couldn't process this statement right now — try again in a minute, or upload a CSV export." : raw);
  }
  const txs = data.transactions.map((t) => {
    const amount = Number(t.amount) || 0;
    const name = String(t.description || "").trim();
    return { date: normalizeDate(t.date) || "", name, amount, category: categorizeByRules(name, amount) };
  }).filter((t) => t.name && t.amount !== 0);
  const numOrNull = (v) => { const n = Number(v); return v === null || v === undefined || v === "" || isNaN(n) ? null : n; };
  return {
    transactions: txs,
    meta: {
      opening: numOrNull(data.opening_balance),
      closing: numOrNull(data.closing_balance),
      periodStart: normalizeDate(data.period_start) || null,
      periodEnd: normalizeDate(data.period_end) || null,
    },
  };
}

  return data.categories;

function buildTxDigest(transactions) {
  const txs = (transactions || []).slice().sort((a, b) => (a.date < b.date ? 1 : -1)).slice(0, 1200);
  const lines = txs.map((t) => (t.date || "") + "|" + (t.name || "") + "|" + (t.amount < 0 ? "-" : "+") + Math.abs(Number(t.amount) || 0).toFixed(2) + "|" + (t.category || "Uncategorized"));

}

/* One entry point: file -> { transactions, meta } */
async function parseStatementFile(file) {
  const lower = file.name.toLowerCase();
  let result;
  if (lower.endsWith(".csv")) result = parseStatementCSV(await file.text());
  else if (lower.endsWith(".pdf")) {
    let text;
    try { text = await extractPdfText(file); }
    catch (e) {
      const m = String((e && e.message) || "");
      if (/password/i.test(m)) throw new Error("This PDF is password-protected — remove the password and try again.");
      throw new Error("Couldn't read this PDF — it may be damaged or non-standard. Try re-downloading it, or use a CSV export.");
    }
    if (!text.trim()) throw new Error("This PDF has no readable text (it may be a scanned image) — try a CSV export instead.");
    result = await aiParseStatementText(text);
  } else throw new Error("Only PDF or CSV files are supported.");
  const meta = result.meta || { opening: null, closing: null, periodStart: null, periodEnd: null };
  const dates = result.transactions.map((t) => t.date).filter(Boolean).sort();
  if (!meta.periodStart && dates.length) meta.periodStart = dates[0];
  if (!meta.periodEnd && dates.length) meta.periodEnd = dates[dates.length - 1];
  return { transactions: result.transactions, meta };
}

function rowToStmt(r) {
  return {
    id: r.id, bank: r.bank_name, fileName: r.file_name || "",
    periodStart: r.period_start || null, periodEnd: r.period_end || null,
    opening: r.opening_balance === null ? null : Number(r.opening_balance),
    closing: r.closing_balance === null ? null : Number(r.closing_balance),
    computed: r.computed_closing === null ? null : Number(r.computed_closing),
    difference: r.difference === null ? null : Number(r.difference),
    status: r.status || "unverified",
  };
}
async function fetchStatements(userId) {
  const { data, error } = await supabaseClient.from("statements").select("*").eq("user_id", userId).order("period_start", { ascending: true });
  if (error) return [];
  return (data || []).map(rowToStmt);
}
async function saveStatementToDb(userId, s) {
  /* Re-uploading the same period for the same bank updates the existing row instead of duplicating it */
  if (s.periodStart && s.periodEnd) {
    const { data: existing } = await supabaseClient.from("statements").select("*")
      .eq("user_id", userId).eq("bank_name", s.bank)
      .eq("period_start", s.periodStart).eq("period_end", s.periodEnd).limit(1);
    if (existing && existing.length) {
      const upd = {};
      if (s.opening !== null && s.opening !== undefined) upd.opening_balance = s.opening;
      if (s.closing !== null && s.closing !== undefined) upd.closing_balance = s.closing;
      if (s.fileName) upd.file_name = s.fileName;
      if (Object.keys(upd).length) {
        const { data: updated } = await supabaseClient.from("statements").update(upd).eq("id", existing[0].id).select().single();
        return rowToStmt(updated || existing[0]);
      }
      return rowToStmt(existing[0]);
    }
  }
  const { data, error } = await supabaseClient.from("statements").insert({
    user_id: userId, bank_name: s.bank, file_name: s.fileName || null,
    period_start: s.periodStart || null, period_end: s.periodEnd || null,
    opening_balance: s.opening, closing_balance: s.closing,
    computed_closing: null, difference: null, status: "unverified",
  }).select().single();
  if (error) throw error;
  return rowToStmt(data);
}

/*
 * Reconciliation: for every statement of a bank, computed closing =
 * opening + sum of ALL stored transactions for that bank inside the period.
 * Re-run after every upload, so a later "longer period" upload that fills a
 * gap automatically flips an old mismatch to reconciled.
 * Also chains statements: previous closing should equal next opening.
 */
function reconcileStatements(statements, transactions) {
  const results = [];
  statements.forEach((s) => {
    if (s.opening === null || s.closing === null || !s.periodStart || !s.periodEnd) {
      results.push({ ...s, computed: null, difference: null, status: "unverified" });
      return;
    }
    const sum = transactions
      .filter((t) => t.bank === s.bank && t.date && t.date >= s.periodStart && t.date <= s.periodEnd)
      .reduce((a, t) => a + (t.amountNative !== undefined ? t.amountNative : t.amount), 0);
    const computed = Math.round((s.opening + sum) * 100) / 100;
    const difference = Math.round((s.closing - computed) * 100) / 100;
    results.push({ ...s, computed, difference, status: Math.abs(difference) <= 0.01 ? "reconciled" : "mismatch" });
  });
  return results;
}
function chainIssues(statements) {
  const byBank = {};
  statements.forEach((s) => { (byBank[s.bank] = byBank[s.bank] || []).push(s); });
  const issues = [];
  Object.entries(byBank).forEach(([bank, list]) => {
    const sorted = [...list].filter((s) => s.periodStart).sort((a, b) => a.periodStart.localeCompare(b.periodStart));
    for (let i = 1; i < sorted.length; i++) {
      const prev = sorted[i - 1], cur = sorted[i];
      if (prev.periodEnd && cur.periodStart) {
        const gapDays = (new Date(cur.periodStart) - new Date(prev.periodEnd)) / 86400000;
        if (gapDays > 3) issues.push({ bank, type: "gap", text: "Possible missing statement between " + prev.periodEnd + " and " + cur.periodStart });
      }
      const overlaps = prev.periodEnd && cur.periodStart && cur.periodStart <= prev.periodEnd;
      if (!overlaps && prev.closing !== null && cur.opening !== null && Math.abs(prev.closing - cur.opening) > 0.01) {
        issues.push({ bank, type: "chain", text: "Closing balance (" + formatMoneyNative(prev.closing, FX.bankCurrency[bank] || "GBP") + ") doesn't match next opening (" + formatMoneyNative(cur.opening, FX.bankCurrency[bank] || "GBP") + ")" });
      }
    }
  });
  return issues;
}
async function persistReconciliation(oldStatements, newStatements) {
  const oldById = Object.fromEntries(oldStatements.map((s) => [s.id, s]));
  await Promise.all(newStatements.map((s) => {
    const o = oldById[s.id];
    if (o && o.status === s.status && o.computed === s.computed && o.difference === s.difference) return Promise.resolve();
    return supabaseClient.from("statements").update({ computed_closing: s.computed, difference: s.difference, status: s.status }).eq("id", s.id);
  }));
}

/* Current balance per bank: anchor on the latest statement closing balance,
   then roll forward any transactions dated after that statement. Falls back
   to the onboarding starting balance if no statement has balances yet. */
function computeBankBalance(bank, statements, transactions, bankRow) {
  const withClosing = statements.filter((s) => s.bank === bank && s.closing !== null && s.periodEnd).sort((a, b) => a.periodEnd.localeCompare(b.periodEnd));
  if (withClosing.length) {
    const anchor = withClosing[withClosing.length - 1];
    const after = transactions.filter((t) => t.bank === bank && t.date && t.date > anchor.periodEnd).reduce((a, t) => a + (t.amountNative !== undefined ? t.amountNative : t.amount), 0);
    return Math.round((anchor.closing + after) * 100) / 100;
  }
  if (bankRow && bankRow.starting_balance !== null && bankRow.starting_balance !== undefined) {
    const from = bankRow.as_of_date || "";
    const after = transactions.filter((t) => t.bank === bank && t.date && t.date >= from).reduce((a, t) => a + (t.amountNative !== undefined ? t.amountNative : t.amount), 0);
    return Math.round((Number(bankRow.starting_balance) + after) * 100) / 100;
  }
  /* No statement close and no starting balance to anchor on. Rather than dropping
     the bank entirely (which made combined balances understate reality and could
     even go negative), assume it opened at 0 across the data we have and use the
     net of its transactions — the same lenient basis the summary screen uses. */
  const bankTx = transactions.filter((t) => t.bank === bank && t.date);
  if (bankTx.length) {
    const net = bankTx.reduce((a, t) => a + (t.amountNative !== undefined ? t.amountNative : t.amount), 0);
    return Math.round(net * 100) / 100;
  }
  return null;
}

  const [pending, setPending] = useState(null); // { transactions, meta, fileName } awaiting manual balances
  const [openingInput, setOpeningInput] = useState("");
  const [closingInput, setClosingInput] = useState("");
  const inputRef = useRef(null);

  const handleFile = async (file) => {
    if (!bank) { pushToast("Pick which bank this statement is from first", "error"); return; }
    const vErr = validateFile(file);
    if (vErr) { pushToast(vErr, "error"); return; }
    const lower = file.name.toLowerCase();
    setBusy(lower.endsWith(".pdf") ? "AI is reading your PDF…" : "Reading file…");
    try {
      const { transactions, meta } = await parseStatementFile(file);
      if (!transactions.length) throw new Error("No transactions found in that file — check it’s a bank statement with a transaction list.");
      setBusy(false);
      if (meta.opening !== null && meta.closing !== null) {
        onImport(transactions, bank, meta, file.name, file);
      } else {
        setOpeningInput(meta.opening !== null ? String(meta.opening) : "");
        setClosingInput(meta.closing !== null ? String(meta.closing) : "");
        setPending({ transactions, meta, fileName: file.name, rawFile: file });
      }
    } catch (e) {
      setBusy(false);
      pushToast(e.message || "Couldn't read that file — check the format.", "error");
    }
  };

  const finishPending = (withBalances) => {
    const meta = { ...pending.meta };
    if (withBalances) {
      meta.opening = openingInput === "" ? null : Number(openingInput);
      meta.closing = closingInput === "" ? null : Number(closingInput);
    }
    onImport(pending.transactions, bank, meta, pending.fileName, pending.rawFile);
  };

  const handleDrop = (e) => {
    e.preventDefault(); setDragActive(false);
    if (e.dataTransfer.files?.[0]) handleFile(e.dataTransfer.files[0]);
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="glass-card modal-card" onClick={(e) => e.stopPropagation()}>
        <div className="brand-row" style={{ marginBottom: 12, justifyContent: "space-between" }}>
          <span className="brand-name">Upload statement</span>
          <button className="icon-btn" onClick={onClose} aria-label="Close" style={{ color: "var(--ink)" }}>×</button>
        </div>

        {!pending && (
          <>
            <p className="subtitle">Which bank is this statement from?</p>
            <div className="modal-bank-row">
              {(banks && banks.length ? banks : []).map((b) => (
                <button key={b} className={"chip " + (bank === b ? "chip-selected" : "")} onClick={() => setBank(b)}>
                  <span>{b}</span>
                  {bank === b && <span className="check-badge"><Icon name="check" size={11} strokeWidth={3.2} /></span>}
                </button>
              ))}
            </div>
            <div
              className={"dropzone " + (dragActive ? "dropzone-active" : "") + (!bank ? " dropzone-disabled" : "")}
              onDragOver={(e) => { e.preventDefault(); setDragActive(true); }}
              onDragLeave={() => setDragActive(false)}
              onDrop={handleDrop}
              onClick={() => bank && inputRef.current?.click()}
            >
              <p className="dropzone-text">{busy ? busy : bank ? "Drag & drop a PDF or CSV here, or click to browse" : "Select a bank above to enable upload"}</p>
              <input ref={inputRef} type="file" accept=".csv,.pdf" style={{ display: "none" }}
                onChange={(e) => e.target.files?.[0] && handleFile(e.target.files[0])} />
            </div>
            <p className="summary-note" style={{ marginTop: 14 }}>CSV needs Date, Description and Amount (or Debit/Credit) columns. PDFs are read by AI.</p>
          </>
        )}

        {pending && (
          <>
            <p className="subtitle">
              We couldn't find the opening and closing balances on this statement
              {pending.meta.periodStart ? " (" + pending.meta.periodStart + " → " + pending.meta.periodEnd + ")" : ""}.
              Enter them so we can check nothing is missing.
            </p>
            <div className="balance-row" style={{ marginBottom: 6 }}>
              <div className="balance-field">
                <label className="field-label">Opening balance</label>
                <div className="target-input-wrap" style={{ width: "100%" }}>
                  <span className="target-currency">{homeSym()}</span>
                  <input className="target-input" style={{ width: "100%" }} type="number" placeholder="0"
                    value={openingInput} onChange={(e) => setOpeningInput(e.target.value)} />
                </div>
              </div>
              <div className="balance-field">
                <label className="field-label">Closing balance</label>
                <div className="target-input-wrap" style={{ width: "100%" }}>
                  <span className="target-currency">{homeSym()}</span>
                  <input className="target-input" style={{ width: "100%" }} type="number" placeholder="0"
                    value={closingInput} onChange={(e) => setClosingInput(e.target.value)} />
                </div>
              </div>
            </div>
            <div className="nav-row">
              <button className="glass-btn ghost" onClick={() => finishPending(false)}>Skip check</button>
              <button className="glass-btn primary" disabled={openingInput === "" || closingInput === ""} onClick={() => finishPending(true)}>Import & check</button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

function AuthScreen({ onDone, onSkip, initialMode, onOpenLegal, onError, onBack }) {
  const [mode, setMode] = useState(initialMode || "login");
  const [submitting, setSubmitting] = useState(false);
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [confirmPassword, setConfirmPassword] = useState("");
  const isLogin = mode === "login", isSignup = mode === "signup", isForgot = mode === "forgot";
  const canSubmit = isForgot
    ? email.trim().length > 0
    : isSignup
    ? email.trim().length > 0 && password.length > 0 && password === confirmPassword
    : email.trim().length > 0 && password.length > 0;

  return (
    <div className="page stage-fade">
      <div className="blob blob1" /><div className="blob blob2" /><div className="blob blob3" />
      <div className="glass-card auth-card">
        <div className="brand-row">{onBack && <button className="icon-btn back-btn" onClick={onBack} aria-label="Back">←</button>}<div className="brand-dot" /><span className="brand-name">{APP_NAME}</span></div>
        {isSignup && (
          <div className="beta-callout">
            <span className="beta-callout-tag">BETA</span>
            <span>Please don't use a real password. For now, just use <strong>123456</strong>.</span>
          </div>
        )}
        {isForgot ? (
          <><h1 className="title">Reset your password</h1><p className="subtitle">We'll send a reset link to your email.</p></>
        ) : (
          <><h1 className="title">{isLogin ? "Welcome back" : "Create your account"}</h1>
          <p className="subtitle">{isLogin ? "Log in to keep tracking your finances." : "Let's get you set up."}</p></>
        )}
        <div className="field-group">
          <label className="field-label">Email</label>
          <input className="glass-input" type="email" placeholder="you@example.com" value={email} onChange={(e) => setEmail(e.target.value)} />
        </div>
        {!isForgot && (
          <div className="field-group">
            <label className="field-label">Password</label>
            <input className="glass-input" type="password" placeholder="••••••••" value={password} onChange={(e) => setPassword(e.target.value)} />
          </div>
        )}
        {isSignup && (
          <div className="field-group">
            <label className="field-label">Confirm password</label>
            <input className="glass-input" type="password" placeholder="••••••••" value={confirmPassword} onChange={(e) => setConfirmPassword(e.target.value)} />
          </div>
        )}
        {isLogin && <button className="link-btn" onClick={() => setMode("forgot")}>Forgot password?</button>}
        <button className="glass-btn primary" disabled={!canSubmit || submitting} onClick={async () => {
          setSubmitting(true);
          try {
            if (isForgot) {
              const { error } = await supabaseClient.auth.resetPasswordForEmail(email);
              if (error) return onError(error.message);
              onError("Check your email for a reset link.", "success");
              return;
            }
            if (mode === "signup") {
              const { data, error } = await supabaseClient.auth.signUp({ email, password });
              if (error) return onError(error.message);
              if (!data.session) {
                onError("Account created. Check your email to confirm before logging in.", "success");
                return;
              }
              onDone(mode, data.user?.id, null);
            } else {
              const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
              if (error) return onError(error.message);
              const profile = await fetchProfile(data.user.id);
              onDone(mode, data.user.id, profile);
            }
          } catch (e) {
            onError("Something went wrong: " + (e?.message || "please try again"));
          } finally {
            setSubmitting(false);
          }
        }}>
          {submitting ? <span className="btn-spinner" /> : isForgot ? "Send reset link" : isLogin ? "Log in" : "Sign up"}
        </button>
        <div className="switch-row">
          {isForgot ? (
            <span>Remembered it? <button className="link-btn inline" onClick={() => setMode("login")}>Log in</button></span>
          ) : isLogin ? (
            <span>New here? <button className="link-btn inline" onClick={() => setMode("signup")}>Sign up</button></span>
          ) : (
            <span>Already have an account? <button className="link-btn inline" onClick={() => setMode("login")}>Log in</button></span>
          )}
        </div>
        <p className="legal-note">
          By continuing you agree to our{" "}
          <button className="link-btn inline" onClick={() => onOpenLegal("terms")}>Terms</button> and{" "}
          <button className="link-btn inline" onClick={() => onOpenLegal("privacy")}>Privacy Policy</button>
        </p>
      </div>
    </div>
  );
}

function OnboardingScreen({ onDone, userId, pushToast, onLogout, initialName, initialBanks }) {
  const [step, setStep] = useState(0);
  const [name, setName] = useState(initialName || "");
  const [currencies, setCurrencies] = useState(["GBP"]);
  const [multiCurrency, setMultiCurrency] = useState(false);
  const [bankCurrency, setBankCurrency] = useState(() => {
    const m = {}; (initialBanks || []).forEach((b) => { m[b] = UAE_BANKS.includes(b) ? "AED" : "GBP"; }); return m;
  });
  const banks = Object.keys(bankCurrency);
  const [savvy, setSavvy] = useState(null);
  const [tracking, setTracking] = useState(null);
  const [balanceCheck, setBalanceCheck] = useState(null);
  const [goals, setGoals] = useState([]);
  const [submitting, setSubmitting] = useState(false);

  const currencyStepOk = currencies.length >= 1 && (!multiCurrency || currencies.length === 2);
  const canContinue = [
    name.trim().length > 0, currencyStepOk, banks.length > 0, savvy !== null, tracking !== null, balanceCheck !== null, goals.length > 0,
  ][step];

  const setPrimary = (c) => setCurrencies((prev) => (prev[1] === c ? [c] : (prev[1] ? [c, prev[1]] : [c])));
  const setSecondary = (c) => setCurrencies((prev) => [prev[0], c]);
  const onToggleMulti = (on) => { setMultiCurrency(on); if (!on) setCurrencies((prev) => [prev[0]]); };
  const toggleBankCur = (b, cur) => setBankCurrency((prev) => {
    const next = { ...prev };
    if (next[b] === cur) delete next[b]; else next[b] = cur;
    return next;
  });
  React.useEffect(() => {
    setBankCurrency((prev) => {
      const next = {}; let changed = false;
      Object.entries(prev).forEach(([b, c]) => { if (currencies.includes(c)) next[b] = c; else changed = true; });
      return changed ? next : prev;
    });
  }, [currencies]);
  const toggleGoal = (g) => setGoals((prev) => prev.includes(g) ? prev.filter((x) => x !== g) : [...prev, g]);
  const next = async () => {
    if (step === ONBOARD_STEPS - 1) {
      setSubmitting(true);
      const { error: pErr } = await supabaseClient.from("profiles").upsert({ id: userId, name: name.trim(), home_currency: currencies[0] });
      const existingBanks = await fetchBanks(userId);
      const existingNames = existingBanks.map((r) => r.bank_name);
      const toAdd = banks.filter((b) => !existingNames.includes(b));
      const toRemove = existingNames.filter((n) => !banks.includes(n));
      let bErr = null;
      if (toAdd.length) { const { error } = await supabaseClient.from("banks").insert(toAdd.map((b) => ({ user_id: userId, bank_name: b, currency: bankCurrency[b] || "GBP" }))); bErr = error; }
      if (toRemove.length) { try { await supabaseClient.from("banks").delete().eq("user_id", userId).in("bank_name", toRemove); } catch (e) {} }
      const check = await fetchProfile(userId);
      const savedBanks = await fetchBanks(userId);
      const banksOk = banks.every((b) => savedBanks.some((r) => r.bank_name === b));
      if (pErr || bErr || !check?.name || !banksOk) {
        const msg = (pErr || bErr)?.message
          || (!check?.name ? "your profile didn't save (profiles table permissions)"
          : "your banks didn't save (banks table permissions)");
        pushToast("Couldn't save: " + msg, "error");
        setSubmitting(false);
        return;
      }
      setSubmitting(false);
      onDone({ name: name.trim(), banks, currencies });
    }
    else setStep((s) => s + 1);
  };
  const back = () => setStep((s) => Math.max(s - 1, 0));

  return (
    <div className="page stage-fade">
      <div className="blob blob1" /><div className="blob blob2" /><div className="blob blob3" />
      <div className={"glass-card onboard-card" + (step === 0 ? " onboard-compact" : "")}>
        <div className="progress-dots">
          {Array.from({ length: ONBOARD_STEPS }).map((_, i) => (
            <div key={i} className={"dot " + (i <= step ? "dot-active" : "")} />
          ))}
        </div>

        {step === 0 && (
          <div className="step">
            <h1 className="title">Nice to meet you, what's your name?</h1>
            <p className="subtitle">Just so we know what to call you — nothing formal.</p>
            <input className="glass-input" type="text" placeholder="Your name" value={name} onChange={(e) => setName(e.target.value)} autoFocus />
          </div>
        )}
        {step === 1 && (
          <div className="step">
            <h1 className="title">Which currency do you bank in?</h1>
            <p className="subtitle">Pick your main currency — your totals and budgets will show in this.</p>
            <div className="segmented">
              {CURRENCIES.map((c) => (
                <button key={c} className={"segment " + (currencies[0] === c ? "segment-active" : "")} onClick={() => setPrimary(c)}>
                  <span>{CURRENCY_META[c].flag} {c} — {CURRENCY_META[c].label}</span>
                  {currencies[0] === c && <span className="check-badge"><Icon name="check" size={11} strokeWidth={3.2} /></span>}
                </button>
              ))}
            </div>
            <label className="currency-multi">
              <input type="checkbox" checked={multiCurrency} onChange={(e) => onToggleMulti(e.target.checked)} />
              <span>I use more than one currency</span>
            </label>
            {multiCurrency && (
              <div className="currency-second">
                <p className="subtitle" style={{ marginBottom: 8 }}>And your second currency:</p>
                <div className="segmented">
                  {CURRENCIES.filter((c) => c !== currencies[0]).map((c) => (
                    <button key={c} className={"segment " + (currencies[1] === c ? "segment-active" : "")} onClick={() => setSecondary(c)}>
                      <span>{CURRENCY_META[c].flag} {c} — {CURRENCY_META[c].label}</span>
                      {currencies[1] === c && <span className="check-badge"><Icon name="check" size={11} strokeWidth={3.2} /></span>}
                    </button>
                  ))}
                </div>
                <p className="currency-note">We support two currencies while we build out the rest — you can add more later in Settings.</p>
              </div>
            )}
          </div>
        )}
        {step === 2 && (
          <div className="step">
            <h1 className="title">{currencies.length > 1 ? "Which banks do you use?" : "Who's your bank?"}</h1>
            <p className="subtitle">{currencies.length > 1 ? "Pick your bank(s) under each currency." : "Select all that apply. Don't see yours? Add more later in Settings."}</p>
            {currencies.map((cur) => (
              <div className="currency-bank-group" key={cur}>
                {currencies.length > 1 && <div className="currency-bank-head">{CURRENCY_META[cur].flag} {cur} accounts</div>}
                <div className="bank-grid">
                  {(CURRENCY_BANKS[cur] || BANKS).map((b) => {
                    const sel = bankCurrency[b] === cur;
                    return (
                      <button key={cur + b} className={"chip bank-chip " + (sel ? "chip-selected" : "")} onClick={() => toggleBankCur(b, cur)}>
                        <span>{b}</span>
                        {sel && <span className="check-badge"><Icon name="check" size={11} strokeWidth={3.2} /></span>}
                      </button>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>
        )}
        {step === 3 && (
          <div className="step">
            <h1 className="title">How smart are you with your finances?</h1>
            <div className="segmented">
              {SAVVY_OPTIONS.map((opt) => (
                <button key={opt.key} className={"segment " + (savvy === opt.key ? "segment-active" : "")} onClick={() => setSavvy(opt.key)}>
                  <span>{opt.label}</span>
                  {savvy === opt.key && <span className="check-badge"><Icon name="check" size={11} strokeWidth={3.2} /></span>}
                </button>
              ))}
            </div>
          </div>
        )}
        {step === 4 && (
          <div className="step">
            <h1 className="title">Do you currently track your spending?</h1>
            <div className="segmented">
              {TRACKING_OPTIONS.map((opt) => (
                <button key={opt.key} className={"segment " + (tracking === opt.key ? "segment-active" : "")} onClick={() => setTracking(opt.key)}>
                  <span>{opt.label}</span>
                  {tracking === opt.key && <span className="check-badge"><Icon name="check" size={11} strokeWidth={3.2} /></span>}
                </button>
              ))}
            </div>
          </div>
        )}
        {step === 5 && (
          <div className="step">
            <h1 className="title">How often do you check your bank balance?</h1>
            <div className="segmented">
              {BALANCE_OPTIONS.map((opt) => (
                <button key={opt.key} className={"segment " + (balanceCheck === opt.key ? "segment-active" : "")} onClick={() => setBalanceCheck(opt.key)}>
                  <span>{opt.label}</span>
                  {balanceCheck === opt.key && <span className="check-badge"><Icon name="check" size={11} strokeWidth={3.2} /></span>}
                </button>
              ))}
            </div>
          </div>
        )}
        {step === 6 && (
          <div className="step">
            <h1 className="title">What do you want to achieve?</h1>
            <p className="subtitle">Pick as many as apply.</p>
            <div className="goal-wrap">
              {GOALS.map((g) => (
                <button key={g} className={"chip goal-chip " + (goals.includes(g) ? "chip-selected" : "")} onClick={() => toggleGoal(g)}>
                  <span>{g}</span>
                  {goals.includes(g) && <span className="check-badge"><Icon name="check" size={11} strokeWidth={3.2} /></span>}
                </button>
              ))}
            </div>
          </div>
        )}

        <div className="nav-row">
          {step > 0 && <button className="glass-btn ghost" onClick={back} disabled={submitting}>Back</button>}
          <button className="glass-btn primary" disabled={!canContinue || submitting} onClick={next}>
            {submitting ? <span className="btn-spinner" /> : step === ONBOARD_STEPS - 1 ? "Finish" : "Continue"}
          </button>
        </div>
        <button className="onboard-escape" onClick={onLogout} disabled={submitting}>Log out / start over</button>
      </div>
    </div>
  );
}

/* ---------------- Per-bank statement upload ---------------- */

const VALID_EXTENSIONS = [".pdf", ".csv"];
const MAX_FILE_SIZE = 10 * 1024 * 1024;

function validateFile(file) {
  const lower = file.name.toLowerCase();
  const validExt = VALID_EXTENSIONS.some((ext) => lower.endsWith(ext));
  if (!validExt) return "Only PDF or CSV files are supported.";
  if (file.size > MAX_FILE_SIZE) return "File too large (max 10MB).";
  return null;
}

function BankUploadBlock({ bank, files, error, onAdd, onRemove }) {
  const [dragActive, setDragActive] = useState(false);
  const inputRef = useRef(null);

  const handleDrop = (e) => {
    e.preventDefault(); setDragActive(false);
    if (e.dataTransfer.files?.length) onAdd(e.dataTransfer.files);
  };

  return (
    <div className="bank-upload-block">
      <div className="bank-upload-head">
        <span className="bank-upload-name">{bank}</span>
        <span className={"bank-upload-count " + (files.length >= 3 ? "count-good" : "")}>
          {files.length} file{files.length !== 1 ? "s" : ""} added
        </span>
      </div>
      <div
        className={"dropzone dropzone-compact " + (dragActive ? "dropzone-active" : "") + (error ? " dropzone-error" : "")}
        onDragOver={(e) => { e.preventDefault(); setDragActive(true); }}
        onDragLeave={() => setDragActive(false)}
        onDrop={handleDrop}
        onClick={() => inputRef.current?.click()}
      >
        <p className="dropzone-text">Drag & drop, or click to browse</p>
        <input ref={inputRef} type="file" multiple accept=".pdf,.csv" style={{ display: "none" }}
          onChange={(e) => e.target.files?.length && onAdd(e.target.files)} />
      </div>
      {error && <p className="error-text">{error}</p>}
      {files.length > 0 && (
        <div className="file-list">
          {files.map((f) => (
            <div key={f.id} className="file-row">
              <div className="file-info"><span className="file-name">{f.name}</span><span className="file-size">{formatSize(f.size)}</span></div>
              <button className="file-remove" onClick={() => onRemove(f.id)}>×</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function UploadScreen({ banks, onDone, pushToast, userId, onBack, onSkip }) {
  const [filesByBank, setFilesByBank] = useState(() => Object.fromEntries(banks.map((b) => [b, []])));
  const [balanceByBank, setBalanceByBank] = useState(() => Object.fromEntries(banks.map((b) => [b, { balance: "", date: "" }])));
  const [errorsByBank, setErrorsByBank] = useState(() => Object.fromEntries(banks.map((b) => [b, null])));
  const [submitting, setSubmitting] = useState(false);

  const addFiles = (bank, fileList) => {
    const incoming = [];
    let firstError = null;
    Array.from(fileList).forEach((f) => {
      const err = validateFile(f);
      if (err) { if (!firstError) firstError = err; return; }
      incoming.push({ name: f.name, size: f.size, id: f.name + f.size + Math.random(), rawFile: f });
    });
    if (firstError) {
      setErrorsByBank((prev) => ({ ...prev, [bank]: firstError }));
      pushToast(firstError, "error");
      setTimeout(() => setErrorsByBank((prev) => ({ ...prev, [bank]: null })), 4000);
    }
    if (incoming.length) {
      setFilesByBank((prev) => ({ ...prev, [bank]: [...prev[bank], ...incoming] }));
      pushToast(incoming.length > 1 ? "Files added" : "File added", "success");
    }
  };
  const removeFile = (bank, id) => {
    setFilesByBank((prev) => ({ ...prev, [bank]: prev[bank].filter((f) => f.id !== id) }));
    pushToast("File removed", "info");
  };
  const setBalance = (bank, field, value) => setBalanceByBank((prev) => ({ ...prev, [bank]: { ...prev[bank], [field]: value } }));

  const allHaveAtLeastOne = banks.every((b) => filesByBank[b].length > 0);

  const handleContinue = async (skip) => {
    setSubmitting(true);
    const allParsed = [];
    const savedStatements = [];
    let totalSkipped = 0;
    for (const bank of banks) {
      const bal = balanceByBank[bank];
      if (bal.balance || bal.date) {
        try {
          await supabaseClient.from("banks").update({
            starting_balance: bal.balance ? Number(bal.balance) : null,
            as_of_date: bal.date || null,
          }).eq("user_id", userId).eq("bank_name", bank);
        } catch (e) {}
      }
      if (skip) continue;
      for (const f of filesByBank[bank]) {
        try {
          const path = userId + "/" + bank + "/" + Date.now() + "_" + f.name;
          await supabaseClient.storage.from("statements").upload(path, f.rawFile);
        } catch (e) { pushToast("Couldn't archive " + f.name + " to storage — continuing anyway", "info"); }
        try {
          const { transactions: parsed, meta } = await parseStatementFile(f.rawFile);
          parsed.forEach((t) => { t.bank = bank; });
          const { kept, skipped } = dedupeTransactions(parsed, allParsed);
          totalSkipped += skipped;
          if (!parsed.length) pushToast("No transactions found in " + f.name, "error");
          let stmtRow = null;
          try {
            stmtRow = await saveStatementToDb(userId, {
              bank, fileName: f.name,
              periodStart: meta.periodStart, periodEnd: meta.periodEnd,
              opening: meta.opening, closing: meta.closing,
            });
            savedStatements.push(stmtRow);
          } catch (e) {}
          kept.forEach((t) => { t._stmtId = stmtRow ? stmtRow.id : null; });
          allParsed.push(...kept);
        } catch (e) {
          pushToast("Couldn't read " + f.name + " — " + (e.message || "check the format"), "error");
        }
      }
    }
    if (!skip && !allParsed.length && totalSkipped === 0) {
      setSubmitting(false);
      pushToast("None of the files could be read — nothing was imported. Try different files, or Skip for now.", "error");
      return;
    }
    devForceUncat(allParsed);
    let saved = allParsed;
    if (allParsed.length) {
      try {
        saved = [];
        const byStmt = {};
        allParsed.forEach((t) => { (byStmt[t._stmtId || "none"] = byStmt[t._stmtId || "none"] || []).push(t); });
        for (const [stmtId, group] of Object.entries(byStmt)) {
          const rows = await saveTransactionsToDb(userId, null, group, stmtId === "none" ? null : stmtId);
          saved.push(...rows);
        }
      } catch (e) { saved = allParsed; pushToast("Transactions parsed but couldn't be saved to your account", "error"); }
      pushToast(allParsed.length + " transaction" + (allParsed.length !== 1 ? "s" : "") + " imported" + (totalSkipped > 0 ? " · " + totalSkipped + " duplicate" + (totalSkipped !== 1 ? "s" : "") + " skipped" : ""), "success");
    }
    setSubmitting(false);
    onDone(filesByBank, balanceByBank, saved, savedStatements);
  };

  return (
    <div className="page stage-fade">
      <div className="blob blob1" /><div className="blob blob2" /><div className="blob blob3" />
      <div className="glass-card upload-card">
        <div className="brand-row"><div className="brand-dot" /><span className="brand-name">{APP_NAME}</span></div>
        <h1 className="title">Upload your bank statements</h1>
        <p className="subtitle">Add at least 3 months per bank so we can spot regular patterns.</p>
        <div className="beta-callout">
          <span className="beta-callout-tag">BETA</span>
          <span>No need for a real statement — just hit <strong>Skip for now</strong> and we'll load dummy data so you can test.</span>
        </div>

        <div className="bank-upload-list">
          {banks.map((b) => (
            <div key={b}>
              <BankUploadBlock
                bank={b}
                files={filesByBank[b]}
                error={errorsByBank[b]}
                onAdd={(fl) => addFiles(b, fl)}
                onRemove={(id) => removeFile(b, id)}
              />
            </div>
          ))}
        </div>

        <div className="nav-row">
          {onBack && <button className="glass-btn ghost" disabled={submitting} onClick={onBack}>Back</button>}
          <button className="glass-btn ghost" disabled={submitting} onClick={() => (onSkip ? onSkip() : handleContinue(true))}>Skip for now</button>
          <button className="glass-btn primary" disabled={!allHaveAtLeastOne || submitting} onClick={() => handleContinue(false)}>
            {submitting ? <span className="btn-spinner" /> : "Continue"}
          </button>
        </div>
      </div>
    </div>
  );
}

function DemoUploadScreen({ currencies, onUseDemo, onSkipEmpty, onBack }) {

  const [over, setOver] = useState(false);
  const [touchDrag, setTouchDrag] = useState(null);
  const dropRef = React.useRef(null);
  const touchStartRef = React.useRef(null);
  const isOverDrop = (x, y) => {
    const el = dropRef.current;
    if (!el) return false;
    const r = el.getBoundingClientRect();
    return x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
  };
  const onFileTouchStart = (c) => (e) => {
    if (dropped[c]) return;
    const t = e.touches[0];
    touchStartRef.current = { c, x: t.clientX, y: t.clientY };
    setTouchDrag({ c, dx: 0, dy: 0 });
  };
  const onFileTouchMove = (e) => {
    const s = touchStartRef.current;
    if (!s) return;
    const t = e.touches[0];
    setTouchDrag({ c: s.c, dx: t.clientX - s.x, dy: t.clientY - s.y });
    setOver(isOverDrop(t.clientX, t.clientY));
  };
  const onFileTouchEnd = (e) => {
    const s = touchStartRef.current;
    if (!s) return;
    const t = e.changedTouches[0];
    if (t && isOverDrop(t.clientX, t.clientY)) markDropped(s.c);
    touchStartRef.current = null;
    setTouchDrag(null);
    setOver(false);
  };
  const allDone = curs.every((c) => dropped[c]);
  const doneCount = curs.filter((c) => dropped[c]).length;
  const markDropped = (c) => {
    if (dropped[c]) return;
    setDropped((prev) => {
      const next = { ...prev, [c]: true };
      if (curs.every((x) => next[x])) setTimeout(() => onUseDemo(curs), 650);
      return next;
    });
  };
  const onDropZone = (e) => {
    e.preventDefault(); setOver(false);
    const c = e.dataTransfer.getData("text/plain");
    if (c && curs.includes(c)) markDropped(c);
    else { const nextC = curs.find((x) => !dropped[x]); if (nextC) markDropped(nextC); }
  };
  return (
    <div className="page stage-fade">
      <div className="blob blob1" /><div className="blob blob2" /><div className="blob blob3" />
      <div className="glass-card upload-card">
        <div className="brand-row"><div className="brand-dot" /><span className="brand-name">{APP_NAME}</span></div>
        <h1 className="title">{multi ? "No statements handy? Try it with sample data" : "No statement handy? Try it with sample data"}</h1>
        <p className="subtitle">{multi
          ? "Drag both files into the box (or click each). We'll load a statement for each of your currencies so you can see how conversion works."
          : "Drag the file into the box (or just click it) and we'll run the full setup on a demo statement, so you can see exactly how everything works."}</p>

        <div className="demo-sim">
          <div className="demo-file-stack">
            {curs.map((c) => (
              <div key={c}
                   className={"demo-file" + (multi ? " demo-file-sm" : "") + (dropped[c] ? " demo-file-gone" : "")}
                   draggable={!dropped[c]}
                   onDragStart={(e) => { e.dataTransfer.setData("text/plain", c); e.dataTransfer.effectAllowed = "copy"; }}
                   onTouchStart={onFileTouchStart(c)}
                   onTouchMove={onFileTouchMove}
                   onTouchEnd={onFileTouchEnd}
                   onTouchCancel={onFileTouchEnd}
                   style={touchDrag && touchDrag.c === c ? { transform: "translate(" + touchDrag.dx + "px, " + touchDrag.dy + "px)", transition: "none", zIndex: 5, position: "relative" } : undefined}
                   onClick={() => markDropped(c)}
                   title="Drag me into the box, or click">
                <div className="demo-file-icon"><Icon name="file" size={18} /></div>
                <div className="demo-file-name">Sample_{c}_Statement.csv</div>

               onClick={() => { const nextC = curs.find((x) => !dropped[x]); if (nextC) markDropped(nextC); }}>
            {allDone ? "Got it ✓" : multi ? (doneCount + " of " + curs.length + " added") : "Drop the file here"}

function ProcessingScreen({ onDone, transactions }) {
  const sample = React.useMemo(() => {
    const spend = (transactions || []).filter((t) => t.amount < 0 && t.name);
    const seen = new Set();
    const uniq = [];
    for (const t of spend) {
      const k = t.name.toLowerCase();
      if (seen.has(k)) continue;
      seen.add(k); uniq.push(t);
      if (uniq.length >= 10) break;
    }
    if (uniq.length < 4) {
      const demo = [
        { name: "SPINNEYS DUBAI", category: "Groceries", amount: -184 },
        { name: "CAREEM RIDE", category: "Transport", amount: -32 },
        { name: "NETFLIX.COM", category: "Subscriptions", amount: -46 },
        { name: "STARBUCKS", category: "Dining", amount: -28 },
        { name: "AMAZON.AE", category: "Shopping", amount: -220 },
        { name: "DEWA", category: "Bills", amount: -310 },
      ];
      for (const d of demo) { if (uniq.length >= 6) break; uniq.push(d); }
    }
    return uniq;
  }, [transactions]);

  const [revealed, setRevealed] = useState(0);
  const [pct, setPct] = useState(0);

  const startedRef = React.useRef(false);
  useEffect(() => {
    if (startedRef.current) return undefined;
    startedRef.current = true;
    const total = sample.length || 1;
    let i = 0;
    let doneTimer = null;
    const tick = setInterval(() => {
      i += 1;
      setRevealed(Math.min(i, total));
      setPct(Math.min(100, Math.round((i / total) * 100)));
      if (i >= total) {
        clearInterval(tick);
        doneTimer = setTimeout(onDone, 900);
      }
    }, 420);
    return () => { clearInterval(tick); if (doneTimer) clearTimeout(doneTimer); };
  }, []);

  return (
    <div className="page stage-fade">
      <div className="blob blob1" /><div className="blob blob2" /><div className="blob blob3" />
      <div className="glass-card processing-card processing-anim-card">
        <div className="spinner" />
        <h1 className="title" style={{ marginTop: 18 }}>Coding up your transactions</h1>
        <p className="subtitle">Sorting each one into a category. This usually takes a few seconds.</p>

        <div className="code-feed">
          {sample.slice(0, revealed).map((t, i) => (
            <div className="code-row" key={i}>
              <span className="code-name">{t.name}</span>
              <span className="code-arrow">→</span>
              <span className="code-cat" style={{ background: catColor(t.category) + "22", color: catColor(t.category), borderColor: catColor(t.category) + "66" }}>
                <span className="code-cat-dot" style={{ background: catColor(t.category) }} />
                {t.category}
              </span>
            </div>
          ))}
        </div>

        <div className="progress-track" style={{ marginTop: 18 }}>
          <div className="progress-fill" style={{ width: pct + "%" }} />
        </div>
        <p className="summary-note">{pct}%</p>
      </div>
    </div>
  );
}

/* ---------------- Target setting ---------------- */

function TargetSettingScreen({ onDone, pushToast, userId, transactions, onBack, banks, accountData, isEdit }) {
  const categories = TX_CATEGORIES;
  const avg = React.useMemo(() => avgSpendByCategory(transactions), [transactions]);
  const typInc = React.useMemo(() => Math.round(typicalIncome(transactions, null)) || 0, [transactions]);
  const balEst = React.useMemo(() => {
    /* Balance at the START of the current month. Built the SAME way as the
       "last 3 months" summary screen (opening balances + net over the same
       trailing window), so the number here always reconciles with what the
       customer just saw — then back out the current month's net to land on
       the opening. Using the per-bank estimate here diverged from the summary
       whenever a bank had no starting balance or a mismatched tag. */
    const bankRows = (accountData && accountData.bankRows) || [];
    const startingBal = bankRows.reduce((s, r) => s + (Number(r.starting_balance) || 0), 0);
    const hasTx = transactions && transactions.length > 0;
    const hasStart = bankRows.some((r) => r.starting_balance !== null && r.starting_balance !== undefined && r.starting_balance !== "");
    if (!hasTx && !hasStart) return null;
    const keys = hasTx ? lastNMonthKeys(latestMonthKey(transactions), 3) : [];
    const netWindow = keys.reduce((s, k) => s + (incomeForMonth(transactions, k) - spendForMonth(transactions, k)), 0);
    const runningNow = startingBal + netWindow;
    const ck = currentMonthKey();
    const curNet = incomeForMonth(transactions || [], ck) - spendForMonth(transactions || [], ck);
    return Math.round(runningNow - curNet);
  }, [banks, accountData, transactions]);
  const curKey = currentMonthKey();

  const [step, setStep] = useState("method");
  const [method, setMethod] = useState(null);
  const [curBal, setCurBal] = useState(balEst != null ? String(balEst) : "");
  const [goalBalance, setGoalBalance] = useState("");
  const [goalMonth, setGoalMonth] = useState(addMonths(curKey, 5));
  const [saveAmount, setSaveAmount] = useState("");
  const [saveMonths, setSaveMonths] = useState(6);
  const [months, setMonths] = useState([]);
  const [budgets, setBudgets] = useState({});
  const [submitting, setSubmitting] = useState(false);

  const monthChoices = React.useMemo(() => { const out = []; for (let i = 2; i <= 23; i++) out.push(addMonths(curKey, i)); return out; }, [curKey]);
  const toMonthList = (keys) => keys.map((k) => ({ key: k, label: monthLabelFromKey(k) + " " + k.slice(0, 4), current: k === curKey }));

  const startGrid = (keys, seed) => { setMonths(toMonthList(keys)); setBudgets(seed); setStep("grid"); };
  const chooseMethod = (m) => {
    setMethod(m);
    if (m === "manual") {
      const keys = monthKeysBetween(curKey, addMonths(curKey, 6));
      const seed = {}; keys.forEach((k) => { seed[k] = { ...avg, Income: typInc }; });
      startGrid(keys, seed);
    } else setStep("goal");
  };
  const buildFromGoal = () => {
    const bal = Number(curBal) || 0;
    let keys, monthlySave;
    if (method === "balance") {
      keys = monthKeysBetween(curKey, goalMonth);
      monthlySave = Math.round(((Number(goalBalance) || 0) - bal) / keys.length);
    } else {
      keys = monthKeysBetween(curKey, addMonths(curKey, Math.max(1, Number(saveMonths) || 6) - 1));
      monthlySave = Math.round((Number(saveAmount) || 0) / keys.length);
    }
    startGrid(keys, buildProportionalPlan(transactions, keys, monthlySave, typInc || undefined));
  };

  const monthNet = (k) => (Number(budgets[k] && budgets[k].Income) || 0) - categories.reduce((s, c) => s + (Number(budgets[k][c]) || 0), 0);
  const totalSave = months.reduce((s, m) => s + monthNet(m.key), 0);
  const projectedEnd = (Number(curBal) || 0) + totalSave;
  const lastKey = months.length ? months[months.length - 1].key : goalMonth;
  const monthTotal = (k) => categories.reduce((s, c) => s + (Number(budgets[k][c]) || 0), 0);
  const applyToAll = () => {
    const first = budgets[months[0].key];
    setBudgets((prev) => Object.fromEntries(months.map((m) => [m.key, { ...first }])));
    pushToast("First month applied to all months", "success");
  };

  const balanceMonths = method === "balance" ? monthKeysBetween(curKey, goalMonth).length : 0;
  const balancePerMonth = balanceMonths ? Math.round(((Number(goalBalance) || 0) - (Number(curBal) || 0)) / balanceMonths) : 0;
  const savingsPerMonth = Math.round((Number(saveAmount) || 0) / Math.max(1, Number(saveMonths) || 6));
  const savingsEndKey = addMonths(curKey, Math.max(1, Number(saveMonths) || 6) - 1);
  const goalReady = method === "balance" ? (Number(goalBalance) > 0) : (Number(saveAmount) > 0);

  const handleFinish = async () => {
    setSubmitting(true);
    const plan = { targetBalance: Math.round(projectedEnd), targetMonth: lastKey, method: method || "manual", openingBalance: Number(curBal) || 0 };
    try {
      const keys = months.map((m) => m.key);
      await supabaseClient.from("targets").delete().eq("user_id", userId).in("month", keys);
      const rows = [];
      keys.forEach((k) => {
        categories.forEach((c) => rows.push({ user_id: userId, category: c, month: k, monthly_target: Number(budgets[k][c]) || 0 }));
        rows.push({ user_id: userId, category: "Income", month: k, monthly_target: Number(budgets[k].Income) || 0 });
      });
      const { error } = await supabaseClient.from("targets").insert(rows);
      if (error) throw error;
      pushToast("Plan saved", "success");
    } catch (e) {
      pushToast("Couldn't save your plan — make sure your targets table has a 'month' column", "error");
    }
    try { await savePlanToDb(userId, plan); } catch (e) {}
    setSubmitting(false);
    onDone(budgets[curKey] || budgets[months[0].key] || {}, plan);
  };

  if (step === "method") return (
    <div className="page stage-fade">
      <div className="blob blob1" /><div className="blob blob2" /><div className="blob blob3" />
      <div className="glass-card size-md">
        <div className="brand-row"><div className="brand-dot" /><span className="brand-name">{APP_NAME}</span></div>
        <h1 className="title">{isEdit ? "Update your plan" : "Set your plan"}</h1>
        <p className="subtitle">Pick the way that feels most natural — whichever you choose, we turn it into a simple monthly plan you can tweak.</p>
        <div className="pw-methods">
          <button className="pw-method" onClick={() => chooseMethod("balance")}>
            <span className="pw-method-title">I have a balance in mind</span>
            <span className="pw-method-sub">"I want my balance to be X by a certain month" — we work out the monthly plan for you.</span>
          </button>
          <button className="pw-method" onClick={() => chooseMethod("savings")}>
            <span className="pw-method-title">I have a savings amount in mind</span>
            <span className="pw-method-sub">"I want to save X over the next few months" — we spread it out and tell you where you land.</span>
          </button>
          <button className="pw-method" onClick={() => chooseMethod("manual")}>
            <span className="pw-method-title">I will set my own budgets</span>
            <span className="pw-method-sub">Set a monthly amount per category yourself — we tell you what that adds up to.</span>
          </button>
        </div>
        <div className="nav-row">
          {onBack && <button className="glass-btn ghost" onClick={onBack}>Back</button>}
        </div>
      </div>
    </div>
  );

  if (step === "goal") return (
    <div className="page stage-fade">
      <div className="blob blob1" /><div className="blob blob2" /><div className="blob blob3" />
      <div className="glass-card size-md">
        <div className="brand-row"><div className="brand-dot" /><span className="brand-name">{APP_NAME}</span></div>
        <h1 className="title">{method === "balance" ? "Where do you want to be?" : "How much do you want to save?"}</h1>
        <p className="subtitle">Amounts are in your home currency, across all your accounts.</p>
        <div className="field-group">
          <label className="field-label">Your balance at the start of {currentMonthName()} {balEst != null ? "(estimated from your statements)" : ""}</label>
          <input className="glass-input" type="text" inputMode="decimal" placeholder="e.g. £9,000" value={curBal === "" ? "" : (CURRENCY_SYMBOLS[FX.home] || "£") + fmtBalInput(curBal)} onChange={(e) => setCurBal(e.target.value.replace(/[^0-9.]/g, ""))} />
        </div>
        {method === "balance" && (
          <>
            <div className="field-group">
              <label className="field-label">Balance you want to reach</label>
              <input className="glass-input" type="text" inputMode="decimal" placeholder="e.g. £15,000" value={goalBalance === "" ? "" : (CURRENCY_SYMBOLS[FX.home] || "£") + fmtBalInput(goalBalance)} onChange={(e) => setGoalBalance(e.target.value.replace(/[^0-9.]/g, ""))} />
            </div>
            <div className="field-group">
              <label className="field-label">By the end of</label>
              <select className="glass-input" value={goalMonth} onChange={(e) => setGoalMonth(e.target.value)}>
                {monthChoices.map((k) => <option key={k} value={k}>{monthLabelFromKey(k) + " " + k.slice(0, 4)}</option>)}
              </select>
            </div>
            {goalReady && <p className="pw-goal-line">That means saving about <b>{formatMoney(balancePerMonth)}/month</b> for {balanceMonths} months. Next, we will split that into category budgets based on how you actually spend.</p>}
          </>
        )}
        {method === "savings" && (
          <>
            <div className="field-group">
              <label className="field-label">Amount to save</label>
              <input className="glass-input" type="text" inputMode="decimal" placeholder="e.g. £6,000" value={saveAmount === "" ? "" : (CURRENCY_SYMBOLS[FX.home] || "£") + fmtBalInput(saveAmount)} onChange={(e) => setSaveAmount(e.target.value.replace(/[^0-9.]/g, ""))} />
            </div>
            <div className="field-group">
              <label className="field-label">Over the next</label>
              <select className="glass-input" value={saveMonths} onChange={(e) => setSaveMonths(Number(e.target.value))}>
                {[3, 6, 9, 12, 18, 24].map((n) => <option key={n} value={n}>{n} months</option>)}
              </select>
            </div>
            {goalReady && <p className="pw-goal-line">That is about <b>{formatMoney(savingsPerMonth)}/month</b>{Number(curBal) ? <> — you would reach <b>{formatMoney((Number(curBal) || 0) + (Number(saveAmount) || 0))}</b> by the end of {monthLabelFromKey(savingsEndKey)} {savingsEndKey.slice(0, 4)}</> : null}. Next, we will split that into category budgets based on how you actually spend.</p>}
          </>
        )}
        <div className="nav-row">
          <button className="glass-btn ghost" onClick={() => setStep("method")}>Back</button>
          <button className="glass-btn primary" disabled={!goalReady} onClick={buildFromGoal}>Build my plan</button>
        </div>
      </div>
    </div>
  );

  return (
    <div className="page stage-fade">
      <div className="blob blob1" /><div className="blob blob2" /><div className="blob blob3" />
      <div className="glass-card target-card">
        <div className="brand-row"><div className="brand-dot" /><span className="brand-name">{APP_NAME}</span></div>
        <h1 className="title">{method === "manual" ? "Set your budgets" : "Here is your plan — adjust anything"}</h1>
        <p className="subtitle">{method === "manual" ? "Pre-filled from your recent averages. Adjust any cell — categories down the side, months across the top." : "Built from your goal, split across categories in proportion to your last few months of spending. Change any cell — your goal updates with it, so the numbers always agree."}</p>

        <div className="budget-table-wrap">
          <table className="budget-table">
            <thead>
              <tr>
                <th className="bt-corner">Category</th>
                {months.map((m) => (
                  <th key={m.key} className={"bt-month-head " + (m.current ? "bt-month-current" : "")}>
                    {monthLabelFromKey(m.key)}{m.current ? " •" : ""}
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              <tr className="bt-income-row">
                <td className="bt-cat"><span className="cat-dot" style={{ background: catColor("Income") }} />Income</td>
                {months.map((m) => (
                  <td key={m.key} className="bt-cell">
                    <span className="bt-input-wrap"><span className="bt-cur">{homeSym()}</span>
                      <input className="bt-input" type="text" inputMode="numeric" value={fmtBalInput(budgets[m.key].Income)} style={{ width: ((fmtBalInput(budgets[m.key].Income).length || 1) + 1.6) + "ch" }}
                        onChange={(e) => setBudgets((prev) => ({ ...prev, [m.key]: { ...prev[m.key], Income: e.target.value.replace(/[^0-9.]/g, "") } }))} />
                    </span>
                  </td>
                ))}
              </tr>
              {categories.map((c) => (
                <tr key={c}>
                  <td className="bt-cat"><span className="cat-dot" style={{ background: CATEGORY_COLORS[c] }} />{c}</td>
                  {months.map((m) => (
                    <td key={m.key} className="bt-cell">
                      <span className="bt-input-wrap"><span className="bt-cur">{homeSym()}</span>
                        <input className="bt-input" type="text" inputMode="numeric" value={fmtBalInput(budgets[m.key][c])} style={{ width: ((fmtBalInput(budgets[m.key][c]).length || 1) + 1.6) + "ch" }}
                          onChange={(e) => setBudgets((prev) => ({ ...prev, [m.key]: { ...prev[m.key], [c]: e.target.value.replace(/[^0-9.]/g, "") } }))} />
                      </span>
                    </td>
                  ))}
                </tr>
              ))}
              <tr className="bt-total-row">
                <td className="bt-cat">Total spend</td>
                {months.map((m) => <td key={m.key} className="bt-cell bt-total-cell"><span className="bt-total-disp"><span className="bt-total-num">{formatMoney(monthTotal(m.key))}</span></span></td>)}
              </tr>
              <tr className="bt-total-row">
                <td className="bt-cat">Saved</td>
                {months.map((m) => <td key={m.key} className={"bt-cell bt-total-cell " + (monthNet(m.key) >= 0 ? "bt-net-pos" : "bt-net-neg")}><span className="bt-total-disp"><span className="bt-total-num">{formatMoney(monthNet(m.key))}</span></span></td>)}
              </tr>
            </tbody>
          </table>
        </div>

        <div className="pw-summary">At these targets you will save about <b>{formatMoney(totalSave)}</b> over {months.length} months — that is <b>{formatMoney(projectedEnd)}</b> by the end of {monthLabelFromKey(lastKey)} {lastKey.slice(0, 4)}. This becomes your goal, and every number in the app ties back to this plan.</div>

        <button className="link-btn inline apply-all-btn" onClick={applyToAll}>Apply the first month to all months</button>

        <div className="nav-row">
          <button className="glass-btn ghost" disabled={submitting} onClick={() => setStep(method === "manual" ? "method" : "goal")}>Back</button>
          <button className="glass-btn primary" disabled={submitting} onClick={handleFinish}>
            {submitting ? <span className="btn-spinner" /> : (isEdit ? "Save my plan" : "Finish setup")}
          </button>
        </div>
      </div>
    </div>
  );
}
